body:
  text: 漢濵集卷六宋王之望撰奏議論造弓箭衣甲奏議臣輒效愚忠上冒宸聽其所陳述實蹈危機感兩宫聖知至深拔用特逹此身既已許國寧敢顧避而默默乎臣謂方今用武之時將帥専任軍中有闕何患其不自言朝廷事量度應副足矣何必他人更為之請如吳璘謹畏體國自不肯過當須求他將聞之豈免輕有邀索此門一開臣恐朝廷異日不勝其應若宣撫虞允文見得此軍果須衣甲則合密具事因泛乞製造以備緩急而令吳璘量數取撥不宜便指此一軍而有請也虞允文既罷買馬又所招效用不多而帶行錢物無所歸附故欲用以造甲謂此二萬弓箭手雖非吾招俾得吾甲而後為用亦與招軍無異而不問其人之未可用甲亦未至闕少也今年八月間虞允文纍檄總領所於宣撫司已交甲庫中取甲三千九百餘副以為所招效用之用臣為關宣撫司而吳璘盡數撥與臣十月五日主管宣諭職事以此甲無用遂盡還與璘允文既知吳璘下弓箭手闕披帶何為虛占上甲而不與也緣虞允文初到蜀中力主姚仲仲敗事恐吳璘有言求所以百方慰恱之舉隅可見如前日衲襖一事是也初臣在總領所與吳璘商議慮士卒寒冷乃進期於七月內支衣令逐家製造冬服足以卒嵗虞允文忽遣屬官任慥密諭制置王剛中令科下四川造衲襖四萬領民間所費百餘萬引郡縣騷然臣謂若諸軍闕衣則宣撫見在軍前與士卒同其暴露自當來告乃移牒制置司及諸路漕臣未得製造而會問宣撫司若果須此總領所當以官錢製造不以擾民總領所去軍前為近般運差省州郡為之則勞費數倍而倉卒之際並緣為姦何所不至會問宣撫司久而不報然此聲既出不可但已總領所遂以官錢造布衫布褲各六萬事與之并腳錢之類共只費十五萬引一月而辦送往軍前吳璘止令於河池寄庫至今支散未盡者尚多可見當時衲襖之不須作也今之造甲與此何異虞允文方赴闕奏事必須更有獻陳識者皆以為憂聖鑒聰明何所不燭但蜀地至逺朝廷必以使人為可信一誤詔令為害實深更在陛下詳之審之軍戎財賦國之大事安危所係尤當重於聽納臣願陛下取允文前後所奏試加考核若前之言後皆可迹則信而行之或聼其説而可喜責其實而無驗則不可以不察也臣孤逺一身朝無黨援非不知忤貴近之取禍但以事關利害職在咨詢茍雷同不言使一方受弊非臣所以報陛下願忠之義也伏惟聖慈密賜采擇無使臣陷於失身之戒須至奏聞者又論虞允文乞造衣甲狀臣近凖朝廷兩降劄命令四川製造衣甲甚為緊急臣已具宣撫司見在甲數奏聞上寬聖慮去訖所有本司虞允文留下招軍例物錢已盡數樁管應副支使又令諸路於就近州郡有本司錢物去處一面先次取撥不住據制置司提刑轉運及州郡公文稱期限逼促勞費搔擾四川為之鼎沸緣上件事朝廷専委制置司製造總領所催促但合支招軍例物錢别不敢干預各令依已降指揮施行然臣官名宣諭以採訪事宜為使指若耳有所聞意有所見不以上聞則是畏避懷姦顧惜官職以誤器使非陛下所以拔擢委任之意或者必以臣為姑息蜀民太過不肯體國有乏軍須臣中原人蜀中並無産業亦無親族寓居何私於蜀其所以愛惜民力者正以邊事方急未有休息之期欲為陛下繫逺方民心保固根本以備無窮之用耳於臣何利焉至於軍前合用之物自當協力濟辦在總領所二年何嘗令一事闕乏軍之勝負不特係國安危於臣一身一家利害至重豈敢立異不體緩急乎若乃得已而不已以致擾民臣若不言誰任其咎謹再條具下項右具如前臣非不知衣甲武事所急雖無前件弓箭手亦當預備但宜量緊慢旋旋為之今許尹所乞造二萬副尚有七八千副未了而又造此二萬副雖得其新復失其舊於事何益臣謂若以此招軍例物錢分下諸路憲漕各度事力於有作院去處接續製造比舊稍加工力不須大段急其期限以致搔擾於舊欠七八千副外更盡此錢而止别聽指揮豈不公私兩便謹録奏聞伏候敕旨繳奏虞宣諭所遣房漢圭招到長安忠義人赴宣諭司奏劄臣契勘虞允文申畫招收效用初謂所至旬月間可以得衆數萬故過京西日乞撥轉運司米二十萬石以贍新軍至蜀又要拘收新邉米三十五萬九十餘石令總領所紐算糶本水腳錢計三百九十餘萬引令逐項樁管以備取撥是致諸司紛然至今未息而所得效用人數絶少遂致收刺逃軍亦是不多乃使招誘沿邊諸將所結忠義百姓取其首領文狀許之以官爵賞賜臣近據虞允文借補使臣房漢圭狀稱齎虞允文字前去長安南山一帶取索忠義人頭領姓名并見管人數計一萬二千五百餘人臣再行詳審却供稱上件忠義人已有官司所管見各守把關隘即不係漢圭招到漢圭無招到人數又會李師顔報稱忠義人兵係招集團結照應梁洋關隘並聼傳統制使喚若令赴宣諭司於邊面委有所妨緣逐處忠義人各是懷土重遷自相團結以保妻子諸將因而籍之雖不可十分倚仗實足以捍守鄉井把截山谷減省戍守又可以為間探不費衣糧不仰器甲别無冀望坐獲其用如鄉社之兵委得事宜今虞允文却欲招誘以為應募之數萬一朝廷信其所説便謂實有此兵或遷來近裏離其鄉土必致驚擾諸將失此藩籬之助却須分軍防托則戰士愈少若姦猾首領徼幸爵賞亡來應命給其糧食補以名目愈更生事而終無益於實用臣但見其害不見其利也見今虞允文所遣人諸將下各有所爭訟而金州統制官郭諶更申虞允文乞降空名借補付身自行書填其事可見謹録白房漢圭狀并李師顔公文繳連在前須至奏聞者論諸軍見攻德順獨王彥未到狀臣自十一月十三日金人離德順軍將入水洛城一帶作過已具狀劄録探報事申三省樞密院機速房去訖見今敵人只在彼處去秦州五七十里中間更無關隘秦州見令兵守治平寨敵出沒剽掠附近新民却皆順蕃德順軍人馬平安糧草不闕只是正路阻隔銀牌馬由間道往來亦有被擒者敵人初來未敢輕進我久無兵馬救援遂宿留修城下寨漸為住計欲斷德順糧道以迫秦州吳璘吳拱王彥李師顔諸帥皆在此而兵少不能進發王彥之軍早來則德順攻寨之時吳璘已出彼必遁去及初到水洛城一帶時若有官軍迫逐亦須却回而王彥之師至今未報起發月日自商州到此計程一月正使即日已來亦須半月以後可到即今已是誤事臣問吳璘有何方略吳璘云已令間道往德順抽兵六千人馬三四千匹來秦州此間除守殺金平和尚原等處外併吳拱李師顔兵及秦州守戍共有萬二三千人欲於秦州臘家城治平寨諸處擺布候彼續更抽德順軍人馬會合若吳璘師出更藉吳拱等聲勢敵或可退不然須至決戰觀吳璘之意其出須在旬日之後據莭次探報敵衆約有三萬馬二萬匹亦自疲敝别無生兵吳璘語臣不須憂終無所害但深恨王彥軍馬後期致失機會夏人只在會州上下吳璘云但得金人退夏人易與不足慮也臣見在河池所有德順軍功賞書填告劄事緣德順軍三月間獲捷雖已推排未曾奏明給據八月以後立功之人皆在軍前守禦推排未得吳璘之意欲併前後功書填少減超轉而事有窒礙商量未定兼為軍務叢冗工力不及以此尚未報應臣見不住催促及出榜曉諭須至奏聞者乞遣重臣入蜀鎮撫奏劄臣契勘德順歸師失律已節次奏聞及申三省樞密院去訖四川精鋭皆屬吳璘吳璘精鋭盡在德順德順正軍三萬餘人今據吳拱所申實收到人未及七千統制將佐所存無幾但云未知下落自西南用兵無此狼狽見今除皂郊一帶王彥吳拱楊從儀梅彥等所屯共有一萬四千餘人外其殺金平至和尚原一萬六七千人半是諸州威強并興洋義士非皆徑卒又德順將士暴露之久疲敝隔絶事失機會以致陷沒連營慟哭聲震原野人懷怨心公肆怒罵其事難以盡述而王彥招到大漢等軍吳璘降到雷千户并食糧軍兵五六千人或在成州或在大安軍屯駐疑而不敢用聚而不能散反費兵將防守名為彈壓而人數不多不足相制既成猜阻得無反側此輩老小皆在敵境勢難持久兼有前後擒到畨人往往配𨽻內郡作院其數不少近利州一夕逃去七十人若或嘯聚亦足為患四川之憂不但外虞敵方安集故疆未必便來深入向去寧免侵犯彼俘我將士因之以三路解體之民而關外四州尤劇困敝重以簽刺敢勇人心離怨往往逃竄山谷四川事勢可謂寒心吳璘喪師之後方寸憂亂往者無及豈容更有疏虞為朝廷計莫若速遣腹心重臣權位出諸帥之右者倍道入蜀鎮撫而經理之庶幾可以保固救焚拯溺正在此時伏望聖慈與大臣熟議早賜裁取施行實宗社生靈之幸須至奏聞者論調護吳璘王彥奏劄臣在河池時吳璘以王彥軍馬不到頗懷忿恚每言及之聲色甚厲臣常與調護問已而二人各得御札聞有所訓飭王彥意甚自得臣問曰手詔云何王彥曰但褒奬耳臣曰可得觀乎乃出相示臣曰聖恩待將帥可謂厚矣然詔意自有抑揚人臣當居寵思危公不可以不知因指詔中德順連兵煩卿一往之語告之曰如煩卿二字豈可教至尊再道彥不覺悚然臣又曰公頗知古今亦記得郭子儀李光弼事乎李郭同為朔方節度使安思順牙門都將甚不相能及安祿山叛其時唐以子儀代思順光弼欲亡去計未決有詔令光弼持節分子儀軍出趙魏光弼惶恐入請曰一死固甘乞免妻子子儀趨下持手上堂偶坐曰今非公不能東討豈懷私忿時邪遂授以兵泣涕言别相勉以忠義訖平劇盜惟光弼之命出於天子而能降下子儀因能使子儀釋宿憾而共成功名公今得詔書更宜引咎加恭巽於宣威則上下俱善矣此亦聖朝之意也彥不復有矜色起謝曰謹受教臣又於吳璘處因事寬解二人既奉明詔皆已無事伏恐聖聰亦欲聞知須至奏聞者乞宫祠劄子臣今有危懇上瀆聖聰臣前任太府卿總領四川財賦自去年二月以後纍具劄目干叩廟堂以衰病日侵丐一宫觀差遣至八月中凖省劄赴行在供職授代將發十月二日忽領省劄蒙恩就除權戶部侍郎充川陜宣諭使方具辭免初五日又凖省劄不候告日下主管職事不許辭免仍令王剛中將帶民兵禁軍同臣與王彥措置把截蜀門候吳璘回日歸司臣所苦雖未安全以事屬軍機不敢稽違朝命於當日主管職事是時吳璘已回河池臣往即河池與吳璘相會王剛中不見前來王彥兵馬未到臣在河池兩月與吳璘同共商量措置蜀門至十二月二十四日宣撫司調發王彥往秦州吳璘只在河池臣遂依元降指揮歸司今來王剛中已召赴行在王彥自秦州回成州見被旨將帶人兵却歸金州吳璘已追抽德順戍兵回守關隘所有四川財賦總領趙沂拘催應副並無闕誤臣見今别無職業臣前在河池宿疾再作胸腹疼痛妨於言語心神昏悸氣體羸瘠醫治無效每有思慮病更增劇枝梧不前兼宣諭一司係是創置官屬吏卒虛費廪給伏乞聖慈察臣愚忠深欲為朝廷宣力非敢辭難避事實緣疾病勉強不行特賜矜憐改授宫觀差遣一次庶獲安養或冀康復他日應有煩難任使臣誓當糜捐圖報萬分冒瀆天威臣無任祈哀俟命惶懼迫切之至取進止再乞宫祠劄子臣今月七日具劄子奏聞緣臣宿疾發作枝梧不前兼吳璘已回興州任責措置把截川口去訖見今宣諭一司别無職事官屬吏卒虛費廪給乞改授一宫觀差遣尚慮天聽髙逺未孚螻蟻之誠不免再冒誅夷上干覆育伏念臣九年宦蜀兩蒙趣召將行復止委寄愈隆叨竊寵榮超逾涯分豈不欲以涓埃自效少答生成而衰病所嬰不容勉強既懷憂責難冀痊安伏望聖慈察臣精力已凋如蓋帷之久敝念臣死亡在即俾骸骨以生還天地父母之恩始終如是臣非木石當如何報也若他日幸臻勿藥自可捐軀或此身遂至填溝亦當結草情詞迫切無任惶懼戰栗延企俟罪之至取進止乞關牒赫舍哩志寧奏劄子臣聞楊存中説赫舍哩志寧見在滁州而王抃由旴𣅿路去恐與相失若王抃徑往布薩忠義處則前左副元帥書至今未到近者滁州敵將孫中憲差四人到建康投牒云王抃所持回書若依得前來丞相元帥與湯樞密書合要國書副本軍馬更不進發建康即作回牒付四人以還四人者却路中為紅巾所殺回牒却將回建康則是副元帥處往回音信皆不通逹渠抗主和議又其兵勢迫近豈不害事臣之愚意欲朝廷再寫周葵及臣前與志寧書副本下國信使副令旴眙軍關牒對境遞往左副元帥軍前志寧見書中語言庶不疑我有踈渠之意使布薩忠義亦可以為問其盱眙軍牒但云近遣王抃通都統元帥書恐王抃去路與左副元帥軍前相失故再録書本關報牒中都不説滁州關牒事只作不知四人被殺如此似亦無害更乞令宰執熟議斷自聖裁施行取進止辭免兼權直學士院奏劄臣今月十二日凖尚書省劄子備奉聖旨差臣兼權直學士院臣聞命之際感懼交并竊以禁林寓直實資潤色之才臣雖時暫兼權不當辭避緣臣久更煩使舊學荒疏衰病之餘志思凋落豈可承乏內制若或冒處必致失職以取顛隮矧今侍從之間居多文學先進之士使當此任無不具宜伏望聖慈特回誤渥改授英俊以穆師言所有前件恩命未敢祗受取進止論集議通和惟求其當奏議臣竊惟金人通和在今日事體最重陛下既欲集議以收羣䇿而示至公此誠謀及卿士之義凡與議者固當展盡底藴用副聖主虛心廣覽之誠然人心不同有如其面各言爾志不可責以雷同武王伐商誓于牧野其詩曰上帝臨汝無二爾心臣願陛下詔羣臣務盡實情以對越天地其或私意觀望其間詔臺諫勿以同異為喜怒詔宰執勿以喜怒為用舍而陛下采納之際勿以多寡為從違惟求其當以濟國事天下幸甚乞熟議和守奏議臣等竊觀布薩忠義擅回書牒語言不順亟欲進兵執辱吾審議官意在梗絶和好金主父子慮其生事故取二小使而釋之其専權怙亂勢豈能久君臣之間必將有變但恐金主之力未足以制之斯人不死禍難未歇今大言虛喝而未能侵犯者蓋野無青草馬乏芻秣深春以後豈可必其不來審議官雖回而不受禮物則所議必不成或雖相允從而别有邀索朝廷必有以處之吾欲援契丹舊例而彼以契丹為非所擬吾欲修景德故事而彼以景德為不可用吾以國信通問而彼欲遣使報謝又責吾緘封越式禮體平易既不許我稱大字又不肯號彼北朝未論四州之地歸正等人只此浮禮尚爾爭執則凡今國書誓草及稱呼禮數皆與敵意相違持是以往必不合矣審議官不専使事名位尚卑故雖遭無禮而卒得放還欲以致使副之來爾使副若往必不止此臣等雖能死莭何補於國和議既爾則邊事其可以不慮臣等至盱眙四十日問之將帥劉寶輩深以兵少力分不足制敵為懼問之漕臣宋曉輩亦以錢糧闕乏支用不繼為憂泗州雖有城壁而樓櫓器械未具敵騎出沒斥堠全無議者謂敵若犯邊必由淮右淮右空闊利於馳突若自淮右繞出真揚則泗州雖能堅守不過自保而已淮東形勢清河口為最急而隄備草草泗州去清河口一百六十餘里非控扼之所見今屯兵近四萬衆兩淮事勢單弱而委四萬衆以保一城其他要害之地恐守禦者有所不足也自敵人用兵未嘗由泗州入故城中諸將以為可守者蓋僥幸其不來耳此臣等所親見其餘諸處傳聞事體尚不論也今日之事或和或守宜速決大計必欲和議之成不知朝廷能曲從敵人意否既不能從不若早為之所敵人狡計常持兩端以􅍁我而誤我向國家靖康中和戰並議兩説互疑自春至冬卒無定䇿敵至河上猶集議而不決覆轍未逺可為龜鑑臣等願陛下與大臣熟議權利害之輕重而審處之欲和邪如何而可以必合欲守邪如何而可以必固和而不可合守而不可固遷延時月或誤大事臣等心有所見不敢隱默冒昧誅殛上瀆聖聰惟赦其狂愚而采擇之天下幸甚乞宫觀劄子臣此瀝危懇上干天聽乞改授一在外宫觀差遣伏蒙降旨未賜允從仰戴恩私涕淚交集顧臣區區之誠非敢虛飾不免再冒斧鉞以犯雷霆之威臣行年六十有餘入官將及三紀以勤補拙所至不敢辭難雖仇怨滿前讒誣駭聽而孤忠自信當官必行旁觀者皆為臣惴栗而臣不之恤也陛下神明獨運察臣於疏逺之中一對清光以臣為粗堪驅䇿心非木石豈不知聖時罕遇英主難逢乃遭遇之初遽有退休之請雖至愚暗亦不應左計如此實緣連年抱疾精力日凋朝謁步趨已憂不及豈能更為公家了辦職事若不自投間散必至顛仆伏望聖慈憐憫特回從欲之仁使衰病之身得從安養則天地父母生成之德未足為喻縱委溝壑猶當效結草之報取進止上殿再乞宫觀劄子臣頃朝辭面對嘗以奏劄瀝具危懇仰瀆宸聰緣連年抱疾精力凋耗出疆事重不敢辭難自合糜捐以身徇國乞使事回日改授一在外宫觀差遣臣到盱眙一病四十餘日雖幸生存而支離愈甚臟腑滑泄胸膈喘悶表虛多汗呼吸冷氣極畏風寒尤憚晨起心氣積損恍惚健忘稍涉思慮終日怔忪兩目昏花不能細字腰膝緩弱跪立艱難微有動作便加困殆委是勉強不前陛下若責以事功則必辜委任若許其尸素則自愧平生臣反覆自量去就甚審非敢上欺君父有邀求規避之心伏望聖慈檢會前劄早賜矜允使就安養庶幾少寬憂畏可引殘年得免顛隮以全晚節干冒天威臣不勝祈哀俟命惶懼迫切之至取進止又臣比再具奏劄乞授一在外宫觀差遣螻蟻之誠未足以動悟淵聽再降指揮不允俯伏感涕不能自已儻非情勢迫切安敢更犯天威臣瀝血之懇前三劄中布敘詳矣若臣不病語不由衷則是懷邀求規避之心欺罔君父臣之姦孰大於此自合稽諸公議顯正刑書若實抱疾疴不堪陳力則陛下亦宜憐憫俾合進退之節豈可使尸素劇部以抵曠瘝况臣去國一十七年三召中止今兹得聨法從其遭遇可謂至難焉忍輕去闕廷遽違軒陛蓋賤分涼薄福過其涯衰病所嬰不容強勉伏望睿慈察臣愚忠實非矯飾特回聖造使就休間則臣戴德銜恩沒齒無替自今至死皆陛下生成之賜也冒瀆再三罪當誅殛取進止辭免淮西宣諭使奏劄臣二十五日夜凖三省樞密院劄子奉聖旨差充淮西宣諭使臣聞命憂惶泣涕終夕臣之疾疢國信所一行盡皆見之朝廷上下盡皆知之獨不蒙陛下憫惻頃三具奏劄懇求宫觀刳心瀝血無一語欺誕既未回天意而今所差委愈更重難豈不酷哉且淮西事宜最今日安危所係既非臣鄉土又不經遊宦官吏將帥全不相識人情地利一切不知使臣強健之時亦不能辦况衰病如此邪臣精神昏眊筋力凋殘畏惡風寒如避鋒刃若使奔走邊塞顛覆何疑雖臣之一死朝廷視猶螻蟻在所不恤其於疆埸之事豈不有誤經度伏望聖慈略賜矜察以此重任改授能臣臣雖竄戮不敢奉詔與其誤國寧獲違命之誅但恐臣死之後奉公盡瘁之人皆以臣為戒耳惟陛下天地父母哀而憐之干犯天威無所逃罪取進止再辭免奏劄臣昨具奏劄辭免淮西宣諭使恩命奉聖旨依已降指揮不得再有陳請仍日下條具合行事件申尚書省臣冒瀆天威仰勤聖主再三戒敕九殞莫贖臣欲求對則腰膝緩弱不能久立陛下不信臣病試令內殿引見察其形神可見不妄臣平生所歷未嘗辭難前為四川總領之日正值軍興臣以一身橫抗三面得免踈闕後蒙就除川陜宣諭守禦蜀門臣與吳璘駐於河池經畫邊防慰撫將士雖德順失利而蜀竟無他既而得請奉祠旋被召命水行八千餘里衝冒三峽漲潦之險偶幸生存到闕兩旬便差奉使大金臣更不敢辭賴陛下保持復還闕下今兹淮西之事聞朝廷自有處畫比前三者未至甚難臣所以力辭者蓋衰病所嬰筋力甚憊心氣積損思慮不周一面事宜利害甚重恐有誤國計况臣十八日上殿已有文字丐祠數日之間劄目三上則非聞命而避事也今中外侍從才智不少豈無一人可當任使乃必欲令疲憊老病之人冒死而行竊意陛下寬仁睿智知臣下之勤勞必不忍獨於微臣逼抑如此蓋未審其實病耳伏望聖慈特賜矜察檢會纍劄改授一宫觀差遣臣屢拒詔旨罪合誅夷惟陛下哀憐幸甚乞以親王為江淮元帥奏議臣契勘宣諭之職所以宣布德意以諭其所部經度事宜所當圖上方略聼命於朝廷至於閫外之制則非其所當専也方無事時採訪申畫稟令於上且容承乏若緩急用兵豈比都督視宣撫可以責成敗之任見今將帥猶以王人會議之故可同措置將來防秋朝廷遣殿司馬步三衙之兵出戍於江北與宣諭不相統攝其肯聼其號令乎或曰敵若犯塞朝廷自别有處置臣應之曰經畫邊事須是敵人未動之前既動之後亦何所及臨時誤事必云前遣宣諭失於經度則誤國之罪専在宣諭矣宣諭獲罪固不足恤獨不知誤國之禍於宗廟社稷如何也唐使九節度圍安慶緒於相州以李光弼郭子儀皆元功不置都帥而以魚朝恩為觀軍容使事權不一遂大潰其師憲宗伐蔡使裴度督戰時韓𢎞為都統乃以度為宣慰使然度方為宰相雖以都統推𢎞而實専帥事故能有濟邇來北邊探報不一皆云金人簽兵聚糧蓄力大舉敵不動則已若其敢來必鑒采石之失別有深計亦可謂大敵矣而獨倚二宣諭以當之不亦難乎臣有愚計望陛下以親王為江淮元帥而於見任宰執中擇一人為之副以辦防秋之事將帥士卒知陛下以聖子賢王出總大柄必皆歡呼奮勵人人願效氣當百倍今方貽書北敵欲議和好彼聞吾此舉必當震怖和事愈益易集或者必謂如此則當犒設諸軍創置官屬有所費用臣謂親王不必臨邊只開府於闕下軍兵自不須犒設而使其副駐於建康鎮江之間足以增重事權張皇軍威闕下開府則亦不須多置僚屬何費之有臣非憚宣諭之行設此以自脫蓋自視才力不足獨當重責若果如臣所請將來幕府僚寀或乏使令臣不敢以不肖為辭陛下勿以和議為必成遂弛邊備臣謂正宜立武以壯國體此安危大計願陛下斷自宸衷速發大號天下幸甚再論江淮乞置元帥劄臣今月二十八日具奏論朝廷雖已通書北敵不可必和議之成遂弛邊備乞以親王為元帥以見任宰執一人為之副若僚屬乏使臣不敢以不肖為辭其意如此二十九日凖三省樞密院劄子令疾速起發不得再有辭免契勘臣所入奏乃是今日事宜國家大計何嘗辭免宣諭之行今來三省樞密院却云臣避事之言止以辭免降旨甚非臣論列本意臣今兹入覲係是召令奏事所以前奏云見擇日朝辭又稱如開元帥府臣願備僚寀之任初非敢入辭免文字但謬當事任上係安危不容不畢盡愚慮若臣所陳未當亦合諭以國論將來措置之如何使臣有所稟承而去恐不可作尋常辭免批答而已今次召臣到闕已住旬日不知所議何事兩淮中間有無險隘去處如何擘畫今三衙在此曽與不曽略令與臣等商議泛泛而來悠悠而去與兒戲無異緩急豈不誤國伏望聖慈特賜睿察再取臣前奏觀之詔宰執更加看詳臣所奏是與不是辭免如是辭免乞行顯黜若事干國計亦乞略賜經畫取進止小貼子臣伏覩三省樞密院劄子備臣所奏既經剪截全不成文理若播傳四方必貽嗤笑乞降指揮如式報行即備臣全文使天下知臣為國逺慮初非辭免伏候敕旨臣昨日得周淙報北敵以太子統軍理或有之恐是欲易布薩忠義也蓋權臣之後非此不足以為重然則敵人不為無謀而臣之愚計適足以當之矣伏乞睿照乞與錢端禮同對奏議臣今日再具奏劄冒瀆天威惶恐以俟雷霆之誅不謂聖慈俯降宸翰褒諭眷倚極於委曲臣不勝銜恩感德之誠糜捐此身何足上報臣數日以腳膝瘡瘇未任請對然以防秋事迫措置未辦曉夕煩躁寢食不安於此久留殊無補益只緣事有臣等所難獨任者所以薦貢愚衷今承聖訓令三衙與臣等同議而去至為允當臣欲初三日與錢端禮同對或初二日先令臣內殿奏事一次取進止乞修城壁壕塹關隘劄臣近凖三省樞密院劄子奉聖旨令將緊要城壁濠塹疾速措置臣今到淮西見得利害守城最為下䇿前所修築皆類兒戲止可為虛名文具豈足抗敵枉費財力耳兼軍民才獲休息未宜勞動而暑雨霖潦亦非土工之時且輟那工夫修創關隘關隘若固敵自不至城下果至城下城豈可守如夀春合淝敵來即當退保清野以困之惟濠州城有少未圓處見今相度淮西比來寧帖北耗無它亦無賊盜諸軍喜悅百姓安堵將來所憂惟在淮東海泗州耳目今未煩聖慮紛紛興訛喜亂之語不必埀天聼緩急臣等自奏聞
