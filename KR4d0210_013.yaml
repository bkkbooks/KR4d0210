body:
  text: 漢濵集卷十三宋王之望撰啓除權户部侍郎川陜宣諭使謝宰相啓奏蜀計以歸班方趨召節二民曹而諭旨就拜除書辭避莫伸凌兢罔措伏念某幼專儒學初乏吏能偶不棄於明時遂寖更於煩使關山萬里幾為莊舄之吟塵土一官久失邯鄲之步升華月士總賦坤維適丁用武之難粗免乏興之責中緣抱疾數懇奉祠賜環已戒於趣塗出綍遽驚於即授名參從槖朝宗輟江漢之行身擁使軺捫歷跨井參之分被寵靈而特異仰造化以知歸此蓋伏遇某官大度包荒至仁恤逺闡尊主庇民之略行拔賢進善之心鎮靜物情掩風流於江左陶成士類憫留滯於周南遂俾衰蹤亦叨重寄某敢不更堅晚節益勵孤忠陳力無堪曷展驅馳之效投間有請終希坱圠之恩與田太尉啓叨膺宸命濫假使權入封部以云初修緘縢而敢後恭惟某官龍韜妙略燕頷雄姿冠􅐧勇於三軍擅功名於一世視儀政路已隆節制之尊孚號廷紳行秉樞機之重眷惟疏冗雅荷照知致忝冒以如斯實吹噓之有自星軺承乏顧綿力以何堪玉帳宣威庶餘光之可借嵗華向晚鈞履具冝冀益謹於保綏用仰承於注倚賀劉舍人啓螭坳締眷鳳沼代言入題紅藥之詩兼草白麻之詔近宸光於三接演帝制於九重凡在觀瞻孰不欽羡恭惟某官英姿邁往絶識造微早逰朝董之科久振常楊之譽十年出處雅髙難進之風一節險夷始見後凋之操屬開公道益簡聖知遂升持槖之聯深副埀紳之望北門西掖已追三代之文前疑後丞行備四鄰之擢某論心有素覿德無階中禁得賢喜詞宗之見用正人當路知吾道之方亨淑氣正妍沖襟尚逺願加保嗇前對寵休賀汪殿院啓顯膺綸告擢副臺綱朝廷知公道之行天下喜正臣之進凡居庇賴舉切歡愈恭惟某官迪德粹醇凝姿敦大醖藉獨髙於人品精神自結於主知夙展英猷荐登華貫紬羣書於麟閣雅推鴻博之儒分六察於烏臺共仰端方之器聲稱彌卲眷注有加遂司擊摶之權益峻班行之望殿庭執法暫資直諒之才政路升賢行奮弼諧之緼某逺將使指欣聽除音鴈塔聯名未有披雲之便龍門引領徒深賀厦之誠嵗律凝和靈襟多裕願副九重之倚更精六氣之調賀陳殿院啓顯膺宸渙擢副臺端直聲聳聞善類增氣恭惟某官介然有守卓爾不羣奧學淵源早冠諸儒之選精忠砥礪深承明主之知樞庭方賴於彌綸憲府俄司於糾察亟升言責用警官邪殿中資執法之良朝右推得人之盛正繩直筆方觀擊搏之威尊主庇民行峻謀謨之用某幸聯末契喜聽新除懷漫刺於門墻阻伸慶謁達空函於几格徒切歡悰賀梁諫議啓顯承詔綍擢長諫垣正臣既用於朝廷公道遂行於天下凡居庇賴舉切歡愈恭惟某官識慮昭融性資閎博文髙作者追三代之醇深氣養浩然塞兩儀而剛大夙負經邦之略果膺不世之逢在憲臺髙繩愆糾繆之風居省闥擢補闕拾遺之美上方規恢大業總攬羣工勵精於仁政之端虛佇於爭臣之烈倘非雅望孰副旁求屈萬乘以心傾冠七人而首用論思獻納已隆近侍之華輔贊彌縫行秉洪鈞之重某逺將使指欣聽除音懷慢刺於門牆阻伸慶謁達空函於几格苐切歡悰賀陳檢正啓被命九重糾司兩省端人既進公議攸歸凡在觀瞻孰不欣忭恭惟某官天資梗亮德性純明名世傳芳望素隆於門閥象賢濟美聲久重於朝廷十年去國而其守不渝兩郡牧民而所至可紀賜環入覲前席輸忠益深睿哲之知擢贊平章之地惟東西二臺之設典中外萬幾之繁奏報縱橫章程靡密欲善彌綸之職必資綜練之材果副旁求式當慎簡既結知於君相行致位於公卿某逺假使軺阻通賔謁出綸詞掖喜聞一札之褒持槖禁塗更徯九遷之峻嚴凝在候福履具宜期茂養於粹和用亟承於寵渥答新利路張漕啓光奉宸綸肅將使指先聲所暨輿論交孚恭惟某官識慮詳明器能宏博一門蘭玉競秀爽於階庭再世詩書發英華於事業遊刃素更於盤錯亨衢咸跂於飛騰剖竹分符方列専城之最賜金增秩宜應細札之褒顧經理於中原資幹旋於外計詢求在列簡畀長材行觀攬轡之初益振埋輪之譽貔貅列戍迄無匱乏之憂鵷鷺近班嗣有超遷之寵某未遑馳訊先辱飛緘感佩良深敷宣罔既答夔路范漕啓期年報政騰善最於專城一節觀風耀皇華於逺服澄清所暨喜懌惟均恭惟某官奧學逢原宏材經世持身粹潔無拱璧之纎瑕遇事剸裁發新硎之遊刃洊膺眷奬擢付將輸方有事於中原實資材於外計登車攬轡信克紹於先猷鳴玉持荷行徑躋於近列某未遑馳訊先辱飛緘感佩良深敷宣罔既賀何內翰啓顯承詔綍榮踐禁林掌九重制詔之嚴極一代文儒之選士流歆寵國體增輝恭惟某官宇量宏深性資沖粹學貫天人之際智窮道德之原崑玉桂枝早植無雙之譽商瑚夏璉出為希世之珍聲實既孚飛騰果峻霜臺彈糾雅髙三院之稱諫省論思獨冠七人之列既效伏蒲之益遂膺視草之榮聖衷方急於規恢德意爰資於播告使訓詞所發如雲漢之昭回則號令之行有風霆之鼓舞眷兹能事屬在傑才鄭絪上察其小心張説時推於大手名書案上已聞倚注之深禮絶座中行有登庸之命某久違英範逺聽除音夢繞門牆悵莫伸於慶謁言形竿牘知難罄於歡悰溽暑正煩台階尚邈願謹保綏之節益圖弼亮之功賀周內翰啓光奉宸綸擢專翰苑正是久虛之席孰如已試之才四方聳聞多士歆寵恭惟某官天姿秀穎道學淵源早收宏博之科遍閲清華之地掖垣瑣闥髙論思潤色之功金馬玉堂極經術文章之選果僉諧於因任遂亟被於真除白麻推三代之英青簡擅一家之美飛騰壯嵗冠壓近班風雲之契已孚夢卜之求允屬名書案上聞御墨之新題禮絶坐中有禁林之故事某猥將使指阻造賔閎內制得賢覺朝家之增重詞宗當路喜吾道之方亨嵗律將窮台符正逺願謹保綏之節用承倚注之心賀汪侍郎啓顯膺宸命進擢臺端正論興於朝廷清標聳乎天下凡居庇賴舉切歡愈恭惟某官識度恢閎才猷超邁學富九流而達以精微之妙行髙一世而卓然純粹之歸自結淵衷亟儀華貫蓬山讎校特髙鴻博之稱柏寺糾彈益闡端方之譽嘉言既效睿眷有加肆茂出綸之恩峻躋橫榻之任正繩直筆方觀擊摶之風尊主庇民行究弼諧之用某夙叨論薦欣聽登庸雖流落遐荒莫遂鳬趨之願然依棲末契尤深燕賀之誠春氣漸和靈襟尚逺願副九重之倚更加六氣之調回知渠州張侍郎啓持使節於湘濵偶逃瘝曠假漕權於梓部益愧叨逾承空乏以何堪託庇庥而甚寵恭惟某官宏材絶俗厚德鎮浮遊利器於蟠根表疾風於徑草容臺典禮孰居制作之先從槖輸忠備罄論思之益暫違清禁逺撫名邦三刀之夢方符五袴之歌已播朱轓皂蓋聊淹師帥之賢青瑣丹墀行補公卿之缺某夙叨雅眷久闊英風朝路彯纓曽被餘光之借天涯攬轡復觀善政之成曽柔削之未修已華緘之下逮其為感幸罔既敷宣賀湯侍郎啓寵奉宸綸榮升禁路粵總司戎之政蔚為從列之光凡在庇庥舉增欣忭恭惟某官鼎鍾偉量韶濩正音德懋中庸師聖賢而有法才優通變應事物以無方自峻擢於巍科頗倦遊於常調守道難進得時則行彈擊百寮獨聳烏臺之望回翔七寺聿修扈正之官輟卿月於金門輝使星於玉壘八年夙夜一節險夷惟西南久宿於師屯故上下俱疲於餽餉帝心憂顧天詔哀矜爰遴擇於通儒俾主持於大計輕徭薄賦蠲重斂者不知幾科足食成軍儲羡財而更豐它日兵民兼裕官吏舉安頌聲上達於四聰歸覲果膺於三接對揚慷慨褒諭頻煩遂以一世之名臣亟擢九重之近侍論思獻納已髙持槖之風輔贊彌縫行副秉鈞之任某逺聞新命喜極卑情無從進旅於門牆獲倍賀列但與去思之郡邑同泳恩波回劉侍郎啓原隰載驅屬觀風而靡暇里閭在望悵披霧以無階比修記以方前忽貽緘之俯及謙撝所逮感愧交并恭惟某官一世名儒三朝近侍經探聖人之藴文為學者之師勇退禁班久忘情於軒冕樂間衡宇獨養浩於丘園雖耆耋而不衰知神明之有相上優晚節姑從琳館之遊時重老臣即聽蒲輪之召某登門未遂攬轡將還莫窺道德之光徒有典刑之慕賀新知荆南楊待制除户部侍郎啓命出宸廷班躋禁路乃眷大司徒之職國計是資爰升小常伯之聯邦基愈固郵音初播輿誦交歡恭惟某官學識髙明材猷強敏雅譽見推於衆論精忠自結於隆知晉列上卿既益饒於軍賦擢居次對爰均逸於祠庭屬分帥閫之雄遽二民曹之劇論思獻納甫持橐於日邊斂散盈虛將流錢於地上佇膺枋用式副輿言某寖别光儀欣聞布告其為慶慰罔既敷宣賀户部劉侍郎啓光膺帝命榮領民曹耆舊既升邇遐大悅恭惟某官才優開濟學探幾深揚歷三朝雅負經綸之志行藏二紀莫窺喜愠之容兹國步之多艱擇人才於已試可屬大事無逾老臣亟蒙黃髮之詢遂席青氊之舊入司邦賦出撫師屯宣勞備展於壯猷注意益歸於宿望僉諧可必柄用無疑安邊境而制四方暫借流錢之算理陽德而遂萬物行觀調鼎之功某邈在逺方莫趨崇仞馳誠千里姑勤竿牘之修竊庇一官更賴帡幪之力賀户部張侍郎啓光膺綸命進二版曹公朝資心計之良法從闡志行之效凡居庥庇孰不欣愈恭惟某官宇量宏深風猷凝粹髙文瑞世蚤擢秀於儒林卓識通方荐蜚聲於要路備更煩使綽著膚公邦禁是司人以不寃而刑罰中地官攸攝民不加賦而用度饒適當天討之行要在軍儲之裕肆疇宿望亟畀真除禁闥雍容已罄論思之益巖廊密勿即攄輔佐之功某將指遐方喜聞新渥匏瓜有守睇賔廡以無階竿牘馳誠通記司而敢後賀徐侍郎啓顯膺綸制進二版曹豈惟增近侍之光華抑亦係生民之休戚庇庥所暨鼓舞惟均恭惟某官奧學逢原宏猷絶俗夙抱經綸之藴荐躋通顯之塗用之則行信其才之卓爾折而不撓知所養之浩然久去明廷甚辜清議頃召從於間館遂亟造於亨衢既升從槖之聨益峻朝紳之望為國興利暫資心計之良惟帝念功行秉事樞之重某屬拘逺部竊聽新除懷漫刺於門牆莫伸慶謁達空函於几格徒切歡悰賀趙侍郎啓光膺宸命峻陟禁班擢由玉牒之英全付版曹之政除音初播僉論允諧恭惟某官一代偉人五陵間氣素養楩柟之用出為梁棟之須東平居家為善最樂河間好古得書至多迹其躬寒素之風固已富經綸之藴軺車屢駕久揚膚使之聲幕府既開益倚長城之重召從淮浦獨領地官雅明足國之方深軫富民之慮變通有術取豫咸宜制邦計之盈虛方資長算參廟謨之密勿行奉明綸某夙仰風猷未窺符采典遐方之餽餉焉稱使令託大厦於帡幪庶逃瘝曠賀汪侍郎啓光膺帝綍進二天官既法從之得賢覺儒林之增氣凡居庥庇孰不欣愈恭惟某官學貫六經文追兩漢才出萬夫之上身兼數器之長獨步妙齡偉五千字掞庭之對後凋雅操安二十年去國之窮雖嵗華方強仕之秋而德望比老成之舊載趣召節益簡宸衷遂升禁省之崇峻總銓衡之秩衆恨淹回之已甚咸欣汩沒之初伸軒陛雍容正賴論思之益巖廊密勿行攄輔佐之功某久濶髙風忽聞新命門闌在逺干賔謁以無階竿牘馳驅通記曹而敢後賀張都督啓寵冠機廷宏開督府既輟中台之舊用升亞傅之崇朝野聳聞華戎胥悅惟將相之用舍係國家之重輕注意允諧成功可必唐登裴度果收藩鎮之權晉用謝安坐折淮淝之冦正人既召公道聿彰恭惟某官學貫乾坤忠輸廟社早際風雲之會重披日月之光德盛勳髙佩四十載安危之寄恩深澤厚傾千萬夫懷附之心出處百罹險夷一節逢勳華之揖讓資稷契之贊襄亟延間世之賢來展濟時之略宣威障塞承制邊關隱若長城折遐衝而有裕偉然巨器降大任以何辭基密命於紫樞假專征於黃鉞運籌決勝暫煩近弼之一行列鼎調元即看中書之三入某夙蒙奬借兹聽褒遷遙睇崇墉莫展殷勤之賀恭裁短削敢稽骩骳之誠賀陳參政啓光膺命綍擢秉政機四方聳聞萬口同慶竊以聰明之主或曠世莫值其臣賢哲之人有終身不獲其位自昔所歎相逢甚難當上聖之勵精操至權而御下爰得風雲之佐仰符夢卜之求事非偶然功可立待恭惟某官氣雄百辟名重三朝堂堂表特立之規凛凛守後凋之操稽山嘯傲挹外監之髙標江左招徠踵太常之舊德粵升法從益茂英猷奮巨力以回天竭孤忠而貫日刋修史牒啓沃經幃遍儀禁路之華妙極儒林之選既論思之見效宜倚注之彌深以三十年難進之資應五百載非常之運遂膺圖任入預弼諧人期致主之秋帝恨用公之晚必將講明憲度復列聖之宏規寢息兵刑畢真儒之能事盡攄素志以闡洪猷茂凝鐘鼎之勳嗣正鈞衡之拜某逺將使指竊聽宸綸大厦斯成喜究梓人之用餘光可借寧憂績女之貧寒律方嚴台階正邈願加調於鼎食用下答於巖瞻知溫州謝宰相啓分帥閫於三山許辭重寄移守符於孤嶼載冒優恩顧慚衰朽之蹤倍費維持之賜伏念某艱窮滋甚疲苶奚堪知涯分之已逾懼禍災之叵測殘年多病嗟藥石之何功隻影自憐弔糟粳之不淑心既凋於憂患力難勉於事為仰干從欲之仁曲遂便私之請投間置散未容奉香火於殊庭辭尊居卑猶俾宣詔條於名郡獲伸志願實賴敷陳此蓋恭遇某官德業皋夔機謀伊管收賢材以凝庶績篤故舊以變澆風有奮庸熙載之能已冠帝臣之選無養生送死之憾首蒙王道之施方託餘庥庶逃大戾更藉陶鈞之運早酬田里之歸湖州到任謝宰相啓職親地禁非不遇時意廣才疏自難安迹分輔郡顧憂之託繫內朝供奉之班望過所期感深而歎伏念某蚤緣薄技冒處周行偶脫簿書之勞寖汙臺閣之選平生狷介進身恥蹈於它岐半世蹉跎得謗皆繇於非意會真人之撫運陪多士以充廷誤簡淵衷首躋法從執羈靮殆逾於千里掌絲綸幾閲於五年每進俚辭輒汙清覽展轉屢經於戎馬推排遂直於禁林雖荷眷知實憂顛仆方欲謝歸而掃軌乃蒙差擇以為州風際船回悵又違於蓬島日邊人至幸未逺於長安兹蓋伏遇某官閣下德當天心勳在王室道合聖人之用舍身為天下之安危猥憐簪橐之餘嘗接茵馮之末姑捐民社俾奉詔條惟苕霅之奧區本晉唐之名郡當干戈之際巋然獨存非師帥之賢何以善後而某素非詳練見謂重遲况丁多事之時豈任守藩之責第當陳力不敢愛身賜金爵於潁川知難企及挂衣冠於神武終冀矜從徽州到任謝宰相啓比者誤膺明詔擢領偏城地接行朝蓋今日股肱之郡世聯編籍乃平生父母之邦起廢恩深叨榮愧甚伏念某一從去國十見周星投迹異州誰復過門而問字疲精斷簡徒知仰屋以著書敢圖三錫之餘仍假一麾之便遵塗浹日入境班春城郭重來疑千載去家之鶴交遊半在或一時同隊之魚退省惘然曷為臻此惟蟠木離竒之成器由大鈞坱圠以無垠兹蓋伏遇某官閣下間出真儒中興名相坐籌帷幄收四方人物之英端委廟堂復萬里輿圖之舊俯憐衰朽久事退藏爰力挽於江湖俾再臨於民社尋童子釣逰之處雖就榛蕪望先人丘墓之墟已寬夢寐幸土思之粗慰宜民瘼之深求敢不專務拊循仰分憂顧褰帷問俗姑榮衣錦之歸上印還家終冀揮金之樂泉州到任謝宰相啓兹者恭承詔綍擢領藩條深行閩徼之山川幾同叱馭初見粵人之風俗敢廢褰帷小器易窮大鈞難報伏念某昨從詞館蒙假州麾方幸餘年自足桑榆之樂乃臨本郡日虞瓜李之嫌不勝丘壑之情冀返江湖之上屢叩閽而有請嗟襆被以無從敢圖誤恩更豫名郡雖云龔勝治姑使於撥煩正恐西華材不能於為大兹蓋伏遇某官閣下受天間氣為世元勳吉甫之憲萬邦資兼文武裴度之師百辟身繫安危俯憐遲暮之孤蹤曽是禁嚴之舊物特捐重寄用詭成功上虎節於山城換魚書於海服矧今臨治自昔要衝既先人逰宦之鄉亦賤子始生之地訪六十年之父老恍若前身佩二千石之印章敢期今日誓扶衰病誕布隆寬務令俗去於鄙夷不使民生於愁歎追成父志仰報君恩宣州到任謝宰相啓鈞播一麾僅逾旬嵗轍環萬里復返中州繇遐陬而移守輔藩緣衰病而歸榮故里生成至此糜隕以之伏念某平進孤蹤倦逰晚節少陪英俊窺大觀之圖書老侍禁嚴執建炎之羈絏雖久收於朝迹亦頻玷於詔除十奉絲綸五分符竹比治海瀕之劇不堪風土之殊亟上封章願還印紱拜散人之號心已向於江湖分凋郡之憂思復叨於民社既容卧治仍獲生還此蓋伏遇某官閣下社稷元勳廟堂真宰伊尹得聖人之任留侯為帝者之師主張吾道之權衡分别斯文之涇渭俯憐猥薄嘗共艱難新建武之官儀不圖前見數貞元之朝士今已無多記存靡間於濶疏調護曲從於安便付之近地慰此頺齡况今所領之州自昔焉依之地承泮水二車之乏歷三朝兩紀之餘因久吏而長子孫幸嘗諳習見髙年而問風俗敢忘拊循除郡謝宣撫開府啓注安危之意有嚴制閫之雄布寬大之條猥預殿邦之重伏念某仕厯三朝年逾八十雖殘年奄奄待盡田廬而一心惓惓尚存帝室孰是急流勇退踐角巾東路之言惟有去後見思詠華屋西州之句蓋騶侏儒亡益而不任事若支離疏有疾而不受功徒費十束之薪空索一囊之粟故應辭仕詎敢妨功不圖軫簪履故物之遺猶進冒爵齒達尊之寵兹蓋伏遇某官兩京循吏三國名臣虎觀論經鼇扉視草寓大學士圖書之直聽東諸侯鼓角之雄猥以庸虛適相先後比還禁路復厠英躔雖龍豬異閭已不侔而虎鼠同宫亦何間圖齊雲之像固難並韋郎白傅之賢凝燕寢之香猶堪佇枚叟鄒生之召代賀范檢正啓光奉宸綸糾司省闥除音誕布公論僉諧恭惟某官德粹圭璋學吞雲夢懷濟世之良具挺許國之精忠公西束帶而立朝尤長専對孟博登車而攬轡綽有餘風方持節而載驅忽賜環而趨召顧惟東西二臺之設實總中外萬幾之繁奏報縱橫文書填委必得詳明之士俾躋釐正之官果被旁求式當遴簡鸞臺鳳閣既密輔於台司金馬玉堂即進登於法從某屬居官次阻造賔閎僻守邊城遙託千間之庇渙揚大號欣聆一札之傳涼氣初回沖襟尚逺更願保綏之謹益膺寵渥之臻代賀孟郡王帥紹興啓懇辭政路出鎮藩維孤棘敘升峻班聯於亞傅齋壇顯拜專節制於舊封恭惟某官以不世之才遇非常之運用兼文武地極親賢持橐禁林早稱國器視儀揆路益聳巖瞻丹書盟異姓之王大纛建中軍之帥入參婉畫出殿大邦艱難百為夷險一意罄送往事居之節協息民繼好之圖遂秉鴻樞密扶皇極方隂修於內政以坐折於遐衝帷幄謀謨得輔贊彌縫之道廟堂出處達盈虛消息之機聖意確留雅懷莫奪雖權分二陜周公罔憚於居東而望重兩河裴度豈容於在外佇頒綸綍即政鈞衡寒律方嚴台符尚逺願益調於茵鼎用永輔於宗祧代范元作謝除福建漕上宰相啓二漕臺於湘外蔑效微勞假使節於閩中猥叨舊物方黜幽之是懼豈因任以宜蒙已試無聞冒榮有靦竊以宣九重之德意選任惟精掌一路之利源事權尤重乃眷八郡之境密鄰二浙之郊昔號奧區今稱近部即山制茗貢包最盛於清朝並海鬻鹽𣙜禁獨寬於逺俗兼行數職亶謂劇司必擅強明練達之資乃付斂散弛張之柄如某者疲駑奚取踸踔數竒詩禮粗傳雖襲箕裘之緒簡編克勵竟辜場屋之功甫涉通津即膺重寄登車攬轡徒內愧於家風挽粟飛芻曽莫禆於國賦幸真儒之宅揆罄綿宇以銷兵已臻嵗計之豐弗慮軍興之乏屬更瓜戍獲對楓宸適四牡以勞還忽皇華之臨遣王畿漸近舉頭如在於日邊官次非遙屈指俄周於嵗律遊宦可希於尺寸居貧亟得於斗升僥幸若斯生成知自兹蓋恭遇某官道包宇宙名塞天淵許身稷契之間致主成康之上制禮作樂坐觀美化之行任賢使能畢盡羣材之用載惟草芥亦荷陶鎔重念某早以夤緣猥承顧盼望房相昻霄之質實出幼年懷孔門附翼之心預期他日雖更契濶每辱記憐頑金屢入於洪爐大匠終收於小木人爾人爾幾干造化之私使乎使乎曷副咨諏之責某敢不益堅晚節更勉初心問雅俗以周爰誓將宣力報洪恩而得所敢憚捐軀代賀新明州潘舍人啓光膺明命起鎮便藩擁斾之官載勤於徒御涓辰視事已見於吏民凡在觀曕孰不慰抃恭惟某官學窮淵奧識洞幾微忠言結聖主之知正色落姦諛之膽三仕無喜莫窺令尹之心萬鍾何加獨養孟軻之氣揆古無慚於益友居今最號於名臣暫違表著之間殊咈縉紳之論遂從琳館假以朱轓俾臨海道之要衝聿壯朝廷之屛蔽顧威聲之夙播必治行之纍彰處汲黯於淮陽實資重望對賈生於宣室佇啓嘉猷某叨領守符密依蔭樾所以承流宣化深愧非才並其有邦厥鄰庶蒙餘潤代賀王舍人啓光膺中制分判西垣聯九重侍從之班極一代詞章之選士流歆寵國體增華恭惟某官道學精微天資孝友氷壺比操炯迎風寒露之珍珠璧其文真明月夜光之寶十年出處一節險夷信直道而不回勵孤忠而自結致宸衷之簡記首邦獻以招徠玉陛書言金華勸講汩沒伸於一日飛騰竦於百僚粵自螭坳徑躋鳳閣方庶政更張之日繄一人總攬之公凡進退於人材當推明於聖意使訓辭所發如雲漢之昭回則號令之行有風雷之鼓舞自非火筆曷布洪猷果升不試之才遂正久虛之席論思獻納已髙持槖之風輔贊彌縫行任秉鈞之寄某特叨異奬尤快新除一佛見前喜初聞於出世雙魚致逺敢申問於加餐秋暑尚繁禁塗多暇願謹保綏之節益承注倚之心代范季思上台守胡端明啓幾年慕用長懷執御之私奕世從逰夙講通家之好敢修竿牘自列門墻願眀晞驥之心庶愜登龍之幸地連雲水海接滄溟仰惟鈞逸之餘綽有分憂之暇名臣所至必政化以流行盛德攸居宜羣靈之默佑恭惟某官術優經濟學造精微大策髙文擅詞宗於一代宏才偉器推王佐於三朝青錢連掇於殊科華貫亟觀於濶步綸掖資代言之美瑣闈還批敕之風忠嘉罄常伯之聨翰墨妙承明之直聿虛近輔庸待真賢遽辭持槖之勞遄被剖符之寄考功而試蕭傅少慰聖心作相而倚晉公行孚民望某備員巖邑絶迹台閎瞻棨戟以無因託帡幪而有賴載惟仲氏宿綴清班方其當軸之時實有帡肩之分俯仰已成於陳迹死生乃見於交情諒興宿草之悲不改寒松之操忝故人之稚弟未拜泰山之容借冨女之餘光願希當路之力代賀越帥周子武啓光膺明命起殿輔藩懷印綬以載途擁旌麾而就鎮凡居臨照舉積欣愈恭惟某官學洞經綸材全康濟優遊守道素髙恬退之聲豈弟宜民夙擅循良之譽既結知於聖主遂亟踐於要津嵗律載同維持三院臺綱聿振聳動百僚身暫去於朝廷忠不忘於王室惟山陰之重地實浙左之大藩紫蓋黃旗嘗會諸侯之狩碧幢紅斾端居連帥之雄自非一世之忠嘉曷稱七州之屛翰果膺妙簡式副具瞻玉帳宏開聊挹鑑湖之勝鋒車趣覲行參鑾殿之華某久願登龍兹叨分虎萬間廣厦幸逺賴於庇庥千里專城阻親承於約束代賀丞相除左僕射啓國播大號敷告外廷時推真儒登庸上衮益茂九重之眷具嚴八表之曕竊以人主之職無它惟論一相冡宰之司至重實總百僚任不專則不足以盡良弼之才位不極則不足以崇宗臣之體仰聖神之撫運窮禮貌以敬賢自非希世之英曷稱羣公之冠恭惟某官際天偉度驚代宏才道德過於古人聲名震乎絶域不清不濁量吞千頃之波至大至剛勇奪三軍之帥再躋揆路獨秉化樞凜然山嶽之弗搖炳若蓍龜之先見鎮兹雅俗息胥動之浮言折彼遐衝挫方興之強敵定廟謨於帷幄還兵柄於朝廷收漢家總攬之權蔑唐室驕強之患威儀整肅始知皇帝之尊庚甲昭明畢聞天子之詔紳緌聳若介胄帖然亟章已試之才遂正久虛之席顯秩肆頒於異數新封改錫於巨邦聿隆勳業之褒備焕典章之盛倚裴中立足以破賊方仰副於宸衷酬李文饒恨於無官當益承於帝寵嗣觀丕績永底泰和某逺把州麾阻趨相府感恩私而結戀聆册命以增愈微物何知夙賴洪鈞之播餘生所托尤欣廣厦之成代宰相生日回韓樞密啓户外桑蓬追記始生之日鑑中蒲栁益驚漸老之姿豈謂某官曲軫眷懷特貽緘翰申之善頌有榮華衮之詞夀以多儀更厚白紵之貺代王守上樞密張郡王啓專城冒寵久代匱於江津易地偷安復承流於山郡拜恩良厚受任惟慚伏念某蕞爾謭材枵焉晚學羞抗塵而走俗盍去故而取新褊淺何堪夙起林廬之興超踰已甚尚分民社之憂頃守當塗實居屬部方邊塵之肆侮覩幕府之徂征外患滋深羣情大駭上慿威德下鎮危疑迄臻凱奏之旋僅免軍興之乏艱難備歷曠弛居多非仰賴於恩私固莫逃於譴戮繼露親嫌之請載蒙朝命之頒舍控扼之要區就清間之偏壘凡兹僥幸實出吹噓兹蓋恭遇某官略邁孫吳功齊方虎昭精忠於白日格盛烈於蒼穹出振天聲有是遒之四國入謀王體無不獲之一夫致使衰遲亦叨委寄某敢不撫綏氓庶遵守詔條既盡事君之忠畢酬知己之遇策勳第賞倘弗廢於微勞碎首捐軀詎敢忘於大造代梁尚書除知溫州謝宰相啓殊庭竊食方退託於鄉閭便郡分憂忽起膺於民社懇辭莫獲就任惟慚某濫竭凡材亶逢興運紫禁早塵於從槖朱轓歷典於名城績無毫髮之可稱恩比丘山而更重當上聖規恢之日實羣臣奮發之秋每勵疲駑過蒙鞭策偶緣抱疾亟請奉祠粵嵗律之未周已使符之再假技止此耳本乏牧人御衆之長行或使之復輟問舍求田之計扁舟徑往衡宇匪遙既諳風土之宜且免道路之役遂私至此圖報若何此蓋伏遇某官盛德格天元勳蓋世畢盡人才之用仰觀帝業之隆顧簪屨之甚微出甄陶而最久念故舊無大故曽莫忍於棄捐謂宴安不可懷庸載加於委寄記憐益厚終始弗渝某敢不勉布皇恩勤思善治洪鈞所播已深坱圠之功夏屋斯成尚賴帡幪之庇代范相家謝婚啓夾輔同心爰考賜盟之舊通婚繼好願諧合姓之歡倘惠徼福於前人冝重問名於初日伏承令妹夙漸聞見已髙風絮之才某姪粗有性靈可授籯金之訓敢因媒妁用締姻聨衰門豈李鄭崔盧顧華胄非吾偶也羣從有封胡羯末俾小兒得我師焉輒效鄙誠佇承嘉命代徐守通婚啓有室有家庶惟男女之願相求相應蓋緣聲氣之同輒忘非偶之嫌用謹及時之義某男某磨礲儒業粗承弓冶之傳令姪女漸漬德風實表閨門之秀既通媒氏許結姻聨合卺共牢已諧於吉卜儷皮束帛敢效於微誠
