body:
  text: 漢濱集卷十四宋王之望撰䇿漢光武晉穆帝禦戎是非策用兵者必知彼己之强弱然後可以定攻守之計知我之可以戰而不知敵之不可與戰則在兵法為不知其所攻知敵之可與戰而不知我之不可以戰則在兵法為不知其所守夫不知攻守之計者小而用之一軍大而用之一國又大而用之天下未有不敗者也古之王者不幸而與敵國相持必審乎此以為制御之術外敵强而中國弱則能下之中國强而外敵弱則能服之外敵中國俱弱則自守而已蓋外國之人尊尚勇力便習騎射生長於戎陳之間然貪殘而不知亷恥無親愛以相固無禮義以相維故驟强而易衰方其盛彊雖聖王在上猶被其患侵軼縱暴其鋒不可當及其既衰則內相攻殘而中國坐制其弊此其勢然也譬猶勇悍之夫疾呼奮臂以張其威怒誠不可與之校及其氣衰力竭疲憊而偃仆則三尺童子可制其命嗚呼有國者能審乎此則可與議中外强弱之形勢矣請因此以論古今之變昔光武乘王莽之亂中國疲敝胸奴之寇嵗嵗不絶其後饑疫並興自相分爭臧宫馬武之徒撫劍抵掌志馳於伊吾之北然是時漠北雖衰漢亦新復彊弱之勢未有所分也故光武以為漠北尚彊傳聞失實不如姑息吾民此其知彼己也審矣至顯宗時承平既久闢土益廣黎民嵗增而胸奴內侵邊城盡閉於是納耿秉之議而諸將揚兵於漠北矣然則耿秉諸將所以建功者以漢於中興之初能固守其文德也晉穆帝時石季龍死北方大亂士民襁負而來歸議者以為中原指期可復然是時石氏雖亡晉亦不振强弱之勢未有所分也故蔡謨獨謂所親曰敵滅誠為大慶然恐更為朝廷之憂此其知彼己也審矣其後殷浩進據洛陽桓溫戰于林渚皆無功而反然則殷浩桓溫所以致敗者以晉當中微之際欲力爭於武功也夫漢晉之成敗相去絶逺惟在乎知彼知己審與不審之間將欲制御敵國可不察夫强弱之分哉國家遭金人之禍一紀於此矣搢紳之儒介胄之士相與議論於朝野之間者或謂前此用兵皆我自敗而敵不足畏者有之或謂金人之彊振古無比而我不可圖者有之二者胥失也夫契丹與中國抗衡埀二百年聖明之君忠智之臣朝謀夕慮思有以屈之迄不得志西夏習戰數有武功方其盛時北抗契丹南寇中國我師百萬聚於陜西而救死扶傷之不暇亦桀黠之雄也然而金人起東北不二十年舉契丹臣西夏遂悉從引弓之國長驅於中原國家敗於河東又敗於京師又敗於陜西又敗於淮揚豈特我之不能哉蓋亦其至彊也觀其行師治衆之力料敵制勝之謀舉無遺䇿略不世出加以器械之利形勢之便兼中國之所長而有之愚謂漢唐全盛之時得韓白不世之將猶未能輕此敵也況今日乎雖然以為不可圖者蓋亦不察矣嘗料金人之衆本不當吾一大郡以女真之師劫契丹而用之以契丹之師劫燕人而用之以至諸國之屬從者皆非心服力劫之而已而契丹燕人懷其父兄骨肉之讎怨之切骨部族既異人各有心其勢豈能久邪加以耶律氏之舊臣往往當權用事皆有興復社稷之心以為南北罷兵則金人守勝而無事英雄無所用武故使窮兵黷武以外敝其衆因乘風塵之變庶幾於得騁焉蓋其勢有類苻堅者堅之盛時擒姚襄破慕容暐皆釋其親而用之其征江南王猛苻融深以為諌獨姚萇慕容垂勸成之及淝水一敗埀萇之徒果乘間飛揚卒滅苻氏金人之事殆將類此矧得中國玉帛子女以亂其志慮上有惑志下有爭心外無彊敵內多功臣士馬疲於戰鬬仇讎聚於心腹不過數年內變必起我以全制其後可以萬全此兵家所謂其彊易弱者也何不可圖之有哉圖之之術奈何亦乘其變而已知其未有變也則法光武之言而固守文德何慮於貽後日之患乎知其有變也則違蔡謨之論而力爭武功何疑於致朝廷之憂乎雖然方胸奴之分固有變之可乘矣而光武猶以為非時者蓋以中原初定民力未任於征役也方季龍之死固有變之可乘矣而蔡謨猶憂於致患者蓋以公卿之間人才不足以辦此也誠能畜養民力搜選人才以待敵人之變則若竇憲之勒燕然可也耿秉諸將之功何足道哉雖若劉裕之平關中可也殷浩桓溫之敗何足憂哉而執事乃使承學之士權輕重之勢度可否之時斟酌其宜施於今者顧愚不敏何足以權大事乎嘗聞古之英雄之主欲求非常之功者必有規模先定於中若事之成否則有非人力所能致者矣句踐之報吳是驕其敵而已昭王之圖齊是俟其釁而已驕敵而敵可驕俟釁而釁可乘天也孫權稱臣於魏受其封爵至欲乞身交州以保餘年亦所以驕其敵也昭烈跨有荆益保其巖阻天下有變則欲下宛洛而出秦川亦所以俟其釁也驕敵而不驕俟釁而無釁亦天也傳曰聖人非生時時至而弗失使孫權昭烈而圖句踐燕昭之功則覆亡之不暇尚何燕越而能保哉愚願國家修四君之術以俟二國之變規模一定勿為浮議所搖其濟與否視天之如何吾不敢取必焉可也然執事之言曰上天悔禍敵國相殘嗚呼天意固有在矣論六藝折中於夫子論聖人之所垂法於後世者書也後世之所取法於聖人者亦書也聖人憂後世也深故書之為說詳後世信聖人也篤故書之為教明昔吾夫子以將聖之道不用於時乃述六藝包羅天地總括萬類若小若大罔有不該凡道有所難知事有所可疑必明辨昭晰處其至當使天下得吾說而求之雖數千百嵗之後猶有可考正焉而後世之人亦能慕其道而歸尊之將有為也將有行也必循之以為行據之以為辭以求合乎大中至正之道然則夫子之述六藝所以斷天下之疑而後世之言六藝者蓋將求夫子之所謂至當者而已矣太史公贊夫子曰自天子王侯中國言六藝者折中於夫子請因其意而申之夫子生於三代之盛時六藝其果作乎曰夫子不生於衰周六藝決不作也何以言之三代盛時法度彰禮樂著風俗醇一教化宣明上之朝廷之所設施下之閨門之所漸染莫匪六藝之所載也當是時家識君臣父子之經人知善惡邪正之辨大道之行昭若日月則詩不必刪書不必序易不必繫禮樂不必修定春秋不必筆削可也周室既衰王道殘缺至於幽厲之後小雅盡廢板蕩之詩作天下日入於亂君焉不知其所以為君臣焉不知其所以為臣為人父者不知其所以為父為人子者不知其所以為子雖有好善之心而不知善之為善以陷於惡雖有守正之意而不知正之為正以入於邪紛紛焉莫之取正也六藝不作天下何所折中乎夫子憂之於是序書則斷堯典論詩則首周南法舜之舞綴周之禮因魯史而修春秋述易道而作十翼其術道德仁義其法禮樂刑政其人堯舜禹湯文武周公自天子至於庶人其修身齊家正國治天下之道粲焉大備為人君者於是而習焉則得其所以為君之義為人臣者於是而習焉則得其所以為臣之義父焉而得其所以為父子焉而得其所以為子如是而為善如是而為惡善惡有所考焉如是而為正如是而為邪邪正有所考焉如方圓之有規矩也如曲直之有繩墨也如輕重之有權衡也别嫌疑明是非定猶豫使天下之人操之以為驗稽之以為決皆得以處其至當則聖人之所以垂法於後世後世之所以取法於聖人者盡在是矣傳曰為人君父而不知春秋必蒙首惡之名為人臣子而不知春秋必陷誅死之罪六經之道其用皆同而春秋特其切於事者耳夫不通六藝之義至於君不君臣不臣父不父子不子其實皆以為善然為之不知其義無以考正其是非而遂陷於天下之大惡此聖人之憂後世所以不得不深而後世之信聖人所以不得不篤歟故史遷上叙天子下舉王侯大及於中國之人以折中六藝之功歸於夫子其意以為中國所以有君臣上下之倫各得其當而不亂者以有夫子為之折中也韓子有言如古之無聖人人之類滅久矣雖求為狉獉之俗且不可得况中國乎今夫易載天地隂陽之變剛柔動靜之材者也夫子不繫易吉凶之應何從而折中乎詩述治亂得失達於喜怒而形於詠歌者也夫子不删詩美刺之義何從而折中乎書紀帝王之言動夫子不序書古今之變何從而折中乎春秋正賢不肖之褒貶夫子不修春秋善惡之辨何從而折中乎夫易詩書春秋始於伏羲之畫卦終於魯史之獲麟其來尚矣一經孔子之手其書遂定以與天下後世為仁義之指南道德之蓍龜何其盛也至於禮也樂也秦火之後孔子之書遂亡故禮樂之論至今紛然無所定則六藝之折中於夫子從可知矣傳曰聖人之辭可為也使人信之不可為也嗚呼此夫子之所以為聖者歟雖然六藝所述大中至正之道也炳而易見要而易守故後世得以折中焉其後書分為二詩分為四春秋分為五易有數家之傳夫子之意益以不明天下始惑於趣舍之方而不知其所適從故王通憤之以為九師興而易道微三傳作而春秋散詩失於齊魯書殘於古今其論是矣然通不能即夫子之書以求其至當而更自為續經曽不知天下之所以尊六藝者以折中於夫子也而通乃自為之天下其肯歸于正乎揚雄以好書而不要諸仲尼為書肆好說而不見諸仲尼為說鈴請以是為通輩折中蕭何論作史者記人之言必有以文之後人感其文而因以失其實者有矣蕭何未央之事是已傳稱何修未央宫上見其壯麗甚怒謂何曰天下胸胸勞苦數歲成敗未可知是何治宫室過度也何曰天下方未定故可因以就宫室且天子以四海為家非壯麗無以重威且無令後世有以加也議者非之以何為不知所務嗚呼如何之賢豈導其君於侈靡益後嗣以宫室者哉以為帝室皇居所以觀示萬國今雖草創後必有所增加與其侈於子孫不若高帝之自為也是時民出於戰國秦項之後習於勞苦之餘用之雖勤無所歸怨若天下已定人皆自寧不可以復動矣且民嘗覩阿房離宫窮極奢麗則未央之制雖稍過度未必以為侈也若宫室既備人知茍美之可安則不可以復營矣故蕭何於此稍加壯麗使子孫數十百年之內無所增益以休息斯民若宫室卑陋不足以隆上國之觀高帝居之何所不可易世之後姦臣有以發其口少主得以啓其心土木一興其禍有不可勝言者所以高帝聞何之言而說也故曰無令後世有以加也史稱文帝在位宫室苑囿無所增加雖帝恭儉出于天資然其不作靈臺必曰朕奉先帝宫室常恐羞之何以臺為則未必不以高帝所營固已壯麗不必有所加也由是言之惠吕文景四世百年天下承平而無宫室之役者豈非蕭何之慮乎及武帝之世何之所營敝矣於是大興土木天下為之騷動然漢之基業已固故役雖苦而民不搖向使武帝之役起於惠吕文景之間則天下幾何而不亂哉議者以武帝之侈為蕭何啓之而不知惠吕文景之不為者未必非蕭何之力也傳稱何買田宅必於窮僻處為家不治垣屋曰後世賢師吾儉不賢無為勢家所奪何之治家為國預為後世計大率如此豈其儉於家而侈於國乎豈治家則欲子孫師其儉為國則以壯麗勝子孫乎此必不然者況崇大宫室以為淫侈之觀使後世無以加庸人皆知其不可而高帝聞之何所悟而說也然則觀史者能不以文害辭則庶幾矣樊噲論西漢之興其大功臣雖出於刀筆之吏販繒屠狗之人然皆一時豪傑王佐之才非遭逢際㑹徼幸而成功者也史於蕭何曹參既以為一代宗臣而以周勃為漢伊周雖後世之論亦莫不然至於樊將軍不過以武勇為稱與酈商灌滕之徒等耳以余觀之噲蓋蕭曹之倫出周勃之右非酈商灌滕之徒所可望也高帝初入咸陽欲止宫休舍噲諫以為不可乃封秦重寶宫室府庫還軍霸上嗚呼此沛公之所以得天下漢祚之所以長久者也是時沛公君臣志得意滿無復逺慮諸將爭走金帛財物之府惟恐己取之不多上令之有所不能禁也寧有諫其主者賢如蕭何不過能收律令圖書耳獨樊將軍首發其端留侯因而推之高帝遂悟三秦之民翕然皆願以為君王沛公之德結於民心聞於天下向使高帝入關居秦宫室收其子女玉帛而有之則無以異秦項之為而鴻門之厄亦何說以釋曺無傷之譖寬項羽之怒安危成敗之機間不容髮微樊將軍則沛公之事去矣且沛公以布衣起盜賊中轉戰連年一旦得彊秦全盛之業自非上智誰不欲少快其心而噲乃諫止之使無秋毫之犯是以湯武望沛公也不亦責難於其君乎夫被堅執鋭攻城野戰以卻敵而爭利者武夫之所能為也若乃見利而不動臨機而敢諫納其君於堯舜慮社稷於久逺此搢紳儒者之所難而噲乃能之豈非所謂豪傑之士王佐之才乎方沛公之入關也蓋未有取天下之心不過曰吾與諸侯約當王關中耳後為項羽所遷失意鬱鬱始欲爭天下使沛公即得關中而王之未必有此意也夫沛公欲王關中既已得關中矣留而居之何所不可而噲乃云云是噲之意不止於王關中而已也是噲先沛公與羣臣有取天下之志也故范增謂項羽曰沛公在山東時貪財好色今聞入關珍寶無所取婦女無所幸此其志不小然則樊噲之諌行敵人固已畏忌有識者固已歸心矣不幾乎一言而興邦乎惜乎遷固為噲立傳只載其鴻門誚項羽排闥悟高帝等事武夫之所能為者至於入關之諫則不大書特書其語而徒附高紀與張良之傳中使其造漢之忠暗然不彰而天下惟以武勇稱樊將軍陸士衡作漢高功臣贊拾托舊史殊無發明彼固不足道歐陽文忠公作舞陽侯廟記亦不及此蓋未之思邪獨揚子雲云天下有事非蕭曹子房平勃樊霍則不能安子雲之意固不以酈商灌滕之徒待噲也豈非有見於此乎故聊為發之近世社稷之臣如何論論社稷臣者多矣有以主在與在主亡與亡為社稷臣者有以招之不來麾之不去為社稷臣者有以堂堂之節折而不撓為社稷臣者然皆莫如孟子之言曰有社稷臣者以安社稷為悅者也蓋豪傑非常之士立乎人之本朝以天下之安危自任既有其志又有其功斯可以為社稷之臣若夫揚雄之論則責名太高而取人或濫不容無議也或問雄近世社稷之臣曰若張子房之智陳平之無誤絳侯勃之果霍將軍之勇可謂社稷之臣矣嘗試論之西漢之時社稷有三變高祖之既衰也吕后之恩日益疏戚姬之寵日益固如意以愛而欲立孝惠以仁而將廢當是時也子房有功高后之初沒也劉氏微弱諸吕擅朝內握兵柄以為彊外阿藩國以為重當是時也平勃有功孝昭方幼上官有逆亂之謀宣帝未立昌邑有淫昏之行當是時也霍光有功揚雄以社稷臣稱四子者蓋謂是耳觀高帝創業之初相業如蕭何戰功如曹參雄不曰社稷臣而稱子房則知以其正嫡庶之位而存惠帝也高后孝文之際守節如王陵質直如申屠雄不曰社稷臣而稱平勃則知以其靖吕氏之難而立太宗也孝宣中興丙魏有聲雄不曰社稷臣而稱霍光則知以其當廢興之運堂堂乎忠擁昭而立宣也方高帝欲易太子以叔孫之極諫而不聽以周昌之彊直而不回可謂固矣及留侯以計來四隱者於商山高祖一見為之慷慨悲歌而割其肌膚之愛向使惠帝果廢如意果立高帝萬歲後老臣宿將北面而事孺子則劉氏之社稷未可知也非子房之智其誰存之祿産之變禍起腹心計迫事窮勢不兩立吕氏不滅劉氏不安周勃左袒一呼而劉吕之雌雄遂決向使太尉不入北軍得徐為之謀則劉氏之社稷未可知也非絳侯之果其誰存之上官之亂根株遍於朝廷昌邑之立罪惡過于桀紂安危之機間不容髮光以寡制衆以臣放君行之不疑卒安天下向使上官不戮昌邑不廢姦臣亂主得逞其心則劉氏之社稷未可知也非霍將軍之勇其誰存之稽二三子之德雖未得如古之所謂成人然乘時遇變奮其智勇神器將墜徐起而正之卒能措社稷於泰山之安亦可以無訾矣而揚雄過為高論責之以禮樂之懿曽不知此乃盛德之事非所以稱社稷臣也假如太子之將廢吕氏之方盛上官之禍未除昌邑之君未放雖有禮樂君子從容揖遜乎其間亦何補於社稷哉若夫陳平之佐高祖定天下設六竒計出其君於艱難險厄之中不可謂無功至於吕氏之亂平實啓之得免於戮幸矣方高后欲王諸吕必問漢大臣則猶有所畏焉平若乘吕后畏逼之心挾王陵廷爭之助而拒之以高帝盟誓之言則諸吕必不王也奈何懷保身之謀開變亂之漸既已使王陵顛沛吕后放恣矣乃始以定社稷安劉氏而藉其口豈真有志於社稷者哉蓋平有不世之謀有無窮之智有應變之機而無大節不可奪之義向非周勃之忠朴劉章之英鋭則艱難倉卒之際其無誤不足恃也昔袁盎責周勃不早去吕氏非社稷臣夫在高后時陳平相也周勃將也平則有罪勃何咎焉以盎之所以責勃者責平可也高祖嘗曰陳平智有餘然難獨任安劉氏者必勃也然則高帝之心固以社稷寄周勃而至於陳平不能無疑則平之為人可知矣夫智如子房果如絳侯勇如霍將軍其功大矣特以禮樂未備未得純為社稷臣陳平為身謀以社稷假人顧以一時之功而遽獲預乎三子之列故曰雄責名太高而取人或濫也雖然雄之言禮樂者為其人之不若伊周也其人雖異其功則同何害為社稷之臣哉雄之取陳平者為其功之有類周勃也其功雖類其志則殊安能為社稷之臣哉昔武帝於汲黯嘗笑其戅矣嘗誚其不學矣至論其人必曰社稷臣公孫𢎞倪寬之徒號稱儒雅不得與焉則知子房輩雖禮樂未備不害為社稷臣也武后欲立三思羣臣無不從獨狄梁公以死爭后歎其忠亦曰社稷臣李績許敬宗之徒有德於己不聞以是稱之則知陳平之立諸吕不得為社稷臣也嗚呼亂於名實儒者之大患雄於子房周勃霍光則亂於名於陳平則亂於實名實既亂烏足以知人哉必欲論社稷之臣則考四人之行事而折衷於孟子可也朝錯論天下之事曷嘗不可為其所以每至於禍敗而不救者非事固然為之不知其數耳為之不知其數以至於禍敗而因以為事固不可為則亦不察矣昔朝錯患諸侯彊大建議削地以尊京師於是七國俱反指錯以為名漢遂誅錯以謝議者皆寃錯之䇿以為吳楚之事錯固已前知之削之則反疾而禍小不削則反遲而禍大嗚呼七國之反漢之不亡幸耳禍尚有更大者邪於此有削而不敢反反亦不能為禍者錯顧不知則其死亦宜矣蓋天下之勢彊弱異形則攻取有先後先攻小以圖大者弱國之形也先攻大以令小者彊國之形也先小後大則敵脆而力有所并先大後小則威加而交不得合髙帝與楚相距滎陽成臯間知項氏方彊而不可獨取乃收趙魏從燕齊兼諸國而攻之故楚雖彊而卒破其後韓彭英布王地數千里高帝知其禍之且起而念諸侯之不可一朝去也而韓信最彊則先取之彭越又彊則又取之最後英布以疑懼反則亦孤立而無應矣向使高帝不審先後并誅三雄而韓信率黥彭以起則天下非漢有也夫惟彊者破於衆人未疑之間而交無所合弱者疑於衆彊已破之後而事無所及此所以三雄之地雖半天下而終不能以病漢也景帝之世山東之國凡十有八而吳阻江負海其地最大怨望不朝其罪最深鑄山煮海招納叛亡其謀最久景帝初立宜姑加惠藩臣濶略細故使睦我而無反側心然後首議削吳彼削之出於不意則事有所不及謀既而勢益弱則謀有所不敢發就使果發亦無以動搖諸侯一區區之吳何能為哉吳既削而天下定矣此所謂削而不敢反反亦不能為禍者也錯固不然方且紛然更定律令以侵刻諸侯為己功先削趙又削楚又削膠西然後乃議削吳諸侯人人自危皆有怨怒不服之心故劉濞一呼天下皆應吳未及削而禍結矣然則錯之謀實驅之尚何寃哉昔齊桓公欲尊王室管仲先使之存亡繼絶而厚諸侯之禮然後南征彊楚責包茅之不入楚服而霸功遂成齊列國也為之有數而其效猶見如此況西漢全盛之時乎孟子謂魯方五百里王者作則必損之又謂今之諸侯取民猶盜王者不盡誅也由是言之使孟子得志於戰國之時其彊大者猶可稍削然亦不至於盡誅諸侯而錯直為此紛紛亦慮之不熟哉夫謀事一未成而為天下所指至以其族藉仇讎之手為萬世笑可不哀哉或曰賈誼於文帝陳衆建諸侯之策主父偃因之漢遂封及支庶諸侯不削而自弱錯獨不為此乎曰文帝之世諸侯之子弟鮮矣誼乃欲建以為國空而置之然則必悟其將弱已矣與割地何異哉彼推恩之令必武帝之世而後可行也非所以責朝錯也贊黃侍御葆光畫贊儼然正色風憲之餘氣恬以平循吏之徒我詢邦人萬口交譽不及見公徵諸畫圖孫威敏處州郡庠三賢畫贊維威敏公人中之龍讜言將略聲動華戎瓌姿偉然可想遺風兹維名臣拜者肅恭記增修處州學記處居閩浙之郊地偏而土瘠視他郡為陋前世聞人鮮焉百年以來衣冠盛於東南名儒巨公磊磊相望三歲詔下以進士試有司者無慮數千人取甲乙走聲名於時踵相接也雖其溪山秀絶精華磅礴之氣實鍾乎人物然閟於古而發於今豈適然也哉殆由近世承流宣化時得其人克敦學校之風以作成而勸勵之也唐以前尚矣自鄴侯李繁新夫子廟養士其中韓文公文之于碑杜牧之書其碑隂處州之學聞天下五代割據廢徹掃地宋興至康定中孫威敏公首請于朝創立黌舍在鄴侯故址之東南一里而近其制加侈焉士始喟然興於學其後或因或革不可槩考要以一時二千石之賢否而為其盛衰宣和中盜起睦州隳于兵火故侍御史黃公葆光乘殘剽掇拾之餘更造今學殿堂環廡齊庖翼外總為屋九十間有竒而缺其三分之一後來者欲有所加顧力不給則熟視罷去歷二十年當紹興壬戌天子垂意儒術詔諸郡葺學宫而華陽王公禔屬守是州公達於政理以良能稱當世其為郡如津人之操舟縱橫曲折心諳手習弗遽弗留暇而必濟故承上之命敏有餘力通守陳公大節君子儒也實佐佑之越來相視孰弊宜理孰闕宜增條其所宜用下之六邑六邑之長皆善士樂聞其役而勸趣之秋九月丁未麗水至起教授㕔于講堂之東辛丑縉雲青田至起執事位中門之左己酉松陽遂昌至起齊于殿廊之右斤築雲集恥陋矜先于新既成亦舊是飭端傾除腐暗昧載彰周邦嚮風多士滋至乃增弟子員益本錢百萬出廪米以贍給之生徒欣繪公像而祠焉俄解印綬去而毗陵徐公汲實來公老於儒學早以德行經術為後學師表其治民如圃者之藝木根深本邃養以風雨勿震勿撓用觀其天庶幾於教化視事之始即詣泮宫周覽舍宇問興造之本末曰七尺之軀風骨之貴賤視其面目千里之地人材之盛衰占乎庠序今學之門絶居西偏面勢不端襟抱虧缺恐不利乎學者盍從而新之諸生合辭而進曰噫前人病此久矣而其地舊錯民居營求百方靳不可得王公易而獲之方遷是圖去弗及舉用有遺恨留錢二十萬以備其費曰後有賢者成吾志焉其有待於公也於是龍泉之材適至乃規屋七楹為南北嚮屬之兩廡闢三門其間所須而未具者一瓦一釘一椽市以其直無擾于民經始於十月之乙酉而成於季冬之甲申宏正顯敞裏外軒新棟聨宇匝其氣弗漏山迎水赴天置神設他日車馬從人靡限降登旁徑殿門中貫講舍喧鬨雜蹂人用弗嚴及門斯成始有閫閾明年元日公率僚吏謁拜聖師下車鞠躬屏騎從于大門外儼儼秩秩至者肅然父老嗟歎謂自有此學門庭幾更而氣象可觀莫與今比吾邦殆其興乎請書其事俾後人知所從來嘗聞古之諸侯天子命之教然後為學直患不得為耳曷嘗得為而不為也後世師帥不賢則主德不宣恩澤不流雖有天子之命鮮或能奉承之幸此邦繼有賢侯以克紹前烈布宣上之德澤惟恐弗逮遂濟厥功可書也已書不書於二公何有雖然使天下郡守皆如二公之賢則聖主之德可以覃乎無外使此邦之後來者能繼二公之迹則國家之澤可以埀於無窮誠不可使無傳也於是乎書紹興十三年二月九日記拄笏軒記鄱陽方彥國老主青田簿數月治㕔事之側為軒以揖溪山之勝名之曰拄笏書來屬余為我記之余惟賢人君子方未遇時汩汩庸俗之中其高標逸氣不受埋沒往往傲睨於窮山逺水以自適焉東晉士大夫浮虛相高此風特盛謝安石藴濟時之具出入將相而東山之志猶不少衰嘗登冶城悠然遐想有超世之心王右軍譏之然右軍一不得意於懷祖遂自誓棄官窮登臨之娛以廢君臣之義則其所失又過於安石諸兒效之放曠益甚而子猷尤號不羈居官落魄不事其事拄笏看山邈焉絶俗世以為無用之散材處之於功名禮法之外惜其邁往之氣亦有過人者若折節於聖人之中道豈不為天下之竒才哉國老故天官侍郎公之子風流人物卓爾不羣自未冠時已與計偕其文學才猷能業其家方當世用非為慕東晉諸君子者顧懷抱利器未有所發斂跡塵埃中無以自拔故聊抗志山水之間觀其妙年能自標致如此則胸中之竒必有翹然而自負者使他時遇合以平日之所操持施之有用之地肯碌碌而已乎如宋廣平之却揖以沮姦禇河南之叩頭而納諫段太尉之挺身以擊賊追其風節尚能無愧古人必不至作王坦之臨事顛倒為後世笑也國老其勉之䝉泉龍堂小記荆門為邦依泉而立飲濯烹飪咸仰以生下流灌溉功利尤博唐人題詠目為䝉泉而今所封實惠泉或曰北為惠南為䝉䝉今微而惠特豐惠泉故有亭繪龍扃鐍嚴閟兵火之後結茅故基久益隳陋神弗顧歆日就湮穢紹興庚午冬余始至官覽之慨然明年春軍城大火載葺民居以其工力之餘稍加疏汰出其瓦甓榛壤積如丘阜如鼻去窒如眼去翳源流益滋池用淨徹夏苦旱暵築壇其傍而禱焉牲血未凝而雨又明年春起皇華之館正洗心之堂於是部民甘懋請新泉上之亭而甃治之夏四月戊子落成堅壯雅潔還承平之舊觀庶幾九淵之靈有所慿依以惠澤斯民秋復不雨禱之乂應歲則荐稔嗚呼此邦之人戴善利侯之德其可以怠十月望軍守襄陽王某書潼川修城堤三橋記碑隂紹興丙子秋九月余以轉運判官行部至梓登牛頭峰以望江山秀絶形勝雄偉而雉堞頽圮莽為丘墟以問左右皆曰自癸酉大水之後陵夷至今民力凋殘未之能復居人不寧偷過朝夕常惴惴焉恐漲潦之復至也時太守鄱陽張杞南卿余故人也方校類試之士于成都不及見則招其子大夀而語之為我白而翁郛郭如此其何以為邦盍圖之庫有某錢庾有某粟以具版築費後得南卿書欣然即事起工東北隅屬于南門經始季冬至明年四月而罷偶其家不幸以病死者二人冬十月南卿又卒于官而憲車賈直清茂德亦以七月下世或追咎土功干犯禁忌所致會余䝉恩移節憲臺十有一月至治所且攝府事有詔發廪以賑旱饑凡羸瘠之民靡不霑上之澤以免於溝壑而梓俗尚氣其農家之少壯者雖糟糠不繼猶恥就給於官於是上府倅李鄩㑹用度之出入裁節冗濫掇拾遺餘以興修城之役髙其庸募民俾食其力民歡趨之自南門而西至于北門又繕捍水長隄補隍岸之缺起石橋于三門之外其詳見于今碑將舉事或曰公其鑒張侯之禍姑止若何余曰南卿之舉我實啓之其死適與事會我若畏禍而輟是危人而自求全也幽明之間得無負乎吉凶命也卒為之閲四月而三役成災厲不作邦人以安余與僚屬俱無恙梓之士大夫刻石以記其成余以為是無足記者而余發端卒事之本末則不可以無述因書之碑隂初宣和間之修是城也見于亷訪使者王總之奏為工三十八萬九千五百有竒縣私附益者不與焉梓去邊徼逺承平無事而創為樓櫓一百七十餘區一路告病既成自轉運副使提㸃刑獄下至督役執事之人增秩有差十邑各有分地歲歲葺之至靖康乃止公私之費不可計父老具能道之余今併書于此非伐一時事以暴前人之失蓋欲後之君子知張皇欺罔害民以徼進獲福無幾遺愧無窮不可以不戒戊寅八月十二日雲山臺記潼川憲治之正寢卑庳湫暗歲久滋敝更癸酉大水之後氣益隂濕居之多疾紹興丁丑秋八月余自本路轉運判官移節而來易其舊而新之凡百所須一不以煩吾民時郪有以淫鬼誑俗者方鳩木為鬼廟乃沒而入之官後圃有澄清堂頗閎壯而不適用亦命徹之于是寢材始具八十日而告成澄清既隳故基巋然因聚其土而崇之為臺其高二尋廣二丈二尺冠小亭其上翼以欄楯經始季冬成于明年之孟夏余與客升焉問客曰杜子美有梓州臺上詩臺安在哉客曰臺亡久矣抑公為此可以補此邦之闕矣遂摘杜詩警句之二言以名之曰雲山臺客曰昔楚子游蘭臺之宫有風颯然披襟而快之宋玉賦雄風以諷今子居高明處臺榭遺暑濕于雲霄之上進風凉于山谷之間誠亦快矣獨不念薅耘畎畝者有泥塗暴露之勤乎逼側閭閻者有溫暍煩寃之苦乎郡縣之獄有淹繫于縲絏者乎村落之氓有追胥于道路者乎使民不時有役于官而不釋者乎聽訟不決有留于庭而不去者乎吾聖天子憫農功寬力役下踈决之詔雖身居九重未嘗一日忘民子為部使者逍遙臺上軼溽暑而延清風若不能上宣主澤下求民瘼則登臨之際得無愧于騷人之所賦耶余再拜謝客曰是吾心也然則斯臺之作雖取名于杜陵之詩而實寓意于蘭臺之賦以自警也後之君子知我罪我其在于斯乎紹興戊寅七月望日記台州重修普安禪寺記出臨海郡治之西四十五里曰寶藏巖衆山環合一峯特秀有古招提相傳權輿於蕭梁之世舊為安衆院治平中改賜今額其為十方以長老住持久矣睦冦之亂焚圯赤地歷數代十有餘年頗復興葺而院小力薄當往來之交日不暇給趣過日前訖無全功紹興閼逢攝提格之歲故丞相高平范公過之慨然以語郡守睢陽劉公棐曰物之廢興繄其人公盍擇所授庶可復乎於是選於叢林以保寧璣之子彥筠主之筠游方罷參衆推耆宿至則因殘就窘左支右補俾住者安居游者飽食然後斥其贏餘助以檀施次第建立不亟不徐飾故創新以底于大備庫有司衆有寮㸑有厨浴有室安僧說法各有堂宇而佛殿巋然居中三門兩廡旁帶前揖荒基替址復為寶坊齊鐘粥魚鏗隱林壑師曰吾院具矣然山號寶藏而經龕梵庋闕焉不設名實不相副乃書抵瀘南帥馮公楫得經五千四十八卷規為轉輪大藏中栖千函外覆大屋學者恣取觀之裒其施入用佐供餽一日其徒來告曰師之為勤矣勞身苦思垂二十年乃克成而未有紀述惜其逺且無傳敢以為請豫舊與筠游其始來兹山謂豫曰剎無大小顧為之如何古人住山披茨棘蹈虎虺孤坐巖谷依草木而食其實徒屬從之贅聚其旁苫蓋茅草及道孚而化行來者益多則稍稍棟宇以漸至于華大後人安享之謂是固然而不知厥初之艱勤也夫利人之資而享其逸孰則不能今吾剎雖隳敝之餘不猶愈乎姑置吾力焉奚憂弗集豫疑其落落難合及今而信嗚呼筠可謂克踐其言者矣豫樂其志之有成又喜其不豫欺也故書俾刻之
