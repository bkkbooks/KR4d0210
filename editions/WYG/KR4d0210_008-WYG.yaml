body:
  text: 漢濵集巻八宋王之望撰朝劄論禁約州縣不科田畝錢以備支犒朝劄某契勘本路今夏羣盗作過州縣便欲並縁科田初議每畝取田畝錢百文以熟田計一小縣不下數萬緡此間民盗雜居當擾攘之際心已動揺而急以重賦且胥而為賊本司遂備録寛恤手詔散榜一路如實於軍期急切合須索之物仰開具實數以鄉村等第所敷曉諭民間通知方得科催仍關牒諸司其事稍緩已而茶陵縣每畝科錢四十安仁縣五十仍有馬料諸色等物其數不少皆公然以寛約廣備為行移遂峻行取問又恐人微言輕不能有所禁戢仍移書丁則具述其不可状且言見遣弓手於法當支役錢将來若有大軍即係總領司支月樁錢而州縣乃欲預以犒設為名多行掊尅其非盗賊所在及非軍馬經由去處亦皆乗時欲相倣傚不可不嚴為止絶設有緩急諸司錢物可以那融事定指數取償於民豈不公私俱便今未有一兵禦侮而重困民力何以為善後之計深恐別致生事賴丁則所見符合兩司表裏相應始見住罷於是不得騁者皆譊譊以乏軍興見逼某先事計慮必保其無他守之不變後䝉朝廷就遣李道措置以致班師並無闕誤惟所過州郡量有犒設亦不敢過當不特民免騷擾而官吏亦獲保全譊譊者方自知其前日之非初武岡用兵某到任日淺不深知邊事次第且非已職雖頗聞其科歛而不問今果起大獄後來其它州縣若非力行禁制則皆将蹈其覆轍雖寘之於法将何所及仰惟鈞慈軫念逺民之意深務矜恤乞免差三司等處取馬人朝劄某契勘殿前馬歩三司自紹興二十五年歳發官來興元取馬甚為逺方之病歳凡用二千三百餘人盖凖七十一運之數毎運馬五十疋用使臣一員兵士三十人去年一年只買發得三十四運餘係今年補發外尚少八運所遣人留滯興元坐費批支亦頗驕縱雖姚仲輩亦不敢誰何自宕昌買馬場至興元計二十程本場顧夫發送五程至施香嶺交與吳璘下兵吳璘界内七程至青泥嶺交與姚仲下兵八程至興元監押人十五次換易莫適任責馬以故死損者甚多峰貼峽類此大率自買馬處至興元已壞五分之一直官價二十餘萬緡而姚吳兩軍押送人批請不與焉某近已具申朝廷乞依舊例自宕昌峰貼峽顧夫徑送至興元只多費本司錢八千餘貫又乞三司取馬官兵在興元者令使臣一員兵士二人獸醫一名直至西和州階州宕昌去西和州六程峰貼去階州四程遂州去買馬處邊界尚逺迎接馬運庻幾早得照管所顧夫直與送至興元交換三司人兵近得宕昌場申今嵗馬路閉澁入中極少雖多作措置招誘蕃客而屬外界非號令所及如此則嵗未可按額而得竊恐三司取馬官兵留滯愈久非徒廣費批支亦妨逐軍教閱且三司所以發人取馬者欲得路中自照管耳今為之計莫若每一運三司只差使臣一員兵士獸醫三人前來興元候逐場買到馬日關報令至西和階州迎接本司顧夫送至興元至行朝却依舊例差諸州兵士押送既有三司使臣兵士照管自無踈虞而嵗省三司差兵一千九百餘人沿路并住程去處免批支騷擾之費實為利便聞三司所差官兵者不止為馬葢欲照顧所差人令轉資三司歲有二千人無故轉資似亦非便又江上諸軍近亦來成都取馬此馬係黎叙州南平軍所買此路見今道路通流嵗額敷足前此係本司以諸州兵士押送自去年諸軍差人來取遂不用諸州兵士諸軍發來人至本路批請嵗約三萬六千餘貫州郡省計有限無可取撥遂令封樁不用兵士借請約三萬五千餘貫那融應副凖户部符近凖樞宻院指揮據茶馬司申要将樁下兵士請受買額外馬而令漕司應副江上諸軍兵士批請漕司安得此錢所謂額外馬者本不可得只是為虚名以占破此錢耳尋常所差兵士係借請月糧却按月除尅入官既不差人則無借請矣樁以應副諸軍批請已是漕司白取於州郡今又要此錢買額外馬而别令漕司應副不免又取於州郡其将何以枝梧除已各具状申尚書省并樞宻院今更别有劄目禀呈伏望鈞慈特賜詳酌早降指揮施行論監類省試朝劄某契勘四川貢士類試于蜀葢三十年矣積弊不可勝言其尤甚者徃徃冒入解名而就試倩人入試而過省代筆之價至萬餘引輕薄子多以致富風俗大壞考試之官争出題目隂抛記號各有所主常至紛紛習俗見聞恬不為怪今次主司自朝廷差委事體增重某與闔院同事更相戒飭務盡公嚴上下一心毋敢挾私横議五旬訖事畧無異同規畫之未當者悉釐正之向來弊端一掃而盡前期約束杜絶姦萌作過士人望風引却者凡數百輩合格人數减於前榜十有八名老成淹滯多獲預選一方取士之路自此遂清若非僕射相公留意人才主張公道洞見事冝于萬里之外何以及此仰惟采聽之廣必有輿論逹於廟堂豈容厚誣以干欺罔之誅也伏幸照察論鹽酒减放不實朝劄某契勘蜀人所苦莫甚於鹽酒贍軍諸色所入總四千餘萬引而折估獨一千一百餘萬東路事力纔及西路十二三而按月折估其數相等朝廷毎有蠲放若係民間科敷則片紙下縣皆知其所减之數惟鹽酒為弊最多非委曲料理則减之不若不减且如嵗額一千一百餘萬引遞年止催及八九百萬皆䟎補拖欠之數若所减在二三百萬之中則可以除拖欠之虛額而無損於官若在於八九萬數中則官失常入之數而重額者反不得裁損前此官吏肆為姦贓豐盛者以賄幸免實欠者以貧不霑此鹽酒之法所以益壞而公私之所以交病也某今次預行措置以待朝廷之命有開到牓示謹具申呈庻幾将來實惠得以及民而無損於調度伏乞鈞照論銅坑朝劄某去年八月二十日凖尚書省劄子委措置銅山縣銅事尋差知涪城縣姜宿前去檢踏縁本官差充類試官别選懷安軍金水縣丞趙純權遂寧府蓬溪縣酒税胡宰分詣逐處相度措置某亦蒙制置司差充類試所考試官至成都府界以朝廷専委辭行九月初十日徑到銅山縣躬親相視廣行詢訪其新舊銅窟凡二百餘所匠户近二百家與郪縣出銅器地名于打銅村相去數十里其于打銅村鑄造之家亦百餘户初謂所産銅礦大段浩瀚毎嵗欲且立萬斤為額而民户哀訴不已某委曲説諭詰以銅窟銅匠鑄銅之家如此之多豈得謂之無銅且縣號銅山此名不應虛得今朝廷以鑄錢闕銅徧行搜括知爾縣所出不貲專委漕臣措置豈容爾輩尚專其利可依實認額母取罪戾其老宿等對曰此縣銅礦有無不常毎遇一窟苖脈盡滅即於旁近尋訪窟之深者至數十百丈若是坑苖豐盛豈有棄舊圖新今新舊二百餘窟見可采者只一十七處後又添兩窟窟之多葢以銅之少也諸村匠户多以耕種為業間遇農隙一二十户相糾入窟或有所贏或至折閲係其幸不幸其間大半往别路州軍銅鈧盛處趂作工役非專以銅為主而取足於此土也其郪縣于打銅村所鑄器物多是漢州及利州大安軍等處客販之銅又四川販銅悉集於此故銅器為多不皆出於本縣縣雖以銅得名然非嚴道鄧通所賜之銅山圖經載唐地理志貞觀二十三年置鑄錢官至調露元年即罷可見此縣産銅自來不多數十年前有窟二十二處毎年人户認銅三百六十五斤政和年中憲漕兩司各遣官重行檢踏只七窟有苖餘一十五處無可採取止於七窟上量添銅二十一斤而已非不欲多増勢不能也某等伏覩榜示亦知朝廷搜括銅寳甚急於使司賞罰非輕本縣山僻無監司巡按數十年矣今使者親來宿留累日豈敢以多為少欺罔官司乎乞從使司嚴行禁絶如有藏匿銖兩衷私貨賣甘伏重罪某亦未以為然遂籍匠户分窟取礦置塲拘收烹鍊以十月為頭仍差趙純權銅山令專主其事至十一月末兼中間有閏凡三箇月每月趂辦不及五百斤甚費督責又民户陳訴不一葢縁諸窟散在山鄉山谷五七十里之間難於拘籍遂再委姜宿前去子細審量措置凡閲兩月方得就緒毎月及五百斤今毎嵗以六千斤為額遇閏更加五百斤已别具状畫一申尚書省自十月至正月五箇月收到銅二千五百斤見行起發通先所起拘到器物銅共計一萬一百三十三斤竊縁剏行之初事渉經久非審見的確利害未敢條上以此稍稽月日某不才蒙廊廟曲加記録特使任使實不敢不盡疲駑伏惟鈞慈特賜照察措置錢監軍兵充諸軍使喚朝劄某契勘利州紹興鑄錢監兵士計二百七十餘人多四方㓙惡不逞之徒苦于上工役居常思亂而重兵所駐不敢為惡今大軍盡已調發無所畏憚人甚患之某隨宜措置諸軍起發之日令統制官任靖入監揀選强壮之士得一百五十七人分作三隊給行錢糧請衮同發付軍前又揀選次强者四十三人及拘收到平南山金牛等巡採打鐵炭兵士二百餘人以充徃来般運錢帛頗頼其用餘在監老弱七十人令任鼓鑄人情始安發遣後數日得吳宣撫書云利州錢監兵竊恐作過為諸軍老小在彼璘不敢放心乞權發來軍前不知可否幸望留念監兵初五日發去初十日得此書聞既到彼皆優加犒勞募敢死者間入敵境招納歸附餘人亦皆可用其錢監鑄錢候将來事定却别行措置論四川總所與東南事體不同劄某契勘東南用兵将帥統軍旅户部總財賦而朝廷制其予奪盈虛之柄今四川去朝廷逺而總司不預兵事凡有調發支費只得據其所須色色應副不過委曲調䕶而已比東南事體大段不同所幸宣撫吳璘忠義體國愛惜財用不然總領一司何以支吾近蒙累降處分令諸軍與本所務在協和不生間隙諸将莫不遵禀本所以自立斯葢聖朝明見萬里之外逺方聞指揮之下皆大悦服凡本所應辦之難不敢重言只乞朝廷以東南調度畧行比較便可以照見也乞令湖廣應副吳拱襄陽官兵錢糧朝劄某照㑹昨凖尚書省劄子坐湖廣總領所申将吳拱帶行官兵糧草料依循贛䕫州體例責令舊應副官發赴襄陽府交納某已于去年十月初四日十一月初八日兩具事理申明承朝廷送下户部勘當未蒙本部照應所申事理止檢送湖廣總領所元申再下本所令依已降指揮某以不才誤膺委使平時麤知國體矧艱難之際茍有利于公家豈問逺近彼此之殊自當竭力若于事非便利力所不及亦不敢畏避含糊以誤大計不免冒昧譴斥再有披陳竊惟四川之地褊隘險絶財賦所出不比江浙而于饋餉為尤難古今稱善用蜀者無如諸葛亮亮得南中六郡軍資饒富又一絲一粟不入中原以今凖之事力不侔亮兵前後四出其衆不滿五萬或由祁山或由散關或由斜谷近止數百里逺不踰三數月木牛流馬窮轉輸之巧猶毎苦糧食之不繼今蜀中大軍十餘萬與敵相持于散關一百三十餘日則兵比亮衆為多右取秦隴洮蘭左取陜華商虢皆仰供億則地比亮境為廣又䕫州萬人防托亦係本所應副視亮用蜀之費不啻數倍若更令越三千里般糧運草饋襄陽之戍區區巴蜀何以勝任古所謂千里饋糧者亦不過旬月計耳若錢糧草料三千里外按月責辦豈能免于闕誤契勘蜀中屯軍分𨽻一十八處其潼川興元府綿劍文渠金洋階成西和鳯州合用糧料本所每年科支本錢就逐州夏秋糴買應副其利閬兩州邊嘉陵江係招誘客販收糴支遣惟魚關興州大安軍三處合用糧料本所于利閬州糴買數内運三十四萬前去水路只五六百里約用船脚錢引七十萬道所有馬草只於屯駐州軍収到税草内應副而四川當無事之時已不堪其勞費今吳四廂官兵一嵗當用錢糧草料春冬衣賜物帛紐筭錢引計一百二萬四千五百餘道上件軍兵朝廷已令限一季招填本所自無此一項闕額衣糧若更移運本色前去襄陽當用水陸脚錢四百三十餘萬道比之應副興州魚關大安軍所費多六七倍雖竭四川公私之力亦恐難以應辦欲望鈞慈特賜指揮檢㑹前状并今來所申逐項子細看議利害免行科撥下湖廣總領所照應施行小貼子照會襄陽府吳拱官兵合用錢糧已凖朝廷指揮令湖廣總領所取撥京西常平司錢三萬餘貫斛斗二萬九千九百餘石并現管諸色錢斛别色科名應副如更不足于軍前應樁管錢米及附近州軍不以有無拘礙應干錢斛移運支遣貼降淮西總領所樁管銀五萬兩鄂州坐倉和糴到米内取撥二萬一百石共五萬石專充吳拱官兵支使即是朝廷應副不為不至自可足辦難以更竭四川事力三千里外移運糧草前去照㑹金州素來凋弊近都統王彦收復陜華商虢分屯人馬在四川間捍禦强敵金人不住復來侵擾見今事勢未保萬全一邦事力已極困弊豈可更任襄陽轉輸之責實恐有誤國事伏乞鈞照乞推賞知通應副贍軍錢物増額朝劄某契勘四川贍軍之資係折估糴本兩色折估出於鹽酒經向來用兵増額至髙未嘗敷足官吏因縁侵盗處處起獄少有清脱者而所虧課利終不可得糴本出於民賦州縣弛慢姦弊百端例皆拖欠少者數月甚至一年失陷既多不可追理嵗月稍逺則舉而放之前後不可勝計某紹興三十年十二月末交割總領職事申畫措置将諸州正月一日至年終實到庫錢物不論䟎補年分新舊只以本年額起之數比較増虧從上取無虧欠州軍一十處又從下取虧欠最多州軍一十處具知通職位姓名申尚書省候逐官任滿改授差遣日自朝廷參照勤惰斟酌施行如有起發年額數足外更能補發以前舊欠即是材力有餘職事濟辦之人别具名銜保明申奏乞籍記以待選擢䝉朝廷選擢依申行下四川官吏莫不欣然悉心遵奉各務協濟本所不遣一卒不差一官不追一吏以相督責而逐處錢物按月而至争赴期㑹以取増羡三十一年終打筭實到庫錢物紐計錢引比祖額計增二百六十萬七千八百五十二道比紹興三十年增三百八十五萬六千九百九十七道其三十年係以前起撥錢物最髙年分四路州郡惟大寧監虧額一千三十道渠州二百五十餘道然亦增於遞年之數其餘並各增羡更無從下虧欠最多去處若非朝廷聰明逺燭曲盡勸沮之方何以及此縁人數頗衆不敢悉依元降指揮申奏今只於數内從上取増數最多一十州知通職位姓名管幹月日具状保明以聞并申尚書省伏望鈞慈特賜數奏候任滿改授差遣日參照斟酌施行仍籍記姓名以待選擢劄下逐官用加奨勸使逺方士大夫咸知朝廷考課分明號令必信勉相慕傚庻幾嗣歳可以繼此趂辦伏候鈞㫖論吳璘多病乞吳拱自襄陽歸蜀朝劄某職總四川財賦專一報發御前軍馬文字有大利害公上所宜知者不敢不以上聞若朝廷行與不行則非某之所敢必也契勘宣撫吳璘天資忠義志在立功愛惜邦財不啻已物今之委寄誠為得人自聞警報即至殺金平仙人原與敵相持七十餘日中間取秦隴洮蘭等州及仙人原等處城寨又分遣王彦東取商虢委有功績然金人重兵盡在鳯翔府大散關和尚原一帶多積糧食守備甚固其意未可測此處不破川蜀之憂未艾也吳璘日夜措畫以圖攻取事未可期而其人平時多病日餌丹砂數十百粒比暴露之久時復發作前欲遣姚仲出秦州而身自攻關輒苦臟腑臟腑稍安又苦腎腸之疾毎疾劇時亦頗危殆今月十五日下仙人原還興州醫治却留姚仲在原上彈壓兵馬彊敵對壘人心危懼四川事勢可為寒心蜀人前此恃以為安者以其姪吳拱在此緩急有頼吳拱移襄陽渠毎以失助為憂今疾如此豈可不預為之所某不知東南事體𦂳慢吳拱可輟不可輟只論目今蜀中形勢不若亟令吳拱復還使吳璘一向安健而得吳拱之助則軍聲愈振可速成大功假使疾勢増損不常則此一軍亦無他慮吳璘既為宣撫而尚領都統職事若除吴拱為都統而吳璘以宣撫使判興州於體尤順竊恐朝廷以吴拱歸蜀㐮鄂闕帥為疑則李師顔見駐峽州可以就用䕫非衝要謀帥不難人命不可知一方安危所繫至急望朝廷權事輕重速賜處置施行候邊事少寧乞差宫祠朝劄某輒有危懇上干洪造伏惟寛度曲賜矜容某戊辰嵗秋自太學博士丐外補出守荆門癸酉歳造朝除湖南提舉常平茶鹽乙亥嵗除潼川府路轉運判官丁丑嵗除本路憲戊寅歳除成都府路轉運副使己夘嵗兼權茶馬庚辰秋除總領四川財賦到官既已踰年毎有申陳荷朝廷采録得以麤免曠敗非不欲益鞭駑鈍以赴事功而入春以來愈更得病一卧閲月職事妨廢昏忘羸劣勉强不前若不展盡區區投誠於鈞播必致顛隮上誤使令伏念某入蜀八年私計多所不便些小生事并諸親戚皆在台州第二兒説婚多日過時不得畢結第三兒将婚一女及笄留滯逺方莫議姻對奴婢隨行者久而不贖妨其丁壮朝夕煎聒在人情亦所不堪犬馬之齒明年六十求田問舍正爾茫然雖一身叨榮冒膺寵禄而以一家論之實皆不得其所老夫老婦常嬰疾疢毎慮一旦溘先朝露其為狼狽何可勝言中夜念之心如焦灼方聖君賢相在上萬物必遂其生有如孤蹤䟦㚄如此誠仁人君子之所宜動心者也悉數前後官蜀之人無如某之久今見在蜀者亦無居某之先累政總領去留久近嵗月可考顧今重兵對壘供饋方急豈主計者援例求去之時敢不且竭衰疲終此調餉候邊事稍定應辦無闕乞加憐憫陶鑄一宫觀差遣使十五年流落之身略歸東南了畢嫁娶整葺生理以寛投老之憂庻幾心志和平得從安養則桑榆暮景盡出生成感戴恩私何啻萎人之復起羇纍之見釋也未委溝壑間他日或别有驅䇿死而後已其敢有辭預布腹心情辭迫切不勝惶懼祈哀俟命之至論運米充備邊朝劄某竊見蜀中邊境見今無事而界外所傳如河巾聚糧渭水搭橋僉軍刷馬之類莫審虛實亦未測敵意所向吳少保宣撫四川軍事有所統一謀謨深逺處置得冝非特可以制敵而本所亦差易酬應幸甚幸甚某前者欲趂秋成增糴軍食而利閬倉廩不足多容遂於合支并樁積之外運米十萬石徃興州寄樁一以備倉卒二以張聲勢三以省厫舍吳少保甚以為喜米船至興州岸適吳拱移屯老少萬數千人正得乗載不然合用三百斛船二百七十餘隻邊逺豈能遽辦一行人兵到和州種種為之區處應副周旋而去又行下經由去處預備津發得無踈虞近收吳少保書録示廟堂鈞翰并北使語録云大軍一動糧道為先某又許運米十萬石見行起發次伏乞鈞照措置備邊餉餽朝劄某今月二十九日伏准宰執通僉劄子備到北使奏陳語録五月二十二日三省樞宻院同奉聖㫖令諸路都統制并沿邊帥守監司照應事體隨宜應變速疾措置務要不失機㑹某已恭依施行外今有本職合行申禀事件畫一如後一川蜀前來用兵都轉運司領其財賦而𨽻於宣撫司如趙開輩皆宣撫置其所厚宣撫司有便宜都漕司依倚而行以為一切之政故麤能應辦是時兵統於諸帥財領於都運而宣撫使兼總之後來朝廷改置總領實分版曹之務倉庫皆以户部為名而以朝臣奉使趙不棄初除四川總領日申畫一項云昨來張成憲應副韓世忠錢糧申明與宣撫别無統攝止用公牒行移乞移張成憲已得指揮朝廷降㫖從之自是兵與財賦各有攸司勢若提衡輕重相濟東南二總領責任差輕又朝廷在近凡事有所倚重匱乏可容丐乞蜀在數千里外奏報徃復動經數月與東南事體不同近朝廷以吳少保為宣撫而應干事務令王制置同共措置且量事𦂳慢移司近吳以便計議四川軍事有所統一甚合事宜是則宣撫制其兵制置共其謀而總領主其餉饋兵未必日交謀未必日用而餉饋則一日不可有闕在今日總領所憂責最重了辦為尤難也四川自改總領所以來未經用兵一旦有事與當時不同恐或諸司各有申明不相參照朝廷行下臨時難以酬應人最所吝惜者財也最所貪愛者亦財也總領一司於郡縣則急其入於将士則裁其出職事所行大扺皆拂逆人情為衆惡之府若非朝廷主張假借使有以自立則緩急之際殆難以財賦作主事關軍國利害非輕今吳少保忠義體國兼愛軍民王閣學明達憂時務循法度皆與某心腹相照可容協濟顧朝廷分司庀職非為一時當計久逺處畫分明則易相調䕶各得守其職分矣一紹興八年七月十二日指揮川陜宣撫司合用錢糧萬數浩瀚都轉運司自合體度科撥應副縁見今置司去軍前頗逺難以應辦理合措置奉聖㫖都轉運司可於利州置司先時置司成都今總領所户部倉庫糧料院並在利州職當科撥應副若大軍一動其般發轉輸須合有随軍轉運前此或有諸路漕臣兼充或以宣撫司參議官為之令三都統邉面皆屬利路利路漕臣緩急全賴協濟責任最𦂳須置兩員更迭出入庶不乏使仍宜得彊幹有風力者為之其餘三路惟䕫路見今兩漕成都潼川各止一員更在朝廷詳酌一朝廷遣王官出使盡總四川財賦以軍馬錢糧為職事或有出入自當竭力應副不容闕乏若與将帥故為異同不體緩急使其無以赴功致誤國事何說以辭誅罰然主兵者亦當恤其有無凡所須索酌度𦂳慢據實闗報事通商量則易於應辦若乗倉卒之際或相促廹臨時必致狼狽朝廷宜加訓諭使同心協議體國從長事如一家無有彼我則功無不濟矣一用兵對敵有攻有守蜀中自守之䇿葢已屢試應干費用麤有凖則若欲出師𢷬虚以為牽制則與守禦事體不同其糧運逺近士卒多少經由去處計司須預開梗槩以為支備乞行下宣撫制置司照㑹一據北使所奏今年九月末北主巡獵陳蔡唐鄧之郊明年二三月方來北京若秋冬以後王師迎擊於東蜀兵牽制於西遂能奏功於淮漢之間固大善萬一衝突關陜則蜀中來年所備愈重日月尚逺何以枝梧自某到官多方經畫催驅州縣務要辦而不擾上半年比較諸色所入已多於往年最髙之數二百餘萬引其勢極矣不可復加所入雖増費出亦夥只發吳四廂兵老小三千人并運州寄樁米二十萬石水脚錢及一兩處移屯等已合添用一百一十八萬引有竒其他雜費尚多難以悉舉諸軍闗請器械帳幕旗幟之類方來而未已皆常嵗所無有将來調發之數皆不在此今於經賦之外既一毫不敢有取而東南用度至廣臣子之義所當體國非甚不得已豈忍煩溷朝廷以此日夜憂恐未知攸濟伏惟鈞慈俯賜矜察論四川将士鋭於立功朝劄某竊見四川諸軍士氣甚振人有奮心諸将鋭於立功可以决勝非尋常之比敵政殘虐闗中百姓不復聊生皆思内附必有土崩瓦解之憂聞東南彼已之勢亦然誠千載之一時此間将帥士卒惟恐敵勢沮縮自憂内亂復有通好之請而朝廷從之仰惟廟堂成算素定而逺方人情事勢必所欲知故敢輒以上稟至於軍須應辦目今並無闕乏枝梧調䕶之難不敢具述若涉大水未知攸濟伏望鈞慈特埀矜察凡所申明如或可采乞早賜施行
