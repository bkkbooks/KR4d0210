body:
  text: 漢濱集巻十一宋王之望撰啟通鄭資政啟㤗山北斗久崇道徳之髙白日青天未快儀型之覩望台符之兩兩懸風斾以搖搖顧姓名嘗掛於齒牙則書記宜攄於肝膽輒效小人之竿牘自通夫子之門牆流水髙山或賞音之可遇夜光明月如按劍以奚憂願明晞驥之心弗拒躍螽之懇恭惟某官才優王佐學擅儒宗世濟美以傳芳天生賢而瑞聖守韋平之經藝自取殊科振王謝之家聲荐躋華貫出入鳴珂之里翺翔持槖之班文采風流望髙當代論思獻納寵冠邇聮夙懐經濟之心適際艱難之運十年險阻一節始終守義奮忠知疾風於勁草釋紛解難游利器於盤根信行蠻貊之邦氣吐虹蜺之上卒柔勁敵並締歡盟寛萬乗宵旰之憂復九重晨昏之養魏絳和戎而利晉較力非難子貢霸越而亡齊論功孰大計安海㝢勲在旂常俄陞祕殿之嚴仍秩輔臣之峻錫膏腴於樂土奉香火於殊庭用均出處之勞益養弼諧之望和合二國已賴鄧芝之功鎮撫四夷將奉陳平之對未拜鼎梅之命忽纒風木之悲朝廷暫失於倚毗聖主深憂其毁瘠髙士致生芻之弔門人廢蓼莪之篇忠孝兩全身名俱泰雖縗麻有制方深追逺之思然金革未消佇下奪情之詔勉辤苫塊入正台衡用承夾輔之盟大振中興之烈某儒冠寒士侯泮冷官素潛附鳯之心終冀登龍之幸鷄鳴狗盗倘容下座之收蟲臂鼠肝久藉大鈞之播嚴凝在候追慕難堪願少抑於孝思用仰酬於睿眷謝及第啟階任子之恩已更賤役應興賢之詔復忝巍科循鄙分以非宜撫踈才而自愧竊以國家惟百年之計留意人才學者以一日之長致身科目凡彼公卿之蹊徑悉由文字以權輿始類浮文終收實用遂使清朝篤意謂糊名較藝之足憑後進希聲以射䇿决科為可貴故此艱難之際亦嚴搜選之方神州尚隔於一隅江表自稱為多士雖未復限淮之地亦不虚造牓之天方三祀之亮陰肅九重而恭黙龍池輟試將權衡於近侍之臣鴈塔書名等甲乙於春官之考訓辭甚切聖意有加精求賦日之才博采濟時之畧謹其聲律蓋將觀組織之工訪以古今所以考經綸之術自非詞兼衆體才擅數長則何以副睿哲之旁求處英賢之上列如某者衣冠寒族庠序晩生無博觀廣覽之資有孤陋寡聞之累専心弱歲攻書劍以徒勞刻意前修佩韋弦而自飭妄起功名之意早遊教化之原博士一經生徒數載月程文藝屢收得雋之功秋試賢能亦在先鳴之列自詭穿楊之審不知拾芥之難龍門未躍於西河鯨鬛遂掀於東海合繻以出彈鋏而歸繼纒風樹之悲無復星槎之興十年兵火脱患難於中原萬里風波從衣冠而南渡講道於絶糧之際談經於弛擔之餘素患難以安行嘗險艱而已備偶緣世賞獲厠官聮鐵違鑄硯之心金負滿籯之訓絶意㝠鴻之寥廓甘心斥鷃之翺翔然素業傳家懼弓冶箕裘之墮青衫入仕有塵埃箠楚之羞痛自激昂載加勉勵家無文史重興五厄之嗟官有簿書更苦三餘之窘心耗於囊中之句目昏於檠下之書過時已覺於難成中道幾思於自畫向用朝廷之事比許還首善之薦名來求禮部之選掄偶犯有司之程度霜蹄遂蹶劍氣空呈復埀翅於囘谿獨倚輈於虞阪功同猿臂疑骨相之難封命肖龍章恨神仙之多障有求弗獲欲罷不能屬詔綍之肆頒厲辭鋒而再鼓既與漕臺之計復觀王國之光朋來集四海之英頴出盡一時之秀時方用賦皆升堂入室之流士必通經多専門名家之學玉有荆山之韞珠無滄海之遺可謂盛哉吁足畏也方錙銖之必較忽糠粃以居前然而求劍刻舟守舊方而甚滯好竽鼓瑟追時尚以尤疎文或病其雕蟲技幾成于畫虎既瑕瑜之不掩宜葑菲之俱遺何圖骩骳之詞猶玷公明之選人非東晉莫與劉琰之流賦異阿房終居杜牧之下尚次甲科之後獲塵乙夜之觀自揣奇窮已為僥倖此蓋伏遇某官才髙人傑道契天民以兼資文武之才膺注意安危之寄計存廟社威名獨重於朝端位冠臣隣風采想聞於天下乆持魁柄力運化樞折遐衝於敵人窺伺之秋鎮雅俗於國勢危疑之日臨大事而不亂蓋胷中之氣有餘推至公而必行故宇内之心自服國有中興之漸士無先識之憂致此庸虚有兹叨冒某敢不益崇儒行勉服官箴隨所遇於他時期粗伸於素志被君相作人之澤雖匪成才師聖賢行已之方則為報徳上孫承㫖啟光奉制書復登翰苑承中禁幾㣲之㫖冠内朝清切之班傳聞四遐聳動羣聴竊以北門待詔専取文章東閣别居必推年徳將相相望於前世官資不計於同僚在中朝熙洽之時特為榮遇逮南渡艱難之後無復常員自非大用之資曷副久虚之選恭惟某官斯文哲匠當代耆英疎通既禀於天資練達尤深於世務清塗揚歴閲歲月於三朝絶域征行冒風霜於萬里夷險不渝於一節身名由是以俱榮入掌絲綸出専斧鉞詔令繼兩京之作威權侔二陜之分屬睿哲之求賢思老成而共政鋒車馳召屢趣舍人之裝黼座對揚遂前天子之席方今台階未備政路多虚濟時實藉於真才注意允歸於舊徳名書案上聞宸翰之親題禮絶座中有禁林之故事某叨䝉慰薦粗識依歸峻比龍門已濫登於賤跡成同燕厦惟竊賀於私心賀孫參政啟進用真儒入參大政綸言誕布隠然國勢之隆輿論僉諧赫爾民瞻之峻庇庥所及慶忭交深竊觀前世之興衰皆係大臣之能否誠得賢輔必收雋功未有用無奇之人而可辦非常之事又况聖哲馳騖之日非如國家閒暇之時宗廟社稷之安危動闗舉措錢榖兵甲之繁冗密備咨詢自非希世之才曷展經邦之略天厭禍亂國登俊良恭惟某官道備弛張學窮治忽發為華藻蔚乎兩漢之文養以淵源粹矣六經之蘊法律淹通於三尺憲章練達於累朝得其一長已足名世至於大節則又絶人曩勍敵之始通擇邇臣而往聘敵心不測物議交疑方衆人相視莫敢請行之間獨匹馬徂征出不反顧之計信義行乎殊俗忠勤簡於清衷位貌寖隆寵􅂕甚渥雍容玉帳兩専方嶽之權出入金鑾三奉禁林之直比載膺於圖任遂亟被於登庸以將降大任之資迪紹開中興之烈君臣同徳協際會於風雲中外傾心望昇平於朞月某受知特達聞命欣愉頌聖主之得賢臣愧無妙語以儒宗而居相位更俟嘉音寒律方嚴恩光尚逺期精加於調䕶用宏濟於艱難與閭丘侍郎問候啟到廣文之官舍誰慰棲遲侍夫子之門牆獨叨顧盼間摳衣而造請毎吐哺以逢迎仰侍儀刑氷壺瑩坐側聆謦欬玉麈生風照落月之滿梁話朝隂而改砌方幸帡幪之借忽驚棨㦸之遥雖羽毛切賀厦之心而駑蹇深戀軒之意台符乍逺時律俄更屬蓮幕以初開諒鈴齋之有暇中和布政豈弟宜民熙雅俗以交歡納多祥而擁茂恭惟某官天和毓秀星緯儲精挺資質於瓊瑶粹靈襟於珠玉才非近用許身稷契之間學邁前修勵志淵騫之上曩一同之宣化已三異以馳英繡衣遽以其名聞黼座亟嗟於見晩擢司紏察特髙御史之聲入總彌綸尤善都公之職俄膺帝制進貳天官藻鑑無私銓衡有叙身持荷橐驟登法從之嚴名覆金甌將秉事樞之重忽厭承明之直暫從真館之游衣晝錦以榮歸醉仙霞而均逸比膺明命起鎮大邦皁盖朱轓引安輿而就道金章紫綬映綵服以趨庭里巷矜榮搢紳豔美惟永嘉之故郡有康樂之遺風冠盖連雲閭閻匝地屬車所次曽紆警蹕之臨原廟斯存久肅衣冠之奉委兹重寄必屬名臣果中詔以明揚分左符而顯授班春慰俗來暮興謠坐恢安靜之風益勵㢘平之素宣十行而撫衆愁歎消聲持三尺以繩姦貪饕屏迹闃訟棠而敷䕃哦夢草以搜竒治行流聞頌聲間作報政遂先於齊魯賜書豈後於龔黃卧閤多閒應爛賞雁山之勝造朝伊邇行趣歸鳯閣之中某日戀三升月糜五斗徒抱漳濱之疾莫陪池上之吟望履未期逺借慶雲之庇彈冠何晩終希宵燭之光朱夏啟辰薫風入奏願益綏於玉體用下副於巖瞻除太學錄謝宰相啟脱選調之塵埃初更祿秩錄成均之攷法忽冒除書揣已何堪就官有靦我國家觀人文而化天下度絶前聞建首善而自京師實由内始逮華戎之多故痛庠序之多隳天之未䘮斯文俄臻偃革物不可以終否復觀迓衡聖賢相逢而治具張財力有餘而頌聲作乃依行所肇闢賢關規模還列聖之容警蹕來九天之上譽髦雲集聲教飈馳爰遴簡於師儒俾講明於經術仍分正錄用糾生徒雖取法先王本詩書禮樂以造士然更資大器執規矩凖繩而治人宜得名流以諧清議如某者禀才至薄涉世尤疎謬傳箕冶弓裘之餘無復師友淵源之自䇿名一第嗟壯歲之已過隨牒四方悵譾能之無補一行泮水三變周星仕有時為貧本作斗升之計教然後知困慙無尺寸之長比及終更偶容善去顧無徳而富貴早已灰心惟有道之賤貧未能雪恥勉從銓課遂忝京僚方徒勞州縣之間甘為俗吏何樂育人材之地遂並英游此蓋伏遇某官仁濟含生功超振古恥堯舜之不及至周召而乃留保乂王家克端命於上帝會紹乃辟用追孝於前人致萬物以得宜無一夫之不獲至如孱陋尤困奇窮貌醜心妍利居衆後髪禿齒豁不見已知與其掉乞憐之尾而僥倖於他人曷若由中正之塗而投誠於吾相式下靈鼇之釣靡資蟠木之容草光範之書無煩三獻開翹材之館亟納孤蹤軫其從宦之清貧授以為文之要體大鈞所播至鑑難逃䝉厚徳以如斯殞微軀而何有某敢不恪共爾位終始其躬當任賢使能之朝既塵公舉堅仗節死義之守必報私恩賀樓樞密啟光膺寵綍越執洪樞還居政府之嚴隠如敵國坐使朝廷之勢安若㤗山將士交欣搢紳胥慶竊以先王之制兵刑出於一原有國之經文武號為二柄掌其政令宜在廟堂逮軍民之既分致將相以異任典戎事者罔陪於國論代天工者弗與於兵權注意既殊全功曷責國家開重熙之景運仍五季之舊章爰建輔臣以司兵本稽於古實六卿司馬之職考其官蓋三事大夫之聮地亞鈞衡謀専帷幄必得腹心之佐始膺體貌之隆矧今大難已平中興伊始雖干戈倒載永無征戰之虞而樽俎折衝允藉威懐之畧自非上哲曷副旁求恭惟某官資粹誠明學窮治忽沈深大度量莫見於津涯厚重寡言色不形於喜慍凛凛萬夫之望堂堂千載之英出入三朝險夷一節曩緣對境許締和盟方善意之未孚致羣情之大擾獨奮龜蓍之見贊成金石之交朝陳悟主之一言夕獲和戎之五利宣帝納呼韓之欵賴蕭𫝊之通經太宗用房喬之謀資杜公之善斷俄躋近弼出撫全秦王侯咸授於指蹤封拜得専於承制釋俘歸敵遐方深得於歡心罰罪賞功諸將願輸於死力名聞草木功在鼎鐘暨零雨以言旋將作霖而是命俄軫劬勞之痛稍稽考慎之圖甫免私艱亟分閫寄輕裘緩帶擁油幕以臨藩淑旂綏章趣鋒車而入覲嘉猷既告睿眷彌隆一開日月之明再契風雲之會對賈誼於宣室不問鬼神留姚崇於渭濱非由馳逐遂復青氊之舊進陪黄閣之崇碩徳既升太平可必基命宥密方攄廟算之奇疇咨登庸行正台階之拜某夙希附驥近獲登龍謬承特達之知許借吹噓之力掃門已晩尚及曹參之在齊結綬有因喜見貢公之輔漢豈止係當時之輕重盖尤關小民之戚休望舟楫於江干日遲行色伺絲綸於轂下側聴除音成命忽傳歡悰曷既剡書薦墨雖未騰北海之章羇旅窮愁寧久索東方之米通樓樞密啟揚清激濁誠先達之髙風出幽遷喬亦後生之雅志欲赴功名之會必由上下之交若矜其位而矜其能孰為之先而為之後是固交相求而一致豈容化於道而兩忘聲氣茍同卑髙曷問所以附翼攀鱗之喻著自聖門彈冠結綬之談誇乎信史絶足繼騰於王路清芬藹著於遺編逮五交之釁既萌致三適之功無取上之人偷安富貴弗憂英俊之沉下之人自負才猷恥藉王侯之勢方圓不合秦越相懸魁奇卓犖者滅跡而無聞讒諂阿諛者乗時而得肆比周無愧勢利相先曲意取容不但奴顔而婢膝抵􅇖競進有同人面而獸心賢才之路用堙市道之風滋扇克敦薄俗必屬偉人幸公道之有歸披鄙誠而自列伏念某衣冠寒族庠序晩生蹉跎踰不惑之年連蹇抱數竒之歎賢關肄業半生白首之經仁路抗顔一紀紅塵之吏曩䇿名於桂籍因濫吹於芹宫坐客無氊舉家食粥瘦馬空存於六印沈舟坐閲於千帆齒髪摧頹老先期而驟至聲光湮沒世與我而相違安寂寞於冷官分棲遲於選調既異蘋蘩之可薦甘同桃李之無言曷嘗低欲就之頭未省揺乞憐之尾恥嗟來而得食肻詭遇以獲禽然而樂善公卿久要故舊或加力於收拾或陰借於吹嘘歲律再更剡章四上惟浮圖之未合恐濩落以無容譬如為山九仞尚虧於一簣宛在中沚一壺何啻以千金敢於軒檻之前輒效頑金之躍恭惟某官術優王佐學擅儒宗九徳在躬表臣隣之冠冕羣書滿腹粹師友之淵源昔居韋布之間已負經綸之氣暨逢興運驟閲華塗西掖代言髙掩常楊之譽北扉視草密㕘頗牧之謀允兼文武之資果注安危之意樞柄進登於二府使星出耀於三秦遣鄧禹於關中威名響震分召公於陜右徳化流行幕府言旋介圭入覲方鼎梅之欲命忽風樹以纒悲甫終祥禫之期遂受蕃宣之寄陞隆名於祕殿委重鎮於陪都細柳兵閒甘棠訟簡修山陰蘭亭之故事題鏡湖秦望之新詩顧惟良弼之求方資帝賚第恐衮衣之詠難緩公歸佇鳳詔以出綸催鹿車而當軸阿衡一世陶冶羣材盖事君以仁者衆夙仰於皇猷而薦賢報國者時正宜於今日方將掩東海以取埀天之翼決西江而迎涸轍之魚使菁莪歌樂育之仁而棫樸頌能官之美搢紳屬望巖穴傾心至如疎逖之蹤尤切依歸之素擬作韓門之弟子未窺孔氏之門牆非不能連草三書漫懐一刺請竇長公之介紹假郭有道之題評因舍人而見曹參為門客而干延夀髙山流水固可覬於知音明月夜光懼或逢於按劍今者塗經大府謁入髙門瞻周公几几之儀驚漢相堂堂之表謙冲下逮顧盼生光季路初來已有升堂之望曹交受業思為假館之留時在可言義難自棄用忘固陋仰冀甄收盖得其所歸燕雀猶知於賀厦翔而後集鷦鷯豈妄於巢林士雖居窮約之中身亦擇棲投之地若非盛徳敢借餘光素㣲半面之知且乏游談之助輒輸肝膽便匄齒牙視古人則進退以無嫌在今世為狂愚而可笑處已如此期公謂何或明附驥之心願借連鼇之手鷄鳴狗盗既下客以兼收蟲臂鼠肝庶大鈞之永託謝孫參政舉改官啟闢鑄顔之冶久荷私恩飛薦禰之章復塵公舉愚衷積感弱質增榮竊以輔政之臣安危所係舉賢之任出處惟均在朝則委以官人去國而猶令進士靡論中外皆得薦揚非如監司郡守之有拘故所霑者廣加以祠官散員之許用故欲得者多自非俊傑之材不在題評之目如某者禀資最陋賦命多奇祈柳巧而莫酬驅韓窮而不去小不能披堅執鋭奮身行陣之前大不能排難解紛効力功名之會徒耽末學分作迂儒陸沈一世之間雌伏百僚之底偶緣科第濫處膠庠坐客無氊舉家食粥誨諸生於館下毎虞譏笑之興集三鱣於堂前豈有升遷之望敢期僥倖忽被甄收此蓋伏遇某官盛徳格天嘉猷濟世欲大恢於相業故廣攬於人材粉澤帝圖有咸熙之庶績陶鎔士類無不獲之一夫致使寒微亦膺記録某敢不激昂氣節淬礪猷為雖功名富貴以難期庶用舍行藏之無愧雞鳴狗盗已叨座下之收蟲臂鼠肝更賴大鈞之播謝樓樞密舉改官啟泮水育材茍幸曠瘝之免銓曹考課冒膺秩序之更受命知慙撫躬曷稱竊以陟黜幽明之典廢士始惰功綜核名實之政衰人斯濫進惟吏部改官之制推本朝立法之嚴積以錙銖較以毫髪一言不應累善無容倘小節之弗完亦前功之盡廢雖聖世於焉而得士然姦胥或得以舞文視賂賄之重輕為行移之淹速故難於應格喻同進士之登科而計所輸貲至比富人之入粟與於此者不亦難哉如某者太學陳人中原冷族専心弱歲絶尼父之韋編刻意前修紉屈平之蘭佩早塵世賞旋竊文科免從州縣之游猥玷師儒之選董惟常下馬帳空懸媚學有徒冠履漫同於聚蚋好書成癖簡編殆類於蠧魚玩華丹於法度之言振鼓吹於京師之作飯蔬飲水樂亦在中乘馬從徒兹非其幸博士虛糜於廩粟廣文何有於才名逮此終更敢希平進忽因公舉得厠京聮資品敘升始正有官之號歲時馴致式階通籍之榮僥倖若兹夤縁有自此蓋伏遇某官至誠樂善偉度包荒觀其廣攬於英才蓋欲大恢於賢業吹噓不倦無非有味之言謦欬所加便作知名之士推轂毎先於寒逺登門不間於故新雖云無用之資亦借曲成之力重念某與時齟齬賦性疎庸久處窮塗分無長物知匪蘋蘩之可薦自甘桃李之無言比黌舍之三年偶剡章之四上方浮圖之尖未合恐濩落之瓠無容續正賴於鸞膠棄有同於雞肋輒輸肺腑用匄齒牙不待先容亟䝉重諾箭俄飛於燕將璧遂假於許田大厦將顛功獨支於一木中流獲濟賜何啻於千金成此叨逾悉由特達某敢不欽承至意銘著乃心儒有古人與稽願堅操履士為知已者死誓報私恩上髙司業啟棘圍較藝塵師匠之權衡泮水傳經記儒宗之領袖久矣執鞭之願闕然釋菜之儀瞻徳表於無階揺心旌而甚切輒效小人之竿牘自通夫子之門牆流水髙山既荷知音之素夜光明月必無按劍之疑緬維賢士之關敬仰哲人之範得英才而教育樂在其中有神物之扶持吉无不利恭惟某官行純金玉操厲氷霜九徳在躬植賢能之冠冕羣書滿腹粹師友之淵源曩游庠序之間已負公卿之望文髙紙價業䆳書帷郭泰居三萬人中獨為稱首何蕃餘二十年久孰敢駢肩迨升俊造之科遂際休眀之運懐鉛抱槧容與石渠含香握蘭進趨粉省率由直道荐歴華塗屬臻偃革之期載闢明倫之地爰資模楷式正本原肇新首善之規誕舉成均之訓生徒濟濟風化洋洋出斯文埋沒之餘振吾道陵遲之後聲華愈茂眷注彌隆博古通今入勸邇英之講分章摘句兼陪資善之游極妙選於一時聳榮觀於多士后䕫之教胄子正賴全材伊尹之格皇天終躋大用某逺依輝庇尚占冷官既榮華衮之褒敢緩空圅之達攀鱗附翼久潛顔子之心結綬彈冠更效貢公之喜方凝寒之在候悵崇仞以猶賖願保冲襟益膺殊寵除博士謝宰相啟糾教法於賢關蔑聞善狀正官聮於講席忽奉恩綸就列無堪循名有靦竊以四海淵源之自蓋本成均六經訓詁之傳實由博士明人倫而在是列天象以昭然平時固號於才難文治尤嚴於徳舉得見君子斯可矣否則學者無述焉如某者業謝師承體非儒雅只縁幸會偶誤甄收屬當首善之興遂造羣英之末典司規矩豈諧寛猛之宜校閲藝文莫贊公明之考繼下帷而政事毎非座以懐慙敢期寡聞無約之資乃冒久假不歸之寵此蓋遇某官至明燭隠大度包荒修禮樂於小雅盡廢之餘洪基圖於炎政中微之後雷破山而風振海壯矣帡幪鳶戾天而魚躍淵妙哉橐籥故雖綿薄亦被生成惟詞章視一世以汙隆而國學為四方之楷式變齊魯以至道欣盛世之已純逃楊墨而歸儒恨斯文之未副既公去取必絶愛憎恃直道之方行冀狂瀾之可復某敢不勉思博約確守靖共譬彼鑄金徳難酬於大冶用諸攻玉質徒愧於它山上湖州王侍郎啟持甘泉之荷橐久藉論思分刺史之竹符用均勞逸朝辭輦轂夕見吏民方幕府之初開諒鈴齋之有暇中和布政豈弟宜人罄雅俗以交歡納多祥而茂擁恭惟某官宏材㧞萃奥學逢原早懐康濟之心適際休明之運致君業履許身稷契之間經世文章接踵班張之後自延登於法從益展盡於嘉猷獻納居多風規愈厲誠心樂善力收當世之滯淹直道立朝無愧平生之出處頃厭承明之直往分聖主之憂君相永懐悵莫留於益友湖山動色喜乍得於詩人暫辭紫禁之烟花聊賞白蘋之風月昔張燕公出臨江夏益妙篇章元丞相來守山隂盛傳酬倡才因景發地與人宜矧苕霅之名邦得風騷之太守凝清香於宴坐出小隊於郊坰凡歸一詠之品題莫匪四并之逸樂然而疆鄰北闕職寓西清忠精夙簡於天衷治行俄騰於日下専城雖美前席可期屈處厚於盛山雖無欣戚試望之於馮翊難緩登庸某猥以庸虛誤䝉知奬方承庥於徳宇忽逺迹於恩閎設祖帳於都門悉傾朝士望仙舟於河上獨後諸生回第三人陳學士啟賜第宸廷聨名鼎甲傳玉音而申諭藹桂籍以生光恭惟某官經史淹該文詞贍蔚卓爾功名之志見於議論之英以貲為郎欲獻相如之賦隨計􅍗闕果䝉漢武之知殊科收摘頷之功絶技有中眉之恨髙名始唱實居季孟之間故事攸拘遂處王楊之後昭聲華於白日開塗轍於青雲某頃預有司獲觀大對収象犀之實本自因人擅龍虎之稱徒欣得士過紆盛服貺以長牋佩謙徳之光亨増鄙情之感激回第四人莫學士啟獻賦春闈試言天陛屈一時之髦士連處上游知萬選之髙文難虧定價恭惟某官青雲令器白雪髙標氣涵苕霅之清光射斗牛之上閨門競秀蔚珠樹以連三場屋先登擅桂枝而擢一金聲既振紙價隨髙以五千言宏偉之詞㕘二三子巍峩之選雲衢自致肻屈身世賞之延天澤驟加遂脱跡銓曹之冗某比窺大對深歎雄才搏虎捕龍敢角衰殘之力擢犀㧞象坐收奇偉之觀徒得雋以為榮顧知音而何有乃迂都騎貺以長牋感幸惟深敷陳莫罄荆門軍到任謝宰相啟分符出守託異縣以須才懐綬之官入黄堂而視事自惟非據深用靡遑伏念某賦性迂踈禀資駑下幸逢聖世獲厠儒林朝暮虀鹽久享詩書之樂春秋霜露毎懐松檟之思惟此小邦密隣故里輒效一麾之請遂成三徑之歸上谷遺風比鄉閭而甚類兒童塵跡尋泉石以都迷朋舊歡迎妻孥交慶服緦從事方有改塟之圖上冡申哀允便過家之舉獲從私願實出優恩此蓋伏遇某官盛徳格天元勲繼世接下必期於自盡包荒靡見於遐遺憫兹流落之蹤惟深懐土察見顓䝉之守粗可牧民故於枌社之旁􅂌以竹符之寵生成甚力銘刻何言某敢不俯體眷憐力圖報効養生送死而無憾既曲遂於身謀愛人利物之謂仁當仰鈞於徳施與襄陽吳帥啟一麾出守誤膺民社之分十國為連獲託藩垣之庇遭逢有幸喜愧惟均伏念某章句鄙生膠庠舊物值聖主崇儒之運充賢關講藝之員倚席五年同擅虀鹽之樂懐家萬里毎深松檟之悲乃眷此邦實瀕故里服緦從事欲為改塟之圖上冡申哀可辦過家之舉來承人乏得便已私此蓋伏遇某官雅量鎮時英猷濟物聳搢紳之重望膺君相之深知紅斾碧油暫領上游之重丹墀青瑣行趨中禁之嚴敢謂衰蹤竊依輝蔭矧惟編籍實寄部封自宋之滕方慕賢侯之政維桑與梓庶修雅什之恭答潭州陳帥啟紅斾入疆已建元戎之幕朱轓至郡復交太守之章封部載歡江山改觀恭惟某官才猷通敏徳器恢宏術應變以無窮治所臨而有績折衝借重坐宣樽俎之威來暮興歌行有袴襦之效某偶因使事獲託官聮攬轡登車方採風謠之美賜金増秩式觀政化之成曽修慶之未遑忽貽緘之先及其為感愧罔既敷宣賀劉運判除祕閣升副使啟申錫帝綸就升使節載聮榮於華閣爰増峻於外臺郵置初傳輿情胥悦恭惟某官器資宏博識度疏明裕然康濟之才偉矣富强之術宜九重之眷注付一道之將輸南方為財賦之淵本斡旋之有道東壁乃圖書之府見寵畀之非常益茂膚公徑躋法從某屬當郡寄欣覩除音阻修慶於賓閎敢寓詞於書尺通樓樞密啟去公府之潭潭洊更歲月仰台符之兩兩杳隔雲天久塵庠序之官毎負簡書之畏名姓用疎於記室精神徒結於門牆惟時輔弼之良夙茂經綸之業祠庭偃息方益聳於具曕神物扶持宜厚膺於純嘏恭惟某官才髙人傑道契天民獨兼文武之資蚤注安危之意玉堂詔令追爾雅於二京油幕韜鈐折遐衝於四國一攀鱗翼再秉樞衡屹然柱石之擎炳若蓍龜之斷允當大任果濟中興佐佑成王君奭協周公之化謀謨貞觀房喬推如晦之籌旋抗封章懇辭機政體恤特深於睿眷股肱稍逸於賢勞遊綠野以娛神侣赤松而訪道屬四海作霖之望爭覩十行副九重審象之求佇臻三入某儒流晩進鈞播微生曩騰光範之書獲厠翹材之館輪囷見器初無蟠木之容踊躍自言遽入洪爐之鑄遂脱身于選調繼列職於行都靜言卵翼之私悉自齒牙之借知已之深恩未報古人之大節奚論克謹操修恐辜提奬比在淵源之地屬經寒暑之時司訓詁以非才日虞官謗念松楸而自請叨假軍麾尚飄萍寄之蹤未及瓜期之代窘饑寒之方急執洒埽以無階菅蒯至微永託卿雲之䕃潢汙雖逺終期滄海之歸兹炎赫之在辰宜保綏之加意亟被賜環之召式隆調鼎之功荆門得替經從湖北謝陳漕啟小壘終更已屢遷於月律先塋輒埽方祗赴於天朝逺泛江濤經從治所行有趨參之幸不勝欣抃之私恭惟某官奥學家傳宏猷世濟踐揚南北雅擅於能名綿歴歲時益精於治道頃一麾而出守俄五袴以騰聲果被褒嘉就司飛輓上游憂顧聊宣力於外臺中禁論思行致身於當路某欽風滋久慕徳無窮解職雖前猶借二天之庇登門在即已輕萬户之封回瀘南晁安撫啟祇奉恩綸顯膺召節輕帆滚滚將修入覲之容芳翰諄諄重講相違之義情文交厚衰耄有光恭惟某官才術開明文華贍博三紀宦游之久一時物論之歸洊歴侯藩政績髙於數郡遄分帥閫威聲振於百蠻簡隆眷以彌深罄嘉猷而無隠行寘論思之列盡攄經濟之圖某正理行􅋔將安真館欣覩追鋒之命阻陪銜舳之游寖逺英標莫卜瞻承之路側聆新渥嗣馳贊喜之緘賀吕總領啟光膺帝制進直郎曹以計省之華資總師屯之重寄恭惟某官家傳奥學世濟宏猷風流標王謝之姿政事處由求之右朱轓出守藹承流宣化之聲玉節觀風勵激濁揚清之志誕布九重之徳澤聿蘇萬里之瘡痍凋瘵息肩姦贓落膽惟武昌之列戍據全楚之上游供億是資傾天下轉輸之半顧憂允賴當禁中奏報之繁自非君相之腹心曷注軍民之耳日果膺妙柬就畀雄權足食成軍方資於良筭庇民尊主行奮於嘉謨某久託餘光特䝉異顧感恩私而結戀聞除命以馳神謝范漕啟小壘分符猥承人乏外臺飛奏重愧已知載省凡材曷勝公舉竊以漢刺史六條問事察二千石為最詳唐採訪十道得人領三百州而得要惟是守臣之能否實繫部使之否臧免督責以為難豈薦論之可覬如某者禀資至薄涉世多奇仕雖本於為貧志亦希於行道老而不試毎疑所學之無庸力非自量妄意為邦之或勉比從黌舍得請軍麾甘沉迷於簿領之中親瑣碎於米鹽之末術因臨事方知賈誼之疎政在愛民更覺陽城之拙惟資餘潤冀免大訶敢期氷鑑之明忽誤蘋蘩之薦此蓋伏遇某官英猷濟物絶識過人登車逺繼於家風持橐行儀於禁路發奸擿伏推政事之神明激濁揚清判人倫之涇渭顧如庸鄙雅荷眷知雖衰遲流落以無堪辱撫育矜憐而益厚居然幸會託在按臨持公法而優以私恩取寸長而䕶其尺短不惜齒牙之論將令羽翼之成自視欿然何以得此某敢不益修操履仰副吹嘘死者有知應感撫孤之義永以為好終輸報徳之誠湖南提舉到任謝宰相啟假䄡帷而出使復去門牆馳軺傳以之官已臻封部情深戀徳感切歸恩伏念某流落孤生艱窮薄命久託洪鈞之播初無蟠木之容入忝膠庠出分符竹養生送死既畢遂於身謀蔵垢納汙毎曲蒙於情恕施等天地仁均父師兹小壘之代還遽外臺而擢授察其稍盡心於從事故驟而寵以使華憐其方竊禄以為生故趣使就其官次惟是書紳之誨尤多提耳之言約以禮博以文恍聞韶而忘味厲之名引之美比贈衮以踰華負荷知恩遭逢乃爾兹蓋伏遇某官言成典誥動契神明距詖行而放淫辭士風丕變開誠心而布公道王化無偏致令寒逺之蹤重戴生成之賜某敢不服膺哲訓悉力公程有地酬知豈此身之足惜指天誓報庶它日以無慚通問湖北陳總領啟叨奉宸恩濫將使指入部封而交事託庥庇以知榮恭惟某官雅量鎮時宏才絶俗宣化藹惟良之譽觀風無太察之苛升郎部之華資總師屯之重寄上游餉餽已寛聖主之憂中禁論思行簉從臣之列顧惟疎冗特荷眷知靜思忝竊之由實有吹嘘之自星軺承乏顧何取於澄清雲䕃埀休庶可逃於曠斥凝寒在候吉履具宜冀妙養於冲和用亟臻於寵渥
