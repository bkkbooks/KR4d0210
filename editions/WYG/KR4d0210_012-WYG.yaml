body:
  text: 漢濱集巻十二宋王之望撰啓潼川漕謝宰相啟糜廪食於湘濱已辜命節將轉輸於梓部載誤恩綸揣分無堪冒榮有靦竊以總利權於一道外臺推漕計之繁次地望於四川左蜀號益都之亞分三銓而選吏權萬井以通商粤自軍興仍多邊費四海既臻於康泰一方未省於征求上軫顧憂逺加寛䘏雖事為之制經講畫之已明然存乎其人要推行之盡善必得異能之士庶知協濟之方如某者賦性甚迂理財素昧比玷光華之選日惟瘝曠之虞典食貨以裕民曷禆良法宣詔條而撫俗蔑布深仁幸憑覆䕶之慈未抵譴訶之域忽驚申命靡俟終更專重寄於一司補缺員於五稔惟是久虚之選宜陞不次之才敢謂踈愚乃承空乏此盖伏遇某官神功不測元化難名有一徳以享天心允任大臣之重使萬民而正王面每勤膚使之求致若孤蹤亦叨器使某敢不更殫夙夜益守靖共外竭力於一官冀無大戾内矢心於九死必報洪恩賀湯樞宻啟光膺詔綍進長機庭肆國家偃武之時専廊廟本兵之任九重屬意四海蒙休恭惟某官間世真儒累朝宿望藴潔靜精㣲之學成彌縫輔贊之功兹萬化之更新頼一臺之糾正直而不倨抗讜論以囬天公爾忘私推誠心而格物能使薄夫敦而懦夫立大臣法而小臣亷暨登參貮之司益展經綸之效惟時樞筦實亞台階府並列於東西班迭陞於先後事分軍國制自祖宗曩戎事之繁興命相臣而兼領勢成偏重權覺寖輕屬當威柄之申遂復章程之舊副兹徳選可謂才難果崇體貌之隆式厚腹心之委基命宥宻方資帷幄之竒謨明弼諧行運陶鈞之化某猥將使指逖聽綸音夢繞門闌雖阻伸於慶謁言形竿牘姑少見於歡悰冬序正中廟謀多暇願精調於鼎食用下副於巖瞻潼川憲到任謝宰相啟久叨餉餽之司曽無政績就易平反之任不改撫封命節増華汗顔有靦伏念某早專樸學晚抗塵容横經首善者始終五年隨牒外方者俛仰十稔一紆守􅌧三假使軺比將漕以充員適勵精之更化輕徭薄賦務宣布於深恩激濁揚清式欽承於休徳豈但轉輸之輒辦必期凋瘵以兼收使巴山萬里之遥如甸服一圻之内至於剗除民蠧禁戢吏姦力雖倍以何功心愈勞而更拙徒依庥庇未被譴呵敢圖瘝曠之餘亦玷陶鎔之末飛芻輓米既辭計事之煩攬轡登車仍正職司之秩叨逾已甚稱塞維艱此盖伏遇某官道貫王猷功熈帝載名世乃聖人之遇求賢真宰相之方為桷為杗校羣材而並用采葑采菲收片善以無遺顧若踈愚誤膺知奬每自慚於譾薄尤重費於生成謂涪潼之間固已粗諳於摩撫則刑獄之寄或能上體於哀矜因俾敘遷實為僥倖某敢不益殫夙夜勉副使令叱馭輸忠庶家風之未泯捐軀效報豈國士之難追賀沈丞相加恩啟勒成國典光被廷綸粤躋賜位之官併衍加封之户陶鎔所及鼓舞惟均恭惟某官盛徳熈天嘉猷濟世雅多材而多藝誠有徳而有言尊主庇民行堯舜文王之道屬辭比事合稷契臯陶之謨兹者圖慶系於璿源述睿思於寳訓聿煩上宰獨總宏經實資指授之勤克善條流之制簡編沓上粲星緯以爭光品秩増崇覺台階之愈峻某官常是守班慶莫遑作一經而埀無窮仰歎股肱之懿懐萬方而褒有徳益欣體貌之隆暑氣方炎恩閎正逺願精調於鼎餗用下答於巖瞻成都運使到任謝宰相啟石渠寓直遽參英俊之逰玉壘將輸復貮光華之選寵榮重沓感愧交併伏念某禀賦凡庸見聞單淺隨牒今逾於二紀乗軺遍歴於諸臺頃按刑書未周嵗籥雖粗殫於夙夜曽何取於涓埃敢期責實之朝乃冒踰涯之寵懐鉛抱槧通仙籍於蓬山輓粟飛芻耀星芒於井絡漕權既重地望彌髙矧擇副以尤難常空員而弗置膺兹優擢必屬異能忽併誤於褒遷實自驚於叨竊此盖伏遇某官道遵皇極學探帝謨藴大任之英姿輔中興之盛烈賢材廣攬已收多士之心利澤逺施深軫四方之慮精求膚使猥及迂儒察其體國之誠未嘗沽虚名而乏調度知其愛民之意不肯越經賦而横征求似於公私取予之間稍識利害輕重之理是以委之劇部秩以清資用伸勸勵之規以起衰頺之意某敢不咨詢民瘼宣布君仁期不負於使令庶少逃於罪戾然而盤根錯節衆謂難圖綿力薄才豈能宏濟非大造曲加於假借則孤蹤必至於顛隮播以陶鈞既荷生成之賜緩其銜勒更希覆䕶之慈載厚徳以無窮隕㣲軀而何有賀工部楊侍郎啟顯膺宸㫖進貮冬官偉法從之得賢致公朝之増氣凡居廕賴舉切欣愉恭惟某官器宇端方性資凝重文章雅健傳古作者之心政事通明為世吏師之首宦海久騰於雋譽士流咸仰於老成星使觀風布九霄之徳澤月卿銜命寛四蜀之征徭果深前席之思亟奉賜環之詔對揚丹陛洞契清衷既正位於通班遄躋榮於近侍雍容禁橐暫資獻納之勤宻勿政塗佇奮弼諧之藴某久睽英範欣聽除音夷路載陞蠅敢希於附驥宏規可繼狗徒幸於續貂與沈䕫帥啟忝軺使以西征方趨逺部勤館人於東道已近雄藩睇幕府以非遥通記曹而可後恭惟某官宏材絶俗厚徳鎮浮紫橐朝持宻從甘泉之幸金蓮夜對親承翰苑之華遽厭直於承明遂分符於井絡俄膺宸詔進領帥權委寄既隆猷為益著八命作牧聊借重於蕃宣一札成文行趣歸於輔贊某頃居學省嘗託官聨悵别徳之何賖忽承顔之在邇驅馳峻阪敢辭叱馭之勞瞻望光儀預切登龍之喜與荆南劉太尉啟牙纛有光坐控江湖之固門墻在逺久疎竿牘之修獨有傾依實勤夙夜恭惟某官資兼文武學富古今挺不世之竒才負濟時之大畧執干戈而衛社稷早信敵國之威閱禮樂而敦詩書方倚長城之重功書彞鼎聲振華區任千里之蕃宣寛九重之憂顧位陞掌武貴已並於疑丞任付本兵謀即攄於帷幄某馳驅蜀道荏苒嵗華自東徂西叨誤恩之三錫以勤補拙無善狀之一毫悵衰病以何堪愧吹嘘之有素朔風戒候台履具宜願加謹於保綏用仰承於眷注賀成都王制置啟光膺明綍出擁髙牙井絡折衝聳全蜀上游之寄河圖寓直冠西清次對之聨除目一傳輿情大慰恭惟某官才猷英特學術縱横昔居韋布之間早負經綸之志軒墀射䇿追晁董以爭衡禁省代言掩常楊而專美眷坤維之謀帥申巽命以任賢獨當真主之知粤副元戎之選輟論思於近侍寛憂顧於逺民一劄細書丁寧徳意萬釘寳帶焜耀身章載頒内帑之貲庸視中朝之寵惟疏恩之特異知注意之逾深紅斾碧油權暫專於玉壘紫樞黄閣名即唘於金甌某衰晚無堪馳驅何補當年傾盖已輕萬户之封指日承顔方借九河之潤賀成都王制置開藩啟重閫需賢坤維就鎮擁麾幢而入境開幕府以建牙凡託部封孰不歡慰恭惟某官資兼文武學通古今自得雋於賢科即受知於明主登崇甚峻天下想聞其風眷注彌深漢廷無出其右兹從近侍來撫上游謀帥得人頓覺雪山之重忘身徇國豈辭蜀道之難草木莫不知名烟雲為之改色列城企踵冀六纛之遄征多士私憂恐一封之趣召某司存有守迎候未遑賀厦輸誠已記曹之是凂披雲自幸傾行斾以尤勤淑氣漸融征途尚逺願益加於保謹用上副於倚毘與宫使孫左司啟登車出使載誤於明恩叱馭之官已交於賤事顧惟叨冒實自吹嘘恭惟某官學貫九流才髙一世擅政事文章之美凝功名富貴之姿東觀南宫早騰於闊步北門西掖衆指於通津一為書錦之行屢藹昔襦之頌求舊已喧於朝論均勞難戀於仙祠行慶褒嘉入躋禁近某夙叨真賞久闊英風賦袖阿房感特深於衡鑑檄傳巴蜀身尚逺於門墻趨丈席以何時臨尺書而獨冩嚴寒在候台履具宜冀妙養於沖襟用亟膺於召節賀宰相正啟月正孟陬聿新於天敘律旋太蔟肇建於人正諒一徳以奮庸有百神之敷祐恭惟某官功牟坱圠徳配堪輿轉一氣於鴻鈞調四時於玉燭咸和海宇永措俗於春臺光輔基圖方過期於周厯履嵗端之伊始偕天步以同休某逺備外臺阻趨公府捧椒觴而獻壽莫效㣲誠仰台彩以馳心徒傾善頌與寄居范都運啟叨膺中制猥備外臺駕軺傳以載驅欣門墻之漸邇恭惟某官精忠許國絶識邁時以一世之能臣為四方之膚使暴公子威名聳震魏弱翁治行流聞久爾倦㳺暫兹均逸士訟王尊之去上疏相先帝思張敞之功起家在即某夙聨末契最荷殊知頃一障以分符偶二天而託庇過䝉眷寵得就涓埃懐盛徳以惟深喜餘庥之復借登車澄按方師孟博之風倒屣逢迎敢辱仲宣之顧嚴寒在候吉履具宜冀妙養於沖襟用倚須於召節賀楊侍郎啟光膺天寵進貳夏卿偉法從之得賢舉朝廷而増重凡居庥庇孰不忻愉恭惟某官學有淵源徳無瑕纇才出萬夫之上身兼數器之長崑玉桂枝早擅無雙之價石渠金匱悉窺未見之書既郎宿以髙騰亦使星之屢遣不汲汲於功名之際每恢恢乎出處之間宣室召還蘭臺入簉益締楓宸之眷亟陞荷橐之華勸講經帷主盟帝學豈但侍臣之髙選實窮儒者之光榮禁闥雍容已著論思之效巖廊宻勿行攄輔佐之功某久闊英風忽聞新命髙閎展敬干寅謁以無階尺牘馳誠通記曹而可後賀陳察院啟拜命樞庭陞華栢寺正人登用公議交孚恭惟某官卓識離倫英姿邁徃宏材周於時務奥學貫於經郛鼓箧賢關夙騰於妙譽彯纓仕路久屈於逺圖既涵養之愈深宜聲稱之彌卲果回淵鑒遄被寵光亟躋六察之聨允極一時之選雍容憲府暫資直諒之猷宻勿禁途佇展論思之益某喜聞成命邈在遐方懐漫刺於門墻阻伸慶謁達空函於几格但切懽悰又顯奉宸恩榮陞臺察國有正臣之進人知直道之行綸綍始頒搢紳交抃恭惟某官性資剛大徳履方嚴學洞聖經博貫九流之藴才周世用旁通萬變之㣲久矣軒昂兹焉遇合既特深於隆眷爰允賴於忠言糾正官聨暫假風猷之峻論思禁路載觀賢業之崇某備使遐陬欣聞成命匏𤓰有守望賓廡以無階竿牘馳誠通記曹而敢後通趙給事啟振翼埀光仰風流之有日抗塵走俗披雲霧以無階敢憑尺牘之修用致寸誠之戀恭惟某官宏材絶等奥學逢源井絡飛英追淵雲而接武天庭摛藻揖晁董以齊驅擢自清衷亟躋華貫鐘鼎成而重輕莫揣圭璋御而温潤有加粹然大雅之資允謂中興之瑞丹墀青瑣已宻侍於景光黄閣紫樞行峻膺於大任某偶承人乏濫假使華叱車馭於卭崍承顔未卜侈里門於髙宻慕徳徒深春氣將殘辰休茂擁願益加於綏養期上荅於眷知賀陳樞宻啟光膺帝綍進貮樞庭凛人傑之既升覺朝廷之増重衣冠歆豔介胄歡呼恭惟某官韶濩正音鼎鐘偉量冠賢科而自致儀禁路以横翔聲華行實之隆夐追前哲獻納論思之益宻簡清衷獨髙專對之才三建出疆之節盖聖心之注意欲鄰國以知賢借此時將命之行示他日折衝之寄使華旋返天寵驟加以四海之儒宗本一朝之兵柄基命宥宻方資帷幄之籌謨明弼諧行正陶鎔之任某雅叨眷奬欣聽登庸大厦崇成阻造潭潭之府餘光逺借徒瞻兩兩之星寒律方嚴政機多暇願順節宣之理用承考慎之圖賀沈制置啟渙號肆頒坤維作鎮九重念逺暫勞牙纛之臨萬里知歸咸起袴襦之詠先聲所暨羣聽具孚恭惟某官識照幾㣲學優康濟日光玉潔燦然經世之文岳峙海涵允矣絶人之徳蚤中異科之目亟陞清禁之班中外洊更險夷一致陳賈生治安之䇿憂有甚於積薪本陸䞇仁義之言逐寧辭於棄梗逮著已然之效咸推先見之明亟膺宣室之思小屈淮陽之卧上方惠顧全蜀圖囬中原欲逺控於上流遂擢專於大閫盡䕶諸將庶幾奬率於三軍兼撫列城豈特招徠於八國即正機衡之任益隆鼎鼐之勲某違徳積年遡風有日驅車梁雍飽諳劒棧之危囬首岷峨頓覺雪山之重太府少卿四川總領到任謝宰相啟貮列卿於外府猥厠廷紳董經賦於上游仍將使指省躬曷稱拜命知榮伏念某少本拘儒老為俗吏偶明時之幸㑹乃煩使之屢更去朝初自於乞麾入蜀繼叨於移節驅馳九載綿歴五司雖殫夙夜之勞蔑有涓埃之效薦䝉増秩比復賜環雷電取將已下仙官之敇蓬瀛且至却四方士之船渙號申頒訓詞溢美亞班聨於七寺之長督餉餽於六師之屯引私諱以有陳觸報聞而莫避凌兢就列顛仆是虞兹盖伏遇某官先覺真材具瞻碩輔以尊主庇民之術行推賢進善之心名一藝者必庸用廣攬英豪之士無大故則勿棄尤曲敦貧賤之交至若衰遲特勤記録推挽之恩極矣不進弗休撫存之意温然有加未已重慚凉薄倍費生成某敢不仰體眷思更鞭駑蹇交修食貨權四路之盈虚兼裕軍民俾一方之帖泰庶上寛於憂顧次少荅於陶鎔囬彭州馮守啓恭承詔綍載綰郡章振都騎以之官合左符而宣化恭惟某官文傳正氣識造大方議論縱横達今昔安危之變聲名赫奕推西南人物之英果勤側席之思荐被賜環之詔已揚舲而趣召遄抗疏以求歸特畀牧民俾行素學暫布中和之政佇還清切之聨過沐謙冲曲埀音問感藏彌切濡染奚殫囬杜殿院啟一鶚上騰方慚於僭率雙魚逺貺殊佩於謙光執禮甚恭捫心有靦恭惟某官學優經濟識造幾㣲讜論忠言為一朝之藥石深仁厚澤歌千里之袴襦既聲實之交孚諒功名之可必淮陽卧治聊資汲黯之行宣室興思即有賈生之召某徒懐慕用未覿風規與大夫僎而同升非能引類知栁下惠而不立實懼貽譏至煩導諭之勤尤重過情之愧凝寒在候福履具宜更冀保綏前膺寵渥賀朱參政啟光奉宸恩進陪國論真儒得位寰宇均歡恭惟某官迪徳誠明凝姿敦大深探道奥㑹先聖不傳之心洞達時宜殖當今有用之學夙奮經綸之藴荐升華顯之途憲府繩違正一臺之綱紀露門勸講闡六藝之淵源精忠彌結於主知公輔久虚於物望果承天眷入秉政機必將下膏澤以醇四海之風恢逺圖而永萬世之業躋民仁壽正位鈞衡輿誦所歸斯言可復某謬䝉薦寵欣聽登庸雖邈在坤維莫遂踵門之志然仰承晉接尤深賀厦之誠霜令載嚴冲襟多裕願謹谷神之衛以符巖石之瞻賀周樞宻啟顯膺綸制進貮樞庭増聖朝道徳之威壯天下安榮之勢帡幪所及慶抃交深恭惟某官徳量恢閎天資英偉學探聖域妙致知格物之功才乂王家兼緯武經文之畧早䝉異眷徧閱華途瑣闥論思凛有囬天之力玉堂播告昭然煥斗之章當敵國之尋盟馳單車而逺聘掉舌端之三寸重國體於萬鈞載酬仗節之勞遂付本兵之寄基命宥宻方資帷幄之竒謨明弼諧即正台衡之任某久叨庇賴欣聽登庸大厦崇成阻造潭潭之府餘光逺借徒瞻兩兩之星寒律方嚴政機多暇願毖節宣之理用承考慎之圖賀楊參政啟顯膺詔綍榮預政機海宇同休簮紳共慶恭惟某官學造聖賢之妙氣鍾天地之和騰茂蜚英展也萬人之傑亷貪立懦卓哉一世之師盖嘗推難進之風將以厚有為之業比及勵精之曰果勤側席之思爰増重於蓬山即升華於荷橐批敕獨髙於夕拜司戎旋擢於夏卿秘殿横經既極名儒之選禁林視草尤符内相之稱上方加考慎之圖人皆謂登庸之晚兹進陪於揆路實簡在於淵衷以旦夕承弼之良為左右股肱之助子儀徹樂已聞清徳之孚淮南寢謀坐有折衝之效竚見白麻之出益昭黄閣之尊某逖在遐方欽聞休命台符兩兩徒仰睇於餘光公府潭潭願永依於大厦賀呉宣撫啟九重注意載頒渙汗之新四蜀分憂就付宣威之重華區震疊廟社奠安恭惟某官智勇兼資勲名夙著三紀壯西南之翰一門攄忠義之誠盖神明黙扶子儀俾再造於王室而軍中素畏李牧不敢犯於邊陲膺具禮於齋壇視多儀於揆路分統連營之盛旋陞亞保之崇顧凌烟之像未極於形容而太常之銘屢勤於記述兵欲藉上游掎角之勢公獨得中原歸附之心故宏建於髙牙庸盡䕶於諸將昔岑彭馮異闡方面之號而衛青去病開幕府之雄兹聞兄弟之迭居足為古今之盛美况司徒之子公武嘗進壁於淮堧太傅之姪謝𤣥亦陳師於淝水豈特功業一時之㑹實係國家萬世之休某久託餘輝欣聆成命簡書有守莫躬賀厦之私調度斯興當叶同舟之力賀洪尚書啟顯膺宸綍入踐禁林司九天告命之嚴極四海文儒之選搢紳艷寵翰墨光榮恭惟某官識度䆳明材猷魁傑學貫六經之藴詞追兩漢之醇蚤擢異科亟䝉殊奬代言西掖兼常楊體制之精典選中臺振裴馬銓衡之譽物望滋峻主知益深若時内相之崇超出廷臣之右演綸攄思豈特資潤飾之功跋燭承恩實有賴謀謨之助矧惟世掌可謂才難匪兹特立之英孰副非常之舉備玉堂之顧問已契淵衷贊金鉉之燮調竚陞政路某逺銜使指欣聽除音雖注目雲霄莫遂登門之志然傾心墻仞尤深賀厦之情春氣肇新冲襟多裕特毖保綏之節用欽考慎之求謝虞尚書啟總軍賦於上游曽㣲善狀正卿聨於外府更玷殊恩揣分量以過優揆才能而弗稱靦顔拜命撫已知慚伏念某涉道迂疎禀資蹇拙少嘗䇿勵頗妄意於清流老厭馳驅嗟寖成於俗吏比承人乏久掌利權屬敵衆之鴟張奮王師而鷹擊輸將粗繼皆朝廷訓勅之明恢復是期乃將帥經營之畧雖備殫於五技初無補於一毫方虞曠職之誅遽沐懋官之寵靖惟僥冒寧蔑寅縁兹盖伏遇某官成徳閎深較才超邁皜皜乎不可尚已載書竹帛之雋功休休焉其如有容常借齒牙之餘論遂令渥洽猥及庸虚某遲頓罔堪叨逾實甚投閒置散每興林壑之思含垢匿瑕猶賴帡幪之庇謝吴宣撫啟總軍賦於上游曽㣲善狀正卿聨於外府更冒殊恩顧薄陋以何堪匪吹嘘而曷致恭惟某官忠誠許國智勇出倫臨戎整暇而恩威並行料敵精深而竒正迭用内全蜀漢民恃若長城之安外掃咸秦兵行如疾雷之震等差功伐愛惜貲儲憐其潦倒之蹤假以揄揚之助遂令奬渥誤及庸虚某荷寵若驚懐歸甚切江湖未返久借潤於靈河鐘漏已殘尚分光於宵燭通問吕經畧啟叨膺宸命濫假使權瞻封部以非遥修緘縢而敢後恭惟某官材標國器業紹家風既妙簡於隆知遂寖更於繁使登車攬轡藹膚使之聲名足食成軍寛上游之憂顧惟桂林之重鎮扼銅柱之遐陬謀帥為難得公而重碧油紅斾聊資鎮撫之良青瑣丹墀行奉論思之直顧惟疎冗特荷照知方一障以分符偶二天而託庇過䝉眷奬得就涓埃每深盛徳之懐復幸芳鄰之接六條問事揣綿力以何堪十國為連冀餘光之可借嵗寒在候台履具宜期茂養於冲襟用亟臻於寵渥賀黄給事中啟被命紫宸陞華青瑣公朝推重士論獲伸恭惟某官杞梓良材圭璋偉器粹然心學窮六籍之淵源允矣躬行作諸儒之標的盤錯素施於游刃險夷不失於正塗夙膺當宁之思首及賜環之詔彌綸省闥獨髙詳整之稱糾正刑書深體哀矜之意勸講輔光明之盛獻言資啟沃之勤惟時封駮之司久虚夕拜必取端方之士庶展辰猷載疇已試之能宜備即真之寵謀王體而斷國論固所優為熈帝載而亮天工佇膺大用某邈居遐俗側聽新除夢遶門䦨雖阻伸於慶謁言形竿牘姑少見於於歡悰賀楊給事中啟寵膺綸制超拜瑣闈仍露門勸講之官兼翰苑代言之職凡居庥庇舉切忻愉恭惟某官韶濩正音鼎鐘偉量粹禀岷峨之秀養深江海之源宣和大比者一萬人獨擅無雙之譽炎祚中興者三十載尚堅難進之風比宣室以召還冠蘭臺而寓直進持從橐入侍經筵借模範於儒宗作典刑於胄子英聲茂實藹然清議之歸碩畫嘉猷卓爾淵衷之契爰課論思之效遂陞封駮之司擢自帝心震於朝路豈但就批於黄勑更資播告於白麻選妙一時榮傾多士益者三友已増帷幄之光弼予一人行運陶甄之化某猥司煩使逺聽除音懐漫刺於門墻阻伸慶謁達空函於几格徒激歡悰賀黄樞宻啟顯膺綸告進貮樞庭増皇朝道徳之威壯天下安榮之勢搢紳屬目介胄歸心恭惟某官才乂王家學探聖域文章醇正參埀世之格言識慮昭融富經邦之竒藴亟䝉睿眷洊歴華塗資管轄於都曹職論思於憲部露門勸講開陳黙契於淵衷瑣闥繩愆封駮允符於公議上方奮乾健以清六合廓離明以燭九幽必使運帷幄之籌如數記而龜卜用能靖兵戈之祲使瓦解而氷消倘非真賢孰濟興運賛宥宻之命精神已見於折衝司造化之權輔相行觀於藏用某肅將隆指欣頌除音邈在遐陬阻遂登龍之志仰傾潭府徒深賀燕之誠春令正妍靈襟多裕願謹鼎茵之節式符巖石之瞻賀吴宣撫陞招討啟命敷綸綍益隆委寄之恩地控關河盡付威懐之柄傳聞中外聲聳華戎恭惟某官幾鑒絶人勲名盖世勇無與敵曽收百戰之功智有餘忠深被九重之眷懋齋壇之寵數總環列之師屯爵命増崇峻處三孤之秩皇靈宣布獨分四蜀之憂眷秦晉之奥區稔祖宗之遺澤江山牢落久淪戎馬之區父老咨嗟常晞日月之照上方振規恢之長䇿公能奮經濟之逺圗特畀重權庸清大敵有指疆土豈惟伐玁狁而至太原克詰戎兵必將封狼居而臨瀚海某久䝉輝潤欣誦詔除屬限官常阻遂轅門之謁仰伸慶問敢稽尺牘之馳逺迎奉使虞尚書啟銜命九重逺撫雍梁之域抗旌萬里近臨參井之墟士民屬目以歡呼將卒傾心而踴躍恭惟某官器全酬酢學富經綸夙推開濟之才聿際亨嘉之㑹受知聖主徧歴清塗督戰淮淝既運籌而取勝宣威隴蜀將傳檄以收功行書竹帛之勲入總樞機之柄某久違英範辱在下風猥限匏𤓰已失爭先之覩載馳竿牘益深仰止之髙賀川陜宣諭虞尚書啟位登八座任重七兵以六官常伯之尊膺一面信臣之遣凡居庥庇舉切歡愉恭惟某官浩氣凌雲宏才絶類雄文奥學得江漢之洪深直節髙標等岷峨之峻㧞驟躋華貫動契清衷珥筆螭蚴妙極一時之選演綸鳯掖炳同三代之風當聖哲馳騖之秋罄侍從論思之益方采石收功於耆定乃古梁抗志以經營宣國威靈諭王徳意召公分陕聊専二伯之權裴度平淮即晉三司之貴某辱知最厚藉䕃甚周蘇代使秦正賴餘光之振相如告蜀行遵偏檄之馳通宫使蘇尚書啟羽儀中禁久欽名徳之髙冠冕西州滋仰人門之峻瞻台閎而甚邇通記府以爭先恭惟某官奥學逢原宏材絶俗斯文不墜自承家世之傳直道而行益聳朝廷之望罄論思於天陛典禮樂於春官一去近班三臨巨鎮樂鄉閭之均逸辭藩府以匄歸東道角巾曲徇髙人之志西清荷橐就陞學士之聨顧側席以方勤恐賜環之在即某外臺忝竊左蜀將輸叱馭而來方竭馳驅之力披雲未卜徒傾慕用之誠寒律正嚴沖襟尚逺願更綏於福履以嗣拜於恩光賀湯中丞啟出綸西掖正位中司海宇傳聞共喜真賢之進簮紳屬望益知清議之伸凡仰光塵舉深慶抃恭惟某官禀資鯁亮造道精㣲煩使屢更著三朝已試之績孤忠自結當萬乗非常之知召自祠庭寘諸憲府出聖神之獨斷首公正以親除選重青囊聲髙白簡惟百辟之承式保一臺之得人國家虚大夫之官以中執憲而為長聖主重言路之責必古遺直之是求自非㧞俊良於頓挫之中何以振風采於陵遲之後果膺帝簡實慰民贍佇追慶厯嘉祐名臣之蹤用復景德祥符希世之治應龍相感雲霧滃然而從猛獸有威藜藿為之不採鈞衡之正朝夕可期某濫使遐陬欽承新命一鶚直上仰搏擊以髙翔二蟲何知欣逍遥而竊庇炎歊猶劇啟處具宜願加謹於保綏以上當於注倚賀汪中丞啓出綸西掖正位中司旒冕虚心寄霜威於言路簮紳屬目仰風采於公朝凡託帡幪舉深慶抃恭惟某官性資直亮德操剛方學貫經邦達聖哲幾㣲之藴識通正體明古今理亂之原自親擢於臺端尤力禆於廟算豪强膽落諛佞魂驚致國勢之愈尊實帝衷之倚重骨鯁既孚於上意精神坐折於遐衝屬專席之簡求跨亨衢而峻陟應龍御極雲霧滃然而從猛虎在山藜藿為之不採具瞻有素爰立可期某邈處遐陬欽聆休命喜而不寐知清議之方伸斐然成章愧鄙悰之莫盡秋天澄肅憲府靖嚴願加謹於保綏庶祗承於眷注賀吴宣撫陞少傅啟命下廣庭爰懋膚公之報寵頒異數特陞亞傅之尊中夏聳聞軍民胥恱恭惟某官勲庸盖世智畧兼人身蔽坤維著威名於三紀志存王室挺忠義於一家屬强敵之侵陵任元戎而敵愾投醪勵衆咸思奮臂以登先破竹乗機孰不望旗而逺遁併克闗山之險一清徼塞之塵既偉績之彌髙宜隆恩之沓至益峻三孤之秩中陪多邑之腴上眷有加既已極褒遷之典公心無斁必將恢久大之功丕展壯猷嗣迎殊渥某夙䝉輝潤欣誦詔除屬限官常阻遂轅門之謁仰伸慶問敢稽尺牘之馳賀汪參政啟顯擢真儒榮參大政綸言誕布丕昭帝眷之隆輿誦僉諧允副民瞻之峻庇庥所及慶抃交増竊觀歴代之盛衰皆係輔臣之臧否誠得元弼始收雋功未有用無竒之才而能辦非常之事况聖哲馳騖之嵗匪國家閒暇之秋毫釐晷刻之差患遺寰宇錢穀甲兵之問日至廟堂必資名世之英斯展經邦之績天祐明聖時登俊良恭惟某官識洞古今量涵清濁中和禀粹渾然九徳之資精宻窮㣲䆳以六經之藴曩由公道自結主知三院階陞凛風霜於百辟一臺坐正肅儀軌於萬方衆論攸歸上心彌簡屬邊塵之犯順持使節以宣威勢壯荆吴奮周瑜之雄畧忠輸淮蔡驗裴度之嘉謀人皆曰賢政將焉徃折衝有賴已書竹帛之勲注意既深即迅鈞衡之拜某欣聞新渥阻造崇墉應龍翔而雲霧興竚須霖雨之下大厦成而燕雀賀永依柱石之穹溽暑尚煩靈襟多裕期茂加於調䕶庸宏濟於艱難賀同知張樞宻啟寵膺詔綍起贊事樞肆國家右武之秋居廊廟本兵之地精神所聚形勢自張竊惟聖賢出處之方必順天地盈虚之數卓然慷慨謹爾行藏奉身而退則視富貴如一毫之輕投袂而來則使社稷増九鼎之重在我初無於得䘮於時乃係於安危熈運重開元勲再入恭惟某官徳尊碩輔學粹鉅儒忠誠表於四朝問望光於百辟三仕無喜孰窺特立之心萬鍾何加獨養至髙之氣早聨近侍最號名臣後生咸仰其風流當世久希於膏澤逮真人之繼紹屈巨哲以登庸允賴壯猷克寧雅俗趣召走貂璫之使給扶優軒陞之儀任隆股肱恩極體貌一䕫足矣知公論之僉同二老歸之信敵情之率服偉哉用江左之傑信爾寢淮南之謀惟具瞻之既孚豈爰立之可緩基命宥宻暫煩帷幄之籌謨明弼諧行正鈞衡之拜某逺叨將指側聽除音夢遶門䦨雖阻伸於慶謁誠馳竿牘姑少見於歡悰
