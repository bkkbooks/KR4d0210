body:
  text: 漢濱集巻十六宋王之望撰祭文祭范相文鳳凰麒麟千載一出卿雲呈霄俄頃滅沒猗嗟我公希世之英命之不延天嗇其齡惟公少時豪氣凌雲射策丹陛名髙劉蕡及在諫臺大體則争不屑細碎言重陽城靖康之末天降禍災餘分竊位代邸未來公勤濡足起振其頺首發大義羣言莫回復政長樂大義克諧功在生靈口不自媒謗書雖入金縢自開起公江湖寘公憲府亟参大政遂相明主獨運廟堂折衝樽俎如山不動内鎮外禦軍書交馳羽檄旁午公居其間從容笑語盜遍海内敵臨江滸公相一年天下按堵一言不合公遂勇退帝豈不懐公方壯歳期公百年社稷永賴方壯而殞出於意外壽少馬周年减如晦人之云亡邦國殄瘁惟我小子早辱公知愛等兄弟恩均父師悲歡離合二紀於兹我困蜀漢公罷鼎司擕孥躡屩萬里來歸貧賤之交弗渝故時口借其譽心恤其私饑食公食寒衣公衣脱我溝壑繄公不遺謂當乆乆從公以嬉云胡不淑哲人其萎山傾海竭魚鳥何依西州路絶東閣人稀醴酒不設繐帳空埀今其已矣尚忍言之殽羞既陳清酒盈巵想公平生恍如在斯音容不接泣涕漣洏撫棺一慟終天永辭祭綦内翰文古今所難莫如文詞文詞之中體重而施逺者又莫難乎書命之為使世當承平優㳺翰墨則中人可以任職及乎艱難之際呼吸變故而發為號令以宣道上意則皆欲切中於事機如三鎮詔書使姦雄不敢顧望奉天赦令雖武夫悍卒亦流涕而嗟咨是皆係成敗闗盛衰非髙世之材不能善也故代王言者尤難乎多事之時國家南渡之初傾側擾攘而文徳廣被與武功而並馳當是時也公以髙文大筆振英聲於翰苑者凡歴幾年於兹其深厚爾雅渾渾噩噩以鼔動乎一世者固無愧乎兩漢之竒而隠順體勢參揣輕重錙銖必較曾一字之莫移制詔之出海内傳誦人皆以為得體雖呫呫然好動其喙者亦莫得而瑕疵至今北扉東閣之間天下稱以為真學士者皆曰非我公而其誰其學問之富上探六經之淵奧旁獵子史之浩博而近尤熟於國朝一代之儀凡典章故實與夫前輩出處之際上下數百載間若指諸掌而無遺此皆搢紳士大夫所共推服至於嘉謀碩畫密陳於中禁而係天下之安危治亂者則人不可得而周知盛徳偉望上方倚以為相而民之無祿忽一卧而長辭世失名臣文喪哲匠所以識與不識皆興殄瘁之悲矧惟小子出入門下從容受教盖一紀以摳衣公不以為不肖慰薦誘掖矜憐撫翼之意䝉最厚於等夷訃音忽聞驚涕失聲而縻於斗食不得伸一慟於靈帷饋奠之微逺寓千里以致一哀而已若乃感念舊徳而懐想儀刑則不知其何日而忘之也祭宜州歐陽氏姊文嗚呼我生不辰幼遭憫凶七歳失母踰冠而孤同産之愛荐遇兵禍死生契闊今餘一人姊先南來意必無恙云何不淑亦遽夭傷荼毒蒼天痛酷蒼天惟姊為人天資明哲既歸華族内外咸宜克育竒兒聰敏是似謂成偉噐光我外家豈期母子相繼淪謝一歳之内逝者四人身既零落爰及苗裔王氏之出絶於髙門何辜于天禍至此酷嗚呼哀哉姊於兄弟我愛尤厚鞠我字我恩勤備至自姊之别無日不思襄漢大亂骨肉凋喪數口避地西走漢中念姊在南乃心懸懸涉險萬里惟姊之故我困東甌姊在南越雖間嶺海㑹有見期姊家書來踴躍以喜謂承吉問以慰逺懐發函中讀忽覩凶報驚惶痛駭號叫失聲泣血拊膺五情割裂嗚呼哀哉姊歿三歳我始獲知哀信未來猶謂姊在日日以冀庶幾見之自今以往此懐絶矣昔與姊别我尚未婚今婦惟張有子惟鏞願一見姊俾其識姑噫其永已夫復何言萬里聞喪奔赴無及逺寓一奠魂馳形留南望長號絶而復活處州同官祭王守閤政恭人文惟夫人體鍾純懿冑出髙華作配君子弼成有家易稱中饋禮標内則由始暨終其儀不忒顯顯使君四佩守符循良之政所至藹如自家移官厥由内輔成此令名夫人之助積善之報既夀而康死生奄忽理不可常煌煌雕軒來未閲月一卧不起聞者悲咽凡我諸人素仰徳聲恭陳薄薦用展哀誠處州同官路祭王守恭人文夫人始來時維孟春魚軒徐驅風和日曛鼓樂在前迎者如雲夫人今歸歳既暮秋靈車既發雲慘天愁哀挽悽然聞者涕流令徳在躬云胡不淑日月幾何來歌往哭丹旐西飛祖送傾城道周一奠鑒此悲誠處州州學立孫威敏黄侍御吴冲和三賢祠堂祭文昔蜀之儒盛於漢時推原其初志則有詞曰文翁倡其教相如為之師蜀人懐徳實用並祠括蒼之學威敏始之買田息錢以經紀之維時冲和講道於斯風同齊魯冠屨委蛇兵火之餘侍御改為請書於朝學者是資三賢之澤于今不隳相望百年異軌同馳侍御未逺有像巍巍威敏冲和以乆見遺我訪於人載冩令儀萃于一堂以永厥思嗚呼典刑將在於兹處州州學上丁祭三賢文猗歟三賢澤流此邦殁有餘思用祠於學仲春之月有事上丁敢以兹辰併陳薄薦登第告考妣文某爰自孤露洊歴艱苦毎遵先訓不敢廢學乃今年旅試省闈叨在第六蒙恩賜第改授左官且有師儒之命此皆先考妣積善餘慶流於後人故不肖之孤克繼緒業永惟罪逆致身遅暮雖竊一第不及拜親感慕悲哀痛貫心骨但當謹奉遺體恪守義方思所以立身揚名顯我父母者恭陳薄薦以告廟筵監學同官祭馮國正文嗚呼淑人君子天道所祐必壽必貴必昌其後或畀一二或享其全徳有原薄天道匪偏子於三者是宜兼得靡有一獲理莫可詰秩惟選人年止彊仕一兒未冠先子而逝兩喪相望曾不朞年弔哭無主帷殯蕭然老母寡妻泣血號天人誰無死子為酷焉福善之訓於此為愆世之論人大致有二外觀其容内觀其噐子之識度深厚莫窺任重致逺士友所期子之風骨凛然瓌異清塗華貫衆謂必至既富文學又挹殊科天若培之而止斯何子素康碩病不旬浹訃音忽傳聞者驚咽惟我同僚乆奉周旋數日不集遂為終天奠以巵酒猶想平生臨棺一慟有淚縱横荆門到任謁諸廟文某猥以菲才䝉恩出守視事之始恭見羣祀神以聰明正直廟食此土雨暘災癘實司其柄惟隂相之俾民䝉其福則吏克有終報事之誠其敢有怠荆門修造禱諸廟文惟此軍城近遭回祿憫民人之暴露亟土木之修營力役既興工程有限而窘兹風雨病及公私用竭微誠仰干靈祀願晴和之借氣俾旬月以收功當候落成别圗報謝荆門軍謝晴文比以風雪過多公私告病輒輸丹懇仰叩洪私齋戒而雲氣漸開禱祈而晴暉遂徹精神所格影響不愆蒙感應以如斯戴生成而愈篤恭陳薄薦用致微誠改塟先考開故墳祭文伏自先考棄諸孤家事陵替繼遭兵火二兄凋喪某與弟之先流落東南二十餘年罪逆不孝使先考乆兹權厝毎一念之心肝如灼乃戊辰歳秋自太學博士得請於朝出守荆門以圗襄奉去年十二月授代還鄉得宅兆於小黄口蔣氏舊居之旁坎山之原以先妣宜人張氏祔又祖考朝奉自塟髙屯私門寡祐術者以風水為不利且孤墳在逺看守為難子孫後來缺於展掃今亦改塟此山與祖妣安人同穴父子夫婦㑹於一區魂靈有知庶慰泉壤今將以正月十四日掩壙謹開故穴徙靈柩於墳所先考其去故即新勿驚勿留以永享安固之藏改塟祖考開故墳祭文自祖考塟於髙屯家門多故後嗣零落諸子中綰綽以無子絶諸孫中之深之美以兵禍絶其餘口夭折者不可悉數術者以為風水不利所致先人常欲改卜力有未及念孤墳在逺艱於看守某㳺宦異鄉歸省有時恐子孫將來寖闕展掃今述遺意得宅兆於城之小黄口蔣氏故居坎山之原以祖妣安人祔先人先妣陪塟其旁擇正月十四日掩壙謹開故穴迎置新塋父子夫婦㑹於一所魂靈有知庶慰幽㝠衡州祭家廟文某去歳暮春離鄉造朝九月初䝉恩假此使節十一月末到官新婦諸孫今年五月至自台州鎮去歳七月就親於吴氏今年三月新婦入門與姑偕來蹤跡不定一年有半祭祀曠廢夙夜不遑惟大夫家歳時薦享皆有儀法是用略依古式修三獻之禮自今以往用以為常古大宗小宗之制各祀其先絶者立後祭不敢黷今十六叔有之先為之後兩房兄嫂更不置立毎遇時祭列於從祀五哥已塟亦係長殤今次於二兄之後伏惟昭鑒祭鹿頭關白馬廟文惟神聲藹鳳雛才標驥足蚤負濟時之畧出依圗霸之雄傾側荆湘﨑嶇巴蜀方將與孔明而並騖致昭烈於中興而逢辰不祥當壯而殞氣吞萬斛折轅軸於户庭志在九霄摧羽毛於尋丈凛英靈於千載兹廟食於一方某世乃襄人神之邑子讀耆舊先賢之傳遐想髙風㳺漢臯峴首之間毎悲陳迹今者將輸益部取道祠前瞻古像以欷歔弔孤墳而流涕時雖異代義豈忘情薦明信於一觴感盛衰而三嘆庶幾遺烈俯鑒鄙誠謁江瀆王廟文惟神發源霛長經營於九州之半浸溉利澤殆與天地分功廟食蜀都威神顯赫某自幼至老泝沿大江四十餘年而無風波之虞者實神之賜今以職事實來是邦其敢不拜祠下區區之誠惟神其鑒之江瀆廟奏科約文漕運之司歳有科約制一路財賦之出入益部廢而不講已更十年州郡出納無以檢束姦弊百出公私告病某承乏計事復修舊籍郡為一編凡十有六帙念天地之間幽有鬼神明有官吏公家之利病民生之休戚惟吏與神分掌其柄故官法之所不及者鬼得而誅之惟神尊居四瀆功利半天下而發源啓廟實在此都福善禍淫神得司之則於一路財賦經常之制不可以無所稽也是用焚獻一部以助神之威靈若其蔑棄有司之籍蠧耗邦財以欺天而虐民者神其鑒之謁射洪顯惠廟文惟王生為良吏沒為明神封爵既崇嘉號累錫能見物怪出雲雨以利澤萬物威福一方使兩蜀之人奔走祀事可謂靈矣某猥因行部道出廟下祇陳薄薦用致微誠謁崇徳廟文惟神功利著於古今英靈震於遐邇父子兄弟爵號崇極一門廟食百世並隆四川之人罔不奔走祀事某持節兩蜀于今六載免抵罪戾實託神庥敢不拜謁祠下恭陳薄薦用致微誠祭武侯廟文嗚呼公才命世王佐之竒若在唐虞臯䕫可希使遇湯武伊周庶幾其治巴蜀因蜀制宜較其藴蓄十未一施用於神州豈止如斯蜀政寛弛萎弱不持公檢以法上尊下卑蜀兵脆怯折北不支公御以嚴侮敵畏威蜀尚文雅華實多違公取有用不主夸毗蜀喜侈靡民無宿貲公率以躬明示軌儀蜀風和易各私所私公莅以公秋毫莫欺有功必賞雖仇弗遺有罪必罰雖親不疑法不盡用惟仁是依伏罪輸誠貸則有辭蜀在三國地小兵羸如其不武坐底陵夷公用其衆振起衰微以攻為守屢耀其師南中六郡懭悍莫羈公服其心聽我撫綏三郡來降進取遲遲量力而動不開禍機謀人之國托受孤兒寧容僥倖或致顛危公之相蜀勲癯道肥馳驅至死昭烈之知公若在魏未必逢時雖或見用焉盡猷為不幸之中有幸於兹天不助漢置公一維匪公之䘏惟世之咨公殁千載蜀有餘思豈惟蜀人古今共推名参管蕭公論莫移徳聲衮衮江漢同馳求仁得仁抑又何悲祭湯侍郎文惟公以經術辭章之傑早挹巍科安恬靖退之風沈抑下位晚受知於聖主亟擢副於臺端論議持平公忠有守雖留中之不乆顧屬望以彌髙蜀道七年使華三易獨司大計盡䕶諸軍得將帥之歡心宣朝廷之徳意蠲重賦者數百萬計被隂功者五十餘州睿澤既敷民生寖裕召還九列入覲清光嘉猷悉簡於淵衷惠利益深於逺俗遂登武部旋貳民曹公爾忘私人固憂於盡瘁哀哉不淑天胡嗇於憗遺用未究於長材壽不充於厚徳中外憂時之士孰不傷心西南聞訃之人舉皆隕涕某頃由賤事獲借餘光言必同心雅盡斷金之利噐非萬乘猥叨蟠木之容未報殊知忽悲陳迹恨拘牽於薄宦阻匍匐於髙門逺奠一觴寓詞萬里庶幾英爽鑒此衷誠永嘉到任謁諸廟文吏以命綍假守是邦神以典祀森衛此境惟神與吏皆食於民厥職交修是為無愧某謹以視事之始祗祓進見所冀雨暘時若時和歳豐匪吏所能繫神隂相軍城修造祭祀溪山神文兹以官寺不葺一切興修用尋斧斤廣行翦伐惟神典司林麓勿震勿驚隂相役人毋生災癘毒蛇猛虎悉令蟠伏當俟落成修嚴齋醮以報神之休軍城修造祭諸廟文軍庭縣宇使館城闉或闕或隳悉將營繕工程既廣動鑿滋多禁忌之方不無干犯惟神鎮守此土勿震勿驚相是役人無絶筋無傷骨無阻風雨無生災癘落成之後當集緇黄各修其事以答神貺軍治畢工謝諸廟文頃為軍民載營廬舎工徒既集風雨是憂顧人力以無施叩神祠而有禱果蒙隂相借以晴和凡綿歴於五旬曾靡妨於一日役者無滯留之歎居人免暴露之災顯應若斯威靈愈著用陳薄薦少謝洪私代處州路祭徽宗梓宫文功就因山禮成啓殯極駿奔於同軌悉孺慕於遺弓汾水神逰不返唐堯之駕稽山土卜永安夏禹之藏懐舊徳以淪心感餘民而灑血龍輴所届想笳鼔以如聞僊馭已賖痛衣冠之永閟臣逺分符竹阻造園陵式修饋奠之誠恭致攀號之戀代孫尚書祭席叅政母太夫人文惟夫人容徳之美族姓之華早以嘉耦來嬪大家輔佐君子蔚為名卿和鳴之慶埀於後昆篤生賢子致位丞輔入相出將允文允武經如方進為世儒宗夫人之訓翟母同風治如不疑嚴而不殘夫人之訓雋母比寛莫榮於妻莫尊於母再世顯光孰與為偶養極萬鍾享兹永年孰如夫人五福純全始終哀榮舉無與比嗚呼清芬永光女史丹旐之東執紼靡遑逺寓一奠我心悲傷雜文弔成安君文司馬遷班固皆稱成安君儒者常稱義兵不用詐謀遂死於汦上嘉餘争於强秦之末列於羣雄之間而服儒守道以至於敗為文以傷之曰事成敗之不足以論人兮要夷考其平生君雖身滅而國亡兮不害為曠世之豪英方六國之為秦兮狙詐習而成風申商為賢兮孫呉為宗焚書阬士兮豪俠斬刈而無所容君儒服而皇皇兮竢雲霧而龍蟄以匹夫而竄伏兮秦皇帝至為之側席逮陳吴之蠭起兮劉項立而虎争戰勝為雄兮弱者為烹節制不用兮謀詐肆行君獨偃然於其間兮指仁義以為兵志大者固難就兮所立已可尚存趙支邯兮走張耳而距項為弱歇之伊周兮處一隅而倔彊異夫世俗之腐儒兮止空言而無狀廣武稱其百勝兮知平日之非否臧諒守道之太篤兮遂一敗而至於亡豈千慮之一失兮亦聖賢之所常在嬴劉之中間兮紛人傑之不可數鹿終死於龍顔兮餘相繼而誅擄三田更王而更敗兮籍軀裂而為五信豹屢降亦不免兮韓彭詐於兒女彼豈仁義之致然兮亦終膏於砧斧盖天方舉六合而授漢兮雖蚩尤其何補要同歸於一死兮惟夫子為得其所處昔宋襄竊名於二毛兮吾尼父猶歎咨况夫子之凛凛兮宜千古而餘悲留窮文癸丑之孟春五日壬子晨起倦而假寐見五怪物歘然俱至衣裳藍縷容色枯悴聳肩拳脊反耳昂鼻行步傴僂僅有聲氣咿嚶而言意若忿戾曰我乃子之窮鬼吾與子逰今三十年子在孩提我矜我憐及子稍長戯逰蹁蹮子能讀書佐子精硏艱難辛苦不爾棄捐望爾有成報我周旋事乃大謬百無一然子年日長子窮日熾流離困頓無復生意半生應舉無所識拔易耨深耕種而不刈偶得一官日望其祿不才無庸所向墻谷纓冠束髪號稱曰儒不獲其利茍得有餘人皆為之爾獨不屑朝不及夕期彼歳月爾子爾妻仰爾以豐吟饑呻寒我耳為聾人皆愉愉爾獨悶悶使我見子無疾而病凡子之窮不可殫論有目未覩有耳未聞釀酒成醯炊飯成糜投䑕中噐誤刀斷機賣漿遇寒曝麥逢雨渡水覆舟執爨焚宇不惟自窮而更及旁逢子者困見子者殃洞庭之波淼瀰無垠子渴欲飲九淵生塵太倉之粟川停岳峙子饑取食百萬掃地我以窮故依人而行子窮若此我何賴焉逝將去汝豈無他人結侣貪魃締交錢神肉食錦衣以終餘齡安能百年與子長勤念子乂逰不忍無言一告而别子其勉旃王子於是駭然莫測黙然内愧徐抽其端緩頰以對吾讀韓子乆聞爾名謂子有知庶幾神靈子則不然憎貧棄舊我不爾驅爾顧我咎凡人之生各有定分貴賤窮逹造物所命天生我窮令與子儔命實為之汝安歸尤物極必反否泰相繆吾窮乆矣庶幾有瘳子姑少安豈無報酬何遽戚戚於我而不留也富者則慕貧者則去被此名也人誰汝顧子其改圗毋苦倉遽窮鬼聞此顧嗟流涕且悲且慚釋憾相謂人皆送我爾獨不棄命也奈何况此厚意永為金石有死無替福唐解試告諭舉子文福唐今年秋賦投家狀於有司者萬有七千人鄉舉之衆天下莫比亦閩中昔日之所未有也可謂盛哉前榜自大魁而下聨科甲者五人與臚唱者六七十人國家於此邦人士誠無負矣本州仰體朝廷之意以科舉為重事開斥貢院編排坐次增添内外執事之人種種如法州郡於此邦舉子亦不茍矣諸君盍澡身礪行思稱賓興父兄戒其子弟長老訓其後生朋友之間更相勸約咸趨禮義盡革囂浮毋怙衆以作非毋自輕而取侮絶博塞之戯息錐刀之争出於里巷之間必有矜持之色衆庶歸重儒服自尊凡所觀瞻孰不起敬士風如此顧不美歟或有不靖之徒多士宜共疾之歳律三更科詔一下賢材待時藏噐指日奮身豈容猖狂以致顛沛且大開選舉精考藝能乃功名富貴所由之途非兇暴豪强興争之地正使㨗如慶忌勇若孟賁何取於翰墨之場乎一犯嚴科即罹公法與夫鹿鳴開宴黄堂享勸駕之儀豹變還鄉緑袂耀觀光之寵者榮華僇辱烏可同日道哉又闊步既騰亨衢甚坦稽古所獲奚止於斯夫以萬七千人羣萃於此其間𤨏碎寧無短長在於寛和無事闊畧三日借路豈責其全一忿忘身雖悔無及將來引試切忌攙先題目出於有司必待舉人盡入何須競進以冒隘途雖少遷延未淹晷刻逺於蹂踐方免憂危宅心既寧下筆熟潔至如案設既定尺寸有分移徙亂行擾動實衆我欲自便人將謂何嗚呼在醜不争先聖之格言畏威如疾前賢之明戒凡我應書之衆勿屑細故以逺大期鴻鵠秋天一飛萬里安可量也惟諸君勉之故兹告諭各請知悉
