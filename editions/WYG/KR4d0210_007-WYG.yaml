body:
  text: 漢濵集巻七宋王之望撰奏議措置淮西漕運儲積奏議臣䝉朝廷降到事目内一項相度轉漕儲積去處臣與江東漕臣薛良朋及知水陸道路人講究利害將來江北不欲多置糧食只于蕪湖縣儲積逐旋津發其淮西屯兵去處係和州巢縣桐城廬州一帶和州者由當利河運昭闗褒禪等處宻近含山縣者由太陽河口入歴湖運巢縣廬州者由裕河入焦湖運桐城縣者由樅陽江口運以上皆近蕪湖見有倉厫可以頓放或只繫舟岸下節次發放實為穩便惟壽春濠州最為廻逺自真州𤓰州入閘經由揚州髙郵楚州入淮過盱眙之西又一百八十里至濠州須著水運又四百七十里至壽春漕運為費力且有敵境抄畧之患今夀春不欲多屯人兵人既不多可以措置陸運廬州至夀春二百里大率千錢斗米可致一石若屯千人則歲用糧九千石并馬料不過費錢萬餘緡米千餘斗比之水運甚為省便可保無虞光州麻城由巴河運自江入巴河出陸一百五十里至麻城又二百四十里至光州所屯人數不多可以和糴相添應副今具畫圖於後除已具圖冊進呈外伏望聖慈更賜詳酌如或可用即乞行下總領轉運遵依措置施行取進止乞沿淮創置斥堠烽火奏議臣前凖朝廷降到事目内一項敵人沿淮清野合如何措置斥堠臣契勘淮西平川廣野敵騎可以疾驅而自來不置烽燧只用探馬所以多至誤事臣今與諸將措置候將來防秋各於敵馬所由道路登髙瞭望依舊日陜西河東體例創置斥堠烽火頃刻之間達數百里非徒緩急官與民間皆可預備亦使敵人知我邊境與向來不同以伐其掩襲之謀兼諸軍不入隊人甚多足以充役不占破出戰之士遇防秋即權罷其探馬亦令依舊委實利便伏望聖慈行下諸軍更賜催促令作速措置仍具所置去處聞奏乞招撫司與江東帥司措置建康樓船奏議臣契勘淮西諸水不通淮河由焦湖而北可至廬州之境廬州不宜置船恐萬一資敵若得舟楫於廬州則可由焦湖而入於江此曹操窺兵之路也故淮西水軍當盡在建康采石一帶以壯長江之勢而量以一二千人游戰艘於江湖以疑敵彼若深入則乗間出合淝以擾其後亦一奇也建康戰船殊未如法樓船絶少惟海鰍稍多不足以威敵前所招神勁軍皆東南烏合其人脆弱不耐江北風土向駐於泗州盱眙者多病死又喜逃亡宜以為水軍而駐於建康鎮江之間既風土相宜可無疾夭又舟師臨陣不容奔北可以盡其死力委實利便其船上器用什物徃徃未備合速令計置仍更添造樓船將來路車之人當用民兵及修船之類事干建康府乞令招撫司與江東帥司同共措置論兩淮鎮戍要害奏議臣伏凖三省樞宻院劄子備錢端禮奏内稱昨來敵人累次侵犯皆自西路而入葢濠夀之地徑捷而糧船多自清河以入滁今西路部分要害已得其宜若嚴切固守無致侵犯東路滁州一帶最為上策設若透漏奔衝則郭振全軍與西路軍馬夾擊甚為利便及令劉寳郭振互相照應臨機制勝遇有兩路連接事機星火關報協力一心無致差誤奉聖㫖劄與淮西宣諭司臣觀錢端禮所陳甚合事宜契勘兩淮屏蔽大江利害一體尤不可以東西分朝廷既差兩宣諭遂有界限勢使然也且如以前宣撫都督通管兩路則如何分得東西淮南形勢淮水殊不足恃而大江狹處最是采石敵人每來由巢縣和州一帶徑至江上最為要害其次方到六合揚州葢江道濶而路稍背也今西路措置修石湖亭昭關等處關隘使敵不得至采石則是兩淮最要害處西路已獨當之矣其餘光黄桐城等處孔道甚多皆須隄備六合雖𨽻淮東而地鄰西路臣所以欲兩路相關措置設有緩急自合兩路相應此事臣與錢端禮所言一同乃今日措置兩淮之上策也若要固守濠夀等州使敵不犯滁州一帶則必無是理臣前奏廬夀光州決不可守濠州若敵大入亦須保横澗山而兩路中間接近去處即合相關措置葢緩急分東西不得敵奔衝東路六合必須西路夾擊若欲固守濠夀使不犯東路滁州則西路亦豈能獨任其責滁州不可守也滁州之不可守而守六合而夀濠之地其可責西路之保守使得不透漏乎今東路劉寳一軍把遏水道外殿前一軍人數甚衆將來屯在揚州郭振軍在六合所備此一帶平濶然不過一二百里之間而西路疆界濶逺邊面千里地平如掌又無城池之固若不據險不知用幾人雖有大衆終不足以當敵人之騎兵見今張守忠軍屯巢縣與時俊保石湖嶺王彦屯和州保曠口昭闗戚方屯桐城保北峽諸闗敵兵不犯去處方可抽那應援假令敵人分兵一犯西路昭闗一犯東路六合州則各處僅能自保而已此所以備禦之不可不嚴也故臣曰西路當據諸山之險以控其兵鋒東路當扼清河之口以斷其糧道淮西若不扼諸山之險而守濠夀以蔽障滁州此乃劉錡王權輩前車之覆轍也若西路敗於濠夀之間則將何兵馬與東路夾擊於六合乎西路既敗非徒無可以應援東路而東路六合揚州之衆亦恐不復能枝梧矣若吾據闗守險非徒可以自保其處敵知吾有備亦未必便敢深入使其送死則吾以逸待勞以飽待饑正墮吾計中可以得志故臣以為今日措置兩淮之上策無以加此臣與錢端禮所論大抵相同只恐淮東指凖淮西固守濠夀欲其不犯滁州將來却成相誤臣愚欲望聖慈預戒兩路諸帥遇有侵犯兩路相近要害去處互相策應不得坐觀成敗臨時朝廷更嚴賜指揮葢此非兩宣諭之力所能獨辦也仍乞降臣此劄行下照㑹庶幾不致疑誤取進止論差撥蕭琦人馬及韓玉不赴新任劄子臣向凖四月十四日聖㫖撥歸正人一千人與蕭琦臣力曾論列至六月四日降㫖依蕭扎巴例於諸軍撥馬步千人付蕭琦指揮已定琦亦無說王彦自合便行差撥縁臣赴闕奏事一向遷延直至臣七月十七日再到建康尚未肯發臣累去催促仍令揀選應副王彦終遲遲遂再行申明蕭扎巴是統制官與蕭琦亊體不同未敢差撥朝廷只檢㑹前降指揮行下催撥足矣近復凖三省樞宻院七月二十九日劄子令於見教閱人馬并北軍各撥五百人付蕭琦臣深所未諭五百人與千人何異奪而復與豈以為恩但深怨禍而已臣與王彦商量昨未承指揮以前盡差南軍與之彼亦不敢有詞朝廷但勿預知可也只是王彦執吝應副得不甚整齊人既參雜馬又不足臣再三説諭終是艱阻蕭琦不無悒悒欲望聖慈劄下王彦所差蕭琦人馬若於諸軍抽差恐不成隊伍可於本軍馬步中各成隊摘五百人馬五百匹限三日内應付仍劄下臣嚴行催發如此則琦必大喜然歸正北人切不可與也蕭琦臣撫之甚厚其人議論實有可取如修闗寨等事與臣意正合臣非有所好惡但國家安危之慮不可不為之防若處之得宜非徒朝廷之利亦琦之福也昔三監之地乃神州奥區其民累世被堯舜禹湯之化一染紂惡遂為汙俗周公遷之洛邑時歴三紀風俗始變書曰周公克慎厥始君陳克和厥中畢公克成厥終更一聖二賢而後厎定又曰邦之安危惟兹殷士聖人憂慮之深如此夫以先王遺民而使管蔡兄弟監之猶為變亂况異域之人哉陛下不可不審處也臣更有少事不免奏聞歸正人韓玉臣不識之聞頗涉獵書傳議論捭闔志大意廣有輕朝廷心張浚聽信以為國士浚之所為多出於玉朝廷更張庶事為玉者自當退聽今添差宣州通判係見闕不即赴任却來建康不謁本路監司只時走蕭琦之門嘗對歸正人添差建康簽判髙敞語言無倫疑朝廷講和之後復歸北人意有含蓄敞復語總司幹官吕撝言之吕撝以告臣呼敞問之却不肯盡言而意若有之臣亦不欲深詰凡隱藏之語臣更不敢具奏又聞玉每寃張浚之罷以為事已埀成不合中變又謂敞云蕭琦奴才而其第二子乃豪傑嘗問我蕭是北人是南人其意大率類此敞濟南人與吕撝是鄉里故肯吐露臣親呼吕撝問之其說如此吕撝頥浩之㓜子也玉來建康只造張孝祥王彦嘗於孝祥坐上見之孝祥大稱其材玉亦云云王彦面折之玉頗說待北人之薄王彦云我南人到彼只為奴婢今北人到此作節度使有何所負玉云南人到彼極有任用者王彦又隨事折之玉遂不敢抗然終不徃見彦亦不敢來見臣其人狼子野心豈肯忠於朝廷縱不為叛亦只是懷張浚私恩於陛下何有今久留於此日與蕭琦交通深恐疑誤蕭琦别有思慮臣謂此人不可令在江上宜改差浙東差遣不然或為後患若此人逺去乃所以保全蕭琦陛下速賜裁處幸甚取進止論和議奏議臣十一日夜半凖金字牌遞到御劄恭承聖問淮西事理王彦軍情且令臣頻具奏來臣自前月十七日到建康日夜督諸將營建官寨烽火王彦地分已修了昭闗山寨并闗門聞頗雄壯見接續修襃禪曠口時俊地分已修石湖嶺戚方亦修北峽闗王彦今日親過江北廵歴本地方及時俊地分自曠口一帶轉入巢縣諸軍親行按視約半月日可囬諸處烽燧諸將相闗措置戚方皇甫倜己申到處所餘亦見次第後月上旬間二事可了候了日奏聞乞從御前宻差人檢校今月初三日建康教閱水軍大小僅千艘車戰船四百七十餘隻臣詢問衆人皆云前所未有今見增置用修葺舟船委可壯長江之勢聞淮西軍民見所修闗隘頗恃以安王彦一軍都無事錢糧足備不聞減尅王彦御軍此間人頗議其寛或聞行在傳以為太嚴甚不然也但軍中事務精力有所不逮於文移詞狀之類遣決不敏臣就其所短而扶持之建康即今軍民安恬只濠夀間歸正等人時為冦攘近夀春頓遇申擒獲二百餘人而濠州孔福申以為擁去平民老小七八百口玉石未分臣已約束不得廣有禁繫正賊之外如有一時驅逐之人仰釋放存恤繼承朝廷指揮委屬官體究見在施行孔福在濠州撫定彈壓人漸安之夾淮之民號跳河子以作過為生近縁更戍未定又北界招誘故易相扇動逐州守臣可以措置非久諸軍出戍若尚不息以千百人廵逴自當消弭光州皇甫倜錢糧前因改淮西總領應副之初所以不繼今復委湖廣總領可免闕乏又有知順昌府孟新一項僑寄光州梁安灘有南北私商徵税之利皇甫倜甚不便之近孟新稱避水移來固始與皇甫倜互有争訴臣各移文調䕶無得生事别聽指揮今朝廷令臣體度與孟新差遣臣已遣人招之候到面問取其所便而處之自此必無事其餘如孫立者如馮湛者如李澤者頭項甚多或就加撫存或招來建康皆有歸著暗消患害多矣若一應稍失事宜便為釁不小如陳八者是也大抵當極弊之後事如棼絲急之則愈亂須緩緩為之甚費料理心力俱盡寢食不遑然不敢屑屑奏聞正恐上貽君父之憂方張浚初罷更張軍政臣孤單么䯢濫當事任萬目睽睽伺其踈缺日虞禍釁不自意全仰頼聖恩得至今日惟當盡力效死罄竭愚忠以報萬分前朝廷既通北書未有耗間頗傳議論不一近聞已得回答臣逺外不知其說不敢妄議但一意激勵將帥為戰守之備以待不虞不問和與不和也但為自治不問敵彊不彊也臣向者累次面對及具奏劄其語甚詳陛下必尚記之敵不肯和必不回書既相報復和意可見然語言必不肯便順須為彊項有所邀索吾既捐四州彼若肯和休兵息民以成陛下之至仁固天下莫大之福臣之願也事若可從陛下且以生靈為念勿較小節勿吝小費能信順而理直天地鬼神實臨之若太不可從則怕他不得須稍見吾彊壯有立之勢聞敵中自河而南水旱飛蝗之災尤甚於我其動衆亦難張皇威勢半是虚聲我若一向伏弱適足害事子産曰國不競亦陵此至言也今日之事不容再錯若和得成須朝廷一一議定然後遣使勿獨掇與使人令辱國啓釁以誤大亊也伏惟聖慈財擇幸甚初除左諫議大夫上殿奏議臣愚不肖陛下過聽擢長諫垣臣未知所以稱塞竊聞唐魏鄭公以諫諍為心恥君不及堯舜平居歆慕以為人臣如斯可以無愧矣然賢人君子立人之朝孰不欲堯舜其君至於得行其志者宰相之外獨諌官耳臣今繆當其職敢不以鄭公之心為心乎或者以堯舜為不可及欲致君堯舜者謂之責難於君臣以為不然堯舜之道甚大而易行堯舜之政甚簡而易為顧後世不之察耳堯舜之道行於其躬者惟孝施於其下者惟仁陛下既允蹈之一無所難信乎甚大而易行矣堯舜之政則在於官人而官人之道在於敷奏以言明試以功而已堯告舜曰詢事考言乃言底可績禹於臯陶亦云此所謂敷奏以言者也舜命禹作司空曰汝平水土成允成功稱臯陶曰汝作士明刑弼教民協于中時乃功此明試以功者也陛下於羣臣中敷奏之以言歟言發於前而底績於後者何人也明試之以功歟功作於始而克成於末者何事也以此察之則虛名不足以惑衆聽横議不敢以揺至公姦欺不容真偽判矣共工静言庸違象恭滔天而驩兜乃嘆美其方鳩僝功欲堯之用之而堯竟不從此言之不驗者也四嶽薦鯀治水堯曰咈哉方命圯族九載績用弗成此功之不效者也舜既承堯首正四凶之罪天下咸服堯舜之政豈不甚簡而易為乎陛下以聰明睿智之資承光堯付託之重屬時多事未嘗一日以位為樂憂勤庶政三年於兹宜其治效崇成未有云獲者非道之不𢎞政未舉耳臣伏見今朝廷之上妨功固位之習未殄背公死黨之論日聞以妄誕為才能以凶悖為堅正執偏見而不求天下之通論各私所主而不恤公家之大計大抵圖國甚拙而為其身謀則工愛君不專而附其交黨則力孔子曰鄙夫不可與事君未得之患不得之既得之患失之茍患失無所不至此風不革陛下雖欲彊兵富國為治安之計臣固知有所不能也伏願陛下明詔在廷各勵節操平其心於論議之際端其趣於背嚮之間使廉恥興行風俗丕變訪之以言者必要其驗試之以功者必覈其實若附下罔上造為弗靖怙終而不變則虞舜四凶之罪在陛下其得已乎如是則朋比自破功罪不誣而天下可運於掌矣此帝王致治之要術御世之至權也惟陛下留神宗社幸甚論恩榜任子革弊奏議臣今月初七日凖御封降下御劄文字付臺諫官謂朕自臨御以來躬率儉抑每念官冗恩濫思革積久之弊將來任子貢舉若停三年之限必胥動以浮言今欲遇郊祀之恩已經奏補者並權免廕補一次開賢良方正之科許令中外普薦真材其免解該恩牓人且權住罷赴試卿等各宜公協乃心參酌所宜條具來上朕審處而行之臣猥以庸虚備數諌省伏覩陛下天資英睿濟以果斷勵精求治約已救時近古帝王葢所未有即位以來慨然憤積弊之久欲一切懲革以大有為於天下斯千載之一時也臣不肖待罪諫省得奉諮詢何其幸歟然臣聞更化者不欲駭俗而除弊者不可循常人情安於僥倖茍且歴數百年乃欲一旦革而正之勢必至於紛紛而不靖將遂行而不卹歟則必失天下之心將中道而復止歟則後日無以為政是不可以不審也若曰更化除弊難卹流俗之議亦須在我者詞直而有名猶當反復調伏使無所發其忿懟不逞之心始可以無悔况其未然乎漢文帝時諸侯强大僭上不軌景帝憤之峻加裁削於是七國俱反漢幾失山東此乃循常駭俗之至也其後武帝用主父偃之策各使封及支庶諸侯不削而自弱葢處之得其道耳任子恩科祖宗時有之遽停三年必不免浮言之胥動慶厯中仁宗開天章閣命輔臣陳當世急務范仲淹富弼輩條上數事減任子其一也未幾謗讟大興一時名臣皆狼狽而去所言卒廢格不行神宗熙寧中減進士狀頭恩數而蘇軾亦極言其非大抵更化除弊為至難在神宗時已然况風俗久壞綱紀未振如今日之甚者乎且名位有高卑子姪有多寡若已經奏補者並免廕補一次則貴賤不分而人有幸不幸矣特奏名之人舉數有多少年齒有老壯若並權住罷則舉多者受屈而年老者無聊矣至於開賢良之科廣中外之薦自是國家求才與任子恩牓非所以相乘除也自靖康以後興復此科十有餘舉竟無一人應詔雖令普薦亦恐虛名而無實也陛下欲大有為於天下毎事不可求速宜為之以漸使僥倖之俗日減月朘愈久愈效而無後悔則善矣以陛下之英睿果斷勵精求治十年之後何事不立今即位未久雖勤儉仁孝之徳孚於天下而恩澤之霑漬者尚未深也如此二事闗於士大夫者甚衆願陛下姑少寛之以為後圖必欲稍救其弊則亦有說矣夫人之情篤於愛其子以及其孫其次則兄弟若姪若甥以至於踈屬於其至親則利害之心切其餘則泛泛而已先王因其親踈之别制為五服此人情之殺天理之自然也今文臣自帶職朝奉郎以上隔郊奏薦中散大夫以上每郊奏薦太中大夫以上雖致仕遇郊亦得奏薦其子孫近親皆已官矣又及其踈屬每薦一人有納賄至數千緡者其壽考之人有薦至數人者甚無謂也今若立制自某官以下子孫之外不許奏朞親某官以下不許奏大小功親某官以下不許奏緦麻親其許奏者差其官品立定員數以郊恩致仕遺表通計數已足矣雖有恩澤不得奏補只許回授與已有官人仍不得名他子孫為已子孫以冒廕補無子息者許養一人如此則一郊所省文武不下數百員然於其人之利害初亦不甚切也此救任子之說也方今科舉之弊莫甚於轉運司之牒試祖宗時無若是之濫也有避一人親而牒三四十人者而所謂親未必親也所謂門客而未必門客也每三歲詔下士人奔走競求牒試富者行賄賂巧者干請託改換鄉井詭冐宗支敗壞禮俗莫此為甚就試者十人解一人到省則十四人取一人若牒一百四十人是暗添一員省額矣天下每舉諸路轉運司所解不下數百人則省額安得不濫乎十四人之中令舉一人而餘十三人者十七八年之後皆免解進士也則恩牓安得而不多乎免解就試之人衆非徒恩牓衆多而正奏名省額亦自暗增葢以十四人則額當取其一也今若將中外官門客牒隣州服屬踈者免牒試試院簾内簾外官别作措置仍申嚴保官批書之法務在必行則轉運司試人絶少每舉正奏名可減數十人而將來免解之數又不知其幾矣此救科舉之說也凡為此者所以修法度重名器柅姦倖覈詐欺而於祖宗之制非有所戾也不亦辭直而有名乎雖有紛紛亦不能為患矣此其大畧其餘纎悉當命有司條具以聞而陛下審處之臣素懷憤世之心最疾冒濫今在得言之地遇非常之主非不欲將順隆㫖以一掃宿蠧顧事有不可以驟語者臣區區之愚惟欲吾君政法流行而名譽光美不願求欲速之效使興訛造訕者得以竊議於其間也伏惟聖慈留神採擇幸甚取進止乞勞師奏劄臣伏覩皇帝陛下以大軍出戍兩淮暴露寒苦臨朝太息宵旰軫懷出内帑之儲普加激犒舉賞功之典優答勲勞尚慮德意未敷聖澤或壅宜遣大臣宣布詔令楊存中已擢拜都督專總兵權臣叨預政機將明是職若陛下不以為不肖乞差臣徃江上勞師庶幾挾纊之恩足以振起士氣取進止勞師乞差辟官屬奏劄臣被㫖勞師江上布宣德意面奉聖訓如更有合差委官屬措置事務許臣量度不限員數差置伏望聖慈特降處分取進止乞追寢職名宫觀守本官致仕奏議臣近三具奏劄乞賜罷免仍重行黜責今二月十七日凖尚書省劄子奉聖㫖除端明殿學士在外宫觀任便居住臣聞命震驚罔知所措伏念臣出將使指入輔政機無毫髪補報而人言洊至罪戾山積雖竄戮不足以謝天下聖恩深厚未忍加誅乃叨祕殿之華資竊珍祠之厚禄保全終始之遇非臣犬馬所能上報萬一但罪應黜責而未正典刑恐於公論有所未允所有上件恩命臣不敢祗受伏望聖慈特賜追寢令臣守本官致仕臣雖疾病之餘死亡無日猶當效結草之報取進止温州遺火乞賜降黜奏劄臣契勘本州自今月十七日西北風大起遂預作凖備㸃檢防火之具十九日風甚巳時新河南界居民葉八家火發烟焰所衝六處並起臣與通判趙不流躬詣火勢猛處救應分遣諸頭項軍兵百姓併力向前至未時撲滅燒過民居三百七十一家茅瓦屋相間約計六百二十餘間并岑山尼院一所是夜二更後城外南廂居民遺火亦即時救滅燒一十五家計二十間并係茅屋臣等終夕廵警澆潑餘燼不敢少懈翌日風勢依前猛急至未時市東界杜秀家火發五處俱作臣等又如昨日極力救䕶至酉時撲滅燒過民居六百七十三家茅瓦屋相間約計一千一百七十餘間龍興宫開元觀嘉福院並當風頭不容拆救内龍興宫有市舶務一所並皆焚毁飛火出城南燒却民居七十家及造船營一所五十六家計草屋一百四十二間打造未成糧船四隻除此之外兩日所燒别不曾延及倉塲庫務官司屋宇臣守郡無政天降之灾大火繼作禍及民庶按紹興勅諸在州失火都監即時救撲通判監督違者杖八十雖即救撲監督而延燒官私舍宅二百間以上蘆竹草版屋三間比一間都監通判杖六十仍奏裁三百間以上知州凖此臣身忝守臣無所逃責見行待罪伏望聖慈重賜降黜以為州郡不職致災之戒取進止小籖臣契勘本州居民約計萬數千家寺觀四十所今兩日所燒共一千一百八十五家茅屋相間計一千九百五十餘間寺觀四所大抵幾災及十分之一而官司廨宇與倉庫務軍兵營壘除市舶務與造船營外並皆無虞尋常州郡被火縁於勅有奏裁之文徃徃減削人户間架以避責罰臣今不敢隱漏盡行供具計其延燒之數罪戾非輕然通判而下皆極力救䕶故雖風勢猛盛一兩時間便得熄火伏望聖慈但將守臣重作行遣臣甘從譴戮不敢有詞伏候勅㫖臣契勘本州從來多有火災每數年間輒一作動焚數千百家葢縁並海多西北風而屋邑繁隘茅瓦相間以致易為延燒臣自到官常以為慮而習俗滋久難與慮患若先事更革必以為擾今遭此一爇遂得大為之防以修火政庶為後日之利伏乞睿照臣自本州遭火之後即刷貧乏被火人户計口給糧賑濟又為措置材瓦之類盡徹茅蓬舍宇增置救火器具及部勒官軍預為區處不敢一一條上伏乞睿照温州水灾放罪自劾奏劄臣今月十九日凖尚書省劄子勘㑹已降指揮温台州近被水灾逐州守臣王某陳巖肖各不即聞奏陳巖肖仍賑恤遲緩王某特降一官陳巖肖落職放罷近台州申獲海賊首領毛大等五十七人温州申獲次首領許大等九十六人十月十一日三省同奉聖㫖王某陳巖肖各有捕賊之勞以功贖過特與放罪前降指揮更不施行内陳巖肖與宫觀臣伏讀訓勅感激涕流臣誤䝉聖恩畀以便郡政事乖刺洊致天灾不能即以上聞罪在不赦况臣嘗侍帷幄深識聖主勤恤民隱亟欲知四方疾苦之心宜與它郡守不同而老病之餘誖眊如此陛下何賴焉考實論情合加重譴乃從末減恐未足以壓服公議若以捕獲海賊功過相除自是明見千里之外創置水寨及將士用命所致臣何力之有正使建明其事偶出於官亦守臣常職惡足以贖蔽灾之大過黜官一秩已為輕典更加貸宥何以示刑伏望聖慈特賜處分將臣降官指揮依舊施行仍從罷免以為付委不效之戒其於陛下信賞必罰綜核名實之政豈小補哉臣無任慚懼戰慄俯伏待罪之至取進止條奏温州水灾後措置事件奏議臣近覩邸報臣僚劄子自夏至秋浙東一路瀕海之郡三遭風水甚至民間以木筏搬載湍急之處廬舍飄蕩禾稼不以早晚或秀而未實或實而未收浸淫損害所餘亡幾在法水傷去處差官檢視蠲減田租似聞州縣之吏恐為已累懵不加卹惟懼朝廷之得聞也欲望先委浙東監司及諸郡守臣詢聞著實被水去處分差清强官檢視定其高下減免租稅并行下諸路監司郡守覺察或有灾傷先期從實奏上庶幾不敢欺隱奉聖㫖依奏續於今月十四日轉運副使劉敏士到州布宣德音體訪委曲過於優卹惠利有加恭惟皇帝陛下憂民救灾之誠至深至厚恩澤所施孰不鼓舞然浙東七郡其四瀕海被灾輕重各有等差不皆如臣劄子所言臣先呼集諸縣知縣赴州親加審問皆云損傷不多其人素皆愛民非喜為掊剋者所言可信又戒更切訽究不得抑遏人户狀詞各皆遵禀而去既是損傷不多則檢踏蠲放合依條限難以前期張皇申奏至於講求荒政固已預為隄備大抵於成法之外更務寛假此皆守臣職分之常其所設施何敢一一溷凟朝聽陛下撫養黎庶視之如子每聞疾苦宵旰軫懷臨遣漕臣躬行按視此堯舜之用心也臣豈容隱黙畧無陳述謹具本州風水後措置事件編成一册繕寫投進以聞庶幾上寛宸慮少副綜核之意伏乞睿照
