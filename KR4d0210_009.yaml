body:
  text: 漢濱集巻九宋王之望撰書上綦侍郎書某聞南山之阿有異木焉萌蘖以生纔數寸爾已有鬱然撓雲之勢不幸壓於土石拳蹙不遂將失其性又遭時之旱暵泉乾土裂孤根熬熬焦然且死俄而有㤗山之雲蒸布太虚將徧雨乎天下百榖草木畢仰其澤而是木也尤汲汲焉夫雲之降時雨以潤物固其職也非有私乎惠物也物之仰雨以生亦其宜也非有私乎求雨也然是木也於衆草木中獨汲汲焉欲亟䝉其澤者何哉蓋困於積年之壓重以三伏之旱抑屈枯悴非他草木比一日二日不雨殆將死矣則其情豈不急而可憐哉今有人不幸而類此者其生於世二十有九年其立身行己積學著文雖不敢妄意古人亦不肯自後時輩弱冠遊太學屢以不腆之語濫處上游丙午試於秋闈亦在異等此顧何足道然儻一得獻技於禮部待問於天廷雖不足以争步英豪追蹤晁董至如韓退之所謂循次而進亦不失萬一於甲科者誠不自揆妄以為庻㡬焉奈何遭時不祥仍以家難流離憂苦不得試其藝者已七年於兹是以在此若乃譏評時政詆訶公卿出位而謀居下訕上以僥倖萬一則又某之所不忍為也以此飢寒困窮為當世失職者之最今者廹於門户之寄衣食之奉摧折素志欲因世祿而茍一官悼心失圖自愧平昔是豈異夫木之拳蹙不遂失其本性遭旱而將死者耶伏遇閣下以貳卿之重獨搃天官自二千石而下皆銓次於閣下之手士大夫之望之若百榖之仰膏雨也而某事之去留亦在焉於衆士大夫中獨更汲汲有望乎閣下者其意非有求乎其私之也蓋以流落之久資用不足以供桂玉而羇窮之餘錢財不足以賄胥吏自非閣下特逹而哀憐之則旦暮之間且餓而死矣此所以祈公之尤切而望公之尤深也伏惟閣下雲行雨施利澤萬物之餘賜之以涓滴則枯莖朽枝不崇朝而遂有生意雖綿弱之質何以酬造化之施然假以嵗時俾其成材嵗寒之資或有可觀者夫叩人急者人必疑無因而至前者人莫我知今某實犯二忌以進故敢獻其區區之説欲閣下一知而不疑耳激昻自薦市道所羞冒昧自陳出於窮迫惟察其肺肝幸甚上吕丞相書某聞古之豪傑之士建大功定大業者往往其人出於勞苦煩辱之中其思慮之所服習筋力之所嘗試皆難能難堪之事故一旦得志於天下則其所立有絶人者昔后稷之播種伊尹之耕稼傅説之版築吕望之漁釣其事至陋而聖賢安之不恥周公文王之子生長於富貴宜若不屑於世務然七月所陳無逸所戒莫非稼穡艱難之語聖人豈為汲汲不自暇逸者哉以為服天下之勞故可以處天下之逸安天下之辱故可以享天下之榮也後世士不務實競為浮誕以收無用之空名平居優游言論風㫖足以傾耀天下及丁變故則茫然不知所為魏晉之際此風尤甚士大夫有盛名而處顯位者皆號為風流之士以清談而取世資已而逺敵駭乎疆場姦雄發於朝廷盜賊起於山林則向所謂風流之士者皆顛沛失據身死族滅而國隨之如司馬懿劉淵石勒之徒一世巨猾其彊悍堅忍之性固已備嘗險阻周知情偽而何平叔王夷甫之流欲談笑而當其衝是猶深閨曲房窈窕女子抗彊暴之侵陵豈不殆哉本朝承平既久士風凋弊浸浸有魏晉之風是以國家不日引不月長陵夷而為靖康之禍此有志之士所以歎息痛恨於前日也恭惟閣下英姿傑出獨立一世不為風俗所移方天下以浮虛相髙侈靡相尚之時獨儉素是守勤勞是務有識之士固曰天下無事則已天下而有大事則排難而解紛者必公也及其功存社稷位冠羣后於人臣無二矣宜可以安處於富貴然於天下勞苦煩辱之事猶身親之孜孜焉勉勉焉若有督責而程課之者以是知閣下勲烈巍巍誠非偶然其康濟之資經綸之術皆其平昔之所安行而天資之所固有非矯揉沽激而為之者也此所以出入將相蔚為宗臣而豐功茂績無愧於伊周者歟某襄漢之鄙人自㓜讀書好考古昔之所以興衰成敗之迹常怪魏晉間賢人君子相望於朝而不免於滅亡及讀孟子見所謂天降大任必先勞苦之説然後知魏晉諸子之所以敗其後身更近世之事而目覩靖康之禍則益信孟子之知言而遐想伊周數公於數千百嵗之上恨不得執鞭其時也今者伏遇閣下暫解機務均逸祠宫實來是邦而某之賤事在焉欲掃舎人之門有日矣自惟踈賤屢進屢卻既而歎曰伊周數公冡中朽骨顧遐想於數千百嵗之上而近不一登相公之門是何異夫捨吾之炙而嗜秦人之炙者哉於是自忘其僭易之罪踽踽然而來庶㡬一造堦墀望折衝之姿聴綜練之語以激懦衷而快宿志焉若其見辭於閽人得拒於典謁則命也伏惟進退之幸甚上宰相書某聞唐虞之道孔孟之學臯䕫稷契之事業初非二物如冶金錫以為器用烹羊豕以為膳羞本末雖殊其實一也書稱堯舜禹皐陶之為人皆曰稽古伊尹樂道畎畆起而相湯格于皇天後世不知道為何物不知學為何事稽古之烈格天之勲判為二塗其間亦有豪傑之士因時乘變能成就其功名者然考之聖賢之事業終無黼黻宫商之序易曰一隂一陽之謂道推而至於富有之大業日新之盛徳又曰形而上者謂之道形而下者謂之器繼之以化而裁之之變推而行之之通舉而措之之事業陰陽者物所由生形器者事所從出道兼隂陽冒形器則凡天下之事物幽明巨細動静出入變化云為萬殊不齊孰有能外此者濬其源而流自清挈其本而末自舉矣故業大而富有徳盛而日新變通至於不窮而事業著乎天下此聖人經綸之極致非浮虛無用之空言也乾之九二以利見之資處人臣之至盛徳博而化天下文明孔子翼之曰學以聚之問以辯之聚者聚此者也辯者辯此者也傅説之誨髙宗亦曰王人求多聞時惟建事學于古訓乃有獲允懐于兹道積于厥躬由是言之經世者必以道致道者必由學所得有淺深則所發有大小顧其淵源為何如耳恭惟某官道為王佐學為帝師所以治其心養其性齊家正國者粹然一出於六經蓄而為徳則剛健篤實極乎輝光之盛發而為文則純正簡古合乎典謨之言曽參之忠恕孟軻之剛大子思之中庸貫為一條誠明而自得雖功蓋一世貴窮人爵於書無所不通於理無所不閱而機政之外猶皇皇焉如不及其終始典于學自周公而來未見其比也故能智先蓍龜節貫金石信行蠻貊勇過賁育赴危難而不懾歴困阨而不挫臨機㑹而不疑入紛糾而不亂享天下之富貴而不淫極天下之功名而不驕始焉以天下非之漠然如無聞於耳少焉以天下譽之泛然若無介於心此無他有道於此足以制事物於㝠㝠之中而不為事物之所制焉故也然則天下之事業有盡而相公之學術無窮其功徳之已陳於天下者特因事而應之者耳事之未來應之未出者天下惡足而知之譬之泰山出雲人見其氤氲變化合散無端不崇朝而徧雨天下以為至矣而不知精華亭毒之氣蓄於中而未出者多於見乎其外者也某襄漢之鄙人㓜志於學行年四十未聞大道何足以仰窺盛徳之萬一抑聞逹巷黨人以里巷之流一見仲尼喟然歎曰大哉孔子博學而無所成名著於論語天下至今誦之某雖不肖託於鈞播有年於此矣嵗在戊午初忝科第兩䝉呼召獲顧盼於稠人之中今兹改官又承借重諸公猥賜收錄比之孔門雖不足與髙弟齒至自附於逹巷之黨人則稱夫子之大不為過矣雖然董仲舒以逹巷黨人為不學而自知蓋資質之美有絶人者使留受業於門則其於髙弟亦庶㡬矣惜乎不知出此一言之外後世無傳焉若某者資質不及而好學之心自謂過之誠得朝夕門牆之下益聞見其所未嘗則他日所得於相公之道必又有深於此者不止於一言而已也不識相公果能收之否乎小子不敢自幸謹獻所為文一編辱賜覽觀或有可采冒瀆鈞嚴戰慄無地上宰相書某聞下之事上莫貴於用情情之所在求之而不為貪辭之而不為矯趣舍之際無適不宜昔孔門弟子或欲干禄或不願仕吾夫子因而遂之進退無譏焉誠知其心無所隠於我也後世之士忠信不足而誕有餘陽為名高隂趨勢利范汪志千時用託省兒墳杜淹欲得美官反效隠者心迹相反以偽釣奇真治世之罪人也獨唐韓愈以古道自信不卹時議上書宰相以布衣求官其言曰可舉而舉焉不必遜於自舉也可進而進焉不必亷於自進也既斥潮州作表哀謝稱已之長其自處於君相之間誠可謂較然不欺者然為國子博士三年不遷既不能恬於進取黙爾無言又不能吐露肺肝卓然自結其作進學解委曲以致其意雖當路憐之自此稍進亦不得謂之誠矣豈愈信道不篤為流俗之所移邪抑當時執政者不足以誠告之也某誦之久矣向自下士來不因紹介負其不腆之文仰干典謁相公收之於泥塗窮悴之中使教育天下之英材自惟疎賤無能濫被器使夙夜磨礪思有以自効當官行已如相公之身臨而目矙之立見於前乗見於衡蓋五年於此矣上自朝士下至諸生無一人親戚鄉閭之援惟恃恩紀以逭譴訶安全卵翼之恩一毫未報豈宜僥倖茍得更有所干請哉但以淵源之地風波易動指目為多不才之人久此叨據嘗恐不免於戾上玷陶鎔欲布腹心未敢率爾不謂相公特軫鈞念俾得自言尙可黙黙畏避懷不盡之意乎如某之寒相公知之舊矣居官得禄猶不能自給今終更在邇故鄉不可歸挾數百指之累將安之邪又一寡居表妹近攜孤女逺來任其嫁遣之責其勢尤迫若於此時不能一鳴其情是蹈韓愈之失而不以吾夫子待其門人者望吾相也而可乎伏惟察其區區之誠終始矜憐畀以一官免待逺次則啼饑號寒之屬庶不殞於溝壑其恩德之小大輕重某宜如何報也上宰相書某聞善論詩者不專取其文詞必觀其志而聽其音傳曰在心為志發言為詩又曰情發於聲聲成文謂之音若七子所賦韓起知其吉凶觀其志也列國之風季札察其治否聽其音也惟是二者有氣焉行乎其間氣之感志與音必應之是氣也非一人為實與天地萬物相為流通顧所感者如何耳治世所感其氣和亂世所感其氣厲是以善觀詩者於音志之外又觀其氣焉且詩本以厚人倫美教化而變風變雅往往因一已之不得其所而發為憤懣以譏刺其上孔子何取焉蓋世當亂亡人懷哀思怨怒之氣賢人君子特因已所遇聲之於詩觀其詩則當時之所感者可知夫聽倉庚者知春之和聞蟋蟀者知秋之肅此物理之公天道之自然也詩之美刺大率如此是故樂而不為淫哀而不為傷美而不為諛譏而不為誹喜怒通乎四時合乎一氣觀其所感而天地萬物之情可見矣若以一已之屈伸而反其所感則小丈夫之作也君子無取焉屈原放逐作為離騷幽憂感憤雖出於一已而楚之風氣著焉不然揚已露材上非其君下譏同列乃名教之罪人豈足以爭光日月哉賈誼當漢文治平之時以近臣出傅長沙年少名盛未為不遇而沈湘弔屈悽然有離騷之風吾固知誼之不長也孟浩然在開元中詩名亦高本無宦情語亦平淡及北闕南山之詩作意為憤躁語此不出乎情性而失其音氣之和果終棄於明主本朝石守道作聖德頌於慶厯間詞工意直真一代名筆但語激訐而氣不平無寛裕優游之風卒之身罹䜛毁而幾成朋黨之禍殆與吉甫穆如清風之作異矣當時梅聖俞以詩名家交游傾一時而仕宦不達其詩乃怡愉温厚不失治世之音故歐陽文忠王文康諸賢皆以三百篇擬之然則為詩者非通天下之志而協夫聲音之道未足與言詩也某晚學無師顧嘗知好義少年雖遊場屋亦時時為之而不得其門後蒙拔擢處淵源之地稍得以潛心詁訓已而出試小壘實古二千石之秩追思前此兵火逃生流離饑寒之苦乃得復見清時與萬物同游於和氣中欣欣然愉愉然進有尺寸之望退無溝壑之憂間為詞章以歌頌太平如蛙鳴蚓號不足聞於當世今老矣志猶在也抑不知擊壤而謡畎畝之樂乎將樂職而為宣布之詠乎其亦形容功德而鳴國家之盛乎大鈞所播其必有所發矣或曰游孔門者難為言子言得無易邪應之曰昔周道既衰王澤僅存而小夫賤𨽻之什猶有取於聖人今聖君哲相在上風化方隆某又嘗以文字見收玷師儒之選則感於治世而鳴其和蓋有不能自已者矣奮厲而言未足多過惟相公恕其狂幸甚上執政書某聞有生而知之者有學而知之者故自誠明謂之性自明誠謂之教聖賢之分正在於此然乾之九二聖人也而其爻曰學以聚之問以辯之坤之六二賢人也而其爻曰直方大不習无不利則與夫所謂生而知之學而知之者相反焉豈自誠而明者其業亦資學而後成自明而誠者其徳有非習之能致者歟且臯䕫稷契亞聖大賢而各守其一官不能相通易地處之未必盡善則臯陶之刑后䕫之樂稷之播種契之敷教皆其性所長得之於天非習而後能者不習而能則誠明自得弗勞而功何所往而不利恭惟某官以超衆之資聰明所照了無不逹一旦出遊場屋待問廣廷條其所對無非當世要務應敵尋常之語不挂一詞鑿乎綜練之文皆可舉而行也及歴要津掌絲綸典禮樂皆曲擅其美卓乎無前以至典章法令之微文錢榖甲兵之大計一歴於耳悉暢本原雖老於厥官能善其事者自以為莫及嗚呼此豈習而後能者哉公學根於天得於不習故嘗竊窺盛徳以為合於坤之六二順而正静而安名蓋四海而心不矜才髙一世而志不溢氣之所養浩無端倪確乎直方至大充塞為臣為子莫不各盡其道易所謂不習无不利者於公其見之夫六二之賢雖曰不習而能敬以直内義以方外蓋輔之學者如此我公之道雖曰天得又能粹之以六經之源滋之以百家之流深造孔顔孟軻淵奥不傳之宗則公道徳之所至勲業之所期其可量也哉某向者叨官於朝以時進見聞謦欬侍儀型退而潛心日有増月有得也一去門下五年於兹汩没簿書米鹽之間舊學荒蕪頑然為俗吏仰惟師範邈焉有霄漢之隔然立見於前乗見於衡無一日之忘鑚仰也今者解秩造朝澡身沐徳復擁篲先生之門不知與之進乎否也若得摳衣趨隅一瞻鈞座庻㡬攀鱗附驥不為小人之歸何其幸歟非所敢望也僭布腹心先生圖之論部民訴經界書某契勘四川經界惟潼川一路詞訟最多蓋緣所部一十五州有行者有不行者有既行而復罷者以此人無定志各懐僥倖一夫鼔扇十百附和每縣易一令郡易一守監司易一人則境内紛然牒訴叢委或訟初行之日保正耆長因界量而受贓或訟既行之後案吏鄉司以走弄而取賄牽連枝蔓必不可行所訴増重之數多至十餘倍少亦不下兩倍考其事實皆未必然若監司守令姑務持循則不過取㑹行移受其煩紊而已或者未詳情偽喜任更張則信其偏詞便有損益縣不禀州州不告監司監司不以聞於朝廷鄉異邑殊前行後止賄賂狼籍請託公行失陷賦租害及貧弱使經常之賦無復定制如是者八九年矣某前備員轉運判官奉詔㸔詳措置經界利害因上便民事内一項專論經界乞將本路不均甚處委監司一員與所屬守令委曲計議各以事宜從長措置仍選見任官五員農隙月分分詣諸縣逐鄉受接人户詞狀其所訴元初打量步畆定驗土色不當増減稅數至五七分以上者㑹集衆户如推排法互相指决以衆證為定不伏者再為界量若是未經界買賣田業不曽推收及隠寄詭名之家自當歸併而非經界不均以致輕重者更不受理逐縣經界所税有溢於舊額者以額外之數與増重人户通融均減既已奏聞又具狀劄繳申廟堂伏䝉僕射相公特賜主張取㫖依申如有人户論訴去處照應前後指揮施行某遵依前件聖㫖遂令逐縣勒鄉司先將未經界前一年并經界一年新舊稅簿逐一校對取見新稅比舊増減及五七分以上人户具帳供申不得追集人民有所騷擾其以前人户論訴多是虛詞濫説不可憑用遂修立狀式雕版印造分送諸縣曉示百姓如不願裁正更不須下狀若願裁正即請買狀式具實書填經所委官投押若有指决不得過三户再限一月出限更不受狀自紹興二十七年十月後選差清彊官分詣經界不均縣分裁正其詞訟不多去處只就本縣委官緣本司所立狀式闗防周宻杜絶弊幸無所容姦狀式已具册内其從來妄狀鼔扇煩紊官司之人皆不復欺誕濫有披陳以致詞訟不煩某又疑縣道及所委官憚於裁正抑遏百姓不令聲説累次嚴行約束及宻切詢訪委是少有請買狀式之人亦有書填不行既買復還者據所委官申皆只就縣受狀不曽下鄉不曽追集百姓多是以逐處溢額税數與偏重人户對減民間亦少相指决雖間有被决増税之家亦情願承受别無争執以此田畆並不曽復行界量吏民並無責罰公私無毫髪之擾未結絶間某䝉恩就除提㸃刑獄公事遂申尚書省乞就憲司結絶於今年三月以前並已了畢溢額税色紐計錢四千八百五十餘貫莊租麥四石有竒對減稅重人户五千六百八十五户用人户科决狀推排減偏重税八十九户増偏輕稅一百六十六户已出榜曉示百姓認定供輸自此永絶詞訟方推行之始人見其事體浩大皆謂争訴必多收之為難及狀式一出姦民往往引退訟諜甚少異論已息然猶疑有所騷動非一二年未易遽了已而略無一事數月而畢皆翕然帖伏自非僕射相公聰明逺燭洞見萬里之外兼收博采不以人廢其言則一方宿弊豈能盡去今已具錄奏聞及申尙書省又繕寫成册投納府第以便省覽某自入蜀以來日為經界詞訟所擾深疾姦弊求所以安人息訟可以經久之策甚詳每士大夫陳述百姓訴理人人與之論辯叅稽講究備見本末踰年始敢上聞既蒙朝廷聽委則説諭守令選擇官僚審謹而行若今後官吏士民尚敢扇揺欲復行舊稅以疑誤百姓者乞從所屬具事因申奏重寘於法庶㡬逺民得以安業一方幸甚其普州安岳一縣不均最甚措置裁正比它縣尤為詳悉已别具劄子申呈併乞鈞照與殿帥楊郡王論兩淮移屯利害書某比承鈞斾之來得以欵誨欣慰無量奉違信宿已深傾企遞中兩辱誨示益荷眷勤即日雪晴苦寒伏惟折衝有相鈞候萬福承諭張馬帥已離和州既不可回且令來長蘆又令員琦與宋受來𤓰步想此經畫非鈞意之得已然其利害前日商量甚詳宜更審處大敵在近而軍無定處旋營寨栅揚州所患兵少勢孤今復員琦宋受逺去和州見憂敵人窺伺今復移却張守忠郡王重臣宿將諳練兵機似此果無後慮否軍旅之亊某未之學也深以為疑大軍臨敵豈可數數輕動張守忠既來長蘆未應遽回且徐徐圖之員宋若尚未動令往揚州如何國事至重茍有所見不敢不以忠告尚幸裁處餘冀保重前膺册拜與李侍郎書論兩淮兵屯某前日嘗獲承教慰甚遽復暌異傾企如初即日雪後寒凛伏惟台候萬福𤓰步却依前議深以為憂想只為張馬帥既來長蘆不得已而為此然馬帥之動既已非策若更以員琦宋受來𤓰步恐又増一失勍敵廹近而大軍數移可為寒心員宋不屯真州上意也不令在真州則當往六合揚州今却令往𤓰步緩急之際聲勢不相接奈何某采訪於人皆以員宋往揚州為得策淮東兵合於揚州則軍威自震且六合有所資若令往𤓰步去揚州更逺雖與六合相近恐未必能相救援張守忠移屯之後和州一帶空虛亦甚可憂侍郎深宜婉畫今張帥業已到長蘆若宋員未動且令往揚州如何大抵規摹須要素定先自擾擾則為敵所窺非計之得也侍郎其審處之回潼川續漕書論西路漕司財計某辱教翰殊用感慰某到此忽將兩月公私衮衮加以衰病厭倦日甚西川弊蠧十倍東路州郡無科約者十年矣非法出入嵗嵗増多雖朝廷累行蠲減而實恵不及百姓民力日困一日可為太息州縣平時只稱闕乏近集官吏就司打算皆有餘而無不足大扺守令亦自不知其財賦之根源前後循習上下相䝉雷同一辭以為公私之耗今既為之均節彼方自省矣其間妄用無有紀極所謂江河不能給漏巵也若此何緣得足夫人不以為便謗讟必紛紛有聞幸以下諭吾輩既受一路之寄義當以身徇職豈復容心於毁譽之間也幸察再回續漕書某比馮運幹行欲附問自前月以來忽苦腹病憊甚坐是稽於修謝豈勝愧恧北事所傳或緩或急日日不同皆不可信姑務自治不必伺敵人之動静以為喜懼自治兩字誰不知之若問其所以自治固未必能言縱能言之或甚髙難行而不切事情或瑣碎而不逹大體求其真可用者㡬何人哉宜乎人以為書生之常談也要之臨事然後見人耳病倦不能多及與徐左司論軍須錢書某萬里相望稍疎具記可量瞻嚮某猥以不才謬當西蜀之劇任適丁兵興大軍十二三萬人與敵相持者半年孤立一司獨抗三邊費盡調䕶諸帥幸皆無事而湖廣總領所横相侵廹殊不曉所謂方此擾擾尤費應酬蜀中向發吳拱下三千二百餘人數百匹馬𨽻鄂州軍各借請三月去矣朝廷令吳璘限一季招填則已無此額而湖廣申請將元額衣糧草料從蜀中應付津般之費嵗計五百六十餘萬引此為可行乎自古未聞水陸三千里按月調運供軍也朝廷以給降湖廣米五萬石銅錢三萬餘貫銀五萬兩儘可應辦又有指揮如不足許於軍前應干樁管錢米及附近州軍不以有無拘礙錢物内移運支遣何苦力欲困厄於西蜀此其不可曉者一也朝廷許湖廣於二十九年四川發赴行在銀内截撥錢五十萬貫計銀一十五萬餘兩四川已發過銀二十八萬餘兩湖廣若行截發不患不足彼其不能違管押官之懇請容情放過却一向責辦本所催發其二十九年四川合發之物已皆盡絶復何催之有此其不可曉者二也又欲兊三十一年經總錢銀五六十萬兩二年共有鐵錢一百二十萬貫川價約買得銀十七萬兩而止夫何誤以彼中銅錢算計况百二十萬貫已發過一百四萬七千餘貫未發僅十五萬餘貫鐵錢而欲兊銀五六十萬兩此其不可曉者三也去年朝廷再令拘截四川經過錢銀五十萬貫此項亦合作銅錢算計為銀十五萬兩湖廣乃併應副江州戚方錢三十萬貫紐作八十萬貫欲銀二十四萬二千四百餘兩殊不討究戚方三十萬貫即係兩年經總錢一百二十四萬鐵錢之數差誤抑又甚焉矧此五十萬貫一項四川已發過銀二萬六千九百餘兩金二十餘兩絹三百餘疋焉得有銀二十四萬餘兩乎此其不可曉者四也今已通發過數言之所欠甚不多乃欲先兊那銀八十萬兩果何所謂朝廷元降指揮係每嵗應副江鄂州錢六十萬貫據未起錢數行下合起官司兊那所謂合起官司乃四路憲司耳本所初無與既無未起數目其將何自兊那凡所申請分毫無是處朝廷不曽勘當便為施行四方萬里何所赴愬軍期急速豈不誤事邪幸從都司詳酌呼上部吏當面詰問頃刻可了殊不難决也本所每有申明皆某手自為之字字有歸事事有理試一觀之自不逃乎聰明辱埀領略幸甚又與徐左司書某劄中所陳特道理云耳道理之外更有不可顯言者四川諸將應有須索本所必格之以法彼亦知本所用度多而儲積少故不敢以為怨今見以百數十萬應副他路則必忿恚解體何所不至昔魏博節度田布以魏兵討鎮軍于南宫度支饋運不繼布發魏博六州租賦以供軍將士不悦曰他日用兵粒米盡仰朝廷今六州刮肉與鎮冀角死生雖尚書瘠以肥國魏人何罪其牙將史憲誠隂蓄異志乗隙得間因以搖亂布軍怒不肯東衆遂潰今日之事得無近似之乎恐朝廷偶未慮及此耳某敢以死守之若得以此罪去誠所甘心也通何内翰書某去秋遣人具問正初人回復領教翰不勝感慰西鄙自去年九月敵近塞應副軍事曉夕不得休息者兩月向後稍定孤立一司獨抗三邊與敵對壘半年於此矣供須調䕶之難更不待言只以東南事勢視之此則可想也一事失當便觸禍機所幸區處素定應干合用軍須率皆前期辦具上自宣帥下至將士無不悦服諸軍有意外之求一切格之以法彼知一出於公不敢怨懟而四川之民常賦之外一毫不斂約束州縣不得假託軍興為名擅有科敷以此郡縣不知用兵百姓安於田畆如太平時熈熈然其如解嚴未有期不得不愛養民力以固根本庶可持久蜀人易動難安官吏並緣侵刻何事不有斡旋計慮倍費心神未知攸濟閣下其能興憐否某敢兾而不敢必也尚祈洞鑒回朱都幹書某辱示劄目見咎不科敷百姓異哉足下之言也本所以財賦為職事應副諸軍自當竭力若是軍須闕乏有功將士合賞但於王少卿取辦可也至於科敷不科敷他人何預哉僕中原人蜀中無一毫生業亦無親族寓居其不科敷何私於蜀蓋以大軍十餘萬衆仰給於此不得不愛養其力否則三軍坐困矣如足下輩月俸嵗廩不從空虛中來亦知其所自乎朝廷徳意深厚每務寛恤東南調度如此亦不聞斂取於民四川獨可以横賦乎國家養兵所以保民而足下乃謂軍民不兩立恐非安民和衆豐財之義又云用兵本約兩月今已四箇月然則解嚴未可期也若本所當時便徇諸處無藝之求只作兩月計則今日何以支吾事未可期則所費無限不且愛養民力以備方來之須將如異日何僕之不斂於民力所以為諸軍也用兵百三十日糗糧草料銀絹錢引所在委積未嘗乏與而足下乃爾云云不知軍行出入何處闕錢糧何處闕草料累次喝犒并朝廷支賜自是諸軍應報稽緩文字纔到本所立便給散略無留阻祇須俟有功諸軍既無功狀本所憑何支破散闗前攻不下聞自有説莫不為無銀絹錢引否不知散闗是險固不可取乎是有可取之理而無銀絹錢引之故士卒不用命乎若可取而士不用命豈計司之責必有任其咎者况聞攻闗之日死傷不少則非士卒之不用命矣自來兵家行動若逗撓無功多是以糧道不繼嫁禍於有司以自解亦未聞以無堆垜賞給為詞者也國家息兵二十年將士不戰竭四川之資以奉之一旦臨敵更須堆垜銀絹而後可用則軍政可知矣且如向來和尚原丁劉圏殺金平諸軍大㨗近日吳宣撫取方山原秦州等處王四廂取商虢等州吳四廂取唐鄧州亦不聞先垜銀絹始能破敵也朝廷賞格甚明本所初無慳吝如秦州始平之初得宣司闗狀即時行下魚闗支散何嘗稍令闕誤兼魚闗簽㕔所備金帛錢物充盈庫藏宣撫不住闗撥豈是有無椿辦耶顧生民膏血不容無功而得耳假令僕重行科敷積金至斗諸軍衣糧犒設支賜之外若無功效一錢豈容妄得哉若果有功亦豈容本所以不科敷而不賞乎諸軍但務立功無患賞給之不行也但管取足無問總所科敷與不科敷也劉晏斂不及民何害李郭之勲李晟屯東渭橋無積資輸糧以忠義感人卒滅大盗足下以書生為人幕府不能以此等亊規贊主帥而反咎王人以不斂於民豈不異哉九月以後興元一軍已支撥過錢引二十八萬道銀絹二千匹兩而糗糧草料與犒設支賞不與焉亦不為不應副矣若皆及將士豈不可以立功有功當賞而未得者何人也朝廷分司庀職各有所主而於財賄出納為尤嚴經由檢察互相闗防所有屢降指揮凡有支費宣司審實總所量度此古今通義而聖朝之明制也足下獨不便何哉來書謂攻散闗時若得銀絹一二萬疋兩錢引一二十萬道樁在鳯州有此重賞而敵不破滅無有也樁在鳯州與在魚闗何異方宣撫以攻守之策㑹問節使時亦不聞以此為言今散闗鳯翔未破足下可與軍中議取散闗要銀絹錢引若干取鳯翔要若干可以必克本所當一切辦集足下可結罪保明具申當以聞於朝廷如克敵而賞不行僕之責也若本所抱認而不能克足下當何如僕前後見將帥多是忠義赴功捐軀報國之人只緣幕中導之或非其道以至害事如姚帥之賢固不肯妄聽然足下自不應為此異論也萬一朝廷聞之得無不可某嘗備員剡薦預有懼焉且宜勉思婉畫審重語言勿恤小利以敗大事但得主帥成功足下復何求哉信筆不覺喋喋幸照與吳宣撫論出征將士書某二十日具手劄上賀必已呈逹自後腹疾再作中脘疼痛妨於語言今日只差減殊羸劣也少意拜禀大散僧原已得陜西無不下之理傳敵人遁去若非設計必有内變也今則惟在慰安闗中以收人心切望戒戢將士毋殺戮毋剽掠廣宣朝廷徳澤以救遺民於死亡之中前所遣紅巾本欲令擾刼敵寨小人無知聞間有作過者宜多出牓文禁止令其速歸不歸者聴百姓勦殺諸將立功之人若能不犯吾令常賞之外更特與優加犒勞費三二十萬引不妨本所雖用度至廣亦當那融應副若敢違約束雖有功者亦深治之如此則威徳盛行人誰敢犯此皆鈞慮所及或已施行何待他人之言某所以僣易者蓋同舟而濟休戚實均深欲門下成此一段功名耳力疾作字不謹併乞照察幸甚
