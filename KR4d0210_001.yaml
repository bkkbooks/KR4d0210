body:
  text: 漢濱集卷一宋王之望撰賦三王之道若循環賦以道若循環代為終始為韻百代稱治三王最隆各埀統以相繼若循環而罔終所尚不同要舉偏而補弊其周必復斯迭用以無窮稽古史之遺言見先王之政理雖革而信之者事有新故然因而循之者道無彼此列三正而異物關彼盛衰旋一化而無端代為終始夏繼虞軌商因夏基或以忠而為治或變質而制宜暨彼周家之盛粲然文教之埀用有還復弊斯改為異世殊時雖靡聞于沿襲同條共貫曽不泥于操持上下千載之間周流六虛之內乘五德以迭王類四時而更代樞始得兮弛張無執柱不膠兮變通斯在本人情而立政時有汚隆法天運以求端迹無留礙前之二帝兮其道淳而未備後之五霸兮其風駁而不純備乃盡變純斯可遵惟三代之甚善宜百王而是因所遇殊塗琴更張而或解其歸一揆規宏逺以相循觀其先聖埀休後王繼作有可因而可革故或稽而或若用能歷萬世以無弊關百聖而不怍知其或繼宣尼推損益之原舍則無由揚子述太平之略逮乎桓文以後秦項而還霸道既雜王功孰攀喜利名者操賞罰而為柄善攻戰者生竒正以如環絶紐莫續異端曷刪所以宣帝勵精自用漢家之制封倫飾辨力言唐治之難異哉史遷明僿之宜董子陳用忠之道約當世而不悖載前書而可考方今欲一變周家之文弊則宜稍復于夏商回狂瀾于既倒以德為車賦運啓元后天臨廣居握至權而負扆恢盛德以為車位正當陽式誕敷於利器術周御俗協順動於皇輿王者受命應時繼天立極以何道而諸侯順軌以何階而百官承式遵適治所由之路必有其資為積中不敗之車莫如以德粵若子育兆姓君臨九埏篤實輝光之有照剛柔正直之無偏蹈中庸而美俗思簡易以承天動靜有節周旋罔愆敷自清躬爰顯懋昭之化行乎正道初無詭遇之權彼其合乎天地者是惟蓋軫之儀中乎規矩者厥有輪輿之㫖文章藹旗常之制聲教協鸞和之美惟積誠以能然故安行而得以無反無側獨由仁義之塗不處不留逺襲帝王之軌豈不以據崇髙之勢享盈成之基惟為之而行者我無失道則動罔不吉者物皆得宜凡此敦臨之術必資厚載之為虞舜升聞實由行於本性唐堯光被示廣運於當時若乃當軸於上者皆咸有之臣鄰得輿於下者有遍為之衆庶我乃肅禮貌以中立攬威權而外附由亨衢而出入動靡顛危總柔轡以馳驅行無遑遽其或外靡允修之實內乖攸好之心致逺兮才非所及載重兮力非所任曳輪弗濟亂轍相尋所以揚子著書智匪壘奔之用夏王有訓欽惟朽馭之臨異哉上奉皇天下臨赤子克謹日休之念斯盡時乘之理當今規模宏逺欲方駕於唐虞肯半途而遂止季秋大饗帝賦以時當季秋天子饗帝為韻君欲毖祀禮宜順時惟是季秋之月允為大饗之期嵗事告成爰届備收之候天神可格式陳遍祭之儀稽記月之遺文見事神之至意既祭于郊兮著貴誠尚質之禮又為之饗兮申報本反始之義惟三代祀天之舉悉用夏正而比年旅帝之常屬當秋季斗既建戌辰俱集房寒初至而入室嵗已登而築場舉帝籍之收斂入神倉而蓋藏欲享于上斯時則當三務成功方授時於昧谷五精降德遂宗祀於明堂時厥明王類于上帝略問卜之末節舉用辛之定制席三重而縟禮具陳樂六變而髙靈下濟候無射之良月肆蕆多儀合太微之貴神爰稱盛祭蓋以嵗遍者祀物成在秋百穀之要既舉五天之報宜修考以漢儀當後時於廟酎求諸唐典每寓禮於郊丘且夫御世而王事天猶子重其祀所以致欽崇之道謹其時所以明奉若之㫖授衣既畢成民之義斯存侑座俱尊嚴父之誠在此及乎簡編殘缺䜟緯流傳論不根於據古說多失於誣天時既弗正名因靡專感迎長啓蟄之文禘郊亂矣立耀魄感生之目稱號紛然嗚呼降衷者其道至尊臨下而厥靈不爽有明德則可薦非克誠而莫饗上方儲精埀思以交神於布政之宫故曰惟聖人而能饗古體詩七夕西風吹繁暑夜氣初宜秋所居稍虛豁得以消我憂獨眠堂中央一榻無衾裯開軒敞南北涼飇入翛翛是日七月七三星已西流殘雲不成雨縹眇當空浮雲行忽中斷月彩爛不收影落庭樹間枝葉如雕鎪草根有小蟲微吟作啾啾豈復厭喧聒更覺窗户幽我欲終今夕飛蚊不相謀喧我復齧我驅去嗟無由但當我自屛豈與汝輩仇閉門歸下帷蝶夢尋莊周雜詩四首有憂烏啼門有喜鵲噪廬主人聞啼噪喜鵲唾老烏吉凶實由人烏鵲何與乎但知預相報其智各有餘人智不如鳥貪喜忌憂虞遂于烏鵲間憎愛乃爾殊福至自福至禍來貴先圖二鳥孰有益嗟哉主人愚春蠶口吐絲生人皆仰供蜘蛛絲滿腹祇能打飛蟲衣服與網羅利害豈可同蠶生旬月老蜘蛛無春冬蠶食惟草木蜘蛛肉食豐蠶以繭自縛蜘蛛掛青空蜘蛛有餘毒春蠶有餘功受報乃如此天理不可窮龜肉不可食蟹螯不中卜龜以殼自戕蟹以味見戮所養殊毅豹所亡等臧穀一足致患害內外皆鴆毒嵇康坐才死霍禹以勢族樂哉蟹螯中貯此老龜肉江發岷山陽河出崑崙趾淵源既洪深浩浩并衆水東流至渤澥曲折萬餘里經山無重數過郡不知幾海邉有小溪近出海山裏未能數里間已接潮波起到海雖則同難與江河比書懷羣山岸東海兹地真斗絶洪濤渺翻天朝夕吐日月雖同一宇宙逈與朝市别三山在咫尺芝草吾欲擷未能仙骨輕稍浣衷腸熱從我其誰歟乘桴曉當發百年胡為哉萬事聊復爾功名早有意貧賤昔所恥嵗月忽蹉跎少壯何足恃身外非我有毫髮不可致惟有一寸心俯仰要無愧歸去來山中髙人未吾鄙村居何所樂春至木欣欣夜睇海上月晝瞻嶺頭雲東家有勝士杖屨日相親山行共采蕨野步仍班荆初見氣已合久游意彌真劇談復痛飲相對有餘情海邉寂寞村春半芳菲月東風所至處陋境亦佳絶壠麥已翻芒山花自成列愁腸不堪斷預畏栁飛雪更憂鶗鴂鳴坐使衆芳歇白日不可留請試餐玉訣山居山居入長夏草樹繞我屋微風披拂之有聲來肅肅葳㽔搖散影掩冉飄暗馥百合開數花孤芳更清淑我卧北窗下午枕睡方足挹此一襟涼泠然若堪掬坐使萬慮空樂哉謝羈束有同顔氏子坐忘遺耳目又如慧可師安心得歸宿落日行庭前披衣自捫腹閒扶舊僵石細數新上竹小禽時下來相鳴入叢蔟見我不驚飛人禽兩幽獨登第後投魏侍郎空山學仙子舊識安期生青霄許相接凡骨難為輕一朝行業滿九轉丹砂成安期忽東來從帝遊玉京下視一笑莞依然有餘情借我白雲車導以虹霓旌攝身出塵土隨君凌紫清機㑹倘一失千載何由丁漢南晤魏侯彥誠魏侯贈詩期依韻和已而荆門受代歸鄉襄務冗甚未果答既離襄陽舟中追和白頭有如新傾蓋或如故乃知意氣間投分自有處魏公使漢南風采聳一路凋殘濡膏澤寃訟廓氛霧游刃若發硎調琴不膠柱平生不相識見我國士遇杯盤倒箱篋笑語雜巵寓豈惟傾肺腑便可託嬰孺慰我疇昔心何啻封萬户離觴峴山曲握手惜歡聚江風吹行色短棹不得住臨岐亦何言加餐納多祜道中寄丹丘親舊别處日已逺别情轉綢繆行行千里餘脈脈無時休夜與夢相隨晝與淚俱流山髙恨不斷水濶遮無由欲吞不下咽欲吐不出喉㦸我胸肺間有如魚掛鈎尋端無從來了知在心頭翻疑一寸心能容如許愁平生丈夫氣愧此鬚髯虬朝來看蓬鬢滿鑑雪霜浮上李丈尚書天孫司經緯專巧上帝旁星縷日月釙幾經補蒼蒼弭節逰人間帝服無文章寒女一機素未知作衣裳再拜願祈巧精神通渺茫但恐雲車回虛無往路長亭亭澗阿松氷雪何青青千嵗已枯死流膏生茯苓雖無嵗寒姿氣味猶典刑塵土久埋沒誰能驗仙經置君藥籠中儻可延年齡蓬室有姝女顔色耀朝暉幽獨人未識嬋娟心自知髙堂懸寶鑑美醜良不欺借君一寸光為妾照蛾眉念當有所適辭親結羅衣常恐妾命薄失身輕薄兒安得嬿婉人白頭同所歸魏彥誠見示出守廣德朝士送行詩用韻追賦肅肅松柏姿春月慚蒲栁但看霜雪後何者能不朽君昔辭鴛鸞出為小邦守治行達明聽眷知從此厚至今兩郡碑德政刋瓊玖九醖熟雖遲要成宗廟酒食橄欖有感余初食橄欖眉蹙口欲吐稍稍滋味之久乃見媚嫵曲終喜奏雅先病得後愈功成老大時亦足酬嘬咀余生足憂患備已嘗險阻猶如蓼中蟲自習蓼中苦不知苦盡處回味有幾許古人倒啖蔗佳境貴漸取但問有與無遲暮不猶愈君看道傍李棄置終泥土書白氏長慶集我愛樂天文平易更精切筆端應有口心事無不說遊戲供日用工巧疑天設述情悉毫釐辨理窮曲折如我本欲言挽我開齒頰如人病瘖啞代我傳喉舌駑駘擬舉步駿足過如瞥弱弧未及彎彊弩已穿札撫才初自愧適意還深愜讀盡一編詩胸懷消百結移竹借宅開小軒自移一叢竹悠然北窗下意色都不俗晴影終日幽風聲杪秋肅最憐疏雨過㑹有白雲宿深培畏不夀靜對殊未足主人已虛心坐客亦青目四村多修篁玉立森如束不為人所愛况復困斤斸天姿奚優劣地逺懸榮辱物情豈固然世事同一躅何當尋怪石小壘傍寒緑要收山林趣密置軒檻曲西峰謾多竒吾方倦遐矚吳傳朋逰絲書鳥迹既茫昧文字幾變更達者擅所長各就一世名衆體森大備造化無留情獨此遊絲法千古祕未呈右軍露消息筆墨無成形偉哉延陵老三紀常研精絶藝本天得非假學力成應手快揮灑援毫謝經營奮迅風雨疾飄浮鬼神驚風狂蛛網轉春老蠶咽明直如朱弦急曲若卷髮縈飛梭遞往復折藕分縱橫獨繭繅不斷風鳶騰更輕希微破餘地妙絶無容聲飛白笑冗長堆墨慚彭亨可憐太纎瘦不受鐫瑤瓊咨爾百代後若為求典刑病後戲贈同官蔣子權吾衰謬養生任運常坦坦每嬰相如病漸作叔夜懶昨因觸大暑留熱在鬲脘醫師戒飲酒所嗜不可斷寒熱一朝作水火互濯熯地偏無藥餌伏枕但憂悺同僚有蔣子爽俊流輩罕作詩宗徐庾巧語如繡纂間有少陵風醇音調玉琯豈惟詩家秀從政今可算牢盆有出納曉夕親授管琴瑟費更張君能時急緩公餘治方書今昔多所纘有來謁蒺病手自施湯散買藥輟俸錢為民已痌痯我昨病在床君來問尤欵教我煮橘皮湯熱過氷碗繼送桔梗湯一杯去煩悶柴胡作引子汗出如被䟎所投立有效病去若水浣乃知才藝多所蓄非窽窽又聞善騎射長箭必引滿設侯六十步所發無虛簳觀君精悍姿此語不其亶獨於圍棊低尺固有所短向來屢小勝喜氣輒衎衎我欲張以羸不令見矛􅗋侈心益驕汰出語頗夸誕不知小敵堅一敗石破卵大戰决雌雄遲君落新館贈范覺民范子廊廟器至寶非凡璞胸懷吞雲夢豪氣低華嶽昔在童稚時樹立已卓卓曳裾橋門內嶄然見頭角嵗行在辛丑帝䇿詢民瘼造庭百千人衣帶矜褒博平居議執政至此舌為括獨餘子范子雅志不可奪吐辭如湧泉一發孰能遏揮毫不停綴盈卷無㸃抹漢廷執㦸郎環顧皆錯莫縱橫五千字字字醫國藥期於必伐病非徒事迂濶怪言一驚衆士論歎且愕皆云布衣流志在縻好爵乃爾張危言身謀胡太錯當時羣宗匠其間多齷齪指言為沽直欲使趨鼎鑊堂堂春官臣主張獨何確讜議既氷釋衆口不能鑠乙科忽大闡秋天一鵰鶚傳誦爭取先紙價為翔躍聲華頓輝赫藹然暨南朔憶昔客東都猥厠英逰數每於談笑間論議聞謇諤誦語非沽名生平真所樂乖離三四載遣我情懷惡間者見眉宇颯然意氣豁亟使羅酒漿沈沈動清酌秉燭夜相對談詞恣嘲謔公卿頗歷詆治亂亦商略間出新詩篇清製皆灑落祇懷蒼生憂肯為窮愁作少陵不忘主氣味若相若倘使任言責必有禆帷幄奈何諌諍姿久矣滯丘壑似聞廟堂上知已被新渥一公丞烏臺一公相黃閣吾君皆太平二公繄深託薦賢乃報國看子翔寥廓送黃叔愚赴平江教授人生水中萍泛泛隨波瀾偶然成聚散誰使為悲歡伊余從君遊兩見嵗履端相得恨不早相見常若難今又舍我去覺我肝腸酸君誠湖海士豪氣老不刓劇談憤世俗怒髮時衝冠向來對宣室見晚帝興歎落落不苟合棲遲猶冷官髙才徒白首未許陪鴛鸞蘇臺今輔郡舉頭見長安㑹看有追詔祝君且加餐吾衰釣滄溟羊裘侣魚黿逍遙各有適快覩扶搖摶尺書倘見存慰此離憂寬初至鴻祐成二百字我生何悠悠飄搖若懸旌已破龍華夢復成鴻祐行鴻祐在何許海濶山峥嶸地侵魚龍窟路與猿猱爭曉日見初出潮波無時平我來秋薄暮寒雨紛縱橫狂飇振林麓忩户皆有聲山鬼夜中號怪禽籬外鳴我衰不能寐起行遲天明歘然念身世百感襟抱盈仲宣昔遭亂避地之蠻荆登樓賦懷土悽傷欲無生况我滯甌越八見秋風驚憧憧一州間蕭寺六易名余至丹丘常寓僧舍今六徙矣已去還復來如魚被鈎嬰去既無所之來亦何所營藜藿誠不充萍蓬甘所丁兹地實樂土浮生聊耦耕鴒原喜在眼蠧簡能娛情九夷亦何陋四海皆弟兄舟至都昌初見廬阜連日陰雨忽爾晚晴雲氣頓收巖巒盡出截然蒼翠立乎巨浸之中真天下之竒觀也遙望欣然酌酒賦詩久思廬山逰忽至左蠡曲倚船初一望秀色溢我目百里堆翠黛千峰矗寒玉陰雲知我來收斂入山腹須臾變光景盡出一山緑宛如几案間青銅鑄巖谷又如牆壁上古畫挂圖軸水光晚蒼茫風氣秋肅穆明朝南康岸艤棹陟山麓歡喜不自持一杯醉醽醁和許總卿孔明屢出師常苦糧食少公今主邉計積粟丘阜小卧龍志空大流馬功竟杳當時若得公大事指顧了從來方面貴體尊吟詠少君侯七尺軀詩膽看更小句如星斗爛氣與雲天杳詞源倒三江傾瀉何時了我登峨嵋山偉觀天下少觀公驚俗句更覺眉山小短章鋒斬絶大篇氣深杳紙敝墨色渝讀誦不能了贈襄陽帥吳彥猷令威千嵗歸城郭尚如故我今還故鄉陵谷亦易處荆榛荒舊蹊溪壑改新路城中十萬家碧瓦生煙霧茅茨變閭閻舊屋無一柱相逢訪親舊十百不一遇豈無新人民往往皆旅寓元帥念疲瘵撫養若稚孺近聞田里間稍稍復逃户㑹當一二年功效見生聚但恐鋒車來追詔不容住努力慰斯民望公若羊祜出疆次副使淮陰舟行丁年慕請纓白首翻攘袂輶軒遽憑軾魏闕頻回睇兩淮輕戰爭萬物皆憔悴雲繁雪霰舞風猛波濤沸椎凌僅通航鼓夜無停枻依檣聞喜鵲酌斚烹鮮鱖出塞那復古涉川今已利一節誰與持同舟心靡異奮身徇主憂圖國忘私計昌黎去懷妾定逺老思妹髙情獨無戚慧眼不留翳豈惟詩酒豪抑亦文武備開館昔登瀛奉車元起沛君遭功名迫我堪閒散置他年洛下吟憶君徒擁鼻投座主張子猷給事東風入雕檻百卉無不花一經造化手各若矜春華主人最好事護養從萌芽澆灌與封植恩光無等差其間一本尤所喜欲售千金貴無比君不見洛陽好事丞相家曽剪姚黃貢天子送賈可封隨郭帥還西城三十韻峴山之陽漢江浦黃花九月迷村塢故人船上初識君白酒黃雞對樽俎坐中意氣最相親便許論交輸肺腑君時方壯我尚少杯酒相逢各豪舉欲傾滄海入壺觴不覺風雲先笑語煙塵回首暗鄉縣避地偷生兩羇旅西城邂逅正春風南鄭流離共秋暑扁舟東下一沾巾漢陰渡頭天欲雨君留蜀漢我甌越關塞悠悠路修阻每悔昔日但酸辛欲寄好音誰付與日邉失喜雙眼明一笑恍然相勞苦久經喪亂喜彊健語及艱難更悽楚離合悲歡二十載往事傷心那可數酒後清狂不復能鬢邉白髮今如許向來驥子未總角今與爺長秀而膴文學嶄然已老成吾徒之衰固其所君材磊磊多大略胸次縱橫雜文武當年上疏請長纓欲以忠信為干櫓馳驅慷慨感知已十年上佐留邉圉一從捧檄傍紅蓮幾為臨戎揮白羽元戎入覲載輜車䇿勳進秩光賓主王卿合作水衡丞庾杲復入將軍府胡為側翅尚隨人千里長城賴禆補汾陽僚吏多將相家聲盛事今猶古致身富貴真未晚唾手功名不難取豈惟出幕看旌麾㑹是封侯裂茅土炎歊六月三吳路海氣昏昏暗天宇驪駒已駕不可留憂緒中來密如組亦如逺送終别離只有加餐相贈處雙魚莫厭逺書頻從此西風日傾佇次韻陳庭藻赴天申燕詩二首紹興聖主埀衣裳倬然文治昭天章已聞華封祝堯帝豈但畏壘歌庚桑千秋此日紀佳節萬嵗羣臣稱夀觴簾前宫扇交翡翠仗下寶馬屯飛黃昭容引儀近日月御史執法嚴風霜九賓無譁臚句肅劒佩儼雅趨侯王一聲鳴蹕傳朱輦千官賜宴趨文昌湛露尊罍均渥澤薰風絃管迓休祥浩唱充庭雲不動繁花壓帽春風光可憐歡聲正四合不覺暮色來蒼蒼軒騶散去九衢閩朝衣醉瀝餘淋浪小臣病著不能起但聽廣樂風聲長天申上夀開明堂羣公祝聖多新章不論南山成帶礪要看東海生禾桑君恩中臺燕百辟金罍兕觥雕玉觴飯抄香粳雲子白酒瀉法釀鵝兒黃宫衣拜賜近端午輕疊香羅如雪霜功臣彯甲奉朝請貂冠峩峩來異王中興盛事須記述樂府宜得張文昌感寓諸孫今列宿詩鳴省户為時祥每逢朝家有慶瑞輒以篇詠賡休光腐儒白首謬通籍博士一經慚后蒼敢陪詩人論風雅祇與漁父歌滄浪升平頌聲還大手白傅才力兼諸長詞源圖著作之㕔屛十幅怪石滄江莽相束恍然坐我三峽旁洶洶奔流欲頽屋不知狂瀾何處回壯哉萬頃納一杯自從此畫出名手海潮不復聲如雷一時文士羅東觀波濤入筆驅河漢逍遙捫腹日來看更得丹青助揮翰我本儒中山澤癯烟蓑祇合老江湖煩將一段好東絹畫箇漁舟釣雪圖王鈐轄出示乃祖兩令公畫像求詩為賦長句藝祖開基登九五駕馭羣雄走龍虎五十餘年到章聖將帥名臣猶接武王家再世䝉休光父子繼踵仍騰驤我從諸孫見畫像絶世風骨何堂堂隋國令公溫如玉方口豐頤秀眉目典刑猶在想可知骨肉都勻肥不俗小令公為隋國兒比之乃父加瓌竒凜然滿面英豪氣猶有酣戰驍雄姿百年神雋今已矣貌向丹青尚如此虎頭不用著三毫燕頷須教飛萬里屹然立向廟堂間可使邉人毛骨寒千載長存麒麟閣當年肯著鵔鸃冠人物于今寧復有竒龎誰是功名手麞頭鼠目休求官歸作山中耦耕叟登大峩絶頂覩圓相佛光成長句二十韻峨眉峻極西南著萬景莊嚴諸佛具髙標天柱八紘張雄鎮坤維百靈赴我來雨霽羣峯出正值春暄三月暮上方解凍僧入巖逺俗來遊客填路籃輿牽挽六十里梯棧髙低三萬步魚貫攀緣筋力疲鳥騰陡絶神魂懼行經崖坂幾縈曲望極堪輿莽回互錦里遙看井底迷雪山忽認屛間誤幽巖得照石發彩陰洞有聲雷蓄怒楞伽仙音好鳥語兜羅綿界神龍護滄海潮回波浪平藍田日暖煙霏布長虹歘放白毫光淡墨俄瞻紫金聚應真飛錫衆共覩圓相攝身人自顧六牙白象恍當空三足赤烏潛隱霧琉璃瓶瑩秋月白優曇花淨含曉露瑞境旁連瓦屋起合成一界如相附神燈夜從九頂朝散作千山無盡炷肉眼親觀佛㑹開凡軀恐逐仙風騖欲尋傅說箕尾間休訪君平斗牛度便排閶闔陟髙圓擾擾人寰何足寓次制帥所和前韻聖主憂勤躬萬務英豪寧許山林住弓旌號召士無留竹帛功名公所赴天表對揚咨見晚坤維鎮撫歌來暮雪山增重絶氛埃蜀道非難履平路分陕聊煩攄妙略秉鈞已歎迂髙步朱轓撫俗逺民懷玉帳折衝荒服懼羽檄不飛烽堠滅駿骨多收邉市互孔明七縱詎非長户牖六竒真不誤農狎其野無外憂馬騰于槽有餘怒三陲絶徼皆妥安諸將雄師今盡護九重益友思直諒四蜀新聲詠宣布帥閫方觀勳業成廟堂行看精神聚嗟我衰遲託末契辱公敦篤傾殊顧當年獻賦誦凌雲上國承顔悅披霧禹門親覩躍風雷堯陛初驚承雨露龍顔下矚頓生光鳯翼髙翔從此附稱身朝服曳青雲滿袖天香攜寶炷九霄變化冥鵬升一紀光陰隙駒騖綈袍雅意念張祿襦袴餘波依叔度他時入覲對金蓮伴直應隨玉堂寓再和年將六帙諸衰具漏盡鐘鳴行不住一身許國銖兩輕萬里攜家斗升赴五羊大夫習勞苦三鱣先生嗟晚暮分為一世數竒人踏遍九州多半路早嵗嘗為梁甫吟中途已失邯鄲步窮通有命常自樂莊子窮亦樂通亦樂所樂非窮通幽顯無慚方不懼郭象注莊子云幽顯無愧於心然後能獨行而不懼每讀商書戒十愆不憂漢法干三互奔走頻驚使節光叨逾敢歎儒冠誤車下奪牛任客疑水中見蟹從人怒怨恩肯效兒女語正直猶希鬼神護平生事業在方策將老精神敝泉布九重德意日邉逺十萬師徒關外聚不令聖澤皆下霑寧免吾皇尚西顧上為朝廷廣霖雨下令郡邑清䝉霧乘軺無術漫觀風分陜維賢倚行露青天雲霧昔曽披緑水芙蓉今密附郊坰小隊連後乘燕寢清香同妙炷鳥雀難偕鴻鵠飛駑駘暫逐驊騮騖自憐落落王平子遇此汪汪黃叔度但憂溫詔趣公歸蔭宇不容孤迹寓再和珠璣百斛何人付公有詩筒來不住出塵秀句若霞摛走筆豪篇逾響赴吟安一字不知老朝作千篇猶未暮秋天鴻鵠翥浮雲平地驊騮驅熟路分憂制節綿萬里餘事文章兼七步千軍獨掃人共驚八面俱來我何懼力扛九鼎更妥帖胸蟠萬卷森差互千言未困見縱橫一㸃不加無謬誤音諧律吕鳯凰鳴勢薄雲天鵬鳥怒流傳應有賈客售在處豈無神物護公詩光焰千丈錦我詩粗窘一尺布公詩雄冨百雉都我詩窮陋三家聚行經北海恍自失出見西施羞反顧殘膏祇欲借鄰光餘潤有如䝉曉霧君侯雅志和薰風聖主恩光深湛露事業終期白日懸功名已見青雲附願公歸侍玉皇案天香復與金童炷願公西取王母環雲車直指瑤池騖要當都俞廟堂上豈久淹留井參度顧我塵埃不足論屈曲世間隨所寓許總卿見和再用韻四紀才名淹世務七年符節坤維住褒功屢有璽書來趨詔尚遲軺傳赴男兒功多投老遂烈士心豈隨年暮松杉頂秃始干雲駿駔齒長方識路所臨遺迹紀蕭規相繼小巫窺禹步補公舊處信有幸顧我非才深自懼轉粟飛芻驅蜀阪摘山市馬司邉互伐柯執斧固非難依樣畫葫終少誤解牛毋歎妙肯綮養虎尤工時喜怒騋牝三千歸圉師貔貅十萬安都護公家遺利悉桑孔閫將歡心收戍布關信增屯烽燧逺邉儲入粟舟車聚未歸左右展論思端為西南重憂顧漠北齊盟尋皎日斗間王氣纒非霧坐鎮全消玉塞塵召還應及金莖露佳句忽貽韶濩作正音乃許巴渝附晝哦蔬飯費三吐夜誦葦燈殘一炷欲隨驥尾彊爭馳暨到蟻封難並騖囊收甚謹加十襲筆舉復停知幾度試將風格比唐人堪與拾遺參感寓劉侍郎見和再用韻大方廣佛三身具境號華嚴普賢住三千淨土毛孔吞百億化身塵剎赴底事眉山迹偏顯端由象法時將暮三乘不起正信心一線頓開方便路將欲神變驚凡目故斂光芒歸窘步示現雖同人異見開遮未判誰無懼臂力遙擎妙喜來頂光近攝清涼互我來親睹未曽有方審傳聞元不誤陽春正值風日好陰雨不逢雷雹怒入夢惟憂神鬼知乘危暗有龍天護招提問路方上征世界當空已先布千林寂歷鳥聲少萬嶺奔騰雲氣聚髙峰初到甫休歇圓相俄驚成指顧一壺恍入物外天五里知非世間霧感通咫尺捷影響變滅須臾嗟電露公居福地寶巖對身享耆年仙籍附兩禁髙辭法從班一燈久續禪宗炷正始餘風獨後凋建安逸駕爭先騖忽聆酬唱便隨喜要與見聞俱得度願公且見宰官身一宅常與軒冕寓和人元夕長安百尺朱樓髙傳籌夜醉聞雞號金吾弛禁玉漏永九衢遍走狂歡遨訪尋三曲選清唱交結五陵皆大豪笑將千金買斗酒輕若九牛亡一毛賦詩更作文字飲止酒一篇羞和陶筆端百韻鬬竒險坐上幾人推俊髦萬事轉頭成短夢十年屈指如奔濤祇今衰老但悲感長歌終日彈豪曹和關子東鐵尺歌先生平生無俗嗜博取珍竒自娛戲案間雙尺本蛟龍怪底雄雌俱出地含精古鐵色沈沈質白玉兮價黃金有時風雨暗堂室直恐雷電相搜尋淨業知君專筆硯白首殘編天眼見一朝出此瑞文房神物化成非鍛鍊閲遍千人誰得將主人比德端且方永供黃卷鎮邉幅明窗净几生輝光先生歌成驚傑句助發鏗鏘得君故何人似與郭代公寶劒豪篇不須賦
