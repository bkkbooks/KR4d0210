body:
  text: 漢濱集卷十宋王之望撰書回吳宣撫論退師書某二十四日在金牛辱二十三日所賜手帖知鈞斾已還河池不勝感慰敵才聞和議不審虛實即日引遁其畏憚可知但我收復環原會州却在退師之後敵懲前敗能復與我爭否今大軍且在河池相近屯泊其各分番歸元來營寨休養戰士度何時可以復出敵知吾回軍敢與不敢却來侵犯新復州軍使司必有文字聞於朝廷略願知其梗槩庶幾不至抵牾與馮編修書某頓首比承選參樞幕結課歸班想遂有峻除便登要近也瓜洲之變天下大慶狂暴之極勢必至此前年元樞書固嘗言之果如所料爾後纍月亦不聞諸軍乘勢深入投機之會似稍失時或戰或和進退未決師老財費定當如何取地甚易保之實難要之不大殱其衆未可議恢復也大駕至建康士氣必振將帥有能榷鋒而前者否回鑾在何時蜀中事言之不能盡敵尚扼散關守備甚固嵗前吳宣撫使姚仲攻不克遂令將三萬餘人出秦亭以攻鞏州又不能下此月初退保甘谷城遣偏將戍秦亭應接洮蘭又取河州見圖熙州與德順軍王顔之衆分屯商虢陜華四州間虢華為敵取敵去復得之陜州亦被攻犯事未可保我師十餘萬衆與敵相持半年於此矣供輸調護之難不言可知事變之來千端萬緒一或失當便觸禍機處勢艱危無甚於此蓋蜀中向來用兵文臣為宣撫諸將受其節制而主財計者皆其腹心之人故誅求可節應辦差易今總所以孤立一司有限之積應三軍倉卒無窮之須朝廷在逺無所倚重雖使古人居此亦未必無悔况如不肖者哉兵家舉措事成則乘勝而進自取功名逗留則稱糧道不繼嫁禍於有司以自解僕皆先事辦具要使無以為詞當與者雖多至數十巨萬而不吝不當與者一錢不可橫得裁之以制應之以權而守之以義不驚不懼遲速惟宜亦可謂頑矣罷兵日久敵忽犯塞警報倉卒事皆創行晝夜不得息者五十餘日水航陸負自利州至魚關五六百里之間相踵不絶而百姓不與其勞人皆駭異糧糗錢帛所在樁積未嘗稍乏士衆悅服而吳宣撫尤見推重腹心相照稱歎感激不容於口以為前後軍興餉餽未有如今日之裕然者也然於四川常賦鹽酒之外一毫不斂惟利路以迫近邊界調夫於關外運糧勿已蓋有不得已者州縣間約束素定絶無行移而贍軍嵗入絡繹而至爭先取羡以赴期會本所未嘗遣一卒差一官追一胥起一獄以相迫促也嵗終糴本折估比較租額計增二百六十餘萬引比遞年最髙之數增三百八十餘萬引嗚呼已極不可復加昔李巽為度支鹽鐵轉運涖職一年征課所入如劉晏之多明年過之又明年增一百八十萬緡以今視之可無愧矣此皆朝廷采聽信任之明四路同官悉心協濟之力僕以不才得免曠責豈非幸耶兵興之初諸將各營山寨般糧運帑為保險自固之計興元驚擾尤重守官者往往逃遁而西流言相怖逺近惶駭人人莫有固志雖東西路亦有欲謀移治者相勸僕遷避者多矣蓋利州無兵之可守無險之可恃也僕謂此户部倉庫所在其中貯積甚多既不容般運吾將安往事若不測亦以一家殉於此而已矣因泰然不動處之若無事時且立賞罰禁止官吏之奔竄扇搖衆心者於是人情翕然安定自劍而西如不聞有兵郊邑間熙熙然也此不待僕言蜀人皆能道因書略及耳許丈到闕憂本所之不足請添印錢引百萬渠意甚善此亦未嘗增添恐有幣輕之患姑少緩之近申明朝廷乞陜西行用錢引已依所請今甚流通諸軍不復多邀銀絹大為公私之利度牒五千道才賣十之一二今既減價必速售也官告發及五六分訟詞不息吏緣為姦有一户入千引而不到官皆為官吏所乾沒可惜可惜僕之措畫大抵隨事消息以盡變通務在軍民之兼裕供餽雖廣而所費省謂如增價以糴月糧士卒既利而官實得賤米蓋軍既出戍有添支口食而家小食月糧不盡却得髙價以資助征夫又齎見錢就糴於關外四州比之轉輸其直甚減四州臨邊穀米不自保而官為增價以收之民固便矣又得此錢以應率斂上下無不利只此兩事自省百萬餘引其他皆稱是也軍行合有糗糒前此皆諸軍自造數不能多而民被其擾僕夏秋間預作措置兑買四州秋稅造一色糜棊子凡二百四十餘萬斤軍中云只食糜棊子亦可為數月之糧此皆前所未有也凡此等事不可悉數姑舉其一二耳吳宣撫所以深相照者蓋每事應手殊不費其力也聞嘗諭其將士云老宣撫時軍食不繼折估欠四個月爾輩所知今總所錢糧應副如此若不能立功他日何所推托耶軍中多為歌謡以贊譽不欲寫去耳吳宣撫去冬病作勢頗危殆人心憂惶十二月後漸平亦一方之幸也自兵興後軍書羽檄及申奏朝省之文皆僕自親已充棟宇其間多關利害不能盡致略録一軸奉呈可以見其梗槩也久欲遣人到朝廷實為無暇欲少説則不濟事多説則不可盡所以懶於發信兼事有公議説不説何所損益獨於吾友不可不略述所懷耳僕自别後精力之衰一年不如一年入春以來尤甚一病閲月不能出今雖勉強全枝梧不行方此艱難又不能便爾求去有劄子懇廟堂乞邊事稍定陶鑄一宮觀差遣期於必得不然須致仕而歸幸於東道力為一言也雖有投劄今更納一本吾友面致之兵用不用夏間雖見次第才有定議便告下手文字到此亦在秋中庶可趂時出峽不容緩也其私計之不便劄子中詳言矣吾友以為僕可留乎不可留乎朝廷用人未嘗不均勞逸既盡其力必恤其身而及其家以其去留久近難易間劇比方前人略相參酌而埀情焉則足以盡天下人材之用曰某也才吾方倚之於彼嵗為此言然初無毫髮異於尋常而徒久置之於不便之地然則人孰肯為才乎皆如僕之不才可矣若果有才者亦豈肯盡其用乎人臣之大戒以東西南北不擇事而安之為忠故春秋嚴君臣之分不以家事辭王事然北山之大夫役使不均輒形于怨刺其詩曰嘉我未老鮮我方將旅力方剛經營四方説者曰嘉鮮皆善也王善我未老乎善我方壯乎謂我之氣力方盛乎何乃獨久使我經營四方也其自矜不遜如此若責以春秋之義自當誅絶而聖人取之以埀萬世嘗竊怪之反復思惟而後得其旨春秋所以立大法詩人所以盡下情夫君上出命下之人或不能承在王法有所必誅人臣盡瘁上之人或不加恤在人情豈容無怨下之以情怨上亦猶上之以法誅下有不能自已者是故文王以天子之命命將帥遣戍役歌采薇以遣之出車以勞還杕杜以勤歸敘其征行之久往來之勤靡室靡家不遑啓處慰勞而撫摩之于再于三以為不如此不足以承天保之政也北山之詩與采薇出車杕杜其言大抵相類而美刺之不同如此蓋采薇三詩出於上而北山之詩發於下也若文王之將帥守衛艱勤而無采薇出車杕杜之恩安知其無北山大夫之作乎雖君子之仕志存許國不以通塞易慮然先王之政未有不本於人情者人情有所不欲未嘗抑而行之聖人以春秋風雅立大法而盡下情豈不兩得也哉若僕輩初無事勞可紀而叨冒過當光華持節遍閲諸司日愧伐檀素餐之譏上不敢冀采薇將帥之榮下無從起北山大夫之怨姑因議論所及以釋經義之疑耳僕老矣非有幸覬如前政數公之進用姑欲得一間官以歸東南造物照知有素亦必哀憐之也所欲言者無窮病倦不能盡幸察與虞宣諭論事書某得幸大君子七年於兹非徒小人平時慕用之誠西南莫比而門下所以眷遇推許亦不居衆人之後其心腹相照固無俟於言説至於當官則各有職事不敢望以私恩相假借尚書蜀人今出使於蜀人未必不疑其以故鄉而有所私某素荷知奬人未必不疑其以舊職而有所庇若每事討理明辨其是非則適足見台座處事之至公而小人居官之不茍初無損於心腹之照所謂和而不同以共濟國事而已朝廷聞之亦必不以為非其間雖或小有異同亦無害大體古人轉禍為福因敗為功多此類也如此則使司所行或有未盡本所固不敢有慊本所所辦或有未合使司亦不須加怒庶幾乎忠臣之節要歸於是而已矣伏望髙明深加恕諒幸甚回虞宣諭吳姚二大將出兵書某今早承局還伏辱台翰繼遞中又拜十三日教賜不勝感激王提幹馬已買得四十六匹葛彥竒十六匹渠輩得回巖昌自然易辦矣商蘭兩州招納降附可喜若有益于國本所不敢憚供億之煩所以夙夜辛勤橫身以當衆怨者正欲節省用度以濟大事非敢靳吝財賦當用而不用以沮將士之心也孔明所謂限之以爵爵加則知榮一顰一笑足以激厲生民膏血豈容妄得乎賞不當于有功猶輦金幣以塞廬山之壑也歸順之人須當優假何所愛乎但向去事大不知所用幾何若涉大水未知攸濟耳適領使檄買馬以百運為限亦得中數乞罷招兵尤為至論本所豈敢望賜只得國事利小人與有獲焉方今之弊不在兵少孔明街亭之敗歸而減卒兵貴精不貴多也淮南之潰與采石磯之捷其衆寡可驗矣南北通使和議必成亦須一再往返耳移書宣威且議休息生靈之幸某昨日因書止其再出大暑如此豈用兵時邪征士征行百姓發運皆是危事師老鋭挫若遇大敵豈不可憂此乃安危所係用度不足言也甚善甚善姚帥年來數竒不可委以要地更宜與宣威議之因糧事不敢必只得不至過當足矣回虞宣諭論因糧糴本錢書某旦日再具劄目伏想呈徹是日又領真翰今日已時又拜初一日所賜教帖不勝感慰應副使司初西縣瞻侍之日便曾上稟豈敢二三後緣所索窠名皆烏有先生不得不詳具曲折前者似蒙稍察且承指揮姑止行移故半月餘日不敢應報宣撫司文字至今未回然聞使司已行申奏朝廷必以為有此一項錢物今又覩使司所榜州縣依舊説諸軍因糧所得糴本水腳等錢即是台意終未融照尚以本所為實有此錢也既以上聞於朝廷下播於民庶則本所豈得獨稽留臺府前牒而不報乎他日責逋慢之罪某何以為辭不免具因依申使司乞行會問宣撫司如果有上件省減到錢則見今本所庫中所有自可遣官拘占不必問本所之可否如無所省減却使本所虛抱此名而為朝廷百姓之所不韙某么麼豈敢任此也兼應副諸軍糴本非所出於總領皆百姓之脂膏以百姓之脂膏供三軍之口實則民無怨讟而軍以效命為當然今若諸軍自因糧而不費百姓之資則諸軍責望於民者益深而百姓之所以咎本司者亦無所不至朝廷亦以總所初無應副而蜀民無預於軍興豈不為四川之大禍哉竊望台慈遍會將帥若會到數目行下本所對行出豁如此則於使司無一毫之損而本所與諸帥各得分明矣竊意臺府所以如此有疑未解者必亦有所據依或是諸軍各有申到因糧數目所以顯見於榜奏行移之間而獨本所喑不得説則有無何以自辨財賦不同他事可借以虛詞一錢須要一錢下落皆有出入簿帳豈容有所隱匿也某衰病如此或死或去諒非久于此者隱匿財物欲以何為某前者劄呈朝廷乞以因糧於敵奬勵將帥而大稱吳宣撫恢復不曾般運糧草至於應副博易本錢之多置之不言蓋欲誘掖勸相以成將帥之功名非於本所有對減之利也小貼子云必不得已則陜西榖賤可以量給價直猶愈於般運區區之意但知息四川調夫之苦非有愛于本所財也亦非有意與諸帥爭功也不意事非始圗轉而至此實應副諸軍糴博本錢皆置而不録實不曾得諸軍糧米而曰有收朝廷在逺何以照察而四川百姓為全不佐公家用兵之急將使如朱紱輩所言得行皆某喑然不為辨白之過尚書聰明無所不燭且以憂國愛民為心今將使事之重上為朝廷所信中為將帥所承下為百姓所仰一言之發小關利害大係安危以為無則實無以為有則實有本所豈可受暗昧於疑似之間不以自明於當路之大賢也伏惟公恕仁明諒其事非得已弗罪其喋喋幸甚不勝惶恐之至回吳宣撫報姚仲原州敗衄書某前月二十九日具手劄計已呈徹今月旦日并今日已時荐領真翰不勝感慰姚帥之敗熙河之捷前已具陳之再枉鈞諭益詳曲折姚軍潰散人兵莫須收拾得一半否其餘差占人皆可根刷得宣撫略為整頓便當勇氣增倍此人之敗未必不反為四川之福所可喜者熙州既克幕府威名益振敵知姚罷無可窺伺自當威懾矣本所除已具録奏去訖伏乞鈞照與吳宣撫論再出散關書某向領三月二十三日鈞翰欲少歇中傷士卒於河池後忽聞再出散關不知何故莫是有可乘之機否頗聞此行士卒鋭氣不及前時果否相公智略先定應變無方必有成算方此大暑師旅征行百姓轉餉皆是危事自非萬全豈可輕舉若果未可動且宜待時雖聞于朝廷可也仰恃知照之深敢爾僭率伏幸優恕謝孫侍郎書某不貢問籖史旦暮拳拳于宮牆之下比朝士中有録示近報者竊知先生不遺某之不肖誤有熊羆殳斨之舉震悚若無所措先生早遊太學旅登清班閲天下士大夫多矣持槖之初取材以自代衆謂必得一世磊落塊竒之彥而乃濫及於無用之鄙生豈大賢藻鑑之公有時或爽邪某昔也羣試場屋間先生得其不腆之文即以經綸許之今老矣略無毫髮上副知已而先生鋭然復收不知何以得此豈天假其逢邪二十年間豈無他人而始終卵翼獨歸鑄顔之手信非偶然者也年來衰憊益甚已絶意于功名薦語忽聞頗復奮勵或者階此得以展其尺寸則凡世俗之所以酬恩者曽何足為門下道要使知人之明有聞於後世然後可以為盛德之報也感激之極不覺發于狂言惟先生諒之上葉樞密書謝薦就言事某謹齋沐裁書效其慶賀感激區區傾倒之誠東望再拜走一介獻于樞密相公閣下伏審光被疇咨擢冠宥密聖朝注意身佩安危方天下有事之時隱然如一敵國四方萬里倚以為重交口相賀喜邦家之得賢自非任重致逺之資久孚于人望解紛排難之略深契於事機則帝眷民心何以及此天下幸甚天下幸甚某比得行朝相知書報樞密知院相公初秋對揚力加論薦遂忝賜環之命始驚且疑以為閣下以命世人傑驟結明主一二嵗間躐居大位方攘袂以圖回天下而天下之賢能繫心屬目願自托於下風者不可勝數登庸之始薦賢報國為莫大之舉宜得異人焉而某流落逺外行能無以逾衆且疏逺之迹未嘗一登龍門豈所傳之妄乎報者狎至方敢以為信則激昂奮勵之氣勃勃乎發于胸中而不知其齒之既衰力之不逮抵掌扼腕恨未有以為知已死者回顧其身不啻如鴻毛之輕也不知閣下何所聞而取之乎夫公卿薦人必求悉其雅素大抵其鄉曲也其親戚也意氣之相投也父祖之有好也科第之同時也宦學之同處也微賤之日蒙其慰薦之恩者也窮厄之際得其周旋之力者也否則以姻舊之婉轉也權貴之請囑也於此數者而擇人焉不在是者雖至寶橫路誰復取焉昔崔祐甫當國除吏八百多其親故曰非親非故何以知之及李吉甫為相咨裴垍曰十五年逺裔不知比日人物垍為疏三十餘人吉甫薦之嘗謂崔祐甫當常衮之後賢愚同滯之時故人不以為非要非天下之公道也不如李吉甫若吉甫所薦必求親故則何以致元和得人之盛哉伊尹之俊彥必曰旁求傅説之俊乂必曰旁招二子起于耕築之處安得親故而用之祐甫之言陋於是矣夫親故有私恩舍之則必致其怨賢能非舊識薦之則或蒙其纍人將何擇焉自非胸襟器局有大過人如伊尹傅説自任以天下之重者孰肯旁搜廣覽為非常之舉哉某不佞何敢竊議盛德嘗試以其所聞而揆之行事必也廣大英特慨然有志乎天下故朝夕汲汲留意人倫思得一世竒士致之乎吾君以共濟艱難之業入居政府席未及暖其尊主庇民之術有未及陳而首以薦賢為急務惟其急於薦賢也故如某之不肖亦不暇有所擇焉假之嵗月則天下英偉豪傑之士有不出于閣下之門者乎顧某非其人耳語曰道不同不相為謀故小德役大德小賢役大賢同聲相應同氣相求之道也閣下以端方鯁諒之操岌岌乎其難進陸沉于下僚逾六十而始遇故每求士之羇窮鬱滯困厄而不振者達之冀萬有一分得或類已者某既愚且拙介介自守無以覬當世之知偶嘗得幸於今廟堂諸公頗蒙諒其平生憐其窮以老而保持之向者臺諫諸賢亦復過聽以其姓名應詔故猶得玷使者之節驅馳逺部不然則放迹林泉躬耕畎畝一枯稿之田夫耳抑閣下其亦以此而取之乎夫君子之難進也將以有為也如閣下是也如某輩亦自量其中無所可用故甘退縮無用之地耳閣下其何取焉雖然閣下不俟識面舉于稠人之中重之以國士之知某何敢以無所可用不少效其愚乎伏惟閣下以命世人傑驟結明主躐居大位聖朝注意身佩安危可謂盛矣不識閣下以位為樂乎將以時為憂也如閣下平昔之所自負必不以位為樂其亦皇皇乎憂時而已時所當憂者得非外敵之憑陵乎以某觀之外敵之憑陵非徒不足憂乃宗廟之靈社稷之福也自古用兵固有強弱而勝負不係焉以南視北誠若不敵然北敗於南多矣今為我敵者能強於石虎乎能賢於苻堅乎能盛於魏太武乎三人皆嘗圖南矣大則以亡小則以亂而區區晉宋曾不為之折國家地土絶長補短猶方萬里帶甲數十萬比之晉宋蔑有不及焉矧主上聖德日新仁孝天至海內愛戴無可乘之釁固皇天之所眷佑亦何畏于彼哉議者狃于靖康建炎之禍以為終不可敵則亦不察矣彼君非昔日之君將非昔日之將謀臣非昔日之謀臣昔其來也乘吾久安而無備一人杖箠千百遁逃入吾封疆不涉險阻所舍者大厦所享者膏粱金帛子女之得不可以數計而吾訖無一人敢與之抗反為其役焉此吾之所以不支而彼之所以獨克也今則不然淮漢之郊荒涼萬里大川為之限無糧食之可因金帛子女可欲之物皆無有也其亦何以使貪而吾人知其可敵亦不至望風而遁誠使一旦決戰勝負未可知彼獨能無懼哉內無所貪而外無所懼則與向來之勢固不侔矣或曰彼地廣民衆兵強而國富數倍於我可也若之何易之應之曰善觀天下者不觀其形而觀其理地廣民衆兵強而國富用之以其道不可當也若以無道行之則亦不足畏矣兵法曰主孰有道將孰有能天地孰得法令孰行兵衆孰強士卒孰練賞罰孰明吾以此知勝負矣論兵衆邪彼誠強矣而客主有勞逸攻守有難易亦足以相當也論地利邪吾東有重江之阻西有連山之固吾為得地矣論天時邪彼災異數見蝗旱相仍吾為得天矣將孰有能則未知其孰賢頗聞其國以淫侈相尚握兵統衆者日從事于聲色貨財之間非復向來深謀善戰之士也至於主孰有道則有不可同年而語矣若夫行法令明賞罰練士卒則在所以自治之如何通好以來埀二十載天下以兵為諱將士日老器械日鈍守禦日懈財賦日消吾謹守誓約不敢為之所也遲之數年將何以為國使彼而有謀密以十萬衆分道疾驅襲吾之不戒豈不殆哉彼其張皇聲勢吾得徐為之謀天也曾一矢之未發而其所以自困者固已極矣觀其所為如有狂疾不度事勢無所不至若尼瑪哈諸人尚在肯為爾邪意者必有姦雄之臣隂蓄異圖使結怨內外以自斃其國因覆而取之耳此慕容埀姚萇之徒所以誅荷堅而卒滅之也內相攻殘土崩瓦解之勢近在旦夕不動則已動則潰矣我於其間得以自警修邊疆戰守之偹以待敵之可乘豈非宗廟之靈社稷之福乎閣下其何憂亦思所以自治而已孟子曰國家間暇明其政刑雖大國必畏之今國家之勢謂之間暇可乎於此不圖尚將何待我誠圖之敵亦無以為辭過是則不可為矣仰惟廟堂之上英賢畢集以明佐聖舉無遺策固已置彼敵於計中合謀相輔建萬世之安在此時也某中原書生老於煩使官有常守不敢出位而謀凡此所陳特天下之大勢而已若慮干機密事可舉行未敢為閣下言也近蒙誤恩擢二九列就總蜀計方以祖諱引避待命未報無緣瞻望履舄引領恩閎不勝惓惓冬寒鈞體何似惟大君子順時施宜為天下自重前膺進拜以副聖天子責成求治望太平於期月之意天下幸甚天下幸甚與葉樞密論制敵方略書某竊惟某官今日之舉安危所繫必有成算以全廟勝所宜明問探審虛實增軍必先料軍食置戍必探察敵情屯數移則士卒勞衆屢分則勢力弱聽言欲廣而迂誕嘗試之䇿每足以誤國求財欲急而浮夸無實之人常至于敗事此在于精之而已若乃臨機制變雖無常形要先勝後戰則謀不可不素定願相公熟計之狂夫之言或有裨于萬一某不勝僭易皇恐之至回張司户手書某頓首再拜司户執事使至辱惠書就審比日需次之暇雅候多福良用感慰示諭詞采蔚然謂士當養其心使富貴不能動始可以權大事是矣司馬子長為人峻潔如其文詞自戰國之後士皆溺於權利子長疾之發憤著書以伯夷為傳首凡高竒廉節之士喜為之稱道如樂毅之去燕虞卿之亡魏皆反覆以致其意而於魯連之説尤所張大蓋皆有激而云又性頗愛竒故所稱或過其實如魯連之却秦軍之類是已魯連固竒士但其出處非四皓之比故其所成就亦有小大要之必有所不屑而後可以有為則一也陶朱公棄越相如敝屣屢散千金之資張子房破家報秦盡以沛公所賜遺項伯辭三萬户侯杜門辟穀其所不屑者如此則措置天下事豈不有餘裕哉雖然吾友所謂養其心使不動於富貴者此孟軻四十嵗之所能也未可輕議世之能言者多矣而不自愧其言者甚少茍愧乎其言則是自欺非徒自欺又自詈也士當審吾之所養果能不愧乎其言而發然後可以有立於天下敢以自警之餘資賢者之日用幸照他戒尤荷顧非君力之所能及者亦無如之何此所謂命也餘惟為才自愛不宣某再拜代范季思上宰相書宰相之甄陶萬化小以成小大以成大實與元氣相侔今夫一元之氣運於太虛混然不見其迹天地得之以覆載日月得之以照臨山嶽得之以生植江海得之以浸灌并包統攝無大不周其微至於一草木之根莖一鳥獸之毛羽一蟲魚之鱗介曲盡其理功深巧妙若物物而雕刻之至廣而於小不遺至衆而於寡不廢古之善為相者亦然雖勳濟四海澤及百世而一夫不獲則若已內之溝中彼其功用與元氣何異蓋自三代而下皆莫足以語此恭惟相公度量宏宇宙才術同造化其盛德大業固已超越千載上配古人豈某區區所能稱述方今宗廟復尊國勢復強海內復平天地之所以大日月之所以明山嶽之所以安江海之所以流既皆聖主倚任吾相之力而又搜選人材細大並用占小善者必録有半面者不忘斟酌所宜各滿分願雖元氣之播羣物未必如是其纎悉也某么髍微生不足比數徒以先兄觀文之故夤緣附託出入門下沐浴相公元氣之中有年於此矣今者罷官松陽迫於食貧黽勉赴調不知相公以為毛羽而使之飛走於山乎以為鱗介而使之遊泳於水乎以為草木而使之扶疏於林乎其必有以處之矣抑聞燕有寒谷五穀不生及鄒衍吹律以召溫氣然後黍生焉是元氣之在天地間亦有所不足也自先兄之薨門户凋零與寒谷無異而相公篤於舊好周恤有加近小姪桂復被陶鎔得官會稽皆由特達初非宛轉之力衰宗改觀存歿受恩雖死灰無由復然而假借餘光稍有暖意則相公之德過於元氣逺矣某是用不揆孱弱輒投誠造化生成之賜實有望焉代人上宰相書某讀周易至泰然後知君子之用人隨時通塞有廣狹之不同也在泰之升曰拔茅茹以其彚征吉其之明夷曰包荒用馮河不遐遺蓋方泰之初去否未逺賢人未盡用小人未盡去於是乎欲撥亂世而反之正非同德比義不足與有為是故非賢不舉非才不用如茅斯拔惟彚是征至於九二則以剛處中上應乎中行之主君子得位泰道既升當是時也天地交而萬物通四海之內無一夫之不獲自非頑嚚凶悍終不可化之小人未有或棄置而不收者也是以荒者可包遐者不遺馮河者亦用而孔子以光大翼之故泰之為泰九二一爻為之主恭惟相公以至大至剛之德當軸處中七年于此方爰立之初王塗未夷廟堂之上惟錢穀甲兵是務而相公獨以人材為已任有不舉舉無非賢有不用用無非才朝拔其尤暮取其穎至於凡庸不肖之人不得雜乎其間故能駕御英豪宏濟乎艱難之運今則陂者已平危者已安內陽而外隂內健而外順小者往大者來昔之為否者今轉而為泰矣賢者莫不舉也而不肖者亦有望焉才者莫不用也而凡庸者亦有求焉廣覽兼收不間遐邇其設施先後之序皆與周易相符所以能挈提一世去否極之時而納之於交泰吉亨之會者豈可謂無以致之邪某盱江之鄙儒昔遊太學嘗獲瞻望台符又忝出於同年進士之末其疏逖之迹雖不得與東閣諸賢齒至塗之人則有間矣然前此自安愚分未嘗敢妄意於大賢君子之門者以為相公居泰之初方彚進天下之賢才非凡庸不肖者所可備使令之時也今相公勳業已成世道已亨恢恢然以九二之盛德收拾寒逺之士某雖凡庸不肖然亦非頑嚚凶悍終不可化之小人也豈於萬物交泰之中獨不望相公之餘澤哉是故冒不測之誅踽踽焉而來輒進其區區之説以僥幸於鈞播之萬一語曰時然後言某之此言真千載之一時也伏惟相公矜憐幸甚代范子芬上宰相書嘗觀海之為物鯤鯨之大蝦蟹之細腥臊醜怪種種并包而不遺故稱量者以海為宗春之為氣千章之木膚寸之草敷榮華實嵗嵗發生而不倦故稱仁者以春為主使海也美者納之陋者拒之則何以擅廣大之名使春也今年生之明年棄之則何以極長養之功恭惟相公德量宏偉仁恩溥博海涵春育細大不遺材智賢能無不拔用而疏愚不肖亦皆各得其所包荒用馮河未嘗忿疾于頑嘉善矜不能未嘗求備于一夫獨運廟堂進退百官十五年于此天下士大夫入爐錘被甄冶者不知一人之身幾經造化之手而曲成之妙曽不懈于頻煩是雖溟渤之納萬族陽和之生百物不能過也某么髍不才無所可道天與厚幸獲附于瓜葛之末入仕十年三荷鈞播皆職優俸厚便於其私仰戴恩德丘山不足以比重蓋相公之量無所不容而某荷庇為特深相公之仁無所不及而某蒙恩為特厚雖纎鱗弱植何以酬涵育之施然遊於恩波和氣之中不可謂不知其所自也今者效官浙東上賴帡幪既獲善解而愚不自揆又將以其不肖之身僥幸於陶鎔之萬一伏惟相公納之以溟海之量休之以陽春之仁始終生成俾得寸進則螻蟻之微自今至老茍有可以報德雖九死不敢憚也代石光錫上宰相書某嘗觀變風之什不遇之仁人窮處之賢者往往羇愁憤悶發於聲詩以譏刺其上其後屈原遭讒放逐離騷之詞作其揚已露才忿疾當世視變風為尤甚嘗竊陋之孔子曰邦無道富且貴焉恥也夫生乎周楚之間廢棄不用君子固無憾焉何怨誹之深也誠使三代之際伊尹周公之徒為之輔相士有抱成器懷竒才顧湮沉於下僚困躓於逺裔則曰聖賢在上無一物不得其所而吾獨為窮人豈非命哉詩所以怨或當於此而發然篇籍所載二公之時一無此作豈當時之士舉無失職者邪考之書傳伊尹相湯曰旁求俊彥一夫不獲時豫之辜周公吐哺握髮下白屋之士無求備於一人二公於天下士可謂無負矣旁求吐握以招延之責之恕而不求其備憂之盡而恐其有所不獲夫如是則士之於進退屈伸之際方且飫道義於腹心淪恩德於骨髓尚何暇於怨誹哉然後知風人騷客之詞雖出於褊心亦上之人有以致之使出於伊周之朝惡所伸其喙乎某不佞出入相公之門十五年矣自未登龍阪區區姓名已挂齒牙之末中間三荷鈞播遂忝朝紳卵翼成就之私山嶽不足以比重而不能周慎旋致煩言內竊自訟永甘擯廢相公矜其窮瘁不忍遐遺曽未數月俾丞便郡枌榆接境如宦於家雖其自處無以加於此矣蓋昔之未用也旁招吐握之勤已誤恩紀既速罪戾則優容闊略不責備於不肖之身逮其既去又周旋憫恤俾遂其私卒無不獲之憂使伊周復出所以處當世之士未必能如是之委曲也是以間居思念感涕交零不能自已所謂飫道義於腹心淪恩德於骨髓者蓋無逾於某者焉兹帡幪之庇秩滿天台而家素貧寒惟祿是仰手足凋喪孤嫠滿前所得俸稍隨手輒盡數百指之纍未知所以活之冒昧而來投誠造化庶幾未忘舊物曲賜陶鎔使亟得一官稍遂寸進則終始之賜殺身不足以報萬一矣嗚呼方今聖君賢相同心一德以起二帝三王之治修文偃武登兹太平誠千載之一時某荷恩至深辱知惟舊曽未有毫髮自效以答生成行年五十汩汩且死矣所以悲歌嘆息自傷其命窮也惟相公哀憐幸甚
