body:
  text: 漢濵集卷五宋王之望撰奏議乞禁約舉人文體奏議臣伏覩國家貢舉之制專試藝文有司考校之科皆有程度中間纍舉屬在艱難場屋取人猶多闊略陛下聿興大業埀意斯文恢闢膠庠遍於中外布韋之士皆得專講習於其間彬彬之風寖復承平之舊矣則選取之法固宜益加詳密且如連用本朝人文集十句在熙寧元豐崇寧大觀法皆黜落不考元祐法與建炎所修雖降從輕尚為一抹而今舉人殊不知避一篇之內或純用數百言主司不以為非更謂該洽又如試文內作歌頌及用佛書全句十字以上大觀法亦係不考而建炎式刪去不收以致舉人尤多犯者若此之類未易悉舉秋試在近其可不革乎伏望聖慈特賜睿旨檢舉見行條法申嚴行下令考官遵守舉子通知其遺漏未盡者更照前後格式量加參定庶幾去取之際不至疑惑取進止看詳楊朴禮部韻括遺狀近承朝廷降下楊朴所進禮部韻括遺令監學官看詳契勘禮部韻止為場屋程文而設非如廣韻集韻普收竒字務為該洽故謂之韻略元祐間博士孫諤等申明謂經傳所用之字禮部韻多所不載只取舉人常用者附入數十字今楊朴所進分為五門採托之功頗為詳悉博涉經史有足可嘉其可收者欲依所乞附韻或注云一作或别出一字內字非常用如廬之為盧泜之為􅓳之類或别無經見如輅之為迓愈之為偷之類或非韻所押如單之音善衆之音終之類於科舉之文無所輕重恐凝學者並乞不收其音不必改一項既關先儒義訓不當以私意改更兼釋文自出本音或諸家已有别説近時學者自不改讀徒立異同何禆損益其字不必附一項如旦明之為神明繕怒之為徑怒之類率多假借或出謬誤禮部韻略元所不收廣示搜羅幾於蕪贅然其間如術之為遂遍之為辨肉好之肉讀為而救切音釋明白韻略所無既欲增添却宜收附至於藝之為勢食之為飼揄之音由焉之音嫣荼之音舒韻略已收難以重出楊朴又謂箛篍􅢑􅞻皆已入韻以此為例其類實繁前人所收不無冗長今之所附豈可效尤今各於逐字下開具奏聞伏候敕旨看詳羅棐恭改正漢書次序文字狀凖監關看詳都省批送下羅棐恭劄子稱南史劉之遴傳鄱陽嗣王範得班固所撰漢書真本獻東宫之遴參校異同録其異狀數十事其大略云真本稱永平十六年五月二十一日己酉郎班固上而今本無上書年月日字真本號班固自序為中篇而今本稱為敘傳今本敘傳載班彪行事而真本云彪自有傳今本外戚在西域後而真本外戚次帝紀下今本髙五王文三王景十三王孝武六子宣元六王雜在諸傳表中而真本諸王悉次外戚下在陳項傳上乞依真本改正次序者臣等謹按南史蕭琛為宣城太守有北僧南渡齎一瓠蘆中有漢書序傳僧云三輔舊書相傳以為班固真本琛求得之以餉鄱陽王範獻于東宫今棐恭所稱劉之遴參校者乃蕭琛所得北僧瓠蘆中書也本傳既云相傳為班固真本則其是非固未可知按後漢班固傳顯宗永平中受詔終成漢書積二十餘年至章帝建初中乃成今稱永平十六年五月二十一日己酉郎班固上與本傳嵗月淹速不同可疑一也前代人臣所上書籍皆有臣字如臣向臣何晏等是也今稱郎班固上而無臣字可疑二也班彪以後漢建武三十年卒於前漢不當有傳班固止因自敘上及其先今云彪自有傳可疑三也劉知幾史通稱章帝建初中固成漢書後卒於洛陽獄書頗散亂詔其妹曹大家校敘選馬融等十人受讀其八表及天文志等猶未克成多是待詔東觀馬續所作然則漢書次敘又經大家編次設别有班固真本大家固當遵用不應為爾異同竊觀前世經傳固有編簡失次者如書之武成禮之樂記文字顛倒灼然可知而先儒謹於闕疑不敢有所釐正矧漢史篇帙有倫豈可以訛偽之書輕亂舊貫正使此本果出班固則已載南史學者可考何必於千載之後追改成書如顔師古劉知幾號為鴻博皆精研此學非不見南史所載而不以為疑者蓋知其出於謬妄也棐恭稱歷代史籍皆以帝紀為先后妃為次又次以諸王列傳惟漢書以外戚列於西域之後諸王雜於諸傳之中與歷代諸史頗異按后妃紀傳自范曄後實冠傳首而宗室諸王未嘗不分在諸傳帙中至唐書始次在后妃之下而云漢書與諸史頗異蓋所未詳棐恭又云魏晉以降腐儒曲説逞其私志而錯亂之按師古集注漢書實采應劭服虔二子漢人初無異説而云魏晉諸儒所亂殊為率爾棐恭又云方今恢崇庠序留意藝文惟班史次序未正訛謬雖不足害治亦太平文治之一疵恭按淳化中太宗命杜鎬等分校漢書咸平中真宗命陳堯佐等覆校及嘉祐六年仁宗又以命陳繹而詔歐陽修看詳至熙寧二年奏御已經纍朝刋正舛誤洪益後學其利甚多而云文治一疵尤為厚誣契勘見今漢史行用已久散在天下家有其書若復亂其次序無益學者徒成紛擾所有羅棐恭所乞恐難議施行謹録奏聞伏候敕旨乞展免耕墾間田稅租狀臣伏覩紹興五年七月七日敕節文諸路都督行府奉勘會荆門軍間田甚多召人耕墾稅租差科並免三年六料奉聖旨依愚民無厭轉生姦弊年限甫滿便輒遷徙臣愚欲乞將今後墾田所免稅租差科三年六料展為六年每年與免一料年嵗既久人亦重遷兼每年止免一料亦可補遷徙之費其已免而料數未盡者比類施行如此則不損朝廷寬恤之典而民不容姦各為長久之計取進止荆門軍替回論禁約公人下鄉奏議臣每伏覩朝廷所下詔令陛下愛養元元之意可謂至矣則四方萬里民之利病事無巨細必欲周知方今郡縣之間為民之害者莫大於公人無賴不逞之徒散出鄉村乘威怙勢恐喝良善小邀酒食大索貨財秋取稻禾夏求絲麥稍不如意鞭縶隨之民之畏怖甚於盜賊而郡守縣令不知禁戢又征稅場務私人猥多皆鮮衣美食膚體充盈此輩不特豐其身以及其家又有飲博遊蕩之費何所從出大抵商賈所輸官得其十之一二以故嵗課日以不登而有司不察猶以為征之未盡此皆公私之大蠧而天下之所共疾者也臣愚欲望聖慈詔諸路監司嚴督察州縣事非重大不得差公人下鄉而稅場吏有定額不得多置私人散出文榜俾民通知髙立賞格許諸色人陳告必罰無赦庶幾農民安業行旅通流天下幸甚取進止論潭衡郴州桂陽軍賊盜劄子臣契勘本路自三月以後潭衡郴州桂陽軍管下有羣盜數火謹節録諸處關報在前一項是販私茶客商殺鼎州武陽縣巡檢轉入潭州安仁縣殺巡檢却入湖北燒辰州溆浦縣在兩路界首出沒一項是吉州賊胡邦寧分作數隊攻劫衡郴桂陽三州之間破安仁縣及耒陽之新城鎮州縣例皆無備帥司戍軍稱李道盡數帶行會合弓手土兵追捕已再敗衄見蟻聚郴州界內當此豐嵗又李道之師在近尚敢猖獗如此今春夏以來武岡全州應副調發民頗失業衡郴桂陽境內又為賊擾栽種過期它時大軍還屯或復出冦為害必大然此鼠竊亦何能為但恐浸淫不制漸成滋蔓欲乞劄下田師中令李道一就速行措置毋遺後患免致再舉又郴州永興縣豪民朱持聚集數百人作過宜章縣有召募弓手一百五十人平時驕甚州縣不能制土人甚患之茶陵耒陽安仁桂陽諸縣姦民及龍淵餘黨多與盜賊陰相勾引其間土豪皆昔日盜賊亦不可不過為之慮若以大兵五百人分戍衡郴以鎮安人心庶可消患於未形今楊再興父子既已殘破則將來武岡全州之戍却可減省蓋諸處土豪之兵不下數千人有戍兵則皆為我用無以制之未必不為賊利害甚大伏望聖慈早賜指揮施行取進止乞分戍奏劄臣契勘武岡全州猺賊李道討捕已及數分某詢訪熟溪洞事者説楊再興已老諸子惟正修聚人最多頗姦滑正拱最凶悍今再興與正拱兄弟皆得惟正修并男楊小二楊小三未擒所冝必獲然計其人衆五分無一自不須全軍在彼若就行分撥權屯衡郴二州以禦盜賊其所帶潭州戍兵亦令發還兼溪洞中無所用馬不若遷置平地武岡山路漕運艱難亦可少寬民力委實利便乞賜詳酌施行湖南提舉司論差役奏議臣契勘保正差役吏姦最多其所差人有未當差法者有保正副陳訴差選不當者所屬限一月與奪應與奪而違限者徒一年紹興十五年七月二十八日申明節文差募之際以籍為定即行交替如有保伍內應差之人以詐匿幸免許被差保正長於充役以後指論如併計物力委髙於被差之人輪次當差即行改正然近經州縣逺經監司文移往返動涉時月其承行人往往故作留滯有所邀求雖或改正被差已久其未當差者將來當役又要别充二年以此差選不當者多不能聲訴欲乞朝廷詳酌應今後保正副差選不當後行改正者其物力可差而輪次未到之人候將來當差計役過月日通行二年交替其物力低小只合充大保者候充大保以後過月日比折及三月以上者與免催稅一料其鄉司人吏差選與奪違戾情罪自依見行條法如此則設有不當為患稍輕取進止湖南提舉司論河渡奏議臣到任屢有民旅陳訴津渡艱阻多取渡錢尋行勘會蓋緣州縣榜賣河渡實封投狀之人多是過立髙價以爭必得既給賣後却以增添官錢為名加倍收取渡錢數年以來此風特甚今鄉村小津渡空行人亦不下收錢一二十擔擎客旅可知其廣闊津渡又可知農家米賤艱於得錢輸納稅租困於邀阻買撲爭奪其勢未已增添之數豈有限極更一兩界行者不勝其弊然所增官錢却多拖欠是官司得髙價之虛名而往來被邀阻之實害檢凖紹興敕諸津渡堰閘無故留難人杖一百若非理邀求仍就本處令衆五日兵級改差重役餘人勒替本司措置嚴行約束外欲乞朝廷行下諸路今後出賣河渡實封投狀添錢承買價髙當給之人並從本州先次責狀不得增收渡錢違者依非理邀求條法斷罪令衆勒替罰錢若干關報所屬縣分於渡頭出榜曉示許人陳告以所罰錢充賞庶得自此止絶契勘河渡與坊場不同坊場若增酒價人得不霑然酒於法有禁河渡據往來必由之地而擅增渡錢尤為切害雖有非理邀求一條未甚著明若比附坊場立法實為利便取進止論潼川路措置經界奏議臣契勘臣前在東南日聞蜀中經界大為民害豪富為姦例獲輕減貧弱受弊多致逃移上户利之而下户皆不願去年臣蒙恩自湖南提舉常平茶鹽除潼川府路轉運判官入本路境首至廣平軍渠州界此兩州嘗行經界而復罷百姓多遮道投牒乞行經界與峽外所聞不同深竊怪之因問之曰爾等皆在上户乎曰下户也詰其所以願行經界之意則曰人戶詭名寄隱産業有田者無户有户者無田而差某等充户長催驅稅賦率皆代納以此破家者甚衆若用經界則戶名有歸此弊可絶及入遂寧府境係見行經界地分百姓陳訴者益多或以為便而願行或以為害而欲罷因使數十為朋自辨於庭下各執偏説互有得失乃知蜀中經界不論貧富大抵稅增者願罷稅減者願行皆出一已之私而形勢户之不願者為多蓋詭名挾戶非下户所為蜀人之至東南者皆士大夫不然則公吏與富民爾其貧弱之徒固不能逺適雖至峽外亦無緣與士大夫接故不願者之説獨聞而其願行者東南不得而知也六年之間士人上書百姓投狀言其不便者不知其幾人上至朝廷省部下至諸司郡邑皆被煩紊陛下憂閔黎元至誠無已始也以稅賦之不均而行之終也以論訴之不息而疑之纍詔監司看詳改正有以見聖人無我惟務便民雖堯舜之用心不能過也然姦民觀望詞訟滋繁諸路監司纍年講究終無為陛下别白而言之者誠以事體至重衆口不同利害可疑不敢以偏辭斷也臣初到官適有詔旨坐知復州蜀人王駿乞罷經界劄子委制置司與所屬監司相度臣於部內詢訪甚詳而守令所陳同異相半臣以為此田里間事必盡見民情然後可決雖有牒訴皆一偏之論不可慿用遂令州縣取諸鄉稅名為鼠尾帳家至户到問其願否使各書其名下分鄉編類願用舊稅户若干願用經界户若干於是究其兩黨之多少本路管一十五州瀘敘州長寧軍以邊郡不行經界渠果州廣安軍既行而復罷行經界者九州凡三十七縣為稅戶三十三萬三千七百有竒除户絶逃移二十有四願行經界者一十七萬七千五百餘户願用舊稅者一十五萬六千一百餘户此其大略也州别計之則昌榮資州懷安軍四州之民願者為多潼川遂寧普州富順監之民願者為少而合州適得其中縣别計之則願行之多者一十有六願行之少者二十有一蓋由當時奉行之人有能否之不同故也臣聞治道去太甚雖堯舜之法不能人人皆利要當以多者為正今之經界在視民願否之多寡而損益之若州縣之願行者多自不須復議願行少者為之量行措置人户之增減者輕自不須復議增減重者為之稍加裁正如此則公私事省不至甚擾正使小有不均亦可置而不問何則經界以釐正舊稅固當有所增減減者既以為是增者必以為非若欲每人而悅之是朝行夕改無時而定也且蜀人之言其不便者曰法行之始驗土色之髙下量頃畝之多少姦弊百出賄賂公行故稅之輕重不當造帳畫圖為費甚廣追呼須索不勝其擾是則然矣事在既往雖改無及至於稅之輕重則新舊各有其弊就二者而較之經界之弊在於業多者稅或輕業少者稅或重而舊稅之弊則在於有田者或無稅有稅者或無田要之以輕為重以重為輕猶稍愈於以有為無以無為有也而蜀人之言其不便者或過其實若初行之擾則有之而今日之弊不如是之甚也臣置司遂寧且以倚郭小溪一縣論之官户凡五百八十有四而願用經界者一百一十有七不願者四百六十有七公吏為户二百二十有二而願用者一十有八不願者二百有四它縣大率皆然以此而觀則或者謂豪富之家皆獲輕減而利之豈不過哉至於下户逃移亦絶無僅有或以時經旱潦或以家自貧窮未必皆經界所致傳曰利不百不變法使經界元初不行或行之未久而罷固善今立為成法已經歷有年所料舊稅圖籍悉多散落中間買賣分析户限更改矧核見隱寄之後虛戶盡去創户甚多承認供輸已有定分一旦舉而變之則升降紛然僥幸復啓實戶之創出者悉皆走失虛戶之詭立者不可推尋吏肆其姦又將有前日之擾且終亦不得其平而催科愈艱爭訴益甚軍須督責何以應期為官吏者不亦難乎臣恐凋瘵之民無復寧嵗矣惟陛下少安聖慮靜以鎮之姑去其泰甚者則紛紛自息天下幸甚謹具措置畫一下項一本路見行經界者九州三十七縣遂州人戶以十分紐計其願用經界者昌州得九分五釐資州得八分九釐懷安軍得八分八釐榮州得六分六釐此四州民願者多乞且令仍舊普州得一分二釐富順監得二分五釐遂寧府得三分四釐潼川府得四分五釐合州得五分一毫此五州民願者少乞量行裁正臣愚欲望朝廷委監司一員與所屬守令委曲計議各以逐處事宜從長措置一應經界縣分有所稅溢於舊額者乞令逐縣取舊稅額外之數將大假增重人戶通融均減一新稅不均所合裁正者謂元初打量頃畝定驗土色不當等户若是未經界買賣田業不曽推收及隱寄詭名之家自當歸併即非因經界不均以至輕重如此者不應受理一前後經本司下狀人戶有增稅不及一二分而為姦猾上户驅扇亦列名陳理意在多將户數皇惑官司或是本戶所增雖少而有詭立别名之户當時作弊不皆併合却創立别户故亦一例陳論如此則一户不願便是兩户今乞將人户經界新稅比舊增減五七分以下者更不增減為裁正之限增減數多而非實行買賣併合戶名者即就逐鄉會集衆戶如推排法互相指決以衆證為定不伏者再為界量將量出田土沒官斷罪一乞令所委監司選差見任官五員分詣諸縣逐鄉受接經界詞狀又於本縣令佐內選可委官一員通簽同共審量裁正一所差官五員若事畢日别無違戾民訟希少乞許保明申奏朝廷量行推賞一乞候農隙月分措置右謹録奏聞取進止改正安嶽縣經界狀臣契勘普州安嶽縣初行經界日縣令張寧大為姦弊改移稅額輕重失平比及三年虧官二十五萬七千餘貫依聖旨除放自紹興二十四年至今又虧一十二萬四千餘貫紹興二十三年縣官以闕乏之故分詣諸鄉巡門驅斂村民不堪其擾結集山谷間抗敵官吏幾致生事至今土人謂之垜山垜山者言山上之人其多如堆垜也臣前在轉運司令諸縣作鼠尾帳家至户到遍問百姓願用新稅或舊稅各令親書於名下獨安嶽一縣願用舊稅者十分之九公私俱病民不聊生臣於去年冬選委昌州推官左從事郎劉弇同縣令右從政郎張介受狀措置凡三百六十餘狀指決干連者不下千五百家若只量行裁正則無由去偏重不均之弊若盡行核實則有追集丈量之擾弇與守令皆謂欲救其弊莫若順民之情復用舊稅臣以本縣經界所失雖多亦不可盡廢遂令將新舊稅簿互相參校於所增減取其酌中分數通融裁正凡新稅之增於舊稅者以所增十分為率減其七分新稅之減於舊稅者以所減十分為率復其六分謂如某人户下元管舊稅一百文經界日增至二百文即裁減七十文作一百三十某人户下元管舊稅二百文經界日減至一百文即却復六十文作一百六十蓋經界增者重減者輕故今所損益有多少之差元申畫指揮增減不及五七分則不在裁正之限今此一縣其弊至深不可以五七分為限故自二分以上皆裁正之本縣經界增稅者四千五百七户計增正稅錢三十八貫八百一十二文今減其七分為錢二十七貫一百六十有竒經界減稅者六千一百二十二戶計減正錢四十貫七十五文今復其六分為錢二十四貫四十有竒其增減不及二分者新稅簿籍脫漏户限為多可見者計二千九百餘户若一一紐算裁正又恐太煩若只用新稅則漏戶不可復得遂仍以舊稅為正計減却正稅錢五貫五百有竒却收漏戶二千七百餘戶得正稅錢八貫七百有竒又根括到失陷稅錢補足舊稅外有溢額者四貫三百有竒以此數項衮同對補裁減之數於租額尚有嬴餘又張寧經界之初既失稅額恐嵗計不敷則擅增折變以補之每正稅一錢增米三合麥二合大率比舊加十分之一今一切蠲除悉依現例凡上件措置皆委曲計議務盡人情輕重適中更無不均之弊百姓租稅各有歸著易於催理自此官賦無復失陷委為經久之利其裁正曲折别編作一册奏聞伏候敕旨潼川路放稅利害狀臣凖御寶封下尚書省劄子坐奉聖旨指揮將州縣旱傷去處依條檢放仍支撥常平錢米措置賑濟仰惟朝廷軫念逺民救災恤窮之意可謂深至本司已即時行下諸州遵奉施行據諸州申到自夏及秋限內不曽有人户陳訴其田畝各改種了當别無根查存在檢凖紹興令節文諸官私田災傷夏苗以四月秋苗以七月水田以八月聽經陳訴至月終止訴在限外不得受理如未檢覆而改種者並量留根查以備檢視不願作災傷者聽今來聖旨指揮係令依條檢放合遵上件條令緣所降指揮於十一月內被受既限內無人戶陳訴又已改種無根查可檢難以檢放若復差官遍詣鄉村徒為紛擾有力者得以計囑貧乏未必得免原災傷所以放稅蓋為人戶不能輸送今年本路秋稅已納及八分以上自無支還之理若用對折來年稅賦倘遇豐熟却反是豐年減放若不於來年對減只據目今未納之數蠲放即是頑猾人戶獨得僥幸而依時送納善良之民反不蒙實惠兼今未納餘分多是攬納者已行結攬實啓姦弊官司空失嵗計臣照得前者三司措置惠民畫降聖旨自今年秋料為頭盡除對糴米一項比之舊額已減三分之一寬恤不為不至已行下一路照會所有賑濟一節則於常平法旱傷去處失於披訴者許放第四等已下闕食人戶自不相妨已關常平司施行外謹録奏聞伏候敕旨論賑濟災傷去處狀臣凖御寶封下尚書省劄子坐奉聖旨指揮將州縣旱傷去處依條檢放仍支撥常平錢米措置賑濟本司已即時行下諸州遵奉施行檢凖紹興重修常平免役令諸災傷計一縣放稅不及七分或失於披訴第四等已下闕食戶當職官保明申提舉司審度依放稅七分法賑給借貸訖奏本司已遵上條委本路州縣當職官體量自第四等已下闕食戶勒耆保盡實抄劄支撥常平義倉米斛應副賑給如本州屬縣有闕常平米斛係沿流縣分即自本州量度數目支撥津載前去如不係沿流去處即行下本處兑換稅米支散據用過數將在州常平義倉撥還若無合兑換稅米即行約度合用米數估定在市實價具數申本司以慿通融一路之數移用支本錢前去糴買應副內遂寧府果普州見管義倉斛米比諸州數多亦行下量減價錢出糶見據逐州申已行抄劄到本州縣界實被旱傷去處孤老殘疾不能自存闕食飢民人數自十二月初六日以後賑給緣本路諸縣地里相近慮有兩處重疊請給已依條定日行下諸州每月取二日七日五日一次同日支散內飢民若係附郭近便人即五日一支若係三十里外人即十日一支庶免飢羸之人往來頻併如有後到人數即續行抄劄其餘不甚旱傷州縣亦已行下檢舉老貧疾乏不能自存及乞丐人依條養濟去訖見今本路諸州所管常平義倉錢米可以通融應副周足其舊撫司樁積錢更不敢取用如將來青黃未接飢民大段數多常平錢米或至有闕即申報所屬取撥施行謹録奏聞伏候敕旨論賑濟狀臣去年十一月伏凖省劄備奉聖旨支撥常平錢米賑濟實被旱傷去處或支用不足即於存留舊宣撫司樁積錢米內取撥本司措置行下州縣依條體量自第四等以下闕食以常平義倉米斛賑給如本州屬縣米斛有闕係沿流縣分即自本州量度數目支撥前去如不係沿流去處即行下本處兑換稅米支散據用過數將在州常平義倉撥還若無合兑換稅米即約度合用米數估定在市實價具數申本司以慿通融一路之數移用支本錢前去糴買應副遂寧府等州見管斛斗比諸州數多即令減價出糶據榮敘瀘州長寧軍富順監申不係旱傷州縣别無闕食飢流民外潼川遂寧果合昌普資渠州懷安軍申劄到闕食飢民人數今自十二月初六日以後節次賑給至今年三月終止共賑濟過飢民一萬八千六百六十人斛斗一萬一千四百八十二石二斗出糶過斛斗五千七十石三斗普州安居樂至縣錢米不足於潼川府通融應副過錢引三千八十五道七百七十六文其舊宣撫司樁積錢米不曽取撥州縣官吏推行有稍不如法者亦懲治一二處以此不敢違戾朝廷實惠得以下及於民一路之間並無流殍利澤洋溢歌頌藹然真盛德事謹録奏聞伏候敕旨謝因吳侍郎傳道太上皇帝聖語狀契勘臣收親戚權戶部侍郎吳芾家書報云芾五月十八日對上因論財賦在得人遂言川陜用兵朕全得一王某之力大軍十餘萬衆數月與敵角而蜀人不知卿且道如此用兵若不是他如何了得又言王某在蜀幾如蕭何在關中芾奏王某與臣是親戚每得書説經畫有素雖用兵之久財賦足辦未嘗略以闕乏為言其人為政尚嚴平日在蜀令行禁止故於財賦亦不督而辦上乃云朕不知與卿是親朕今日之言與卿暗合芾又奏王某有志於功名但近來多病又骨肉亦屢病心甚念歸前時亦有書來懇廟堂求宫觀上言亦見大臣云他婚嫁都未了亦欲令歸但蜀中少他不得亦怎奈何只得且教他在彼候事稍定朕却大用之卿既與之是親因通家問且與朕道此意教他且在彼少留後日當大用之須至奏聞者右吳芾傳道太上皇帝聖語臣具録在前伏念臣疏逺小臣濫膺寄委典司蜀計適值軍興賴朝廷申畫之明每事遵稟得以少稽曠敗不謂太上皇帝誤簡聖知因吳芾登對過形奬諭比擬非倫仍令少留以須後用顧問纎悉下及其私恩榮所加非臣涼薄所克負荷伏讀驚感涕淚交零雖糜捐此身何以圖報萬一謹當更勵衰病國爾忘家以仰副君父記憐戒敕之意臣不敢上章德夀而事當奏復不容但已謹具録奏聞伏望聖慈降下尚書省為臣備奏太上皇帝御前庶知愚臣今已恭承睿訓伏候敕旨
