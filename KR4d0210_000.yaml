body:
  text: 提要漢濱集十六卷别集類三宋臣等謹案漢濱集十六卷宋王之望撰之望字瞻叔襄陽穀城人後寓台州登紹興八年進士第纍遷太府少卿孝宗即位除户部侍郎充川陜宣諭使洊擢至參知政事勞師江淮為言者論罷乾道元年起為福建安撫使加資政殿大學士移知溫州卒事迹具宋史本傳錢漙祕閣書目載有之望漢濱集而佚其册數焦竑經籍志作六十卷然趙希辨陳振孫兩家俱未著録則宋代已罕傳本後遂散佚不存今從永樂大典中採撮裒綴所存什之三四而已之望當秦檜柄國時落落不合人咸稱其有守其歷官亦頗著政績惟在隆興時力主和議與湯思退相表裏專以割地啖敵為得計而極沮張浚恢復之謀考宋南渡之初自當以北取中原為務然惟嶽韓諸將可冀圗功張浚狠愎迂疏但急於立功以固位實非可倚以恢復之人一敗於富平而喪師三十萬再衄於淮西而叛逃者七萬三挫於符離而喪師又十三萬僨轅誤國其驗昭然講學家以張栻之故回護其父殊未免顛倒是非之望之沮浚不可不謂之知人至其論和氣之策以為南北之形已成未易相兼惟當移功戰之力以自守然後隨機制變又以為金人制勝之謀舉無遺策加以器械之利形勢之便雖漢唐全盛之時猶未能輕此敵而况於今日其斟酌時勢以立言與史浩意頗相近亦不可謂之不知時務特其朋比小人附和權幸與浩之出於老成忠藎者不同又湯思退所主者乃六國賂秦之計與浩之主於持重俟釁者亦復逈異故當時重為人所抨擊而宋史亦極不滿之誅其心也至其詩文則皆疏暢明達猶有北宋遺矩諸劄子亦多足以考見時事與正史相參未可遽廢僅釐為十六卷著之於録庶其人其文是非得失各不相掩焉乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f8d9cc821d8302f76b2abf063517e48defbacabd747d99604da23829967ef291
