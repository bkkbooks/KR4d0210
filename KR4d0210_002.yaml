body:
  text: 漢濵集卷二宋王之望撰近體詩乙巳四月自都下省歐陽氏姊於封丘時河朔流移滿道即事有作寄范覺民北出都門道紅塵汚客襟號蟬如有意髙栁自成隂轍亂思良馬林幽慕逸禽據鞍回首處愈覺帝閽深龍華山寺寓居十首抱病雲山逺興懷節物新林紅紛過雨嶺翠鬱堆春猿鳥時相狎煙霞日自親可憐成底事半世走風塵齋飯來香積鐘聲出翠筠僧投松徑逺鳥下石壇馴茶摘春山嫩泉烹雨澗新蕭然煙篆室處處喜留人嗜好非前日顛狂減少年久疏長夜飲新學小乘禪覔句驅春恨翻書引晝眠朝來山鳥閙驚破睡中天作客他鄉久宜人此界稀身間長挾策地僻慣披衣妻有虀鹽樂兒因筍蕨肥出門何所適終日掩荆扉海國幽棲地春風欲暮時病憂梅雨逼貧歎麥秋遲併日終無愧逢年會有期飢寒寧茍免吾道諱磷緇時節清明過溪山晴霽初出遊偕婦子相識半樵漁稼穡歸寧遂經綸計已疏淵明至窮約三徑亦吾廬羊乳莖猶嫩枸杞也豬牙葉未殘皂莢也呼童聊小摘為爾得加餐仗馬卑三品山雌慕一簞朝來食指動苦菜入春盤有客過松徑呼兒下竹關張燈深夜語沽酒逺村還醇異交公瑾清非醉景山劇談自有理不在濁醪間杜宇來何處天涯又復鳴空山聽更激寒夜窈難明故國三千里春風第一聲年年羇旅地愁絶不勝情水鄉經月雨潮海暮春天芒種嗟無日來牟失有年人多逢菜色村或斷炊煙誰謂山中樂憂來百慮煎送别祝得之倦遊淹海上得子意彌敦文采與春秀性情如玉溫相從不知久欲别更何言努力功名會飛騰入帝閽别友人此日天涯别春風斷客魂緑楊初暗路芳草欲迷村祖帳前山逺驪歌落日昏相思今夜月不復對清樽豁然亭何處開軒檻凌虛杳靄間胸中吞百粵眼界抵三山曉日賔滄海秋潮俯碧灣登臨一舒嘯宇宙頓寬間同諸鄉人泛臨安西湖短棹夷猶處湖平酒滿觴荷深迷去路波淺澀歸航落日山頭暗西風水面涼今朝知己共相對恍江鄉坐中贈朱尉慶長君尉襄陽日吾方首善遊素交微半面青顧乃雙眸有喜一尊共相期三徑幽溪山許分老為我繕菟裘懷李相之李子通家舊人門孰與侔胸中足今古皮裏貯陽秋尊酒懷清致關山隔俊遊江城携手地春色黯離憂相之見和有真能乘興之句再次韻一月如三嵗懷君未足侔情親頻入夢句好欲生秋真有山隂興聊尋河表遊翻愁江上别心事不堪憂齊堯佐寄詩許豫授代歸榖城日相過次韻故人千里去猶記别時歌衰鬢禁愁得狂懷可奈何南枝春意動西望夕陽多三徑荒涼外髙軒詎肯過和李士舉陪提刑徽猷遊中梁山臨秀逺軒以望江中平陸之勝承示佳句且敘故舊離合之感次韻二首空翠浮軒檻嵐光拂棟梁江隨平野曲林擁暮山蒼城郭猶平日田疇本樂鄉呻吟未休息衰病意空長京口追遊地錢塘執别年飄流恍如夢聚散豈其天夙駕行趨詔當朝正急賢紫荷持從橐去去入林泉次韻賀子忱春事老境流年速春風幾日晴清尊花下怯白髮鏡中眀蝴蝶迷幽夢倉庚愧好聲良辰一尊酒鐘鼎可忘情挽林給事中母栁夫人詞三首聨德成偕老和鳴六十春休聲傳孝婦餘慶産名臣人去虛韋幔哀深泣孟鄰千年慿直筆圖史播芳塵作配歸華族生賢瑞國朝升堂拜王導窺牖識房喬綵服金龜重安輿駟馬驕慶門今鼎盛環珮忽蕭蕭方喜門施戟俄驚客奠芻孤鸞空對影老鳯獨將雛祖送傾朝士哀榮震帝都秪應歸葬處千兩擁山隅張和公母秦國太夫人挽詞誓比共薑早貧如翟母希三遷功可大五福報無違衮繡供兒綵風幡契祖機千秋慿直筆圖史播芳徽贈元觀正字才名四紀藹簮紳王謝風流信絶倫雲路舊遊羣玉府山城初見謫仙人八龍漂泊知餘幾三爵追隨莫厭頻此會未應輕作别梅花且醉臘前春和曽丈贈光化令趙元質奔波朝士覔官忙獨買扁舟去意長汲黯舊聞羞作令馮唐今愧老為郎鵷鴻引去知何慕鷗鷺歸來不亂行竊食端輸厠中鼠驚餘猶得飽飢腸關子東約中秋遊天竺再用前韻有詩和之湖光盡處兩山開夾道蒼松鬱壯哉水過冷泉雙澗合石飛天竺一峯來勝遊喜有幽人約佳句俄催爽氣回桂子中秋正芬馥流霞好泛月邊杯文監丞出關子東西湖春遊倡和且約為重九之遊次韻西湖爛醉踏青天秀句重尋未隔年已約清樽携九日要將黃菊薦三賢深秋風日明寒水宿雨波瀾起畫船佳氣蔥蘢如有待曉粧濃淡抹非煙題龍華寺孤枕僧庵夢不成披衣推户竹軒明一天月色連秋色萬樹風聲似水聲小檻沉沉青嶂合修簷冉冉白雲行今宵佇立情何限曉鑑霜毛兩鬢生同年十人會於湖上巫子先拘臺制不來有詩次韻曲江一散各西東杯酒重來氣尚雄才薄愧參龍虎榜會難常歎馬牛風弟兄半已顛毛白賔主休辭醉頰紅底事坐中猶未樂車公不遂一尊同與同舍遊淨明是日大寒豫獨乘馬諸公以孟浩然相戲以其鄉人故也關丈有詩次韻慘淡隂風暗廣川衝寒直到白雲邊寒驢苦憶長安道古寺深行小有天淨明有邊郎中詩云疏篁蔥蒨雲添潤亂石玲瓏蘚借斑小有洞從仇穴入妙峯頂對德雲間同行者皆愛之峴首詩人窮入畫孤山處士句堪傳疑君便是林君復妙字清題故宛然淨明有子東詩子東臨安人也丈人觀設醮留題翠麓丹崕敞洞天瓊宫珠殿照雲煙森羅壁繪推前輩縹眇樓居見列仙朝斗壇邊星象冷步虛聲內月華圓塵埃迥隔人間世骨悚魂清夜不眠再用前二詩韻洞府仙扃本不關凡蹤長墮世塵間勝遊得得今須遍俗駕遲遲肯遽還絶巘晨光收雨腳羣峯春色嚲煙鬟感通珍重神靈意詩思雖荒詎敢慳勝境名標第五天殊庭佳氣藹非煙鼓鐘與看千人會玉石難分十種仙幽壑舊傳靈藥富蒼崖曽現寶光圓塵勞未決丹梯急只得虛堂一夜眠棲賢三峽橋次南康守晏德基韻古寺深藏紫翠間清風夾道凛蒼官千尋秋色巗巒淨十里雷聲澗谷寒此去洗心應少纍從來蓄眼未經看使君健筆題佳句一首新詩倒醉瀾題胥解元成美堂當年英妙曳青襟曽習王褒盛德吟驥騄作駒期萬里鸞凰振翼便千尋馳聲場屋誰勍敵好事侯邦盡賞音古語美成須在久願君長保嵗寒心贈元運使使節東來炯繡衣蒙泉景色動旌旗官曹傳檄清風肅老稚隨車淑氣移趙日可能兼畏愛蘇天那復間公私鴒原更遇蓬瀛客好駐幨帷十日期缺題霜晴愛日曉生東蕭寺山茶賞嵗豐錦里出遨驅小隊雪山納堠狎諸戎葉連油幕侵天碧山茶兩株頗髙大花倚朱旗特地紅美景良辰萬人喜不妨行樂一尊同還鮮于蹈夫詩編百首新詩句句妍追還江左一千年春歸池草難専美冷入江楓稱所傳一字人知吟不到八分我喜録成編西來所得真多矣滿篋今藏錦繡篇溫原廟神御北還和謝景思韻靈輿歸路肅班班帳殿秋風響珮環九廟向來連北闕五陵依舊對南山玉衣不受清塵涴風馬應隨綵仗還行起奉常陪薦享天威咫尺侍懸問賀劉侍郎三首早嵗儒林俊譽流中年持橐侍宸遊論思清禁三朝遇間散殊庭二紀投迹與香山齊出處詩將彭澤盡賡酬似聞璧水求三老行起蒲輪慰九州漢嘉平日想風流喜作凌雲載酒遊塵土何時公事了林泉聊與故人投心期濟物衰難強志在求田老未酬官滿便當投劾去一航從此下揚州萬景樓頭盡日留烏尤嶺上及春遊溪潭杳渺遊魚樂林木隂森倦鳥投千尺梵身名不謬半輪山月句難酬爭流競秀君休問更有江聲撼一州題上清宮一徑緣雲徹上臺玉樓銀闕冠崔嵬連峯衮衮從天下迥野茫茫匝地開曉日重溟紅浪湧夜燈千嶺瑞光來却歸下土人應怪身自瑶池閬苑回留題修覺山絶勝亭余昔於峴首壁間見一蜀中監司題字云景物似新津之修覺今登絶勝亭徘徊久之亭似恨偏江似恨小而雜平逺似恨不甚廣轉至寺三門西望卭江頗濶眼界益寬蓋庶幾焉因題五十六字古寺幽巗萬木稠蜀川一覽盡西州依微逺樹低平野散漫清江吐亂洲老眼乍明疑峴首歸心忽動憶槎頭當年風物悲遊子子美應同故國愁風物悲遊子子美詩也子美亦襄陽人豈其有所感耶題廣利院翠嶺蒼巗帶落霞水雲平野一川斜二山相距無千里數口俱仙有兩家仇穴便當營草屋武陵何必訪桃花擇鄉試復詢風俗善政人人令尹誇寄題謝景思藥寮仍用其韻城府年來怪迹疏端因藥圃滯巾車芒鞋入谷親尋種野服巡欄自把鋤室藹芝蘭無俗物房深花木稱僧居他時猿鶴休驚怨安石寧終老一墟同鮮于蹈夫管養正飲衛氏雲亭誰結危亭古岸頭雲容水態入簾鈎數峯嵐翠欲排闥半夜溪聲礙枕流入坐煙霞終日秀對牀風雨一燈幽那知戎馬紛紜際杖屨相陪得勝遊同龐彥才晚酌於涵翠軒登臨到處久徘徊水色山光滚滚來百頃煙村抱城郭數峯雲水擁樓臺千篇取足詩材賸萬軸橫陳畫笥開清興窮探猶未厭更投涵翠舉餘杯上曽二丈仲成湖海元龍氣尚豪笑談誰料已霜毛文章家法西京在兄弟才名北斗髙欲取功名酬老大豈將州縣歎徒勞登壇不獨風騷將出幕他年看節旄憶拜氷壺日下時先君未老我方兒庭闈一閟成今昔世路重來太險巇風義肯忘三益友姓名願入八哀詩遺孤么麼何能報泉下幽魂儻有知患難餘生二十年一身孤苦百憂纒文章昔謂古可到蹤迹今為人所憐憔悴形容勳業鏡歸依空寂祖師禪不孤雖有山公在恐逐龍舒下九泉和關子東笻杖老境生涯正倚君周旋夷險共悲欣最憐磊磊多髙節未肯斑斑出異文漢閣燈來徒照夜葛陂龍去謾拏雲願為靈壽扶黃髮廊廟他年看勒勳落梅春意枝間忽暗驚乘風作陳去縱橫蒼苔可忍欺香骨粉蝶無端亂舞英有恨應羞霜月照鍾情猶賴晚風輕夢回一夜頻搔首腸斷空階驟雨聲香殘粉暗若為情寂寞空餘瘦影橫雨後園林無玉樹朝來庭院滿瓊英浮雲冉冉當風盡飛雪飄飄落砌輕廣武為君聊一歎羣花從此擅名聲挽季通判六藝心老益尊此邦耆舊衆推賢髙文早出諸儒右清節宜書獨行篇白首可憐才半刺朱衣猶得貴重泉佳城一閟成千古寂寞哀笳慘暮煙挽王教授子節父綵衣方喜奉安輿丹旐俄驚返故居已作善人稱里閈固宜隂德大門閭悟超庭柏心無礙香茁階蘭慶有餘哀挽一聲寒日外蕭蕭風樹鎖郊墟題蒙泉西北峩峩疊嶂來濤奔浪湧勢難回忽臨城郭千峰住下有源泉萬斛開魚鱉寧容腥沼沚池素無魚蛟龍曽是起風雷平時寂寞何靈響嵗旱方知濟物才禱雨輒應和友人弟兄南渡各馳驅幾奉君王尺一除黃耳音書寄懷抱烏衣門巷惜丘墟澄清孟博榮持節雅量玄平靜著書五桂家風殊未艾黃山佳氣藹如初坐閲江城嵗月遷心勞政拙豈能賢昔遊泉石迷尋訪故里風煙喜接連聊假頒宣行素學敢將遲暮歎華顛他年良史徵佳什會入西京循吏篇和眉守王郎中驚風鴻鵠各翻飛同落西南蜀一維一日三秋雙鬢改兩鄉千里寸心馳清香燕寢多佳致逺景樓臺發妙詞只恐江山留不得賜環聞已下丹墀壽台州黃守千載初平慶未窮本支今復見仙翁當年郜鼎爭尤力此日于門報已隆政尚寬和承祖烈量涵清濁稱家風賜金增秩知非晚行看絲綸下禁中壽處州徐守三首僕射文章六百春人間又見石麒麟朱顔白髮古仙伯和氣清風今德人出處三朝常守道承宣千里更宜民聖時共政須耆舊歸去千秋輔紫宸共理經年惠利豐此邦歌頌藹提封仙都洞府春風好處士星躔瑞氣濃道向偓佺傳口訣禪從摩詰悟心宗世間功業公餘事平日髙情薄萬鍾赤矢朱弓祖慶綿五雲吉夢世生賢嘉時浹日迎重九景運中天恰半千律播金商資爽氣露和瓊屑引遐年壽觴莫負専城貴好對西風醉管絃留題光相寺至人悲念攝冥頑倏見光明指顧間億劫未曽親見佛一宵今得暫棲山從來業障須除結此去功名直等間欲以殘年奉香火塵勞無計戀松關挽張直講早嵗英聲已絶塵暮年髙節更殊倫絳帷久擅詩書樂朱邸頻釃酒醴醇不許功名書竹帛秪將文行照簮紳鄉鄰若欲存遺範祭社端宜配古今和李清卿雪浩蕩天花弄曉光春風未轉忽芬芳人躋物外紅塵逺境墮壺中白晝長風栁冷飄三月絮寒梅幽寄一枝香朝來暴喜家風貴圓璧方圭滿舍旁吳明可寄詩次韻為答兩地相望百舍強相思空結九回腸君家滄海賔初日我戍衡山俯夕陽情話何當傾肺腑倦遊聊復信行藏求田問舍真長策捧檄榮親道更光房公湖余兩過漢宿房公湖上不暇題詠任德廣攝郡事來索鄙詩追賦於益昌總領廨舍金雁橋南二頃湖房公遺迹未湮蕪人遊杜牧晚晴賦境對王維别墅圖經始林泉心自巧折衝廊廟術何迂當時只作幽人計留得陳陶四萬夫皇華館以上已落成因修禊事題詩紀之泉上新臺紫翠環暮春修禊俯潺湲漢流尚帶桃花水雲氣初披杏子山栁絮輕揚晴日暖竹光不動午隂間時和嵗稔遊人樂一醉聊開病守顔杏子在軍之西天每欲雨則此山出雲收則雨止呂叔恭運使和題皇華館詩復次韻何處溪聲響佩環洗心堂下轉潺湲數株古栁枯臨水百畝叢篁翠倚山嵗久刋題多泯滅時清景物自幽間軺軒登覽留佳句頓覺林泉發妙顔帥漕復次韻再和二豪詩律晉江東迭倡更酬卷軸豐狎主齊盟爭定霸互為勍敵鋭臨戎波瀾已得江流助組麗仍依錦段紅入蜀詞人多妙句向來嚴杜一編同中秋同兒姪登寶峯亭絶頂憑欄思有餘滄江下眺眇三隅月光此夜十分滿風色今朝一點無鄉國不須悲楚蜀庭階且喜集封胡史君邂逅分鮮鯽斫鱠還成逸少圖缺題天梯雲棧轉龍旗細雨凄風暗路岐七夕難忘祈巧夜三鄉不似望仙時曲江若悟賢臣語汾水寧傷才子詞此日鈴聲腸斷處後庭遺唱未為悲大龍湫余聞大龍湫之勝舊矣嵗暮來遊水泉收縮僅存微溜無復壯觀與平時所傳不類殊未快也因留此詩以為再來之約瀑水傳聞舊壯哉飛流亭下久徘徊玉龍鱗甲寒猶蟄銀漢波瀾凍未開斜日湫潭微濺雨深冬天地不鳴雷斯遊未快平時意更擬他年得得來次韻劉南伯二首曉來庭竹碎秋聲令我思君重愴情三畫當年曽擅價五言今去合知名賦歸已荷因風寄釃藇終期對月傾但願官軍破驕敵不妨淮海寄餘生十年蹤迹困邅如多謝韋郎肯寄書千里漫尋苕水夢一㕓方對相山居歸心不為蓴鱸切交契應間簡牘疏近向錢塘得嘉種秋盤何日共新蔬次韻王圜中二首網得金鱗不忍烹一甌春菜眼偏明逢君強賦湖隂曲顧我方趨日照城散坐酴醿留客醉過庭鵯鵊為誰鳴還朝密邇非輕别知有蒲輪訪姓名舟兀東風怯曉寒緑楊堤畔見青山遡流不礙朝天去掉鞅何當拜命還半世光隂憂患裏他時勳業笑談間兒童似覺吾衰老只欲西歸便丏間次韻制帥和王憲二首淮水綿綿不絶流渡江龍化復東遊宗盟尚詫當年盛交分還欣此日投名並卭郲公等繼政稱京兆我難酬得時俱為公家計三窟寧當各一州二麥初收堰水流西園飛蓋使君遊羽旄每出邦人喜壺矢間同坐客投膏雨應時和氣洽豐年有兆頌聲酬政成訟簡追胥息鎮靜西南五十州次韻陳勉仲見留之什新詩俊逸走風雷愧我馳驅欲強陪花外疏篁青掩映門前流水緑縈回髙情好客長留客勝賞傳杯莫放杯老懶畏寒朝睡美報章淹緩莫相催寄制帥五郡馳驅兩月忙少城春事杳相忘鷅鶹鳴處韶光老鵜鴂聲中旅思長曽為青山迂客路莫偕紅斾訪仙鄉浣花時節歸期近猶及遨頭共一觴和制帥離索堪驚嵗月忙少城遺愛未曽忘西園尚記英遊並南浦空嗟别恨長壯志且窺勳業鏡髙情休憶水雲鄉玉關柝靜邉烽息漢殿歸稱萬嵗觴和制帥按部經時走四封雲山有路寶巖通普賢相對圓光裏摩詰不離方丈中公自稱遺安居士此句謂公不預遊山也喜有篇章交寄逺恨無羽翼可凌空來詩忽作蛟龍吼三日能令兩耳聾自憐麋鹿性疏頑心在雲林迹世間每厭塵埃驅俗駕不辭險阻訪名山池魚得意時歸壑廏馬長鳴暫出間萬仞峯頭曽進步禪機一撥透三關力求見佛上天梯忽覩光明志意迷華藏神通驚變現臺山公案好拈提太沖漫作三都賦子美全無一字題今日諸賢賡妙句強驅駑駕力難齊卿月中天照上流使星入蜀久西遊蟠胸經緯開碁局出手梟盧轉博投學有淵源流不竭詩如珠玉價難酬詞章怪底猶雄健棠蔭曽聨栁栁州又和勝遊每恨不相同郵遞猶欣日日通玉帳未容佳境到雲山已在好詩中靈珠忽富千金贈凡馬堪嗟萬古空展卷髙吟知幾過大音一震耳根聾塵勞汩沒老尤頑遍走岷峨杳靄間筋力已疲難報國田園有計即歸山何期俗駕經時出却得浮生數日間已請一麾江海去故應生入玉門關新篇孤峻絶階梯照眼光芒五色迷已向詩壇稱獨步不妨祖令更全提來詩多雜禪語真空雅與髙情契絶景終希大手題餘事文章暫遊戲要將李杜與名齊住因得坎去乘流萬里西南更倦遊三徑未成歸計晚一尊猶喜故人投小篇偶寄詩筒去佳句還勞驛使酬得與諸賢更倡和故應盛事播西州渾醉庵詩并序襄陽姚格去非弱冠出入兩學逾四十不第一時場屋故舊班班為顯人而去非落魄混於酒徒窮日夜以飲無算中間得病瀕死朋友止之稍止而復飲今年長矣量少減而嗜之不衰雖常以此病然其所以安於沈滯而無羇窮流落之歎者亦酒之力也丞相髙平公來丹丘鄉閭親舊依之數十家酒醴之會去非無不與蓋一日不飲則愁思無聊若不可過者腳逡巡諸好事之門必得酒乃已酒盡輒去挽之不留也髙平公既為設醴諸鄉人亦更飲之而去非又善俯仰人事與物多可旁尋外邏不擇所主有酒輒從之是以能活於此髙平公因名其寢曰渾醉庵鄉人王某賦之以詩去非曰幸甚凡與我遊而能詩者吾皆將請焉子併為我序之故云人間嵗月都幾許醉裏光隂差較長千日不醒終有盡百年渾得要為常故人屢過無窮巷一室能寬有醉鄉好事不妨多酌我老來無復次公狂又題鴻祐寺石佛山頭日欲頽尋僧不遇懶空回青鞋布襪雲門路柱杖穿林歸去來戲景思明鏡佳期故未忘月圓人缺恨何長陽臺朝暮誰為主夢裏時時怨楚王顔色傾城藝更精愛卿長是説卿卿卷中昔日崔徽貌重見應憐太瘦生題鄧寨周氏小園詩徑草荒春緑作堆東風深入小園來可憐幾陳嫣香裏立盡庭前數樹梅病餘兀坐偶成二絶寂寂經旬病卧家起來都不記年華一聲簷上驚秋晚墻外初聞賣菊花病骨欒欒瘦轉加秋風怯傍小窗紗蕭然丈室維摩觀一炷清香到日斜倚江亭會上虞伯逵送梅花并二絶句坐上次韻併調賀子忱腸斷江頭索笑花三三兩兩逐枝斜忽隨清絶驚人句來自西湖處士家喜見江梅又著花插來不怕帽簷斜髙標幽韻誰真似人在風流賀監家賀子忱家侍兒有以梅名者和姚令威春隂四絶急雨顛風帶海煙白頭腸斷落花天東風為買春光住栁撒黃金榆擲錢十日春隂晝景微鳴鳩逐婦幾時歸柔桑細麥寧馨長落絮遊絲可解飛雨過山村緑滿陂紅芳漸少翠隂低春風吹草依然碧潮水浮花却自西休對風光感物華且將春酒趂春賒一聲杜宇芳菲晚只有荼䕷芍藥花題延慶觀六時泉千尺髙崖屛翠琰六時甘露雨真珠梯巗穿壑身親到始信仙靈境界殊和尚書李丈六絶丈人詩律照青春句到諸郎副析薪特許八分傳阿買囊收珠玉破清貧風光無賴惱詩翁健筆凌雲思未慵長句數篇欺白雪江山浩蕩發春容近侍三朝捧御牀宮衣猶帶內家香殊庭更得流霞助杖屨春風步履強休論世事苦悲辛龍卧南陽自有人指日承明却歸去煙花紫禁及青春經旬山雨暗春輝桃李成隂總未知試逐東風入城市不妨尊酒暫娛嬉雨過千山翠色重羣花欲盡絮飛空牡丹寂寞芬芳晚日暮朱欄獨倚風題真符道中山寺江路南風漲白沙鐙驢來憩梵王家片雲忽作蕭蕭雨夢斷僧窗日未斜題前詩已天忽作雨戲成一絶嵗暮靈泉水未饒蒼崖無復舞飛蛟詩成不覺天零雨料得神龍欲解嘲鐘鼓山間久雨二絶山雨蕭蕭不肯住天寒雲愁光景昏桃李紅白春風面有恨無言空淚痕髙林縹眇強可見茅屋半山煙雨昏誰家一幅鵝溪絹古畫猶存水墨痕次韻王司户梅花五絶不得用古人意及比婦人玉雪并潔白等字牢落天涯邂逅逢清愁幽恨與誰同故園腸斷三千里客裏看花嵗又窮溪外人家處處栽三分蓓蕾一分開故教嫩萼參差發似要幽人次第來可耐幽花發較遲殷勤為倩曉風吹朝來策杖探消息香處初開一兩枝聞説江梅已惱人衝寒著意去尋春枝枝細看枝枝好嵗嵗相逢嵗嵗新一嵗都來幾日開一開能得幾回來清尊留待溪邊月不怕山城晚鼓催和錢處和梅花五絶萬木歸根冷未滋可憐孤絶發寒枝心期本在氷霜後占得隆冬未恨遲枝上春風漸有涯斷魂初見兩三花一尊盡日看無厭更待參橫月影斜莫欺玉蘂瘦欒欒中有江南長恨端白髮天涯歸未得年年老眼淚中看鐡心開府不妨狂賦語清便獨擅唐堪笑離騷窮逐客只知蘭蕙有幽香林下風神物外姿閨房秀色鑑中竒兩家標韻誰兼得會有多情識者知以鼎爐遺關子東有詩相謝次韻君家聚古無不有不腆敝器何足竒兩首新詩愧虛辱恨無郜鼎為君移贈君劍川八卦鼎一餅清泉終日然淨几明窗讀周易妙香時炷不論錢送海棠與姚令威酣酣芳意不勝春一笑嫣然惱殺人分寄多情還解否要教國色在東鄰謝景思惠酒并二絶時宗守邀看上元景思不至次韻户外驚聞剝啄聲東山消息到柴荆兩章著意撩衰白風味相扶有麴生使君髙會著幽人燈火元宵醉夜分博士從來文字飲不妨聊復醉紅裙饒守陳粹中有詩見留次韻為謝相逢一笑又相離腸斷登臨送别時久占都亭慚重客秋風回首片帆遲郢守喬民瞻寄襄陽雪中三絶因追述前過石城杯酒登臨之勝為和滄浪渡口莫愁鄉萬頃寒煙木落霜珍重使君留客意一尊芳酒醉斜陽江上危亭思黯然追遊陳迹欲經年别來西望應相憶郢樹荆門共一川白雪樓傾不記秋樓前江水自悠悠多情猶憶湖南守一曲陽春白盡頭僕舊遊白雪樓見張休詩石刻尾章云美人莫唱陽春曲白盡湖南太守頭今石已亡民瞻詢於老吏遂得其全篇云將復刻諸石
