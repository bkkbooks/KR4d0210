body:
  text: 漢濱集卷四宋王之望撰表狀賀皇太后回鑾成書表慈闈久服大典初成埀簡䇿以增光罄幅員而共慶竊以鄭開大隧猶誇考叔之功漢割鴻溝乃逸侯公之語傳傷溢美史恨闕文偉哉聖孝之隆著此信書之實恭惟皇帝陛下樂天而保大屈己以寧親億萬斯年躬定太平之業五十而慕日承長樂之歡冠百行以無前作一經而詔後臣逺將使指阻造朝班編之詩書喜鋪張於偉績老於文學期歌頌於中興荆門軍謝到任表傳經庠序愧非重席之才假守湖山更忝分符之寄肅趨官次祗戴君恩伏念臣窮苦寒生羈單冷旅始延世賞旋䇿賢科逢聖代之崇儒入賢關而講藝三年訓詁安朝暮之虀鹽萬里丘墳感春秋之霜露惟兹小壘密接故鄉久深懷土之情忽冒專城之寵田萊雖曠已稍復於流逋風俗還淳爰絶希於鬬訟獲承人乏實便已私此蓋伏遇皇帝陛下功濟羣生仁侔列聖不泄邇不忘逺允恢無外之風在知人在安民尤謹惟良之選顧雖庸鄙亦玷使令臣敢不悉意頒宣究心撫字顧聖朝有勞來還定之政可舉而行使斯民無歎息愁恨之聲庶免於戾潼川運判到任謝表熊湘持節方虞瘝曠之誅梓蜀觀風忽假轉輸之任叨逾滋甚感惕交深伏念臣儒業荒踈吏能淺薄比玷外臺之寄朅來南嶽之陽道德意志慮於逺民雖殫夙夜行斂散阜通之良法蔑效涓埃敢期申命之頒曽靡終更之待矧潼江之一道亞益部於四川惟將漕之攸司久攝官而虛次俾承空乏宜屬賢能豈謂凡才乃膺遴選此蓋伏遇皇帝陛下躬湯一德執舜兩端王業載隆久同符於治古使華分遣尤加意於遐方故雖綿弱之資亦誤使令之末臣敢不悉心餉餽畢力驅馳謹留州送使之常務一遵於憲度體足國裕民之制期兩便於公私潼川提刑謝到任表久司飛挽之權曽微善最就易平反之職不改部封命節增華汙顔有靦伏念臣早専朴學晚竊賢科顧朝廷渥澤之所加何臣子㳙埃之足道祗安愚分忽誤明恩惟諫官御史之昌言必大夫國人之公論敢圗列薦濫采虛名遂煩聖造之曲成斯實清時之盛美資聨內閣奉裕陵丕顯之謨體重外臺光蜀道皇華之遣靜思踈逖可謂超逾此蓋伏遇皇帝陛下日月照臨乾坤覆育申九歌於帝典嚴八柄於天官信任臣鄰曽四目四聰之弗壅甄明爵賞雖一嚬一笑以無私致若孤蹤亦膺異寵臣敢不激昻晚暮黽勉事功雲漢昭回方問乘槎之上井參捫歷更輸叱馭之忠茶馬司進馬狀位正九重欣覩聖明之造心傾四海願修職貢之祥前件馬來自殊方育之外廄載驅逺路雖慚八駿之良入獻大廷敢備七騶之副茶馬司合進銀馬狀盛德重明出撫帝王之運綿區同載畢修臣子之恭前件物常賦之餘殊方所出精良入貢間居三品之珍駔駿效牽敢備七騶之副皇太后聖算八十賀皇帝表三朝受籍屬臨文德之朝萬嵗稱觴式展慈寧之慶化流寰宇歡動宫闈恭惟皇帝陛下性體堯仁躬行舜道於斯為盛承太姒之徽音受祉既多小魯侯之燕喜禮成中禁福集新元孝感仁明格母儀於上壽澤施耆艾慰人子之至情臣承乏外臺與聞盛事千官入賀想環珮之丁當四海霑恩快雷風之鼓舞皇太后升遐慰皇帝表夙鍾慶祚誕育清躬艱難百罹從先皇而北狩始終七閏享大養於東朝方延上壽之期光撫中興之運何期窀穸永隔晨昏恭惟皇帝陛下孝慕至深悲摧罔極願追承於理命用少抑於聖情臣使事有拘不遑奔赴闕廷臣無任銜哀抱痛劈踊感傷之至謝授太府少卿四川總領到任表二列卿於外府猥厠廷紳主經賦於上遊仍將使指省躬曷稱拜命知榮伏念臣少本拘儒老為俗吏偶明時之弗棄乃煩使之屢更去朝初自於乞麾入蜀繼叨於移節驅馳九載綿歷五司雖殫夙夜之勤蔑有㳙埃之效薦蒙增秩比復賜環雷電取將已下仙官之敕蓬瀛且至却回方士之船渙號申頒訓詞溢美亞班聨於七寺之長督餽餉於六師之屯引私諱以有陳觸報聞而莫避凌兢就列顛仆是虞此蓋伏遇皇帝陛下道配施生恩函動植公聽逹四聰之壅兼收屈羣䇿之長詢事考言判人材之真僞循名責實極王政於清明致若孤蹤亦塵劇任臣敢不交修食貨兼裕軍民江漢朝宗徒抱愛君之志井參捫歷益堅許國之心謝授太府卿表主計坤維苟逭曠官之責升華月寺忽驚增秩之榮更膺修舉之褒愈切叨塵之愧伏念臣早專儒學初乏吏能於財賦以何知尤性資之所短矧當調餉乃誤使令宿重戍於三邊開新疆於兩路轉輸粗給皆朝廷申畫之明凱捷屢騰實將帥驅馳之力夫何綿薄猥冒恩光此蓋伏遇皇帝陛下仁孝獨隆德刑並舉聰明睿知而不殺偉略無前是非賞罰之已明微勞必録故雖踈逺亦被甄收然臣衰病日侵事功難彊投閒置散已屢貢於忱誠治劇濟煩恐終辜於寄委願回淵鍳俯照丹衷賀降赦恢復州軍車駕親征至建康府表敵勢方張國威旋振輿圖席卷宣渥澤以規恢禁旅星陳幸留都而經略普天同快振古希聞竊以皇天眷有宋之仁全付所覆强敵乘中衰之運洪惟作威慨念遺黎久淪虐政屬烽烟之告警渝信誓以稱兵不戢自焚果速乾溪之禍有征無戰遂收淝水之勳勞軍親屈於時巡撫逺肆推於霈宥恭惟皇帝陛下沈幾獨運英武無前以安民保大之心伸取亂侮亡之舉天回日轉爰興順動之師雨施雲行用慰來蘇之衆漢祖威加於四海唐宗耻雪於百王臣備使遐陬欣聞盛事執玉帛而趨禹曾莫陪方嶽之朝被金石以昭聖功願刻神丘之頌天申節賀表赤伏告祥式應興王之運濁河變色聿丁誕聖之期彌月載臨普天胥慶竊以社稷靈長之祚有開必先祖宗積纍之休克昌厥後方斗樞之呈瑞適星火以揚輝實真人受命之符見炎德中天之兆恭惟皇帝陛下順帝之則與神為謀堯巍巍而成功已清國步舜業業而致孝允格天心措一世於安榮躋兆民於仁壽屬此載生之節肇稱久曠之儀廣庭上萬嵗之觴百辟獻千秋之鑑九賓咸設六樂具陳長樂承顔應記熊羆之夢寶鄰修聘永休貔虎之師臣濫守偏州莫觀盛禮祝松椿之算願效華封傾葵藿之心徒瞻魏闕寶運有開亶聰明而作后寰區胥戴祝富壽以多男凡懷傾日之心共慶流虹之旦竊以嵗在娵訾之分藝祖肇生律中㽔賓之音大辰畢見惟聖神之誕育推年月以應期知真人受命以同符昭大德中天之有兆恭惟皇帝陛下明同離照健協乾行舞階敷虞舜之仁問寢躬文王之孝鴻圖永固方將混文軌於車書鳯厯長新豈特等山河於帶礪臣軍符濫假官守攸拘稱萬嵗之觴阻趨漢殿上千秋之鑑徒慕唐臣賀太上皇帝遜位表淵衷素定上格皇天神器至公親授天子乾坤清謐華夏歡呼恭惟太上皇帝陛下政始憂勤功收保定正南面而恭已三紀垂衣為天下而得人一朝脫屣發於獨斷不待耄期戴黃屋以非心神交姑射席白茅而問道壽比崆峒臣久荷寵靈逺司餽餉讀詔書而有感頌歎徒深仰遜德之無前名言曷既茶馬司賀太上皇帝遜位表遜位元良法大公於堯舜儲神淡泊娛至道於羲皇曠代希聞溥天同慶恭惟太上皇帝陛下功超邃古澤被生民積三祀之憂勤既臻耆定厭萬幾之繁委自處沖虛眇大物而遊於初舉神器而授之子必得其壽如聖德何以加兹不離乎真非至神孰能與此臣親逢濶典邈在逺方績效無聞已辜恩於使節馳驅既久徒結戀於君軒賀皇帝登寶位表惟天與子聿膺內禪之傳為民作君光撫中興之運九廟有尊安之勢萬方同愛戴之誠恭惟皇帝陛下德本天生學由日就英特同符於藝祖慈祥並美於仁宗方上皇以昭曠宅心厭錢穀甲兵之問宜聖主以元良繼體為謳歌朝覲之歸百姓與能諸神受職揖遜行巖廊之上孝慈形宇宙之間盛事無前道已尊於二典髙風所暨化終格於三苖臣濫厠卿聨出將使指飛龍御極欣逢踐阼之辰流馬餉邊莫預稱觴之列茶馬司賀皇帝登寶位表監國撫軍方重元良之寄握符秉籙遂膺揖遜之歸和浹三靈歡均四海恭惟皇帝陛下道參蓋軫英類祖宗天生德以應期人與能而歸命帝堯克讓既高黃屋之心夏啓有光果獻大橫之兆爰正重離之位肆推作解之恩臣濫綴卿聨肅將使指六龍在御徒仰慶於時乘百獸旅庭曽莫陪於率舞謝權戶部侍郎充川陜宣諭表解外計於坤維方趨召節攝二卿於民部就假使軺懇避莫伸凌兢罔措伏念臣早更多難晚遇明時以疏拙之腐儒玷光華之煩使併總四川之賦粵躋九列之聨未乏軍興實禀朝廷之令初無吏最偶寬司敗之誅屬衰病之寖加覺事為之難彊懼瘝劇任屢丐真祠俄奉命以造朝已理裝而即路宸綸載下從橐超升留二星參井之墟停八月斗牛之泛惟版使設文昌之副未始外除而王人專德意之宣必由中遣夫何凡品獨誤殊恩此蓋伏遇皇帝陛下道本心傳學由日就以重華文命之懿承貞觀開元之風詢事考言特謹人材之用循名責實坐觀王政之行遂使孤踪亦叨重寄臣敢不爰咨逺俗誕布皇靈陳力無堪徒抱捐軀之志投閒有請終希從欲之仁謝授戶部侍郎參贊軍事表領邦計於版曺再叨舊物佐樞臣於油幕仍冒新除顧綿薄以奚堪負憂惶而罔措伏念臣幼專朴學老際昌辰忝列卿之秩而總軍賦於西南偹法從之聨而宣王靈於梁雍徒承空乏曷補事功引衰疾以丐閒奉真祠而得請平日之孤忠自信豈恤乎羣愠之浮言當官則直道而行所恃者清朝之公論儻匪聖明之照難逃讒慝之傷洎全璧以遄歸俄賜環之亟下方辭召命已錫贊書惟柬記之若斯信糜捐而莫報此蓋伏遇皇帝陛下堯聰稽古舜孝重華情僞周知日容光而必照震驚是堲雪見晛而聿消故雖疏逖之蹤亦誤頻煩之寵然臣心欲為而力不逮耄既極而病復侵若辜奉於洪恩必盡隳於素節欽承威命未容伸傴僂之私俯鍳丹衷尚終冀精誠之感謝吏部侍即表再二計曹初無補報亟升選部益愧叨逾仰戴恩私伏深震悸伏念臣比緣抱疾亦既投閒旋召復於故官仍外參於督府洎䝉賜對遂俾留中繼寓直於禁林俄出將於使聘未决辭榮之請益懷避事之心期仗節以還歸即丐祠而引去豈圗僥幸更冒寵光此蓋伏遇皇帝陛下唐帝聰明漢皇豁逹賢才是急形夢想於精神賞罰靡輕嚴笑顰於勸沮致兹冗職亦誤褒遷臣敢不戒在瘝官審於量已不能者止况堪衰病之侵有欲必從終冀生成之造辭免參知政事表超升政地局蹐靡遑荐奉德音懇辭未獲瀝危𠂻而瀆叩兾淵聽之終回竊惟以明主而責愚臣何能稱塞以小材而膺大任必至顛隮矧今聖哲馳騖之秋非如國家閒暇之際錢穀甲兵之問日至廟堂毫釐晷刻之差患貽寰海使陪國論正藉人材如臣早實腐儒晚更煩使雖到關甫周於一嵗而乘軺凡閲於三時內充諫諍之員外忝將明之寄有何績效遽冒登庸顧微臣自愧於心顔則公議豈逃於指目伏望皇帝陛下保全孤迹追寢誤恩若以為粗可使令願容臣伸辭尊居卑之義或猥欲加之德意願遲臣宣積日纍久之勞庶幾授受以無譏可免叨逾而取戾謝除參知政事表備爭臣而諭旨蔑著顯庸躋政地以出綸驟膺親擢控忱誠之懇切頒訓告以頻煩拜命若驚省躬甚惕竊以虞舜紹唐堯之緒五臣舉而至治彰武王恢周室之基十亂升而大勳立惟輔理承化者非一賢之略必同寅協恭而廣衆正之求矧今三邊未寧庶事多舛民生既匱國是易搖天災時變之占每深寅畏旰食宵衣之慮特軫憂勤陛下妙簡臣鄰旁招俊哲列之丞弼責以謀謨蓋將外撫四夷內修百度振藝祖創垂之統酬光堯付託之誠自非兼文武之弛張效忠嘉於啓沃學邃古今而通其變才周軍國而措之冝則何以上贊辰猷下符僉論如臣者斗筲小器鉛槧腐儒徒以險阻艱難之備嘗稍諳俗狀故於東西南北而不擇自勵公程久絶望於榮塗復何心於晚節向者召從巴蜀歸覲闕廷初無左右之容遽被神明之照未更一嵗殆及九遷版部銓曹綴獻納論思之末禁林諫苑充文辭言語之官皆暖席之未遑已抗旃而于邁心欲為而不逮者精力勞則有而何取於事功遲休榆塞之防秋丐老莵裘而卒嵗敢期僥幸乃爾超逾除二府之自外方追慶厯名臣之殊遇由七人而參大政蓋本朝歷世之罕聞兹蓋伏遇皇帝陛下照讒誣若七政之明定許豫若四時之信祗承於帝思鋪張不世之休無競維人每夢想非常之士遂令猥瑣亦玷登庸臣敢不鞭䇿疲駑支持衰病仰體丁寧之旨對揚特逹之知際㑹風雲方快覩亨嘉之運奉承教令期助成宏逺之規除參知政事謝德壽宫表禁闥備官冒綴七人之列巖廊陪議驟參四輔之聨仍兼總於事樞俾悉聞於國論恩榮不次指目謂何伏念臣識昧經邦才非濟務少專末學粗知涉獵之勤晚際昌期積有超逾之愧自橫經於太學旋揭節於外臺雖崎嶔流落之備嘗顧智略謀猷之莫效繡衣直指曽微膚使之稱華衮示褒冞益孤臣之懼逮嗣聖紹開於景運宜熙朝並列於羣材藐是陳人躋於法從矧帷幄方恢於逺馭而干戈未戢於中原畢千慮以陳愚冀寬宵旰罄一心而盡瘁曷補㳙塵敢意孤蹤遽叨巨用此蓋伏遇光堯壽聖太上皇帝陛下軫深仁而念舊擴大度以包荒曲盡初終致兹圗任君臣胥契真成千載之逢神聖相承曷副重離之照惟堅素節以報洪私謝除端明殿學士表輔政巖廊實曠近司之職奉祠珍館猶叨祕殿之名抗章爰罄於懇辭出綍重勤於中諭危𠂻易感衰涕交零伏念臣濫得虛名本無實用雖屢膺於煩使曾靡效於微勞召於久外之中遽有非常之遇粵由侍從擢置疑丞自知綿力之不任幾犯威顔而引避屬邊隅之正擾致志願之未伸卒繇罔功上辜殊奬人言荐至宜典憲之必加聖度優容暴愆尤而弗忍曲全體貌以示眷憐深慙顛仆之餘特費保持之力兹蓋伏遇皇帝陛下聰明天縱忠厚風移嘉善而矜不能士無失職觀過各於其黨民用歸仁故俾孤蹤獲逃重譴臣敢不杜門念咎擊壤待終尊主庇民已負平生之志殺身報德空餘未死之心除端明學士謝德壽宫表預政罔功已曠輔臣之職奉祠竊食尚叨祕殿之名撫已知慚拜恩有靦伏念臣本無實用濫得虛名曩煩使之屢更曽微勞之莫效召從逺外服在論思所除者乃中外之要權所任者皆安危之重事遂由諫省起置政塗獨深明主之知躐處羣工之右實道家之所忌宜衆怨之必歸雖英賢任此以猶難以罪戾居之而豈免果嬰物議致聖神曲費於保持特屈刑章俾體貌得全於終始危蹤未隕厚德難名兹蓋伏遇光堯壽聖太上皇帝陛下視逺惟明允恭克讓彰善疸惡炳日月之照臨忘過計功廓乾坤之覆育故如孤弱亦逭顛隮臣敢不自訟前非益堅素守桑榆晚景知莫報於涓埃松柏嵗寒誓弗渝於金石謝賜臘藥表一札細書幸拜王言之寵萬金良藥恭承御府之頒加體貌以冞優銘肺肝而不朽伏念臣猥䝉隆眷易守名城顧惟宣化之初未有及民之效方日虞於瘝曠乃上軫於記憐錫以寶奩實之珍劑增榮改觀咸知聖主之不遺蠲疾去痾頓覺殘骸之復壯兹蓋伏遇皇帝陛下恭而接下仁以愛人謂臣昔與政機曽忝贊襄之任念臣今叨郡寄適當凝沍之辰爰示匪頒用加摩撫臣敢不仰承嘉惠欽挹至和邪氣不奸庶逭陰陽之冦餘齡可引難酬天地之恩謝賜臘藥表臘曰嘉平適届祁寒之候禮亦異數特頒名劑之珍拜賜有加感恩無極伏念臣禀資愚陋遭世休明一叨閫寄之行兩見嵗華之易顧桑榆之晚矣恐衰病以相陵有草木之滋焉庶頽齡其可制曲荷記憐之及乃分服餌之良五色有光萬金非重兹蓋伏遇皇帝陛下仁能濟衆惠足使人謂臣頃在政塗曽預都俞之末念臣今居藩服或愆調攝之宜假以寵靈示其體貌臣敢不欽承茂渥仰戴洪私何必餐霞徒愧頭顱之老未先溘露庶殫藥石之忠謝賜厯日表閏以正時欽授若天之厯言惟作命誕敷率土之臣凡在照臨迪知遵奉恭惟皇帝陛下輔宜交泰合德純乾其智如神心鑒二篇之䇿以星為紀面稽七政之衡肆頒致日之書式定歸餘之嵗臣敢不仰承帝則俯相民生春析夏因深體奉時之意夙興夜寐聿求熙績之方謝賜厯日表奉若天道爰建於夏正欽授民時聿遵於堯典伏膺嵗錫祗拜王靈恭惟皇帝陛下功配堪輿德髙宇宙調四時於玉燭轉一氣於洪鈞懸象日月星辰式觀大運布治邦國都縣普及綿區臣監守偏城亦叨寵錫頒宣皇澤雖慙符竹之分申勸黎元庶謹田桑之候謝水災免降官表告災敢緩宜從必罰之科宥過以寬特反惟行之令拜章自劾畫㫖報聞懼劇履氷感深漏網伏念臣性尤踈戅老益眊昏尚承乏於海邦實虛糜於廪食頃者風潮之變稍為秋稼之傷曾弗預言殊乖共理數馬以䇿而遲其對所以嚴事上之恭畫跎為足而敗於成蓋欲條惠民之政既素體憂勤之意乃或稽疾苦之陳顧鐫秩以猶輕何計功而幸免此蓋伏遇皇帝陛下仁同天覆德與春溫樂善無厭雖微勞而必録使臣以禮非大故而不遺致令曠職之孤蹤得逭黜幽之重譴臣敢不捐軀效報沒齒銜恩罪不逃刑當益勵古人之節退思補過庶不貽明主之羞謝遺漏放罪表政無善狀災延及於千家國有常刑恩特寬於三尺省愆無措徼幸居多伏念臣猥冗無堪叨逾已甚辭價藩而引疾移便郡以空餐雖支離老病之餘不勝其憊而勉强米鹽之細無敢弗勤然撫字乖方布宣無術積其釁咎馴致禍殃盲風怪雨之相仍三時薄害回祿祝融之不戢連日煽威計間架而甲令有誅待譴訶而封章亟上纍然席藁凛若負芒敢期解網之仁誕委覆盆之照貸其罪戾爰及官僚收召驚魂即安舊服此蓋伏遇皇帝陛下量函四大明察萬微任賢使能既振中興之烈記功忘過更隆上施之光致若孤蹤得逃重劾臣敢不仰遵訓敕俯恤困窮書焚室而寬征稽前人之令典徙積薪而曲突為後日之預防代梁尚書賀皇后受冊表柔日載涓長秋肇建宫闈增重臣妾均歡竊以虞舜之仁始刑於媯汭文王之道亦盛於周南欲紹前芳實資內輔必有天作之合乃成王化之基恭惟皇帝陛下睦族移風明倫訓俗心正而朝廷正德本躬行家肥而天下肥治由內出比徇羣臣之瀆聿開萬世之休爰正坤儀用宣陰教東朝問寢方仰紹於徽音清廟奉嘗益助成於聖孝臣猥叨琳館阻上瑶觴卷耳知臣下之勞式歌采采螽斯宜子孫之衆行詠詵詵代賀皇后受册表誕揚涣號顯正坤儀喜動宫闈慶均寰海竊以聿來胥宇姜女開岐下之基憂在進賢后妃致周南之化或共濟艱難之運或弼成信厚之風考其以御於家邦莫匪造端乎夫婦洪惟盛世兼紹前徽允資內助之良克振中興之烈果膺天命式厚人倫恭惟皇帝陛下德本建中道先正始修己而安百姓睦族以和萬邦王假有家治蓋由於身率天立厥配祥靡自於人為采北闕之封章遵東朝之慈訓謂九重大養豈佐餕之可虛而七廟明禋實助祭之攸重神人咸契龜筮告從寶册有光椒塗載闢陰佐陽而成嵗方密贊於元功月遡日以生明永安行於黃道臣逺聞盛事內切歡悰稱萬嵗之觴阻趨班列賦百男之雅願播聲詩代台州王守謝獻助奬諭表邦用不資爰效涓埃之助王言下逮忽膺綸綍之褒仰荷寵靈伏深榮幸伏念臣身叨郡寄世受國恩夙懷事上之誠粗識愛君之義謂朝廷有非常之慶當備禮容而臣子修不腆之儀乃其職分方憂菲薄用速譴訶敢意孤蹤上塵睿奬忽奉璽書之訓頓生蔀屋之輝固將垂示於子孫豈但歡傳於民吏此蓋伏遇皇帝陛下使臣以禮御衆以寬禹儉自將惜兆民之財力舜聰旁逹知羣下之勤勞故雖一介之微亦拜十行之賜臣敢不益堅晚節更勵愚忠庶傾葵藿之心少答乾坤之施代賀元㑹表寶厯更端布王春於四海正衙受賀復元㑹於三朝華夏駿奔乾坤交泰恭惟皇帝陛下堯仁天覆湯聖日躋成功德以告神明觀㑹通而行典禮接千嵗之統已啓中興立一王之儀式彰盛節樂奏四夏廷設九賔舞千羽於兩階執玉帛者萬國垂衣南面始知皇帝之尊上壽東朝益顯聖人之孝臣逺紆郡紱阻造朝班夢想鈞天莫陪於獸舞心馳魏闕徒切於葵傾代謝御書表金石騰輝爰闡宸奎之祕圗書拜賜永為魯泮之藏黌舍生光山城動色竊以書契之作肇自鴻荒古今所傳可論工拙邈哉千載逹者幾人厥有楷法通神草書入聖皆由專習故克名家罕聞萬乘之尊妙極六書之藴抽寶跗於暇日録方册之微辭誕布多方式昭大訓恭惟皇帝陛下能由天縱道本生知博學而無所成名多聞而守之以約投戈講藝窮經史之淵源肆筆成書陋鍾王之體制寫之琬琰炳若丹青付以學官示一人之稽古頒諸寰宇俾四海以同文臣叨領銅符獲觀寶蹟諸生服化非關師帥之承宣百世傳芳自有鬼神之守護代誅叛卒謝放罪表凶卒結謀自干誅戮守臣專殺宜正典刑方引咎以懷憂忽疏恩而善貸法因人屈感與涕并伏念臣學昧變通性尤朴鄙比誤膺於朝命遂濫綰於州符宣布十行務存於寬大奉遵三尺但守於亷平空勞撫字之心蔑著循良之效屬國家之安靖駭士卒之猖狂輒起異圗隂規竊發密行蹤跡遂審誰何授以姓名悉皆擒獲方此倉皇之際不無反側之虞止流殛於渠魁靡推窮於詿誤術乖牧御既莫杜於姦萌事出權宜仍不遑於奏覆深惟罪戾甘俟譴訶豈意矜容得從幸免伏遇皇帝陛下堯天廣覆湯網大開文德洽於好生神武成於不殺戢兵禁暴坐臻四海之安忘過記功畢盡羣材之用故雖重負亦逭嚴科臣敢不益勵愚忠勉酬聖造仰體中和之政用思寬猛之宜羊去敗羣俾善良之無害馬不窮力期疲瘵之少蘇
