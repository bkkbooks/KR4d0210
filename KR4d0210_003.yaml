body:
  text: 漢濱集巻三宋王之望撰制詞賜特進尚書左僕射陳康伯等乞解機政檢㑹前奏速賜罷免不允詔勅康伯等省劄子所奏乞解機政檢㑹前奏速賜罷免事具悉機㑹之來安危所係議論之際可否是資卿等宜協定謀猷切磋利害以宏濟于大事俾無有于後艱胡恤異同輕為去就非朕之所望於大臣者也備禮要君之請在自信以何嫌解紛排難之功顧仰成之方切所請宜不允賜陳康伯乞祠不允詔卿厚徳元勲兩朝是賴深誠偉量一代所尊勤勞王家亦已至矣朕所以挽留之意豈顧問哉方今外虞孔艱大事未定卿久專機軸朕所倚毗一旦舍朕而去朕何以處此傳曰時然後言卿之告去時乎勉為朕留毋復困我賜左朝散大夫試兵部尚書湖北京西制置使虞允文乞除宫祠不允詔卿以文武有用之材宣力當世馳驅南北險阻備嘗方倚重于上游用紓憂于西顧投閒之請非朕所期所請宜不允賜右太中大夫錢端禮辭免除户部侍郎兼樞密都承㫖恩命不允詔勅端禮省所奏辭免除户部侍郎兼樞密都承㫖恩命事具悉足食足兵邦政所重于斯二者惟才實難卿以變通練達之資踐更中外所至可紀厥聲茂焉上皇所知己試有績朕實因任其又何辭徃圖爾庸以稱朕意所請宜不允陳康伯可罷尚書左僕射同中書門下平章事兼樞密使特授少保觀文殿大學士判信州進封福國公加食邑食實封制門下輔相股肱於元首身允佩於安危帝王體貌於大臣恩必隆於進退眷我冢司之老懇辭魁柄之榮既莫遂於挽留宜有加於寵秩肆頒明命誕告治朝特進尚書左僕射同中書門下平章事兼樞密使兼提舉編修玉牒所監修國史兼提舉編類聖政所信國公食邑七千九百户食實封三千一百户陳康伯學貫天人才周經緯中和自稟言有物而行有恒度量難名澄不清而撓不濁爰登揆路六閲嵗華當國家多事之時專廊廟萬幾之寄雍容鎮俗談笑折衝道蕩蕩以遵王無有作惡心休休而樂善其如有容邦政弗愆物情交附惟予一人纘承之慶本太上皇付託之誠能將順以輸忠實贊襄之有助心如金石勲在旂常朕方委任而責成爾亦勤勞而匪懈久煩機務累抗封章丁寧諭㫖而莫回傴僂陳詞而愈固式揚典冊俾解鈞衡亞保升華煥衮衣於左棘鴻儒列職冠書殿於西清進公社於新邦分使符於故里載疇井邑并衍圭腴於戯功名克保於始終古今所重出處暫均於勞逸中外何殊其思注意之深勿替告猷之舊可劉寳可特授安慶軍節度使依前捧日天武四廂都指揮使充鎮江都統制兼淮東路招撫使節制本路軍馬食邑實封如故制門下遣戍役以衛中國方深經武之圖聴鼓鼙而思將臣敢廢念功之典惟予爪士載總師干既宣專閫之勞盍復登壇之拜式揚孚號明告治朝捧日天武四廂都指揮使武泰軍承宣使充鎮江府駐劄御前諸軍都統制兼淮東路招撫使節制本路軍馬彭城郡開國公食邑三千六百户食實封一千二百户劉寳驍果冠時韜鈐决勝笑談劈臂氣嘗蓋于萬夫拳勇摧鋒身實更于百戰勲書盟府名播逺方早嚴六纛之儀横控大江之險軍聲甚振武備聿修中退處于宴閒兹重分于節制恩威未泯號令一新宜還豹尾之雄俾鎮龍舒之舊因其事任庸示眷懷於戯起李廣于故將軍期折彼匈奴之勢復魏尚為雲中守冀慰予鉅鹿之心益服休嘉以伸報效可賜陳康伯告口宣屢抗封章懇辭機務爰升孤棘出鎮鄉枌徃服恩光無煩謙遜賜劉寳告口宣復膺閫寄克振軍聲既著忠勞宜加寵渥龍舒舊鎮虎節載頒祗服恩光益茂勲烈賜撫問張浚到闕并賜金合茶藥口宣逺自師屯肅趨魏闕朝宗在即匽薄良勤宜有匪頒以申問勞副兹虚佇無憚疾驅賜安慶軍官吏軍民僧道耆壽等示諭勅書朕以劉寳載膺邊寄克壯軍威既宣分閫之勞宜復建旄之寵用畀同安之節以紓舊俗之思惟故將之重臨諒周邦之共喜賜張浚臘藥勅書為憲萬邦折衝一面方此嚴凝之候必須服餌之良宜有匪頒式昭至意除郭振武泰軍節度使賜本軍示諭勅書敕武泰軍官吏軍民僧道耆壽等朕以郭振勇且有謀老而克壯折衝禦侮蚤洊著於膚公御衆牧人今併膺於閫寄爰畀節制以為寵光既成命之惟行諒逺方之咸喜䇿問䇿問四首問昔夫子抱帝王之道鬱不得施退修六藝之教稽之前聖而不悖埀之後世而不誣使其一旦得志舉而措諸事業則平日之空言皆致君澤民之具也惟聖人多變不可執以一端故容有可疑者焉且豳詩七月言稼穡艱難之業甚詳然樊遲學稼則鄙而不予何周公陳於成王而夫子不以告門人邪周官司馬教軍旅戰陳之法甚備然靈公問陳則拒而不答何周公掌以六卿而夫子不以告時君邪虞舜命臯陶穆王命吕侯著於尚書是聖人不能廢刑矣而夫子則不取齊之以刑者聚人曰財理財曰義繫於周易是聖人不能遺利矣而夫子則罕言之夫詩書易夫子所修舜周公夫子所法顧不同如是而不知夫子見用於時於是四者將忽而不務歟則何為而存諸經也如皆用之則與平日之言亦相戾矣抑窮達之際所施異宜所言非所用所用非所言乎二三子方將行其所學者也其必有以知聖人矣請詳以告我問昔人論文章之難曰得之難知之愈難蓋古今文章其工拙髙下雖有定論然好惡不齊衆口難一非精於其道為世所宗者不足以擅其品藻也唐韓愈髙材絶識實主斯盟非徒當世學者依以成聲而後之史筆猶時借其言以評前作彼誠有以取信於後世矣然愈於漢人每以司馬遷相如劉向揚雄為言如賈誼董仲舒班固之徒皆不論也夫賈誼賦鵩弔屈之文固無愧於相如之大人揚雄之反騷其痛哭流涕之書又非封禪劇秦之可比也而過秦一論議者以為書傳之最善者至於仲舒言天人之際宜不在劉向下而班固之為良史抑亦差子長之肩其宏才麗藻足以相優而無甚相遼愈獨屢稱四人無一言及於三子何邪將出於偶然歟其亦固有輕重歟愈同時於文最重栁宗元於詩喜稱孟郊蓋嘗以宗元比馬遷而以郊詩髙出魏晉自今觀之宗元之作視太史為如何而郊之篇什孰愈曹劉潘陸輩也愈謹許與其抑揚比擬必有所謂願質數子之文而折中其是非將以觀諸君之精識問天下之風俗罔不惟上之倡而斯文為尤甚書稱堯曰文思舜曰文明禹曰文命商周之君或終始典于學或緝熙于光明故唐虞三代之人至今炳然與日月争光詩曰倬彼雲漢為章于天周王壽考遐不作人斯文之興豈不由上之為乎秦焚詩書天下以文為諱英如漢祖特不喜儒文景之際重之以黄老而朝廷大臣皆刀筆吏吹簫屠狗引彊蹶張之流宜此道之遂冺不數十年賈馬晁董之徒相望於時西漢詞章之盛與古争衡其後光武顯宗最重儒學然東京之作遽不及逺甚下逮魏晉以及梁隋其間君臣多尚文雅而筆墨氣格日以不振雖唐太宗聰睿卓絶輔以房魏之佐升平無事尤汲汲然加意於斯而終不能革六代之餘以此而言又似非上之所能為以我國家累聖相繼咸蓄盛藻昭回垂光異才競奮肆更多故學士失職主上喟然愍之書經訓以發其淵源闢膠庠以勵其器業居無㡬何羣試于有司者人握靈蛇之珠家抱荆山之璞彬彬如也然則謂文為不由於上可乎夫以漢髙文景之間絶不好文而作者如彼其多魏晉梁隋有唐之世君臣篤好而文字如彼其陋盛衰之變與時不同而今日之應若響何邪願聞其説問自三皇而來歴帝與王下逮五霸其事逺矣而見於六經之籍孔孟之言者不為不詳要其間容有可議者書曰唐虞稽古建官惟百夏商官倍是則帝道簡而王制加詳矣然舜以禮樂分命二官而周併總於一卿舜分天下為州十二而三代合為九州果孰為簡孰為詳乎孟子曰以徳行仁者王以力假仁者霸是則王者任徳而霸者任力矣然湯征十一武滅五十而齊桓九合諸侯不以兵車晉文教民禮義示原以信果孰任徳乎孰任力乎孔子之序書斷自唐虞則二帝之前宜荒忽無足稽矣不録桓文則二伯之烈宜卑陋而無足采矣然易繫辭述黄帝之制作與堯舜氏無少異而春秋之事實予齊晉何也舜典曰詩言志歌永言蓋有虞之世固已有詩與樂並行矣當孔子時魯猶用四代之樂則虞夏之詩豈無存者然其序三百五篇止及商周而臯陶之所賡五子之所歌皆不列於四始何也諸君學古通經講之已熟有司可得聞乎論語荅問荅何希深衛輒之問衛輒之事古今之論多矣孔子作春秋定天下之邪正以斷天下之疑使亂臣賊子知懼於此正宜大書屢書使深切著明以為萬世之法然其辭漠然無所懲勸且入其國而不避孔子以出公八年自陳入衛九年魯人招之始自衛反魯享其養而不却曼姑圍戚而不貶子路死悝而不罪則是孔子不以輒之立為非明矣公羊曰蒯聵為無道魯公逐蒯聵而立輒輒可以立乎曰可以王父命辭父命是父之行乎子也以王事辭家事是上之行乎下也此議最為通論今人有子不肖而逃幸而有孫焉其祖付之物曰父來勿與也父至而欲取之子當與父乎當守祖之命而不與乎與之則非徒已違王父命而亦使其父違父命父子之道廢矣不與則非徒已得所以尊祖而父亦得所以尊父父子之道兩得焉范甯稱榖梁以衛輒拒父為尊祖傷教害義不可彊通者特為不當拒其父命耳不以為不當立也江熙釋榖梁乃云若靈公廢蒯聵則經不得復稱世子稱世子則靈公未嘗命輒其從王父之言傳似失之是不然靈公不命輒則必歸蒯聵而立之不歸蒯聵又不立公子郢則是靈公之命輒也其稱世子者諸侯之世子必命于王蒯聵得罪于靈公而逃靈公雖不及廢猶廢也但未改命于天子耳故書曰世子非以為當立也又引鄭世子忽復歸于鄭為例非其比矣鄭忽於復歸稱世子則世子為當歸歸者無惡之辭也蒯聵於納稱世子則世子為弗當納納者不受之辭也春秋美惡不嫌同辭夫以世子出奔若其無罪人孰不欲其歸今大國興師以納之而國人不受則其為人可知矣書世子者所以正其名而甚其惡也若以世子為當立則楚世子商臣弑其君亦為當立乎公羊云齊國夏衛石曼姑帥師圍戚國夏曷為與衛曼姑圍戚伯討也曼姑受命于靈公而立輒義可以拒之何休釋曰曼姑無惡文知得拒蒯聵於曼姑言得拒之知輒之不得拒也然則輒之立也為可獨拒父為不可耳公羊許其立而不許其拒父是矣以拒父為尊祖者榖梁之説也二傳公羊為長後世曾不分别二事併而為一宜其説之不通蓋自江熙亂之而劉原父乃主其説此有心於闢傳之過也或曰輒既當立而不拒蒯聵使蒯聵得入輒當奈何曰輒之既立當迎其父以歸曰立輒者王父之命不敢失墜至於尊事之禮敢不極其優隆蒯聵見容則父子可以無間不幸而必欲得國則為輒者弗敢與争或死或奔於義皆得廢祖之命罪不在我所謂父雖不父子不可以不子者也蒯聵而稍有人心亦必底豫而不至於姦此舜之所以諧瞽䏂也豈可拒其來而不受乎或曰方孔子在衛輒若有問何以處之曰子路問孔子衛君待子而為政子將奚先子曰必也正名乎學者疑孔子得政於衛必變置其父子其失聖人之意逺矣夫有國者父稱公子稱世子名分之正也今輒子也而稱公蒯聵父也而稱世子名體不順至不可以並居豈不病哉蓋亦正其名而已正之奈何曰使蒯聵不為衛侯而為衛侯之父如趙之主父漢之太公之類别為一號以尊之不亦可乎此孔子正名之意也若必欲變置其位則是正其實也非止於名而已孔子謀人之國豈若是之疎乎或曰冉有疑夫子之為衛君子貢設夷齊之問而知其不為則孔子之不與輒明矣曰不然孔子居衛踰年而不去門人之髙弟又多仕之而初無一言非輒所以致冉有之疑先儒以為為助夫子不為者特不助耳固不以其立為不當也何休謂衛輒之立雖得正法非義之髙者故孔子不為此言得之武王滅商夫子猶以為未盡善於衛輒何助之有况當時衛之大臣與其國人皆不願蒯聵之立蒯聵得立置南子於何地輒雖欲遜其父豈可得乎假令賢者處此亦不過棄國而去為伯夷叔齊耳伯夷叔齊非所以責衛輒也若欲人人夷齊則春秋舉無全人雖齊桓晉文亦當誅絶豈特桓文武王伐紂而不用伯夷諫王季奪嫡而不為叔齊之遁亦皆得罪於聖人矣而可乎且孔子稱夷齊之何怨豈特可施之於輒以此而責蒯聵其孰不曰尤宜是孔子於衛侯父子俱無所為中立乎其間至於衛輒之立春秋無譏焉則是以王法而正之也夫蒯聵欲弑其母其子法當併廢靈公尚遵周道舍諸子而立孫則蒯聵之罪為至深而靈公無負於蒯聵輒於其祖其父尊親惟均當從其父乎當從其祖乎當從其有罪者乎當從其無負者乎議者徒知責衛輒以不遜其父而不思蒯聵之立為違父之命則似於義有偏恐非孔子中庸之意而失春秋所書之法也夫瞽䏂日欲殺舜而貴象舜從堯命而不從瞽䏂舜殛鯀而遜禹禹不敢念父之讎而順命于舜則輒之立尚何譏乎愚見如此未知當否幸有以正之講義論語發題昔孔子述而不作未嘗著書其繫易也述易之變而已易之外無説也其序書也述書之作而已書之外無説也春秋約魯史以成文而時出新意詩刪衆作以成書而弗改舊章此外戴經之所記止乎禮樂之事孝經之所稱不過孝弟之行其他雜見於諸子百家之書者徃徃其言得於傳授非復親承雖間有異聞而無所統紀皆不足以見天地之全古人之大體也若夫條貫具備本未有考出於孔氏之門而可以求聖人變化云為之妙者惟論語一書而止耳蓋夫子述詩書禮樂易與春秋王道備矣而其教不同恐習之者嗜其偏而不能以兼通溺於博而不能以反約也故平居答問之際摘其樞要以警悟學者其後門人集而成書其辭簡而盡其㫖深而明六經之道莫不總攝於此參之唯回之如愚子貢之性與天道易之精㣲也管仲曰仁子産曰惠子西曰彼哉春秋之褒貶也稱堯舜之巍巍禹之無間周之至徳則疏通知逺極書之髙致子貢因事以明詩子夏因詩以悟禮舉三百篇蔽以思無邪之一言則優柔該貫盡詩之深㫖純儉從衆拜下從禮行夏之時而用商周之車服達禮之變舉在此矣武為盡美韶為盡善以翕純皦繹之音語魯太師論樂之藴舉在此矣汪洋奥雅無所不備自始乎為士至終乎為聖人其進修之序皆具乎其中人而不求聖人之道則已如欲求聖人之道必盡心於此書而後可此書之不明而驟語六經則浩乎其無涯茫乎其無塗矣今夫天形之渾淪不可俄而度若察之以璣衡則經緯之動静躔度之疎密咸可推矣聖道之光大不可俄而測若求之於此書則聖賢之閫域師友之淵源咸可考矣然則論語者其孔氏之璣衡歟是故觀堯曰一篇則夫子之志意可知也觀述而一篇則夫子之教學可知也觀㣲子則夫子之出處去就可知也觀鄉黨則夫子之容止進退可知也觀子罕則夫子之言行道藝可知也觀子路則夫子之政事施設可知也至於先進一篇道羣弟子才分之淺深器業之小大資性之緩急其言尤詳讀之悠然可以想見其為人非特夫子所以品第其徒者如此至其門人亦各以其分量之所得而善於形容天子之道仰之彌髙鑽之彌堅則夫子之極致愈求而不可盡者不有見於此乎瞻之在前忽焉在後則夫子之中庸若近而不可能者不有見於此乎如天之不可升如日月之不可踰如宫墻之不可窺則夫子之道其髙明而深奥者不有見於此乎故熟讀論語伏而思之則吾夫子之儀形與羣弟子之揖遜如在其上如在其左右昭昭乎其無所隱矣去古既逺不讀此書何以求聖賢之遺範乎故予樂與諸君講學之雖聖言淵奥非末學所窺要之識隨賢愚小大各有所得亦不可無述也若乃前説之既善者今則循而用之不敢務新奇而有加或已有所見則從而著之不敢以固陋而自隱期於當而已矣諸君因講以求論語之書因書以㑹夫子之道黙而識之執方册以對古人庶㡬觀成周之禮者入廟而知周公學師襄之操者撫琴而見文王也不其偉歟為政以徳章洪範曰庶民惟星星有好風星有好雨言民心好惡之無常也為政者欲人人而悦之則雖得於此必拂於彼無適而可矣又曰月之從星則以風雨言人君政教失中而惟民之從則其為亂如日月失其所而從星者風雨之變也是故為人君者惟當建極於上以中正自居而不失其所則天下之民自四面而歸徃之矣書曰夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨必先之以爾身克正罔敢弗正民心罔中惟爾之中者蓋惟能處乎大中至正之地則民心雖無常終亦必恊于極豈不猶衆星之共北辰乎洪範曰皇建其有極無偏無陂遵王之義無反無側王道正直㑹其有極歸其有極皇建其有極所謂譬如北辰也無偏無陂無反無側所謂居其所也㑹其有極歸其有極所謂衆星共之者也然則所謂徳者如之何亦曰中正以觀天下而已道之以徳章道者誘道之齊者整齊之周官六典邦之刑政在焉孟子曰明其政刑二者聖王所不能去也然非其所以為先以輔吾之徳禮則可矣化之以徳禮而不變於是乎有政刑以俟之是以君子長者之道待天下也上之待民也如此則民皆興於亷恥而吾之教化無所不及矣故曰有恥且格格者至也言其無所不及也若道之以政齊之以刑則是以斯民為不可以徳禮化而不以君子長者之道待天下也上之待民也如此則民皆抵冒無恥而政刑亦有所不能及也故曰民免而無恥免者幸免也言有所不能及也吾十有五而志於學章荀子曰學惡乎始惡乎終曰其義始乎為士終乎為聖人蓋學而不至於聖皆未足以盡學也孔子方其十五而志於學則大聖之事業固已有潛諸其心者矣夫人患不學學患無志能志于學則無所不至矣惟學可以盡聖人之能事惟志可以成學者之極功故仲尼有為山之譬揚子有學海之喻皆言其有志與否耳茍有志於學矣則每進愈上至於從心其始也如木之有本雖未極乎髙大而根莖節葉畢具於中如水之有源雖未至於洪深而縱横曲折終至於海孔子所謂志於道者蓋此道也三十而立則是非毁譽莫能搖其守所謂立於禮也四十而不惑則死生禍福莫能動其心所謂知者不惑也其守不搖其心不動則一性湛然知吾所受於天者矣故五十而知天命所謂窮理盡性至於命也六十而耳順則凡耳之所聞無非道也七十而從心所欲不踰矩則凡心之念念無非道也其進道之序必每限之以十年者雖舉其大數蓋亦所謂真積力久者也然原其所自皆本於志學而已夫所謂生而知之者謂其樂之之誠出於自然耳非於天下之事物不學而皆知之也孔子以成童之年而能志於學終趨至聖之域則其樂之之誠可知此所以為生而知之歟孟懿子問孝章書曰世禄之家鮮克由禮孟氏魯之世卿也觀其所以事君則其所以事親者必多違於禮矣且懿子之父僖子病不知禮死屬二子於仲尼使學禮焉今而告之以禮亦所以慰其親之志也夫論語者師弟子問荅之書也弟子之問及於此人之行莫大於孝故以為先焉然有能問者有不能問者林放問禮之本曰大哉問樊遲問崇徳修慝辨惑曰善哉問此問得其道者也子路問事鬼神曰未能事人焉能事鬼問死曰未知生焉知死此問非其道者也孔子之告人不憤不啟不悱不發必先㣲見其端俟其人之反復而叩之然後極其説如子貢之問士曰敢問其次者再子路問君子曰如斯而已乎若此之類皆善問者也至於顔子之問仁夫子告之以克己復禮使他人聞之亦唯唯而已而顔子則能復之曰請問其目然後及於視聴言動之説此亦可以見其羣弟子審問之能否也懿子問孝子告之以無違亦欲其反復叩已而盡其説而懿子不能也若瀆告之則非待問之體若不言之則懼聞者之不察其㫖也故退而告樊遲樊遲之為人其性亦魯其問仁智子告以愛人知人而不達申告之以舉直錯枉亦不曉其所謂蓋其不敏如此故孔子以對懿子者告之蓋欲發其問因以祛其惑也夫子於荅問之際豈茍而已哉序論語以此為始蓋有深意其餘或詳或畧或顯或㣲或婉或直或答或不荅皆可以義推矣孟武伯問孝章人之一身内有隂陽之患外有人道之患隂陽之患吾無如之何若人道之患則在吾修身之何如耳豈可復貽父母之憂乎孟子曰事孰為大事親為大守孰為大守身為大失其所以守身能事其親者未之有也然則能守其身以免於人道之患可以為孝矣雖然孝子之事父母豈欲其有憂乎孔子之告武伯以唯疾之憂是亦使之謹疾也驕奢滛佚所以致疾之由也武伯世禄之家所以告之以此子游問孝章竭力以養父母者世俗之所謂孝也然犬能警馬可乘是皆能以力而為養矣君子之孝將何以自别於世俗乎亦曰敬而已矣敬者非貌敬也敬之於心也敬之於心者豈止於晨昏進見之際乎蓋雖屋漏暗室之間常若對嚴君焉夫如是豈復有遺行哉其為孝不可勝用也視其所以章聖人之觀人不以一日之善惡先視其今日之所以又觀其平昔之所由又察其將來之所安視其所以者閲其今日之所日用觀其所由者考其素所從來察其所安者要其終於悠久以此三者求之則人將何所隱矣見之及物者謂之視視之加意者謂之觀觀之加詳者謂之察所以在今為易見故云視所由既徃為難知故云觀所安未來為尤難知故曰察温故而知新章今日之新來日之故今日之故徃日之新道無新故顧吾之於道有已得與未得耳已得者温之而未忘未得者知之而不止所謂終始典于學者也故可以為人師顔子得一善則拳拳服膺而不失温故者也吾見其進未見其止知新者也君子不器章論語凡稱君子多與小人為對如周而不比比而不周泰而不驕驕而不泰和而不同同而不和之類不可槩舉此所謂君子不器則不然謂君子不可以一善器之然可器者亦不便為小人也孔子曰管仲之器小哉謂子貢曰女器也何害其為賢乎觀書者當考其意不可執一而廢百也此書有聖人賢人仁人善人志士智者勇者剛者有常者是雖道徳有廣狹資性有能否然皆可以正名之也至於君子雖有小大之不同要不可以一器名易於卦象皆稱君子左氏於褒貶則亦稱君子記於中庸亦曰君子是皆非一善之可名故以為稱焉如直哉史魚邦有道如矢邦無道如矢此其直為可器者至於蘧伯玉邦有道則仕邦無道則巻而懷之則不可器於直不直之間所以謂之君子
