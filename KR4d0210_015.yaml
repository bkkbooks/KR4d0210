body:
  text: 漢濱集巻十五宋王之望撰跋跋趙祖文七進圖先君宣和中在京師與竹隱公游喜稱誦其詞章後公出帥南陽過博望題詩傳舎自序少時娶田氏于襄陽攜家往來今三十年過之當時之人獨身在耳因感退之始興江口詩和之云邯鄲枕裏人何在華表聲中鶴僅存世事悲歡三百載此懐欲與退之論乙巳歲先君經行是驛見壁間粉牌曰此趙承之詩也小子識之時公已歿後二年而先君不幸又十八年見公從子祖文于武林出所畫七進圖示余觀其跋云圖中所存今惟二人因追記博望之詩則當時目前相逐者又零落如此而余亦孤苦流落行且老矣感歎之餘為之出涕然此圖文甚雅麗畫又妙絶所謂雖無老成人尚有典刑者也跋魯直書東坡卜算子詞東坡此詞出髙唐洛神登徒諸賦之右以出三界人遊戲三界中故其筆力藴藉超脱如此山谷屢書之且謂非食烟火語可謂妙於立言矣蓋東坡詞如國風山谷跋如小序字畫之工亦不足言也跋光祿堂記余襄陽人亂後還鄉登峴首光禄堂茅屋數椽此碑斷折殘缺為之悵然今見墨本豈特去國似人之比安得好亊者復摹諸石以為吾邦之偉觀也跋姚令威詛楚文詛楚文三集古所録不及亞駞意秦詛楚時名山大川皆有之其出有先後耳秦自殽之敗與晉為仇通盟於楚當自此始古者諸侯祭不越望亞駞并州川屬晉秦楚結好以擯晉乃越境而質之何也蔡君謨謂古篆或多或省或移之左右上下惟意所欲今觀此文信然如不為丕康為庸失為泆甚為湛者為諸義為􅀈以文考之於義皆允然余以類求之其曰穆公成王是戮力相好是字似當作寔也春秋左氏宋人來渝平公羊榖梁作輸平杜預以渝為變二傳以輸為墮釋音渝羊朱切輸式朱切此文云變輸盟刺則輸與變類蓋古渝輸字通當讀為渝因知二傳釋經之不及左氏也㑹稽姚令威推考此文甚詳多所釐正謂余曰岐陽石鼓世以為史籀所作本無所稽特見韋韓之詩惟此文戰國時書石刻中最古且筆法精婉非後世所及令威好古博識篆𨽻八分無所不工而以此文為宗其言宜不妄觀者考焉跋傅欽之手帖并温公東坡往還簡服膺傅獻簡公之髙風恨生之晚不得與執鞭之役一日其孫守攜畫像手澤見過遂獲瞻公之儀以想其徳窺公之字畫以求其心及觀温公東坡之帖又見公交遊之盛所以切磨之益則與升其堂見其人聞其論何異哉兹非幸耶跋劉提舉事迹余讀兩漢史見當時奉使絶域者皆間關於萬死中卒以智力成就其功名嘗歎息以為近世不復有此堅忍之士矣今觀劉君所為乃知世不乏人顧其所用之何如耳跋陸子履簡尺修撰公豐碑大字美矣而簡尺間小字尤自在可愛宜醉翁以繼君謨也跋閬州吕守文靖公手軸名卿鉅公文章字畫傳寳於世者多矣至於場屋程文未嘗覩其真蹟文靖公應鄉試詩賦巻至今尚存明堂之棟此其萌芽也豈不重可寳哉一代宗臣典刑未泯雖有神物䕶持抑可以見其後昆傳家之懿矣跋蔡瞻明雙松居士圖天台之麓梵釋之宫長松對植夭矯雙龍拔地俱起兮摩天掃空雄吟雌和兮萬壑清風下有丈人兮巾屨從容翫此歲寒兮何必友園綺而交黄公歸來明堂須棟兮無留滯乎山中書榮節婦傳後襄公三十年五月甲午宋災伯姫卒待傅姆也秋七月叔弓如宋𦵏共姫公羊曰稱諡賢也穀梁曰外夫人不書𦵏吾女也卒災故隱而𦵏之伯姫正矣然其死近於無名故左氏以為女而不婦榮節婦掖姑逃賊以姑老故及於難與伯姫之待姆孰重婦人之愛子也過於己節婦不以二子之命易其守與伯姫之禍止其躬孰難較二人處死之得節婦其尤也伯姫以諡稱則節婦之為節也宜哉春秋賢伯姫詳書其亊至今與日月争光節婦遭聖世褒揚義烈而大諌公上其狀以應赦書遂當列於國史昭示無極節婦視伯姫夫復何憾春秋以吾女故隱伯姫而𦵏之則大諫公之汲汲於節婦之傳為合乎春秋之義殆亦將牽聨得書矣題覺慧大師與權歲寒圖野曠山深老樹無隂憩疾者誰來蹤莫㝷支頥注目萬事無心嗒然喪我枯木龍吟傳桂女傳桂女李姓桂字襄陽榖城杜母人也桂年始笄桑仲據襄陽漢上大亂有羣賊夜入其家桂與昆弟避於屏處其父為賊得桂從隙中見之趨而出謂賊輩曰凡吾家之所有惟爾曹之所取吾父老矣幸諸君釋之賊不聽則引父之裾而慟賊徐見其色悦之欲刼與俱行不可及脅之以刃桂曰吾父為賊擄吾尚奚以生為此身有死不可以辱于賊也聲容俱厲無沮撓色賊度不可彊遂殺桂而卒免其父桂女之見殺也親戚鄉黨莫不為之歎息流涕傳曰臣事君猶子事父也子為父死無所恨然世罕能蹈之者至於臨難不茍免忘身以徇義雖古烈丈夫猶或難之孔父仇牧死於其君春秋書曰及其大夫賢之也秦漢而下至于今數百千歲其間身徇君親知處其死者求之於史蓋寥寥然絶無而僅有彼皆豪傑之士尊名教守節義為人所難為固宜如桂女者閭閻間一處子耳乃能倉卒之際奮不顧難與古烈丈夫争為難能賊入其家而身不避刃加其頸而色不變知惟父之免而不知死之可畏不亦絶人逺也哉今夫為人臣者食君之禄身戴髙位徳不稱而謀不臧陷君於難顧安視之或更役於仇人以煽其禍彼所以安於戮辱不能引决者非必為姦徒畏一死耳天下之禍莫大於畏死夫以仲由冉求聖門之髙弟而天下後世之所謂大賢人也然孔子期之止於弑君父之不從而已盡此而不從小則殺身大則亡族其節亦甚難非求生以害仁者所能辦也故人茍畏死則凡可以得生無所不可為然而未必其不死也斯人之徒宜禽獸之不若顧猶靦然面目立乎天下自以為善避禍聞桂女之風亦少愧哉王子曰吾聞桂女平昔為人性甚和柔寡語言與家人處雖犯而不校父母有所賜推善者以與姊妹而自取其惡者人視之退然者也乃一旦能爾哀哉墓誌銘故左朝請郎石君墓誌銘紹興十九年夏六月庚申通判台州石君滿秩去官郡之士大夫與四方之寄寓者燕餞閱月祖送傾城予與送君西郊慷慨言别後二十餘日聞君病未幾訃至凡前之送客相與驚悼流涕且憂其貧無以舉大事既數月其孤純臣以書與行狀來曰𦵏謹具惟誌諸墓者未有其詞丈人其為之銘予惟君之舊與其孤之志悲且憐之義不得辭按衛康叔七世孫靖伯食采於石後以為氏碏書春秋漢萬石君以孝謹顯厥宗遂大永嘉之亂曰舉南渡為建安太守子孫散處呉越或家于會稽之新昌枝葉蕃盛為東南望族君曾大父諱象之官至太常博士盛年掛冠自丞相潞國文公而下皆有詩送行優遊丘園四十餘年以卒其潜徳懿行見於清獻趙公之誌大父諱景勲隱逸不仕父諱師聖有聲場屋贈右朝奉大夫母韋氏贈宜人左朝議大夫知明州累贈特進驤之女君諱延慶字光錫六歲而孤自知力學穎悟絶人既長遂工文詞應鄉舉第一登紹興二年進士第授左廸功郎容州司戸參軍未赴試中教官改明州州學教授又中博學宏詞科循左修職郎終更授左從政郎入為詳定一司勅令所刪定官改左宣教郎充諸王宫大小學教授兼親賢宅講書宗祀明堂辟提㸃事務司幹辦官永祐因山總䕶使辟掌牋表尋除國子監丞言者論其常見執政私第叱其典謁出添差通判台州以賞典年勞累官至左朝請郎去台感末疾請致仕未報秋七月辛巳卒于新昌享年四十九逺近來赴哭之皆哀冬十二月庚申𦵏於嵊縣剡山之原君伉爽磊落襟抱夷曠嗜酒愛客雅有風味杯觴流行沈酣笑歌怡然放懐不屑韁鎖見之者無不心開意豁忘戚戚拘窘之態以故人多喜其為人識與不識皆字之曰光錫尤樂賙人之急倉卒扣門未嘗以有無為解吉凶不能振者輒身任之舅壽卿官會稽舉郡癘疫死者相枕藉莫敢過門君躬自調䕶宿食其家人或止之笑曰死生命也一無嫌憚之色其所為類如此四明更兵火後學宫不葺君請而新之泮宫之制始備生徒沓來遂舉鄉飲之禮明酬酢降登揖拜之節考訂甚詳後朝廷取其法頒之天下三歲一行以為定式歲在癸亥始建郊丘臨安君因面對乞備五輅以嚴禋祀從之自翠華南廵儀物草創大駕鹵簿至是赫然君平時脫略細謹咸以為不羈之才及論議設施皆大典禮人始知其不可量也素不歴州縣而臨海之政詳練敏達輔以儒雅士民安之與其兄嗣慶篤相友愛兄守江隂卒于官奔哭䕶喪奉祀極力事嫠撫孤甚有㤙惠當世英俊多與之遊俸稍所得索於賓客身後無儋石之儲淛東諸司俱治會稽協力經紀其家養生送死始頼以濟君之素行由是愈彰君之舊名襲慶集英唱第改賜今名娶同郡鄭氏封安人三男曰純臣純孝純行皆傳父業女二人尚處長許嫁右廸功郎處州青田尉陳達善自中興以來連取三科者惟君一人人物秀一時聲名籍籍衆望且大顯雖君亦自負而止於此庶幾裕其後人銘曰石宗渡江蕃於新昌厥材如林杞梓豫章猗歟光錫實惟其良連掇三科英聲洋洋興舉墜典禮文有光青㝠鎩翮厥飛不揚以位凖才十未一償嗚呼弗延惟命之傷琢銘堅石永閟幽藏遂寧馮君墓誌銘馮氏之先避唐末之亂自秦入蜀兄弟三人散居遂普緜三州間皆為著姓而遂州之馮多隱君子君遂之小溪人也曾祖諱堯民以經術操行髙于蜀聞于朝廷仁宗時再賜粟帛熈寧初召試舎人院不起其生也何公聖從論薦甚力歿則無盡張公以文表其墓子孫世其風流故居者重于出處仕者輕于去就皇祖諱正雅明經中第元符間提舉三門輦運以上書言事免與其弟正卿皆名刋黨石終朝奉大夫皇考諱芝五試禮部不第州舉八行辭不應鄉人稱為小隱君以别于其大父云贈右承事郎二子長曰耘以祖任入官鎖其㕔試上舎登科亦恬于進取終左奉議郎利州州學教授君其季也諱耔字與忠力學多聞居家孝友與奉議公同居四十餘年雍睦無間宗族之貧不能婚嫁者君任其責紹興初黨禁解大夫公始得致仕恩補君將仕郎非其志也諸臺數辟置不就乃擇君所便屈監荆井鎮酒税荆井去家不百里親舊勸駕君忻然從之踰月即棄去遂終身不仕浮沉里閭日與賔客談笑把酒篤于風義施窮周急不計有無四方逰士至遂者皆主于君館之雖久不厭益歡一時名人多與定交或為文詞以賛頌其為人君性樂易純誠不與物忤而遇事分别是非確然不可奪鄉黨愛而畏之咸取直焉古所謂一鄉之善士其君之徒歟年五十有九以微疾終于家實紹興丁丑季冬之丁巳也始娶潼川王氏左通議大夫維之女今夫人普慈王氏左朝㪚郎深之女男曰稷左廸功郎瀘南沿邊安撫司凖備差使曰呉帥早夭女曰穆嫁鄉貢進士李朴而卒曰秵尚㓜稷學行修整敏秀而文余使諸兒從授學焉因得與君遊知君為詳是宜其有子也累世隱徳其將發于斯乎稷將以某年月日𦵏君某所請銘余不得辭銘曰出處何常惟其所適不違已以徇物則超然于欣戚君藴不施其志則逸歸安此丘子孫逢吉故萬氏夫人墓誌銘余為博士太學有王生十朋者來學焉余得其程文在百千人中卓然也因置之異等其後學益䆳論議益純而文日益竒月校歲考屢先多士紹興十九年秋遂試上舎為第一諸儒厭服無異辭俄而母夫人病以九月某甲子卒明年冬十有一月某甲子與其父合𦵏于先塋之側白巖之原將𦵏使其徒鄭生遜志來致其辭曰十朋罪逆急一第為親榮鼓笥去家而吾親下世病不嘗藥餌斂不視衣衾星奔而歸闔棺在堂呌號不聞懐痛窮天已矣雖萬鍾之養亦無及矣惟有圖所以不朽者敢匄銘先生以掩諸幽以贖其不孝以慰吾兄弟之思羸瘠餘骸旦暮死滅不能自致宇下謹扶杖再拜授書門人惟先生哀之余發書流涕時適有逺役以裝遽辭而請益勤重傷孝子之心乃為之銘夫人姓萬氏温州樂清人曾祖諱文會祖諱安父諱勇皆隱徳不仕夫人未笄歸里人居士王君亊舅姑以孝謹聞姑沒三十年每春秋薦饗哀慕如初居士諱輔字安民賢而好學夫人習於見聞亦知書史能道其梗槩毎以古今篇詠口授兒輩居家有法度雖盛暑必正衣冠無少長一遇以禮見僮僕無惰容嚴於内外之分族屬非至親不接也鄉人春月婦人集僧舎觀佛亊夫人曰婦人職處閨房此何為者終其身不遊宗族化之遊者為息居士好賓客夫人常儲饌以待雖倉卒辦具未嘗告乏遇其子之客加厚且能料其人曰某也異日必達已而果然居士知其才任以家事内外之務畢舉而尤篤于教子愛而能嚴有過者年雖長不少假初居士每以學校中廢為其子病卒之明年太學興三子既除喪夫人悉遣受業泣送之曰吾割愛遣爾豈不旦夕念哉乃父之志不可廢也行矣勉之十朋文喜已出不蹈時俗前此數不利場屋夫人撫之曰得失有命顧所學如何吾不以是戚戚也其明達識道理類如此十朋既知名于時今為太學上舎人而二弟壽朋百朋亦以學行自立稱善士雖皆居士之教而夫人之力為多夫人享年六十有七臨終區處後事了了不亂三女皆淑慎長適邑子孫彦詔次適萬世忠能宜其家次許嫁支鴻孫三人孟甲孟乙孟丙嗚呼世之賢材多由母徳母之于子習而切故其訓也入如夫人賢是宜有子哉銘曰婦無非儀曷窺徳美欲知其人視夫與子夫稱善人子騰令名夫人之賢厥有典刑白巖之阡伉儷同穴刻銘斯石千載不滅行狀故客省使雄州防禦使涇原路兵馬鈐轄兼第十一將郭公行狀君諱成字信之姓郭氏徳順軍中安堡人也其先居儀州之華亭徙焉曾祖而上世系無所考公初應募為弓箭手累級補都指揮使熈寧七年討河州路白城叛羌有功換西頭供奉官從征交趾瀘南轉内殿承制元豐四年朝廷合五道兵趨靈武公將涇原選鋒八百騎賊扼温葉隘王師不得進公出竒力戰身被數創而氣愈厲賊潰獲級七百二十生擒六十二人遂至靈武有酋馳突陣前不可耐統制劉昌祚曰誰能取此者公請行伏於路傍賊至躍出斬其首馬上以獻昌祚大喜是行諸將皆以不利奪官公獨進階四等為涇原第十副將㝷遷為正有部將盗軍實覺公不忍窮治杖而遣之副與公有隙訟公輒杖部將坐免復起為經略司凖備將領第五副將終更再留紹聖三年秋夏人犯鄜延涇原出師牽制之攻其石門峽之新堡六晝夜拔之公力為多明年三月詔合熈河秦鳯環慶涇原之師築平夏城置第十一將以戍之在渭州之西葫蘆河之大川土地平衍袤數百里西直石門北當黙音峽東有減泊口温葉隘皆夏人出入孔道於是建盪羌九羊鎮羌通峽靈平五寨而平夏處其中元帥章楶議曰新邊控扼賊衝將宜得人誰可付者諸將皆曰非郭君不可楶趣召公相見見其魁龎福艾且數有戰功遂奏為第十一將駐平夏敵失地利朝夕憤怨明年十月乾順與其母空國大入謀曰平夏視諸壘最大郭某最知兵平夏下則諸壘悉平郭某得則諸將悉降其餘不足圖也遂縱兵合圍自黙音峽為連珠大寨東抵葫蘆河減泊口西連石門峽九羊寨南扼熈寧寨古壕門綿亘百餘里其名將六路統軍威明阿宻主攻城於内西壽監軍黙拉都克布禦援師於外穴地道堙塹激火起樓車衝輣以臨城中迭進番休矢石如雨晝夜不息公沛然若平時隨機應變方畧不窮自庚辰至壬辰賊死傷不可計國母者恚恨𠢐面流血一夕遁去圍方急諸路援兵大集壁於古壕門與賊對壘莫敢動有郭祖徳者以同姓故常兄事公時為統領責誚統制諸將王恩姚雄古种朴輩曰平夏存亡所繫非輕失平夏則新疆皆沒涇原危矣公等奉命擁精鋭赴危急宜以時進戰併力破賊乃臨敵巽懦按兵不出其如國家何且吾兄百口旦暮為擄諸君忍坐觀邪萬一不守必有任其咎者恩與雄古曰方且圖之朴曰兵未可出宜令郭統領登髙視賊虚實見可而後進祖徳曰諾乃以千騎上東山以望敵充滿川谷不見前後俄而賊騎奄至祖徳幾不脫既歸諸將問曰敵勢如何祖徳曰甚盛雖然願以數千騎突圍而入與兄共守死生以之朴曰無益也我輩不戰非怯也蓋有大不可者夫嬰孤城抗劇賊所恃以堅士心者援兵爾今吾衆寡不敵戰而勝圍未必解不幸小挫賊驅所獲以示城中則士卒解體誰與守者且郭公在城何憂及敵既走諸將問公何以守公曰賊何能為吾惟憂諸君戰爾其説正與朴合諸將始服公守有餘力果足制敵初不以外兵為輕重也陞統制官公乃與盪羌寨將折可適議曰賊新衂可乗若輕兵擣其巢穴可以大獲可適以為然乃詣幕府白帥帥以萬騎與之十二月辛巳潜兵將薩川由納木會分六道以進夜至錫斡井諸酋方聚飲不虞見襲蕃官額芬將佐張澤即帳中擒阿宻都克布及其家屬偽公主夫人首領等俘馘三千餘人獲牛馬羊以十萬計振旅還平夏二人皆大酋有智謀勇健善鬬歲入盜邊朝廷久知其名捷至哲宗大悦百僚稱賀於廷轉引進使雄州防禦使涇原路兵馬鈐轄上遣中使齎詔奬諭賜以御府兵器袍帶金帛之屬寵靈顯赫邊人榮之帥竒公功思有以慰其意移知徳順軍使晝錦還鄉元符三年徽宗即位覃恩轉客省使夏人知公去平夏侵擾不已帥亟召公還賊不敢復犯崇寧元年春三月命諸將合力築綏戎懐戎二堡而命公獨以本將兵城合流平會天大雪督工不息暴露得疾歸四月一日卒于平夏城享年五十有六上悼惜之命走馬承受張永鐸撫其家賜銀絹五百遺表外特官其婿張符為三班借職六月甲子𦵏于中安堡祖塋之側公之為内殿崇班右騏驥使以年勞州刺史客省使以恩霈其餘皆以功遷娶趙氏再娶范氏封永安縣君子男三人溱浩涓溱早亡浩今為某官涓修武郎天都寨兵馬都監五女皆適宦族公資貎豐偉襟度坦然踈財好施喜賓客撫養孤窮甚有恩惠守邊城二十年廪稍随手盡衣食粗給及任子先錄猶子二人初夏人犯沒煙峽公與折可適禦之被圍可適馬乏公推所乗之馬與之曰公決圍去我留死戰以家事累公可適曰公幸有親行矣我以死報國相持久之士衆感泣部將王告乃以已馬與可適於是分隊鏖擊賊大敗全師而歸其獲阿宻都克布也帥以軍受俘稱公之績嘉嘆再三公曰此折防禦之功也可適亦曰我與郭君異道而出郭君實獲二酋某何力之有帥曰諸將惟務争功二君乃爾相推邪遂俱被褒賞公嗜酒飲數斗不亂其駐平夏也知城王之才者䜛公曰縱飲廢事帥因召公至則燕飲終日酌以巨觴公盃至輒盡而不見酒色夜中罷會與論邊亊條陳慷慨貎整肅而語有倫帥異之乃出之才謗書示公曰彼將有不法而憚君邪有則以告帥得為君理之公謝守邊無狀宜致人言之才無罪且無之才公安得聞此帥益賢之翌日稱於衆曰郭君度量不愧古人公歸召之才與飲慰安之之才愧謝副將李萬者以弓箭手馬假人時約束甚嚴走馬承受欲按之萬憂恐不知所為公語萬曰第無慮將不忍副食貧而失祿代副坐之可也承受者感其義遂不復按嘗居平涼縣令馬希道者亷吏也官罷不能歸公憐之時方免官貧無他資盡質衣服弓劒為令辦裝令始能去公為將甚得士心所至畏愛既全平夏擒二酋威震西鄙雖小兒女子皆知公名及其卒也往往嗟咨流涕而平夏之人徳公尤深祠公于城之西水旱疾癘必禱禱必應廟享日嚴宣和元年亷訪使者王孝傑以聞上親灑宸翰曰郭成盡忠報國有功于民宜載祀典其議所以名其廟者有司請榜其額曰仁勇詔可嗚呼生有大功死為明神威福一方以享廟食雖古名將何以加此豈非精忠偉烈貫於幽明凛凛之氣歿而不朽者邪公之亡諸孤尚㓜邊方少文人儒士失於紀錄故事多遺逸獨其卓卓者猶播衆口不可埋沒謹錄其實以備史氏之闕謹狀
